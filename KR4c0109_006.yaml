front:
  text: 白蓮集卷第六
  hash: sha256:cf9191d6339a188d91232759bc0fa98a44fc8e845335679a80baf82df9161ce5
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0109_SBCK_006-1a}
body:
  text: 廬嶽僧齊己撰寄東林言之禪子間思相送後幽院閉苔錢使我吟還廢聞君病未痊聽秋惟困坐怕客但言眠可惜東窗月無聊過一年寒節日寄鄉友歲歲逢寒食寥寥古寺家踏青思故里垂白看楊花原野稀疏雨江天冷淡霞滄浪與湘水歸恨共無涯聞西蟾徔弟卜岩居嶽西有寄瀑布見髙低岩開岩壁西碧雲多舊作紅葉幾新題滴􅅹中疏磬嵌空半椅梯仍聞樵子徑不到前溪寄懷西蟾師弟蟾師有萬里八九月一身西北風之句萬里八九月一身西北風自徔相示後長記在吟中見説南逰逺堪懷我姓同江邊忽得信回到嶽門東撲滿子祗愛滿我腹爭知滿害身到頭須撲破却散與他人寄西川惠光大師曇域禪月有名子相知面未曾筆精垂壁溜詩澀滴杉氷蜀國徔栖泊蕪城幾廢興憶歸應寄夢東北過金陵憶别匡山寄彭澤乾晝上人憶别匡山日無端是逺逰却廽看五老翻悔上孤舟蹭蹬三千里蹉跎二十秋近來空寄夢時到虎溪頭又寄彭澤晝公聞君彭澤住結搆近陶公種菊心相似嘗茶味不同湖光秋枕上嶽翠夏窗中八月東林去吟香菡萏風因覽支使孫中丞看可準大師詩序有寄一千篇裏選三百首菁英玉尺新量出金刀舊翦成錦江增古翠仙掌減元精準公曽以詩遺訪司空圖于華下自此為風格留傳諸後生新秋病中枕上聞蟬枕上稍醒醒忽聞蟬上聲此時知不死昨日即前生更欲臨窗聽猶難䇿杖行尋應同蛻殼重飲露華清寄雲蓋山先禪師曽尋湘水東古翠積秋濃長老禪栖處半天雲蓋風間床饒得石雜樹少于松近有誰堪話瀏陽妙指蹤落葉落多秋亦晚窗外見諸鄰世上誰驚盡林間獨掃頻蕭騷微月夜重疊早霜晨昨日繁隂在鶯聲樹樹春次耒陽作繞嶽復沿湘衡陽又耒陽不堪思北客徔此入南荒旦夕多猿狖淹留少雪霜因經杜公墓惆悵學文章舟中晚望祝融峰天際卓寒青舟中望晚晴十年關夢寐此日向峥嶸巨石凌空黑飛泉照野明終當躡孤頂坐看白雲生弔杜工部墳鵬翅踏于斯明君知不知域中詩價大荒外土墳卑瘴雨無時滴蠻風有穴吹唯應學太白魂魄往來疲嶽中寄殷處士出嶽與入嶽新題寄後題遍尋僧壁上多在鴈峰西近説逰江寺將誰話石梯相思立髙巘山下草萋萋送幽禪師霜繁野葉飛長老卷行衣浮世不知處白雲相待歸磬和天籟響禪助嶽神威莫使言長往勞生待發機燒獵獵寒蕪引承風藝不還放來應有主焚去到何山熖入空濛裏煙飛蒼莽間石中有良玉惆悵但傷顔詠茶十二韻百草讓為靈功先百草成甘傳天下口貴占火前名出處春無雁收時谷有鶯封題徔澤國貢獻入秦京嗅覺精新極嘗知骨自輕研通天柱響摘繞蜀山明賦客秋吟起禪師晝卧驚角開香滿室爐動緑凝鐺晚憶涼泉對間思異果并松黃乾旋泛雲母滑隨傾頗貴髙人寄尤宜别匱盛曾尋修事法妙盡陸先生寄陽岐西峰僧西峰殘照東瀑布灑冥鴻間憶髙窗外秋晴萬里空藤隂藏石磴衣毳落杉風日有誰來覔層層鳥道中回雁峰瘴雨過孱顔危邊有徑􅌉壯堪扶夀嶽靈合置仙壇影北鴻聲亂青南客道難他年思隱遁何處憑闌干贈詢公上人威儀何貴重一室貯氷清終日松杉徑自多蟲蟻行像前孤立影鍾外數珠聲知悟修來事今為第幾生秋興所見背時情間行亦獨行晚涼思水石危閣望峥嶸雨外殘雲片風中亂葉聲舊山吟友在相憶夢應清古寺老松百歲禪師説先師指此松小年行道繞早見偃枝重月檻移孤影秋庭卓一峰終當因夜電拏攫便雲龍題無餘處士書齋間地徔莎蘚誰人愛此心琴碁懷客逺風雪閉門深枕外江灘響窗西樹石隂他年衡嶽寺為我一相尋歲暮江寺住山衣枯稿容何處見年終風雪軍城外蒹葭古寺中孤村誰認磬極浦夜鳴鴻坐憶匡廬隱泉聲滴半空新燕樓託近佳人應憐巧語新風光華屋暖絃管牡丹晨逺采江泥膩雙飛麥雨勻差池自有便敢觸杏梁塵喻吟日用是何專吟疲即坐禪此生還可喜餘事不相便頭白無邪裡魂清有象先江花與芳草莫染我情田過湘江唐宏書齋四鄰無俗迹終日大開門水曉來邊雁林秋下椘猿一家誰難在雙眼向書昏况近騷人廟吟應是古魂讀賈島集遺編三百首首首是遺冤知到千年外更逢何者論離秦空得罪入蜀但聽猿還似長沙祖惟餘賦鵩言寄山中諸友自歸城裡寺長憶宿山門終夜冥心客諸峯呌月猿嵐光生眼力泉滴爽吟魂只待遊方遍還來掃樹根懷終南僧擾擾二京塵何門是了因萬重千疊嶂一去不來人鳥道春殘雪蘿龕晝定身寥寥石窗外天籟動衣巾送二友生歸宜陽二生俱我友清苦輩流稀舊國居相近孤帆秋共歸殘陽沙鳥亂疏雨島楓飛幾宿多山處猿啼燭影微懷從弟孤窗燭影微何事阻吟思兄弟斷消息山川長路岐月沈棲鶴島霜著呌猿枝可想為懷抱多愁多難時嶽陽道中作客思尋常動未如今斷魂路岐經亂後風雪少人村大澤鳴寒雁千峰啼晝猿爭教此時白不上鬢須根赴鄭谷郎中招逰龍興觀讀題詩板謁七貞儀像因有十八韻何處陪逰勝龍興古觀時詩懸大雅作殿禮七貞儀逺繼周南美彌旌拱北思雄才垂朴略後輩仰針規對坐茵花暖偕行蘚陳隳僧初學結朝服久慵披到處琴棋傍登樓筆研隨論禪忘視聽談老極希夷照日江光逺遮軒檜影欹觸鞋松子響窺立鶴雛癡始貴茶巡爽終憐酒散遲放懷還把杖憩石或搘頤眺逺凝清盻吟髙動白髭風鵬心不小蒿雀志徒卑顧我專無作于身忘有為叨因五字解每忝重言期捨此應休也何人更賞之淹留仙境晚廽騎雪風吹書李秀才壁干戈阻上書南國寄貧居舊里荒應盡新年病未除窗風連島樹門徑接鄰蔬我有間來約相看雪滿株聞尚顔下世嶽僧傳的信聞在麓山亡群有為詩客誰來弔影堂夢休尋灞滻迹已絶瀟湘逺憶同吟石新秋檜柏涼薔薇根本似玫瑰繁英刺外開香髙藂有架紅落地多苔去住間人看晴明逺蝶來牡丹先幾日銷歇向塵埃送隆公上人獨携談柄去千里指人寰未斷生徒望難教白日間空江橫落照大府向西山好聘陳那孔誰云劫石頑宿簡寂觀萬壑雲霞影千年松檜聲如何教下士容易信長生月共虛無白香和沆􅒭清間尋古廊畫記得列仙名遇元上人七澤過名山相逢黃落殘杉松開寺晚泉月話心寒祖遍諸方禮經曾幾處看應懷出家院紫閣近長安早梅萬木凍欲折孤根暖獨回前村深雪裏昨夜一枝開風遞幽香去禽窺素豔來明年尤應律先發映春臺聽泉落石幾萬仞遠聲飄冷空髙秋𥘉雨後半夜亂山中只有照壁月更無吹葉風幾曽廬嶽聽到晚與僧同送孫逸人歸廬山獨自携琴鶴還歸瀑布東逍遙非俗趣楊柳謾春風草繞村程緑花盤石磴紅他時許相覔五老亂雲中聽李尊師彈琴仙子弄瑶琴仙山松月深此聲含太古誰聽到無心灑石霜千片噴崖泉萬尋何人傳指法携向海中岑寄武陵微上人善卷臺邊寺松筠繞祖堂秋聲度風雨曉色遍滄浪白石同誰坐清吟過我狂近聞為古律雅道更重光匡山寓居栖公外物盡已外間遊且自由好山逢過夏無事住經秋樹影殘陽寺茶香古石樓何時㝎休講歸嗽虎溪流湘西道林寺陶太尉井太尉遺孤井寒澄七百年未聞陵谷變終與姓名傳影浸無風樹光含有月天林僧晚來此滿汲灑金田寄松江陸龜蒙處士萬卷功何用狂稱處士休間欹太湖石醉聽洞庭秋道在誰開口詩成自點頭中間欲相訪尋便阻戈矛閉門外事休關念灰心獨閉門無人來問我白日又黃昏燈集飛蛾影窗消迸雪痕中心自明了一句祖師言看水范蠡東浮濶靈均北泛長誰知逺煙浪别有好思量故國門前急天涯棹裡忙難收上樓興渺漫正斜陽寄栖白上人萬國爭名地吾師獨此間題詩招上相看雪下南山內殿承恩久中條進表還嘗因秋貢客少得掩禪關自題禪外求詩妙年來鬢已秋未曽將一字容易謁諸侯挂夢山皆遠題詩石盡幽敢言梁太子傍采碧雲流孫攴使來借詩集因有謝冥搜從少小隨分得淳元聞説吟僧口多傳過蜀門相尋江島上共看夏雲根坐落遲遲日新題互把論夏日言懷苦𬒳流年迫衰羸老病情得歸青嶂死便共白雲生樹枿燒爐響崖稜躡屐聲此心人信否魂夢自分明早秋寄友生雨多殘暑歇蟬急暮風清誰有間心去江邊看水行河遙紅蓼簇野濶白煙平試折秋蓮葉題詩寄竺卿送王秀才往松滋夏課松滋聞古縣明府是詩家靜理餘無事欹眠盡落花江光搖夕照柳影帶殘霞君與應相與乘船泛月華喜辨公自武陵至已盡滄浪興還思湘椘行鬢全無舊黑詩别有新清暫憩臨寒水時來扣靜荆囊中有靈藥終不獻公卿假山并序假山者蓋懷匡廬有作也往歲嘗居東郭因夢覺遂圖于壁乞于十秋而攢青疊碧于夢寐間宛若捫蘿挽樹而升彼絶頂今所作倣像一面故不盡萬壑千岩神仙鬼怪之宅聊得解懷既而功就乃激幽抱而作是詩終于一百八十言爾匡廬久别離積翠杳天涯靜室曾圗峭幽庭復創奇典衣酬土價擇日運工時信手成重疊隨心作蔽虧根盤驚院窄頂聳訝簷卑鎮地那言重當軒未厭危巨靈何忍擘秦正肯輕移曉覺莎煙觸寒聞竹籟吹藍灰澄古色泥水合凝滋引看僧來數牽吟客散遲九華渾倣佛五老頗參差蛛網藤蘿挂春霖瀑布垂加添雙石笋映帶小蓮池舊説雷居士曽聞逺大師紅霞中結社白壁上題詩顧此誠徒爾勞心是妄為經營慙培塿賞玩愧童兒會入千峰去間蹤任屬誰謝西川可準上人逺寄詩集匡社經行外沷洲禪宴餘吾師還繼此後輩復何如江上傳風雅靜中詩卷舒堪隨樂天集共伴白芙蕖秋空已覺秋空極更堪寥泬青只應容好月爭合有妖星耿耿髙河截翛翛一雁經曾于洞庭宿上下徹心靈與聶尊師話道伯陽遺妙旨杳杳與冥冥説即非難説行還不易行藥中迷九轉心外覔長生畢竟荒原上一盤蒿壠平送相里秀才自京至却回夷門詩客至椘寺閉蕭騷老病語言澀少年風韻髙難于尋閬島險甚涉雲濤珍重西歸去無忘役思勞謝人寄南榴卓子幸附全材長良工斫器殊千枝文柏有一尺錦榴無品格宜仙果精光稱玉壺憐君逺相寄多愧野蔬粗寄舊居鄰友别後如何趣搜竒少客同幾層山影下萬樹雪聲中晚鼎烹茶緑晨厨爨米紅何時携卷出世代有名公送朱秀才歸閩荆門來幾日欲往又囊空逺客歸南越單衣背北風近鄉微有雪到海漸無鴻努力成詩業無諸謁至公龍潭作乍臨毛髮竪雙璧夾湍流白日鳥影過青苔龍氣浮蔽空雲出石應禱雨翻秋四面耕桑者先聞賀有秋依韻酬謝尊師見贈二首師欲調舉南國搜竒久偏傷杜甫墳重來經漢浦又去入嵩雲舊别人稀見新朝事漸聞莫將髙尚迹間處傲明君嶽頂休髙卧荆門訪掩扉新詩遺我别舊約與誰歸賢路曽無滯良時肯自違明年窺月窟仙桂露霏微送氷禪再往湖中行心寧肯住南去與誰群碧落髙空處清秋一片雲穿林瓶影滅背雨錫聲分應笑逰方久龍鍾椘水濆喜表公往椘王城己聞人捨地結搆舊基平一面湖光白鄰家竹影清應難尋輦道空是王城誰信興亡迹今來有磬聲春雪𥘉晴喜友生至數日不見日飄飄勢忽開雖無忙事出還有故人來已盡南簷滴仍殘北牖堆眀朝望平逺相約在春臺殘春連雨中偶作懷友人南鄰阻杖藜屐齒繞床泥漠漠長門掩遲遲日又西不知何興味更有好詩題還憶東林否行苔傍虎溪送崔判官赴歸倅白首徔顔巷青𫀆去佐官只應微俸祿聊輔舊飢寒地説邱墟甚民聞旱歉殘春風吹綺席賓主醉相歡寒食日懷寄友人萬井追寒食間扉獨不開梨花應折盡柳絮自飛來夢覺懷仙島吟行繞砌苔浮生已悟了時節任相催懷巴陵舊逰洞庭雲夢秋空碧共悠悠孟子狂題後何人更倚樓日西來逺棹風外見平流終欲重尋去僧窗古岸頭招乾晝上人宿話連夜因風雪相尋在寂寥禪心誰指示詩卷自焚燒語默鄰寒漏窗扉向早朝天台若長往還渡海門潮荆門秋日寄友人青溪知不逺白首要難歸空想煙雲裏春風鸞鶴飛誰論傳法偈自輔坐禪衣未謝侯門去尋常即掩扉哭鄭谷郎中朝衣聞典盡酒病覺難醫下世無遺恨傳家有大詩新
