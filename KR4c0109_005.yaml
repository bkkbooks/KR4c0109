body:
  text: 廬岳僧齊己撰寄仰山光味長者大仰禅棲䖏杉松到頂陰下来雖有路㱕去毎無心鳥道峰形直龍湫石影㴱經行誰得見半亱老猿吟貽廬岳陳沆秀才爲儒老雙鬂勤苦竟何如四海方磨劔空山自讀書石圍泉眼碧秋落洞门虚莫慮搜賢僻徵君舊此居邉上漢地從休馬胡家自牧羊都来銷帝道渾不用兵防草上孤城白沙翻大漠黄秋風𧺫邉雁一一向瀟湘蟋蟀聲異蟪蛄聲聴湏是正聽無風来竹院有月在莎庭雖不妨調瑟夛堪伴誦經誰人向秋夕爲爾𣣔忘形寄西山鄭谷神西望鄭先生焚修在杳冥幾番松骨朽未换鬂根青石闕凉調瑟秋壇亱拜星俗人應撫掌闲䖏誦黄庭讀參同契堪笑修仙侶燒金覔大還不知消息火只在寂寥關鬂白爐中術䰟飛海上山悲㢤五千字無用在人间闻落葉椘樹雪晴後蕭蕭落晚風囙思故園亱臨水幾株空煑茗焼乾脆行苔踏爛紅来年未離此還見碧叢叢謝王先軰昆弟逰湘中囘各見示新詩瀟湘夛勝異宗社乆徘徊兄弟同逰去幽奇盡采来只應求妙唱何以示寒灰上國携㱕後唯呈不世才寄酬髙輦推官道自闲機長詩從静境生不知春艶盡但覚雅風清竹膩題幽碧蕉乾裂翠聲何當九霄客重叠記無名逢詩僧禅玄無可並詩妙有何評五七字中苦百千年後清難求方至理不朽始為名珍重重相見忘機話此情話道大道多大咲寂寥何以論霜楓翻落葉水鳥啄闲门服薬還傷性求珠亦損䰟無端鑿混沌一死不還源謝歐陽侍郎寄示新集宫錦三十段金梭新織来殷勤謝君子迢逓寄寒灰鸑鷟對鼔舞神僊雙徘徊誰當巧裁製披去升瑤䑓西墅新居漸漸見苔青踈踈遍地生闲穿藤屐𧺫亂踏石堦行野鳥啼幽樹名僧笑此情殘陽竹陰裏老圃打门聲酬孫魴幽人還􅋢雲才子已從軍可信鴛鴻侣㪅思麋鹿羣新題雖有寄舊論竟難闻知己今如此編聫悉𣣔焚掃地日日掃復灑不容纎物侵敢望来客口道似主人心蟻過光中少苔依润䖏深门前亦如此一徑入踈林書匡山隐者壁紅霞青壁底石室薜蘿垂應有迷仙者曾逢採薬時桃花饒兩頰松葉淺長髭直是来城市何人識得伊送乾康禅師入山過夏由来喧滑境難駐寂寥蹤逼夏揺孤錫離城入亂峯雲门應近寺在路㦯穿松知在栖禅外題詩寄北宗野鴨野鴨殊家鴨離羣忽逺飛長生縁甚瘦近死為傷肥江海逰空濶池塘啄細㣲紅蘭白蘋渚春暖刷毛衣傷秋旦暮餘生在肌膚十分無眠寒半榻朽立月一株枯夢已随雙樹詩猶却萬夫名山未歸得可惜死江湖懐東湖寺鉄柱東湖岸寺髙人亦閒往年曾每日来此看西山竹徑青苔合茶軒白鶴還而今在天末𣣔去已衰顔寄峴山願公三首形影更誰親應懐􅃮道人片言酬鑿歯半偈伏姚秦榛莾池經焼蒿莱寺過春心期重西去一共吊遺塵相思恨相逺至理那時何道咲忘言甚詩嫌背俗夛青苔闲阁闭白日㫁人過獨上西樓望荆门千萬坡彼此無悄息所思江漢遙轉闻夛患難甚說逺相招老至何悲歎生知便寂寥终朝踏松影携手虎溪槁清袒作不惜白日短乍容清袒長㘴闻清露滴吟覚骨毛􅋽興寝無諸病空闲有一床天眀振衣𧺫苔砌落花香贈白䖏士莘野居何㝎浮生知是誰衣衫同野叟指趣似禅師白髮應無也丹砂乆服之仍闻創行計春暖向峨􅖭雀秀才宿話事轉闻夛事心休話苦心相留眀月寺共憶白雲岑蘚壁殘蛩韵霜軒倒竹陰開门又言別誰竟懐塵襟懐天台華頂僧華頂危臨海丹霞裡石槁曾從國清寺上看月眀潮好鳥親香火狂泉噴泬寥𣣔㱕師智者頭白路迢迢送人赴官年少作𥘉官還如行路難兵荒經邑里風俗乆凋殘照硯花光淡漂書柳絮乾聊應充侍膳薄俸繼朝飡水鶴鴛鴦與鸂鶒相狎豈慚君比雪還勝雪同羣亦出羣静巢孤島月寒夣九臯雲㱕路分眀過飛鳴即可闻湘中感興漁翁即㑹我傲兀葦邉行亂世難逸跡乘流擬濯纓江花紅細碎沙鳥白分眀向夕題詩䖏春風斑竹聲九日逢虗中虗受椘后萍䑓下相逢九日時干戈人事地荒廢菊花籬我已夛衰病君猶盡黑髭皇天安罪得解語便吟詩贈李眀府名家宰名邑將謂屈鋒鋩直是難蘇俗䏻消不下堂氷痕生硯水柳影透琹床何必稱瀟灑猶為詩酒狂暮春乆雨作積雨向春陰冥冥獨院深已無花落地空有竹藏禽簷溜聲何暴隣僧影亦沉誰知力耕者桑麦最關心渚宫莫问詩一十五首并序予以辛已歲蒙主人命居龍安寺察其踈鄙免以趍奉爰降手翰曰盖知心在常禮也予不覺欣然而作顧謂形影曰爾夲青山一衲白石孤禅全王侯搆室安之給俸食之使之楽然萬事都外逰息自得則雲泉猿鳥不必為狎其放縦若是夫何繫乎自是龍門墙仞歴稔不復瞻覬况他家㢤囙創莫问之題凡一十五篇皆以莫问為首焉莫问踈人事王侯巳任伊不妨随野性還似在山時静入無聲楽狂抛正律詩自為仍自􅋢敢望至公知莫问休持鉢從貧乞已踈侯门叨月俸齋食剰年儲簮履三千外形骸六十餘舊峯何錬若松徑接匡廬莫问依劉跡金䑓又度秋威儀非上客談笑愧諸侯禮許無拘检詩推異軰流東林未歸得摇落椘江頭莫问無機性甘名百鈍人一床鋪冷落長日卧精神分巳踈知舊詩還得意新多才碧雲客時㦯此相親莫问關门意從来寡往還道應㱕淡泊身合在空闲四面苔圍緑孤窓雨灑斑夣尋何䖏去秋色水邉山莫问逐性情人间髙此道禅外剰他名夏松邉㘴秋灮水畔行㪅無時忌諱容易得題成莫问多山興晴樓獨凭時六年滄海寺一别白蓮池句早逢名匠禅曽見祖師冥搜與真性清净裡尋思莫问伊嵇懶流年巳付他話通時事少詩著野題多夢外春桃李心中舊薛蘿浮生此不悟剃髪竟如何莫问休行脚南方已徧尋了應湏自了心不是他心赤水珠何覔寒山偈莫吟誰同論此理杜口少知音莫问孱愚格天應只與闲合居長樹下那稱衆人间跡絶為真隐機忘是大還終當學支遁買取箇青山莫问無求意浮雲喻可知滿盈如不戒倚仗更何疑楽矣賢顔子窮乎聖仲尼已過知命歲休把運行推莫问闲行趣春風野水涯千门無􅒜女両㟁有楊花好鶴曽為客真龍或作虵踟蹰自廽首日脚背樓斜莫问真消息中心只自知清風含笑詠眀月混希夷壊衲涼天擁玄文静亱披善㢤温伯子言外認揚眉莫问衰殘質流光速可悲寸心修未了長夀𣣔何為坐卧身多倦經行骨漸疲分明說此苦珎重竺乾師莫问野騰騰勞形已不䏻慇懃無上士珎重有名僧生覺心心黙行思歩步氷終㱕石房裡一點亱深燈荆州新秋病𧺫襍題一十五首病𧺫見王化融融古帝鄉暁煙凝氣紫晚色作雲黄四野歌豐稔千门唱樂康老身仍未死猶詠好風光病𧺫見圖畫病𧺫見圗畫雲門興似燒衲衣㯶笠重嵩岳華山遙命在齋猶赴刀闲髮盡凋秋光漸輕徤𣣔去倚江橋病𧺫見苔錢病𧺫見苔錢規模遍地圎兒童掃不破子母自相連润屋何曾有緣墻謾可憐虚教作銅臭空使外人傳病𧺫見庭竹病𧺫見庭竹君應悲我情何妨甚消瘦却稱苦修行每謝侵牀影時廽傍枕聲秋來漸平復吟遶骨毛輕病𧺫見生涯病𧺫見生涯資緣覺甚奢方袍嫌垢弊律服變光華頗愧同諸俗何嘗異出家三衣如兩翼珎重你寒鴉病𧺫見秋扇病𧺫見秋扇風前悟感傷念予當咽絶得爾致秋涼沙鷺如揺影汀蓮似綻香不同婕妤詠託意怨君王病𧺫見衰葉病𧺫見衰葉飄然似我身偶乘風有韻𥘉落地無塵縱得紅霑露争如綠帶春因傷此懐抱聊寄一篇新病𧺫見庭栢病𧺫見庭栢青青我不任力扶乾痩骨勉對歲寒心韻謝疎篁合根容片石侵衰殘想長夀時倚就閑吟病𧺫見庭蓮病起見庭蓮風荷已颯然開時闻馥郁枕上正纏綿本在滄江濶移来碧沼圎却思香社裏葉葉漏聲連病𧺫見庭菊病𧺫見庭菊幾勞栽種工可䏻經卧疾相倚自成叢翠蕚低含露金英盡亞風那知子愛爾不在酒盃中病𧺫見庭石病𧺫見庭石豈知經夏眠不䏻資藥價空自作苔錢翠憶藍光底青思瀑影邊嵒僧應笑我細碎種階前病𧺫見庭莎病𧺫見庭莎綠階傍竹多遶行猶未得静聽復如何蟋蟀幽中響蟪蛄深處歌不緣田地窄剩種任婆娑病𧺫見苔色病𧺫見苔色凝然陣未枯淺深圍柱礎詰曲遶廊廡碧翠文相间青黄勢自鋪為錢虗玷染畢竟不如無病𧺫見秋月病𧺫見秋月正當三五時清光應鑒我幽思更同誰惜坐身猶倦牽吟氣尚羸明年七十六約此健相期病𧺫見闲雲病𧺫見闲雲空中聚又分滯留堪笑我舒卷不如君觸石終無跡徔風或有闻仙山足鸞鳳歸去自同群夜坐闻雪寄所知𥘉霄飛霰急竹樹洒乾輕不是知音者難教愛此聲漸凌孤燭白偏激苦心清堪想同文友忘眠坐到明懐洞庭憶過巴陵歲無人问去留中霄滿湖月獨自在僧樓漁父真闲唱靈均是謾愁今来欲長往誰借木蘭舟欲游龍山鹿苑有作龍山門不逺鹿苑路非遥合逐闲身去何湏待客招年華殘兩髩筋骨倦長宵闻説峯前寺新修白石橋再逢晝公竟陵西别後徧地𧺫刀兵彼此無緣著雲山有䖏行久吟難敵句終忍不求名年鬂俱如雪相看眼且明送人逰武陵湘中為子歌行樂西南入武陵風烟無戦士賓榻有吟僧山遶軍城叠江臨寺阁層遍尋幽勝了湘水泛清澄酬九經者九經三史學窮妙又窮微長白山𥘉出青雲路欲飛江僧酬雪沙鶴識麻衣家在黄河北南來偶未歸寄贈集灘二公闻有難名境因君住更名軒窗中夜色風月遶灘聲客好過無厭禽幽畫不成終期一尋去聊且寄吟僧夏日作燕省語相和風池滿芰荷可驚成事晚殊甚得闲多竹衆涼欺水苔繁綠勝莎無慙孤聖代賦詠有诗歌行路難下浸與髙盤不為行路難是非真險惡翻覆作峯巒漆媿同時黑朱慙巧處丹令人畏相識欲畫白雲看送玉泉道者囬山寺却憶西峰頂經行絶愛憎别來心念念歸去雪層層石塢尋春笋苔龕續夜燈應悲塵土裡追逐利名僧謝王拾遺見訪兼寄篇什竹裏安禅䖏生涯一印灰經年乞食過昨日谏臣来愧把黄梅偈曾酬白雪才因令識鳥跡重叠在蒼苔題張氏池亭樹石叢叢别诗家趣向幽有時闲客散始覺细泉流蝶到琴棋畔花過島嶼頭月明红藕上應見白龜逰送人南逰且聽吟贈逺君此去蒙州瘴國頻闻说邊鴻亦不逰蠻花藏孔雀野石亂犀牛到彼誰相慰知音有郡侯題明公房寺北聞湘浪牕南見嶽雲自然髙日用何要出人群瓦滴殘松雨爐香匝印文近年精易道疑者曉紛紛寄顧處士半年離别夢来往即湖邊兩幅關山雪尋常在眼前項容藏古翠張藻卷寒煙藍淀圗花鳥時人不惜錢貽徐生可䏻東海子清苦在貧居掃地無闲客堆窗有古書少年猶若此向老合何如去歲頻相訪今来亦見疎謝虚中上人晚秋見寄楚外同文在荊門得信時幾重相别意一首晚秋詩日暮山沈雨蓮殘水滿池登樓試南望為子動歸思白蓮集卷第五
