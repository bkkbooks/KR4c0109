front:
  text: 白蓮集卷第五
  hash: sha256:b5fa572761b1ef387c5c487fca20adae29a1fb35b8d821138b264812ae523c1f
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0109_SBCK_005-1a}
body:
  text: 廬嶽僧齊己撰寄仰山光味長者大仰禪棲處杉松到頂陰下來雖有路歸去每無心鳥道峰形直龍湫石影深經行誰得見半夜老猿吟貽廬嶽陳沆秀才為儒老雙鬢勤苦竟何如四海方磨劔空山自讀書石圍泉眼碧秋落洞門虛莫慮搜賢僻徵君舊此居邉上漢地從休馬胡家自牧羊都來銷帝道渾不用兵防草上孤城白沙翻大漠黃秋風起邉雁一一向瀟湘蟋蟀聲異蟪蛄聲聽須是正聽無風來竹院有月在莎庭雖不妨調瑟夛堪伴誦經誰人向秋夕為爾𣣔忘形寄西山鄭谷神西望鄭先生焚修在杳冥幾番松骨朽未换鬢根青石闕涼調瑟秋壇夜拜星俗人應撫掌間處誦黃庭讀參同契堪笑修仙侶燒金覔大還不知消息火只在寂寥關鬢白爐中術魂飛海上山悲哉五千字無用在人間聞落葉椘樹雪晴後蕭蕭落晚風因思故園夜臨水幾株空煮茗燒乾脆行苔踏爛紅來年未離此還見碧叢叢謝王先輩昆弟逰湘中回各見示新詩瀟湘夛勝異宗社久徘徊兄弟同逰去幽奇盡采來只應求妙唱何以示寒灰上國携歸後唯呈不世才寄酬髙輦推官道自間機長詩從靜境生不知春艷盡但覺雅風清竹膩題幽碧蕉乾裂翠聲何當九霄客重疊記無名逢詩僧禪玄無可並詩妙有何評五七字中苦百千年後清難求方至理不朽始為名珍重重相見忘機話此情話道大道多大笑寂寥何以論霜楓翻落葉水鳥啄間門服藥還傷性求珠亦損魂無端鑿混沌一死不還源謝歐陽侍郎寄示新集宫錦三十段金梭新織來殷勤謝君子迢遞寄寒灰鸑鷟對鼓舞神仙雙徘徊誰當巧裁製披去升瑤臺西墅新居漸漸見苔青踈踈遍地生間穿藤屐起亂踏石階行野鳥啼幽樹名僧笑此情殘陽竹陰裏老圃打門聲酬孫魴幽人還􅋢雲才子已從軍可信鴛鴻侣更思麋鹿羣新題雖有寄舊論竟難聞知己今如此編聫悉𣣔焚掃地日日掃復灑不容纎物侵敢望來客口道似主人心蟻過光中少苔依潤處深門前亦如此一徑入踈林書匡山隱者壁紅霞青壁底石室薜蘿垂應有迷仙者曾逢採藥時桃花饒兩頰松葉淺長髭直是來城市何人識得伊送乾康禪師入山過夏由來喧滑境難駐寂寥蹤逼夏搖孤錫離城入亂峯雲門應近寺在路或穿松知在栖禪外題詩寄北宗野鴨野鴨殊家鴨離羣忽逺飛長生緣甚瘦近死為傷肥江海逰空濶池塘啄細微紅蘭白蘋渚春暖刷毛衣傷秋旦暮餘生在肌膚十分無眠寒半榻朽立月一株枯夢已隨雙樹詩猶却萬夫名山未歸得可惜死江湖懷東湖寺鐵柱東湖岸寺髙人亦間往年曾每日來此看西山竹徑青苔合茶軒白鶴還而今在天末𣣔去已衰顔寄峴山願公三首形影更誰親應懷􅃮道人片言酬鑿齒半偈伏姚秦榛莾池經燒蒿萊寺過春心期重西去一共吊遺塵相思恨相逺至理那時何道笑忘言甚詩嫌背俗夛青苔間閣閉白日斷人過獨上西樓望荆門千萬坡彼此無悄息所思江漢遙轉聞夛患難甚説逺相招老至何悲歎生知便寂寥終朝踏松影携手虎溪稿清袒作不惜白日短乍容清袒長坐聞清露滴吟覺骨毛􅋽興寢無諸病空間有一床天眀振衣起苔砌落花香贈白處士莘野居何㝎浮生知是誰衣衫同野叟指趣似禪師白髮應無也丹砂久服之仍聞創行計春暖向峨􅖭雀秀才宿話事轉聞夛事心休話苦心相留眀月寺共憶白雲岑蘚壁殘蛩韻霜軒倒竹陰開門又言別誰竟懷塵襟懷天台華頂僧華頂危臨海丹霞裡石稿曾從國清寺上看月眀潮好鳥親香火狂泉噴泬寥𣣔歸師智者頭白路迢迢送人赴官年少作𥘉官還如行路難兵荒經邑里風俗久凋殘照硯花光淡漂書柳絮乾聊應充侍膳薄俸繼朝餐水鶴鴛鴦與鸂鶒相狎豈慚君比雪還勝雪同羣亦出羣靜巢孤島月寒夢九臯雲歸路分眀過飛鳴即可聞湘中感興漁翁即會我傲兀葦邉行亂世難逸迹乘流擬濯纓江花紅細碎沙鳥白分眀向夕題詩處春風斑竹聲九日逢虗中虗受椘后萍臺下相逢九日時干戈人事地荒廢菊花籬我已夛衰病君猶盡黑髭皇天安罪得解語便吟詩贈李眀府名家宰名邑將謂屈鋒鋩直是難蘇俗能消不下堂氷痕生硯水柳影透琴床何必稱瀟灑猶為詩酒狂暮春久雨作積雨向春陰冥冥獨院深已無花落地空有竹藏禽簷溜聲何暴鄰僧影亦沉誰知力耕者桑麥最關心渚宫莫問詩一十五首并序豫以辛已歲蒙主人命居龍安寺察其踈鄙免以趍奉爰降手翰曰蓋知心在常禮也豫不覺欣然而作顧謂形影曰爾夲青山一衲白石孤禪全王侯搆室安之給俸食之使之樂然萬事都外逰息自得則雲泉猿鳥不必為狎其放縱若是夫何繫乎自是龍門墻仞歷稔不復瞻覬况他家哉因創莫問之題凡一十五篇皆以莫問為首焉莫問踈人事王侯巳任伊不妨隨野性還似在山時靜入無聲樂狂拋正律詩自為仍自􅋢敢望至公知莫問休持鉢從貧乞已踈侯門叨月俸齋食剩年儲簮履三千外形骸六十餘舊峯何錬若松徑接匡廬莫問依劉迹金臺又度秋威儀非上客談笑愧諸侯禮許無拘檢詩推異輩流東林未歸得搖落椘江頭莫問無機性甘名百鈍人一床鋪冷落長日卧精神分巳踈知舊詩還得意新多才碧雲客時或此相親莫問關門意從來寡往還道應歸淡泊身合在空間四面苔圍緑孤窗雨灑斑夢尋何處去秋色水邉山莫問逐性情人間髙此道禪外剩他名夏松邉坐秋灮水畔行更無時忌諱容易得題成莫問多山興晴樓獨憑時六年滄海寺一别白蓮池句早逢名匠禪曽見祖師冥搜與真性清淨裡尋思莫問伊嵇懶流年巳付他話通時事少詩著野題多夢外春桃李心中舊薛蘿浮生此不悟剃髮竟如何莫問休行腳南方已遍尋了應須自了心不是他心赤水珠何覔寒山偈莫吟誰同論此理杜口少知音莫問孱愚格天應只與間合居長樹下那稱衆人間迹絶為真隱機忘是大還終當學支遁買取箇青山莫問無求意浮雲喻可知滿盈如不戒倚仗更何疑樂矣賢顔子窮乎聖仲尼已過知命歲休把運行推莫問間行趣春風野水涯千門無􅒜女兩岸有楊花好鶴曽為客真龍或作蛇踟蹰自廽首日腳背樓斜莫問真消息中心只自知清風含笑詠眀月混希夷壞衲涼天擁玄文靜夜披善哉溫伯子言外認揚眉莫問衰殘質流光速可悲寸心修未了長夀𣣔何為坐卧身多倦經行骨漸疲分明説此苦珍重竺乾師莫問野騰騰勞形已不能殷勤無上士珍重有名僧生覺心心默行思步步氷終歸石房裡一點夜深燈荆州新秋病起雜題一十五首病起見王化融融古帝鄉曉煙凝氣紫晚色作雲黃四野歌豐稔千門唱樂康老身仍未死猶詠好風光病起見圖畫病起見圗畫雲門興似燒衲衣棕笠重嵩嶽華山遙命在齋猶赴刀間髮盡凋秋光漸輕健𣣔去倚江橋病起見苔錢病起見苔錢規模遍地圎兒童掃不破子母自相連潤屋何曾有緣墻謾可憐虛教作銅臭空使外人傳病起見庭竹病起見庭竹君應悲我情何妨甚消瘦却稱苦修行每謝侵牀影時廽傍枕聲秋來漸平復吟繞骨毛輕病起見生涯病起見生涯資緣覺甚奢方袍嫌垢弊律服變光華頗愧同諸俗何嘗異出家三衣如兩翼珍重你寒鴉病起見秋扇病起見秋扇風前悟感傷念豫當咽絶得爾致秋涼沙鷺如搖影汀蓮似綻香不同婕妤詠託意怨君王病起見衰葉病起見衰葉飄然似我身偶乘風有韻𥘉落地無塵縱得紅霑露爭如緑帶春因傷此懷抱聊寄一篇新病起見庭柏病起見庭柏青青我不任力扶乾瘦骨勉對歲寒心韻謝疏篁合根容片石侵衰殘想長夀時倚就間吟病起見庭蓮病起見庭蓮風荷已颯然開時聞馥郁枕上正纏綿本在滄江濶移來碧沼圎却思香社裏葉葉漏聲連病起見庭菊病起見庭菊幾勞栽種工可能經卧疾相倚自成叢翠蕚低含露金英盡亞風那知子愛爾不在酒杯中病起見庭石病起見庭石豈知經夏眠不能資藥價空自作苔錢翠憶藍光底青思瀑影邊嵒僧應笑我細碎種階前病起見庭莎病起見庭莎緑階傍竹多繞行猶未得靜聽復如何蟋蟀幽中響蟪蛄深處歌不緣田地窄剩種任婆娑病起見苔色病起見苔色凝然陳未枯淺深圍柱礎詰曲繞廊廡碧翠文相間青黃勢自鋪為錢虗玷染畢竟不如無病起見秋月病起見秋月正當三五時清光應鑒我幽思更同誰惜坐身猶倦牽吟氣尚羸明年七十六約此健相期病起見間雲病起見間雲空中聚又分滯留堪笑我舒卷不如君觸石終無迹徔風或有聞仙山足鸞鳳歸去自同群夜坐聞雪寄所知𥘉霄飛霰急竹樹灑乾輕不是知音者難教愛此聲漸凌孤燭白偏激苦心清堪想同文友忘眠坐到明懷洞庭憶過巴陵歲無人問去留中霄滿湖月獨自在僧樓漁父真間唱靈均是謾愁今來欲長往誰借木蘭舟欲遊龍山鹿苑有作龍山門不逺鹿苑路非遙合逐間身去何須待客招年華殘兩鬢筋骨倦長宵聞説峯前寺新修白石橋再逢晝公竟陵西别後遍地起刀兵彼此無緣著雲山有處行久吟難敵句終忍不求名年鬢俱如雪相看眼且明送人逰武陵湘中為子歌行樂西南入武陵風煙無戰士賓榻有吟僧山繞軍城疊江臨寺閣層遍尋幽勝了湘水泛清澄酬九經者九經三史學窮妙又窮微長白山𥘉出青雲路欲飛江僧酬雪沙鶴識麻衣家在黃河北南來偶未歸寄贈集灘二公聞有難名境因君住更名軒窗中夜色風月繞灘聲客好過無厭禽幽畫不成終期一尋去聊且寄吟僧夏日作燕省語相和風池滿芰荷可驚成事晚殊甚得間多竹衆涼欺水苔繁緑勝莎無慙孤聖代賦詠有詩歌行路難下浸與髙盤不為行路難是非真險惡翻覆作峯巒漆愧同時黑朱慙巧處丹令人畏相識欲畫白雲看送玉泉道者回山寺却憶西峰頂經行絶愛憎别來心念念歸去雪層層石塢尋春笋苔龕續夜燈應悲塵土裡追逐利名僧謝王拾遺見訪兼寄篇什竹裏安禪處生涯一印灰經年乞食過昨日諫臣來愧把黃梅偈曾酬白雪才因令識鳥迹重疊在蒼苔題張氏池亭樹石叢叢别詩家趣向幽有時間客散始覺細泉流蝶到琴棋畔花過島嶼頭月明紅藕上應見白龜逰送人南逰且聽吟贈逺君此去蒙州瘴國頻聞説邊鴻亦不逰蠻花藏孔雀野石亂犀牛到彼誰相慰知音有郡侯題明公房寺北聞湘浪窗南見嶽雲自然髙日用何要出人群瓦滴殘松雨爐香匝印文近年精易道疑者曉紛紛寄顧處士半年離别夢來往即湖邊兩幅關山雪尋常在眼前項容藏古翠張藻卷寒煙藍淀圗花鳥時人不惜錢貽徐生可能東海子清苦在貧居掃地無間客堆窗有古書少年猶若此向老合何如去歲頻相訪今來亦見疏謝虛中上人晚秋見寄楚外同文在荊門得信時幾重相别意一首晚秋詩日暮山沈雨蓮殘水滿池登樓試南望為子動歸思白蓮集卷第五
