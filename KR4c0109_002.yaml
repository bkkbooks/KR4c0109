body:
  text: 廬嶽僧齊己撰寄鄭谷郎中清名喧省閣雅頌出吾唐叠嶠供秋望無雲到夕陽自封修藥院别掃著僧牀幾夢中朝事依依鵷鷺行㱕雁塞門春已暖連影起蘋風雲夢千行去湘川一夜空江人休舉網虜將又虛弓莫失南來伴衡陽樹即紅登大林寺觀白太傅題版九疊蒼崕裏禪家鑿翠開清時誰夢到白傅獨尋來怪石和僧㝎閑雲共鶴廽任兹休去者心是不然灰贈􅔟松先輩今歲赴春闈逹如夫子稀山中把卷去榜下注官㱕椘月吟前落江禽酒外飛閑遊向諸寺却看白麻衣夏日江寺寄無上人講終齊磬罷何處稱真心古寺髙杉下炎天獨院深燕和江鳥語墻奪暮花陰大府多才子閒過在竹林夏日梅雨中寄睦公梅月來林寺冥冥各閉門已應雙履跡全沒亂雲根琢句心無味看經眼亦昏何時見晴霽招我憑巖軒傷鄭谷郎中鍾陵千首㑅茟絶亦身終知落干戈裏誰家煨燼中吟齊春長蕨釣渚夜鳴鴻惆悵秋江月曾招我看同􅎔行題友壁山衲冝何處經行避暑深峰西多古寺日午亂松陰鶴默堪分靜蟬涼解助吟殷勤題壁去秋早此相尋别東林後寄回修睦昨夜從香社辭君出薜蘿晚來巾舄上已覺俗塵多逺路縈芳草遙空共白波南朝在天末此去重經過古松雷電不敢伐鱗皴勢萬端蠧依枯莭死蛇入朽根盤影浸僧禪􅊜聲吹鶴夢寒尋常風雨夜應有鬼神看夏日栖霞寺書懷寄張逸人人中林下現名自有閑忙建業紅塵熱栖霞白石凉倚身柳兒穩灑面瀑流香不似髙齊裡花連竹影長訪自牧上人不遇然諾竟如何諸侯見重多髙房度江雨經月長寒莎道本同騷雅書曾到薜蘿相尋未相見危閣望滄波題東林白蓮大士生兜率空池滿白蓮秋風眀月下齊日影堂前色後群芳坼香殊百和然誰知白染性一片好心田寄懷江西徴岷二律師亂後江邊寺堪懷二律師幾畨新弟子一樣舊威儀院影連春竹窗聲接雨池共緣山水癖久别共題詩東林作寄金陵知已十八賢貞在時來拂蘚看已知前事逺更結後人難泉滴勝清磬松香掩白檀慿君聽朝貴誰𣣔厭簮冠山寺喜道者閏年春過後山寺始花開還有無心者閑尋此境來鳥幽聲忽斷茶好味重廽知住南岩久冥心㘴緑苔再逰匡山紫霄兼二老相對倚空寒久别成衰病重來更上難徑危雲母滑崖旱瀑流乾目斷嵐煙際神仙有石壇贈浙西李推官他皆恃勳貴君獨􅋢詩玄終日秋光裡無人竹影邉東樓生倚月北固積吟煙聞說鴛行裏夛才復少年題終南山隱者室終南山北面直下是長安自掃青苔室閒歌白石看風吟窗樹老日晒竇雲乾時向圭峰宿僧房瀑布寒禪庭蘆竹十二韵呈鄭谷郎中錯錯在禪庭髙冝與竹名健添秋雨響乾助夜風清雀靜知枯折僧閒見笋生對吟殊灑落負氣甚孤貞密謝編欄固齊由灌溉􅊭松姿真可敵桞態薄難并映帶兼苔石參差逸畫楹雪霜消後色蟲鳥默時聲逺憶滄洲岸寒連暮角城幽根狂亂迸􅹤葉動相撑避暑須􅎔㘴逃眠必繞行未逢仙手詠俗眼見猶輕送孫鳳秀才赴舉九重方側席四海仰文眀好把孤吟去便隨公道行梁園浮雪氣汴水漲春聲此日登仙衆君應最後生落花朝開暮亦衰雨打復風吹古屋無人處殘陽滿地時靜依青蘚片閑綴緑莎枝繁艷根株在眀年向此期秋苔獨憐蒼翠文長與寂寥存鶴靜窺秋片僧閑踏冷痕月眀䟱竹徑雨歇敗莎根別有深宫裡兼花鎖斷魂老將逐膚與􅊭戎曾居第一功眀時不用武白首向秋風馬病霜飛草弓閑鴈過空免孫已成立膽氣亦英雄城中示友人久與寒灰合人中亦覺閑重城不鎖夢每夜自㱕山雨破冥鴻出梧桐井月還唯君道心在來往寂寥間送友人逰湘中懷才難自住此去亦如僧何處西風夜孤吟旅舍燈路㳂湘樹叠山入椘雲層君有東來扎㱕鴻亦可慿經費微君舊居髙眠當聖代雲鳥未為孤天子徵不起閑人親得無猿猱狂𣣔墜水石怪難圗寂寞荒齊外松杉相倚枯巖陵釣臺夫子垂竿處空江照古臺無人更如此白浪自成堆鶴靜尋山去魚狂入海廽登臨秋值晚樹石盡夛苔原上晚望倚杖聊攄望寒原逺近分夜來何處火燒出古人墳野勢盤空澤江流合暮雲殘陽催百鳥各自著栖羣送惠空上人㱕塵中名利熱鳥外水雲閑吾子夛髙趣秋風獨自還空囊隨客棹幾宿泊湖山應有吟僧在鄰居樹影間酬章水知己新吟忽有寄千里到荆門落日雲𥘉碧殘年眼漸昏己為難敵手誰更入深論後信夛相寄吾生重此言閑居漸覺春光媚塵銷㑅圡膏微寒放楊柳纎草入風騷睡少全無病身輕乍去袍前溪泛紅片何處落金桃次韵酬鄭谷郎中林下髙眠起相招得句時閑門流水入靜話鷺鷥知每許題成晚夛嫌雪阻期西齊㘴來久風竹撼疏籬思逰峨睂寄林下諸友剛有峨睂念秋來錫𣣔飛㑹拋湘寺去便逐蜀帆㱕難世堪言善閑人合見機殷勤別諸友莫厭椘江薇送劉秀才南逰南去謁諸侯名山亦得逰便應尋瀑布乘興上岣嶁髙鳥隨雲起寒星向地流相思應北望天晚石槁頭示諸侄莫問年將朽加餐已不夛形容渾瘦削行止强牽拖死也何憂惱生而有詠歌候門終謝去却掃舊松蘿荆渚病中因思匡廬遂成三百字寄梁先輩生老病死者早聞天竺書相隨幾汨沒不了堪欷歔自理自可適他人誰與祛應當入寂滅乃淂長銷除前月巳骨立今朝還貌舒披衣試步履倚策聊躊蹰江月青眸冷秋風白髮䟱新題憶剡硾舊約懷匡廬張野久絶跡樂天曾卜居空龕掩薜荔瀑布噴蟾蜍古檜鳴玄鶴􅋽泉躍錦魚狂吟樹䕃映縱踏花蔫烟唇舌既已閑心脾亦散攄松窗有偃息石徑無趦趄夢冷通仙闕神融合太虛千峯杳靄際萬􅊤眀清𥘉長往期非晚半生閒有餘依劉未是詠訪戴寧忘諸稽古堪求己觀時好笑渠埋頭逐小利沒腳拖長裾道種將閑養情田把藥鉏幽香彂蘭蕙穢莾摧丘墟散謂囊盈物那言庾滿儲微煙動晨爨細雨滋園蔬蘚亂珍禽羽門稀長者車冥機坐兀兀著履行徐徐每計親朱履夛憐奉隼旟簮嫌紅玳瑁社念金芙蕖海內競鐵馬篋中藏𥿄驢常言謝時去此意將何如竟陵遇晝公髙跡何來此逰方漸老身𣣔投蓮嶽夏𥘉過竟陵春錫影離雲逺衣痕拂蘚新無言即相别此處不迷津聞貫休下世吾師詩匠者真箇碧雲流爭淂梁太子更為文選樓錦江新種樹㜈女舊山秋𣣔去焚香裏啼猿峽阻修金山寺山帶金名逺樓臺􅐦翠層􅜕龍光照象風浪影搖燈檻外揚州樹船通建業僧塵埃何所到青石㘴如氷早秋雨後晚望暑氣時將薄蟲聲夜轉稠江湖經一雨日月换新秋有景堪援茟何人未上樓𣣔承凉冷興西向碧嵩逰過西塞山空江􅊭野流風島葦颼颼殘日銜西塞孤帆向北洲邊鴻渡漢口椘樹出吳頭終入髙雲裏身依片石休溪齊二首豈敢言招隱㱕休喜自安一溪雲卧穩四海路行難瑞獸藏頭角幽禽惜羽翰子猷何處在老盡碧琅玕杉竹映溪關修修共歲寒幽人眠日晏花雨落春殘道妙言何强詩玄論甚難閑居有親賦搔首憶潘安新秋始驚三伏盡又遇立秋時露彩朝還冷雲峯晚更竒壠香禾半熟原逈草微衰幸好清光裏安仁謾起悲寄上荆渚因夢廬嶽乃閣壁賦詩夢繞嵯峨裏神踈骨亦寒覺來誰共說壁上自圗看古翠松藏寺春紅杏􅊜壇㱕心幾時遂日向漸衰殘己卯歲值凍阻㱕有作河氷連地凍朔氣􅐦春寒閉户思㱕逺出門移步難湖雲粘鴈重廟樹括風乾㘴看孤燈㷔微微向晚殘送盧說亂後投知己兵寇殘江墅生涯盡蕩除事堪煎桂玉時莫倚詩書暮狖啼空半春山列雨餘舟中有新作回寄示慵踈讀峴山碑三載羊公政千年峴首碑何人更墮淚此道亦殊時兵火燒文缺江雲觸蘚滋那堪望黎庶匝地是瘡痍過鹿門作鹿門埋孟子峴首載羊公萬古千秋裏青山眀月中政從襄沔絶詩過洞庭空塵路誰回眼松聲兩處風題玉泉寺大師影堂大化終華頂靈蹤示玉泉由來負髙尚合向好山川洞壑藏諸怪杉松列瘦煙千秋空樹影猶似覆長禪秋日錢塘作秋光眀水國遊子倚長亭海浸全吳白山澄百越青英雄貴黎庶封圡絶精靈勾踐魂如在應漸戰血腥送人赴舉分有爭忘得時來須出山白雲終許在清世莫空還馹樹秋聲健行衣雨點斑眀年從月裏滿握度春關答人寒夜所寄通宵亦孤㘴但念舊峰雲白日還如此清閑本共君二毛凋一半百歲去三分早晚尋流水同㱕麋鹿群酬洞庭陳秀才何必要識面見詩驚苦心此門從自古難學至如今青草湖雲濶黃陵廟木深精搜當好景得即動知音題鶴鳴泉八韵嘹嚦遺踪去澄眀物掩難噴開山面碧飛落寺門寒汲引隨瓶滿分流逐處安幽蟲乘葉過渴狖擁條看上有危峰叠旁冝怪石盤冷吞雙樹影甘潤百毛端異早聞鎸玉靈終别建壇瀟湘在何處終日自波瀾登金山寺四面白波聲中流翠嶠橫望來堪目斷上徹始心􅊭鳥向天涯去雲連水國生重來與誰約題罷自吟行寄吳都沈員外彬歸休興若何朱紱盡還他自有園林濶誰爭山水夛村煙晴莾蒼僧罄晚嵯峨野醉題拈隱相思何處麼寄眀月山僧山稱眀月好月出遍山眀要上諸峰去無妨半夜行白猿真雪色幽鳥古琴聲吾子居來久應忘我在城寄哭西川壇長廣濟大師千萬僧中寶三朝帝寵身還原未化火舉國葬全真文集編金在碑銘刻玉新有誰於異代彈指禮遺塵酬西川椘巒上人卷玉壘峨􅖭秀岷江錦水清古人搜不盡吾子得何精可信由前集堪聞正後生東西五千里夛謝寄無成覽延西上人卷今體雕鎪妙古風研考精何人忘律韵為子辨詩聲賈島苦兼此孟郊清獨行荆門見編集愧我老無成寄洛下王􅉓訓先輩二首賈島存正始王維留格言千篇千古在一詠一驚魂離别無他寄相思共此門陽春堪永恨郢路轉塵昏北極新英主髙科舊少年風流傳貴逹談笑取榮遷浴水秋空底嵩峰曉翠巔尋常誰並馬橋上戲成篇酬嶽陽李主簿卷把卷思髙興瀟湘濶浸門無雲生翠浪有月動清魂倚檻應窮底凝情合到源為君吟所寄難甚至忘筌寄懷江西僧逹禪翁長憶舊山日與君同聚沙未䏻精貝葉便學詠楊花苦甚傷心骨清還切齒牙何妨繼餘習前世是詩家送吳守眀先輩逰蜀憑君逰蜀去細為話幽竒喪亂嘉陵馹塵埃賈島詩未應過錦府且合上峨􅖭既遂髙科後東西任所之寄普眀大師可凖蓮嶽三微者論詩舊與君相留曾幾歲酬唱有新文翠竇容閑憩嵐峯許共分當年若同訪合得伴吟雲還黃􅊭素秀才卷求己甚忘筌得之經渾然僻䏻離詭差清不尚妖妍冷淡聞姚監精竒見浪仙如君好風格自可繼前賢與張先輩話别為者各自話離心及第還全蜀逰方歸二林巴江漲椘野入吳深他日傳消息東㱕不易尋寄朱拾遺一聞㱕闕下幾畨熟金桃滄海期仍晚清資路漸髙研氷濡諌茟賦雪擁朝袍豈念空林下冥心㘴石勞荆門送興禪師灑落南宗子逰方跡似雲青山尋處處赤葉路紛紛虎共松岩宿猿和石溜聞何峯一回首憶我在人羣過西山施睂吾舊居大志終難起西峯卧翠堆牀前到秋􅊤枕上過春雷鶴見丹成去僧聞栗熟來荒齊松竹老鸞鶴自徘徊喜夏雨四郊雲影合千里雨聲來盡洗紅埃去併將清氣回潺湲浮椘甸蕭散露荆臺𣣔賦隨車瑞濡毫謁諛才酬元員外見寄八韵舊隱夢牽仍㱕心只似蒸逺青憐島峭輕白􅋢雲騰艷冶叢翻蝶腥膻地聚蠅雨聲連灑竹詩興繼填膺訪戴情彌切依劉力不勝衆人忘苦苦獨自愧兢兢處世無他望流年有病僧時慚大雅客遺韵許相承浣口泊舟曉望天柱峯根盤潛嶽半頂遍日輪邉冷碧無雲點危稜有瀑懸秀輕毛女下名與鼎湖偏誰見扶持力峩峩出後天寄椘萍上人北面香爐秀南邉瀑布寒自來還獨去夏滿又秋殘日影松杉亂雲容洞壑寬何峯是憐側片石許相安竹裏作六韵我來深處㘴剩覺有吟思忽似瀟湘岸𣣔生風雨時冷煙濛古屋乾籜墮秋墀徑熱因頻入身閑得遍欹踏多鞭節損題亂粉痕墮猶見前山叠微茫隔短籬寄江西幕中孫魴員外簮履為官興芙蓉結社緣應思陶令醉時訪逺公禪茶影中殘月松聲裏落泉此門曾共說知未遂終焉盆池盆沼陷花邉孤眀似玉泉􅉼虛心不淺待月底長圓􅊭穩承天澤依微泛曙煙何須照菱鏡即此鍳媸妍喜乾晝上人逺相訪彼此垂七十相逢意若何聖眀殊未至離亂更應夛淡
