  text: 白蓮集卷第九
  hash: sha256:c5bbcd2e7b66a1503f93368b49d059d4369b21729efe194f2fa61f0daddf5a96
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0109_SBCK_009-1a}
body:
  text: 廬嶽僧齊己撰春寄尚顔含桃花謝杏花開杜宇新啼燕子來好事可能無分得名山長似有人催簷聲未斷前旬雨電影還連後夜雷心迹共師爭幾許俗人嫌處自遲廽寄梁先輩慈恩塔下曲江邊别後多應夢到仙時去與誰論此事亂來何處覔同年陳琳筆硯甘前席甪里煙霞待共眠愛惜麻衣好顔色未教朱紫汚天然荆渚偶作無味吟詩即把經竟將疏野訪誰行身依江寺庭無樹山繞天涯路有兵竹瓦雨聲漂永日紙窗燈熖照殘更徔容一覺清涼夢歸到龍潭掃石枰城中晚夏思山葛衣沾汗功雖健紙扇搖風力甚卑苦熱恨無行腳處微涼喜到立秋時竹軒靜看蜘蛛挂莎徑間聽蟋蟀移天外有山歸即是豈同逰子暮何之憶舊山誰請衰羸住北州七年魂斷舊山丘心清檻底瀟湘月骨冷禪中太華秋高節未聞馴虎豹片言何以傲王侯應須脫灑孤峯去始是分明個剃頭寄骵休南州歸去為尋醫病色應除是舊時久别莫忘廬阜約却來須有洞庭詩金陵往歲同窺井峴首前秋共讀碑兩處山河見興廢相思更切卧雲期過陸鴻漸舊居陸生自有傳于井石又云行坐誦佛書故有此句椘客西來過舊居讀碑尋傳見終初佯狂未必輕儒業高尚何妨誦佛書種竹岸香連菡萏煮茶泉影落蟾蜍如今若更生來此知有何人贈白驢時太守贈白驢寄懷鍾陵舊逰因寄知己洪井僧來説舊逰西江東岸是城樓昔年淹迹因王化長日憑欄看水流貞觀上人栖樹石陳陶處士在林丘終拖老病重尋去得到匡廬死便休遣懷病腸休洗老休醫七十能饒百歲期不死任還蓬島客無生自有雪山師浮雲聚散堪關慮明月相逢好展眉既兆未萌間酌度不知中抱自尋思懷武陵因寄幕中韓先輩何徔事武陵嘉致迹多幽每見圖經恨白頭溪浪碧通何處去桃花紅過郡前流嘗聞相幕鴛鴻日向神仙洞府逰鑿井耕田人在否如今天子正徵搜贈樊處士小子聲名天下知滿簪霜雪白麻衣誰將一著爭先後共向長安定是非有路未曽謀日用無貪終不亂天機間尋道士過仙觀賭得黃庭兩卷歸荆渚逢禪友澤國相逢話一宵雲山偶别隔前朝社思匡嶽無宗炳詩憶揚州有鮑昭晨野黍離春漠漠水天星燦夜迢迢間吟莫忘傳心祖曽立階前雪到腰送僧歸洛中赤日彤霞照晚坡東州道路興如何蟬離椘柳鳴猶少葉到嵩雲落漸多海內自為間去住關頭誰問舊經過丁寧與訪春山寺白樂天真在也麼道林寓居秋泉一片樹千株暮汲寒燒外有餘青嶂者邊來已熟紅塵那畔去應疏風騷未肯忘雕琢瀟灑無妨更剃除即問沃州開士僻愛禽憐駿意如何仙掌峭形寒倚夕陽天毛女蓮花翠影連雲外自為高出手人間誰合鬪揮拳鶴拋青漢來岩檜僧隔黃河望頂煙晴露紅霞長滿掌只應栖託是神仙中秋月空碧無雲露濕衣群星光外湧清規東樓莫礙漸高影四海待看當午時還許分明吟皓魄肯教幽暗取丹枝可憐半夜嬋娟影正對五侯殘酒池送禪者逰南嶽忽隨南棹去潯陽誰住江邊樹下房塵夢是非都覺了野雲心地更何妨漸臨瀑布聽猿思却背岣嶁看鴈行想到中峰上層寺石窗秋霽見瀟湘聞道林諸友嘗茶因有寄旗槍冉冉緑叢圓穀雨初晴呌杜鵑摘帶嶽華蒸曉露碾和松粉煮春泉高人夢惜藏岩裡白硾封題寄火前應念苦吟耽睡起不堪無過夕陽天將歸舊山留别錯公舊峰前昨下來時白石叢叢問紫薇章句不堪歌有道溪山只合退無機雲含暖態晴猶在鶴養間神晝不飛欲去更思過丈室二年頻此挹清暉聞尚顔上人創居有寄麓山南面橘洲西别搆新齋與竹齊野客已聞將鶴贈江僧未説有詩題窗臨杳靄寒千嶂枕遍潺湲月一溪可想乍移吟榻處松隂冷濕壁新泥庚午歲九日作門底秋苔嫩似藍此中消息興何堪亂離偷過九月九頭尾算來三月三雲影半晴開夢澤菊花微暖傍江潭故人今日在不在胡雁背風飛向南逢進士沈彬欲話趨時首重搔因君倍惜剃頭刀千般貴在能過逹一片心間不那高山疊好雲藏玉鳥海翻狂浪隔金鰲時應記得長安事曽向文場屬思勞聞王員外新恩有寄欲退無因貴逼來少儀官美右丞才青袍早訪淹花幕霜簡方聞謝柏臺金諾靜宜資講誦玉山寒稱奉樽罍西峰有客思相賀門隔瀟湘雪未開秋夕言懷寄所知休問蒙莊材不材孤燈影共傍寒灰忘詮話道心甘死候體論詩口懶開窗外風濤連建業夢中雲木憶天台相疏却是相知分誰訝經年一度來答禪者五老峰前相遇時兩無言語只揚眉南宗北祖皆如此天上人間更問誰山衲靜披雲片片鐵刀涼削鬢絲絲間吟莫學湯從事拋却袈裟負本師寄尚顔公受徐州薛尚書見知莫向孤峯道息機有人偷眼羡吾師滿身光化年前寵幾軸開平歲裡詩北闕故人隨喪亂南山舊寺在參差清吟但憶徐方政應恨當時不見時梓栗杖送人禪家何物贈分襟只有天台杖一尋拄去客歸青洛逺采來僧入白雲深逰山曽把探龍穴出世期將指佛心此日江邊贈君後却携笻竹向東林寄朗陵二禪友瀟湘曽宿話詩評荆椘連秋阻野情金錫罷逰雙鬢白鐵盂終守一齋清篇章老欲齊高手風月間思到極精南望山門石何處滄浪雲夢浸天橫燈幽光耿耿草堂空窗隔飛蛾恨不通紅燼自凝清夜朵赤心長謝碧紗籠雲藏水國城臺裡雨閉松門殿塔中金屋玉堂開照睡豈知螢雪有深功寄金陵幕中李郎中龍門支派富才能年少飛翔便大鵬久待尊罍臨鐵甕又徔幢節鎮金陵精神一隻秋空鶴騷雅千尋夏井冰長憶相招宿華館數宵忘寢盡寒燈寄韓蛻秀才松門高不似侯門蘚徑鞋蹤觸處分逺事即為無害鳥多間便是有情雲那憂寵辱來驚我且寄風騷去敵君知伴李膺琴酒外絳紗間卷共論文湘中春興雨歇江明苑樹乾物妍時泰恣逰盤更無輕翠勝楊柳盡覺濃華在牡丹終日去還拋寂寞繞池廽却憑欄杆紅芳片片由青帝忍向西園看落殘送錯公栖公南逰洪偃湯休道不殊高帆共載興何俱北京喪亂離丹鳳南國煙花入鷓鴣明月團圓臨桂水白雲重疊起蒼梧威儀本是朝天士暫向遼荒住得無寄南嶽諸道友南望衡陽積瘴開去年曽踏雪逰回謾為椘客蹉跎過却是邊鴻的當來乳竇孤明含海日石橋危滑長春苔終尋十八高人去共坐蒼崕養聖胎送韓蛻秀才赴舉槐花館馹莫塵昏此去分明吏部孫才氣合居科第首風流幸是薦紳門春和洛水清無浪雪洗髙峰碧斷根堪想都人齊指點列仙相次上崑崙溪居寓言秋蔬數壠傍潺湲頗覺生涯異俗緣詩興難窮花草外野情何限水雲邊蟲聲繞屋無人語月影當松有鶴眠寄向東溪老樵道莫摧丹桂博青錢遣懷詩病相兼老病深世醫徒更費千金餘生豈必虛拋擲未死何妨樂詠吟流水不廽休歎息白雲無迹莫追尋間身自有間消處黃葉清風蟬一林自湘中將入蜀留别諸友巾舄初隨入蜀船風帆吼過洞庭煙七千里路到何處十二峰雲更那邊巫女暮歸林淅􅅹巴猿吟斷月嬋娟來年五月峨嵋雪坐看消融滿錦川寄匡阜諸公松頭柏頂碧森森虛檻寒吹夏景深靜社可追長往迹白蓮難問久修心山圍四面才容寺月到中宵始滿林爭學忘言住幽勝吾師遺集盡清吟峰前林下東西寺地角天涯來往僧泉月淨流間世界杉松深鎖晝香燈爭無大士重修社合有諸賢更服膺曽寄鄰房挂瓶錫雨聞簷溜解春冰送人入蜀何必間吟蜀道難知君心出嶮巇間尋常秋泛江陵去容易春浮錦水還兩面碧懸神女峽幾重青入丈人山文君酒市逢初雪滿貰新沽洗旅顔酬廬山張處士髮枯身老任浮沈懶泥秋風更役吟新事向人堪結舌舊詩開卷但傷心苔床卧憶泉聲繞麻履行思樹影深終謝柴桑與彭澤醉逰訪入東林寄峴山道人鳳門高對鹿門青往歲經過恨未平辨鼎上人方話道卧龍丞相忽追兵爐峰已負重廽計華嶽終懸未去情聞説東周天子聖會搖金錫却西行送王處士逰蜀又挂寒帆向錦川木蘭舟裏過殘年自修姹姹爐中物擬作飄飄水上仙三峽浪喧明月夜萬州山到夕陽天來年的有荆南信廽札應緘十色箋懷金陵李推官僧自牧秣陵長憶共吟逰儒釋風騷盡上流蓮幕少年輕謝眺雪山真子鄙湯休也應有作懷清苦莫謂無心過白頭欲附别來千萬意病身初起向殘秋寄尋萍公聞在湓城多寄住隨時談笑混塵埃孤峰忽憶便歸去浮世要看還下來萬頃野煙春雨斷九條寒浪晚窗開虎溪橋上龍潭寺曽此相尋踏雪廽得李推官近寄懷荆門前嵗使乎回求得星郎近制來連日借吟終不已一燈忘寢又重開秋風漫作牽情賦春草真為入夢才堪笑陳宫諸狎客當時空有個追陪對菊蝶醉蜂狂半折時冷煙清露壓離披欲傾琥珀杯浮爾好把茱萸朵配伊孔雀毛衣應者是鳳凰金翠更無之何因栽向僧園裏門外重陽過不知憶東林因送二生歸好向東林度此生半天山腳寺門平紅霞嶂底潺潺色清夜房前瑟瑟聲偶别十年成瞬息欲來千里阻刀兵可憐二子同歸去南國煙花路好行渚宫西城池上居城東移錫住城西緑繞春波引杖藜翡翠滿身衣有異鷺鷥通體格非低風搖柳眼開煙小暖逼蘭芽出土齊猶有幽深不相似剡溪乘棹入耶溪中秋夕愴懷寄荆幕孫郎中白蓮香散沼痕乾緑篠隂濃蘚地寒年老寄居思隱切夜涼留客話時難行僧盡去雲山逺賓雁同來澤國寬時謝孔璋操檄外每將空病問衰殘酬湘幕徐員外見寄東海儒宗事業全氷稜孤峭類神仙詩同李賀精通鬼文擬劉軻妙入禪珠履早曽從相府玳簪今又别賓筵篇章幾謝傳西椘空想雄風度十年寄蜀國廣濟大師氷壓霜壇律格清三千傳授盡門生禪心靜入空無迹詩句間搜寂有聲滿國繁華徒自樂兩朝更變未曽驚終思相約岷峨去不得携笻一路行答獻上人卷衲衣禪客袖篇章江上相尋共感傷秦甸亂來栖白沒苧山空後皎然亡清留島月秋凝露苦寄巴猿夜呌霜珍重南宗好才子灰心冥目外無妨寄武陵貫微上人二首知泛滄浪棹未還西峯房鎖夜潺潺春陪相府逰仙洞雪共賓寮對柱山詩裏幾添新菡萏衲痕應换舊斕斑莫忘一句曹溪妙堪塞孫孫騁度關吳頭東面椘西邊雲接蒼梧水浸天兩地别離身已老一言相合道休傳風騷妙欲凌春草蹤迹間思繞嶽蓮不是傲他名利世吾師本在雪山巔懷體休上人仲宣樓上望重湖君到瀟湘得健無病遇何人分藥餌詩逢誰子論功夫杉蘿寺裏尋秋早橘柚洲邊度日晡許送自身歸華嶽待來朝暮拂瓶盂招湖上兄弟去歲得君消息在兩憑人信過重湖忍貪風月當年少不寄音書慰老夫藥鼎近聞傳祕訣詩門曽説擁寒爐漢江江路西來便好傍扁舟訪我無江居寄關中知己多病多慵漢水邊流年不覺已皤然舊栽花地添黃竹新盆池换白蓮雪月未忘招逺客雲山終待去安禪八行書札君休問不似風騷寄一篇中秋十五夜寄人高河瑟瑟轉金盤噴露吹光逆憑欄四海魚龍精魄冷五山鸞鶴骨毛寒今宵盡向圓時望後夜誰當缺處看何事清光與蟾兔却教才子少留難謝人自鍾陵寄紙筆故人猶憶苦吟勞所惠何殊金錯刀霜雪翦裁新剡硾鋒鋩管束本宣毫知君倒篋情何厚借我臨池價斗高詞客分張看欲盡不堪來處隔秋濤移居西湖作二首火雲陽熖欲燒空小檻幽窗想舊峰白汗此時流枕簟清風何處動杉松殘更正好眠涼月逺寺俄聞報曉鐘只待秋聲滌心地衲衣新洗健形容官園樹影晝隂隂咫尺清涼莫浣心桃李别教人主掌煙花不稱我尋蜩螳晚噪風枝穩翡翠間眠宿處深爭似出塵地行止東林苔徑入西林看金陵圖六朝圖畫戰爭多最是陳宫計數訛若愛蒼生似歌舞隋皇自合恥干戈寄南嶽嶽泰禪師江頭默想坐禪峰白石山前萬丈空山下獵人應不到雪深花鹿在菴中片雲水底分明天上雲可憐形影似我身何妨舒作從龍勢一雨吹消萬里塵寄清溪道者萬重千疊紅霞嶂夜燭朝香白石龕常寄溪窗憑危檻看經影落古龍潭病中勉送小師往清涼山禮大聖豐衣足食處莫住聖迹靈蹤好遍尋忽遇文殊開慧眼他年應記老師心謝人惠拄杖何處雲根采得來黑龍狂欲作風雷知師念我形骸老教把經行拄緑苔送楚雲上人往南嶽刺血寫法華經剝皮刺血誠何苦欲寫靈山九會文十指􅅹乾終七軸後來求法更無君送胎髮筆寄仁公內惟胎髮外秋毫緑玉新裁管束牢老病手疼無那爾却資年少寫風騷謝西川曇域大師玉筯篆書玉筯真文久不興李斯傳到李陽氷正愁千載無來者果見僧中有個僧偶作寄王祕書七絲湘水秋深夜五字河橋日暮時借問祕書郎此意靜彈高詠有誰知謝人惠紙烘焙幾工成曉雪輕明百幅疊春氷何消才子題詩外分與能書貝葉僧答文勝大師清桂書才把文章干聖主便承恩澤换禪衣應嫌六祖傳空衲只向曹溪永息機寄懷曾口寺文英大師著紫袈裟名已貴吟紅菡蓞價兼高秋風曽憶西逰處門對平湖滿白濤懷道林寺道友四絶堂前萬木秋碧參差影壓江流間思宋杜題詩板一月憑欄到夜休放鶴放猿絶句四首上辭主人華亭來復去芝田丹頂霜毛性可憐縱與乘軒終誤主不如還放却遼天堪憶春雲十二峰野桃山杏摘香紅王孫可念愁金鎖縱放斷腸明月中放鷺鷥白蘋紅蓼碧江涯日暖雙雙立睡時願揭金籠放歸去却隨沙鶴鬪輕絲放鸚鵡隴西蒼巘結巢高本為無人識翠毛今日籠中強言語乞歸天外啄含桃白蓮集卷第九
