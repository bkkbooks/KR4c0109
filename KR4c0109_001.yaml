body:
  text: 廬嶽僧齊巳撰夏日草堂作沙泉帶草堂𥿄帳卷空牀靜是真消息吟非俗肺腸園林坐青影梅杏嚼紅香誰住原西寺鐘聲送夕陽寄鏡湖方干處士賀監舊山川空耒近百年聞君與琴鶴終日在漁船島露深秋石湖澄半夜天雲門幾回去題遍好林泉送人歸吳此說歸耕釣迢迢向海涯春寒逰子路村晚主人家山緑過茶重尋舊鄰里菱藕正開花仰避地依真境安間似舊溪干戈百里外泉石亂峯西草瑞香難歇松靈蓋盡低尋應報休馬瓶錫向南携夜坐百蟲聲裏坐夜色共冥冥逺憶諸峰頂曽棲此性靈月華澄有象詩思在無形徹曙都忘寢虗窗日照經新栽松野僧教種法苒苒出蓬蒿百歲催人老千年待爾髙靜宜兼竹石幽合近猿猱他日成陰後秋風吹海濤期友人早晚逐兹耒間門日為開亂蛩鳴白草殘菊藉蒼苔困卧誰驚起間行自𣣔廽何時此携手吾子本夛才和鄭谷郎中看棋箇是仙家事何人合用心幾時終一局萬木老千岑有路如飛出無機似陸沉樵夫可䏻解也此廢光陰寄錢塘羅給事憤憤嘔讒書無人誦子虗傷心天祐末搔首懿宗𥘉海樹青叢短湖山翠點踈秋濤看足否羅剎石邊居戊辰歲湘中寄鄭谷郎中白髮久慵簪常聞病亦吟瘦應成鶴骨間想似禪心上國楊花亂滄洲荻笋深不堪思翠蓋西望獨沾襟寓言造化安䏻保山川鑿𣣔翻精華銷地底珠玉聚侯門始作驕奢本終為禍亂根亡家與亡國去此更何言寄王振拾遺戊辰歲折檻意何如􅊭安信不虗近來焚諌草深去覔山居餘分眀知在處難寄亂離書經賈島舊居先生居處所野燒幾為灰若有吟魂在應隨夜魄廽地寧銷志氣天忍罪清才古木霜風曉江禽共宿來送人逰塞槐桞野橋邊行塵暗馬前秋風來漢地客路入胡天鴈聚河流濁羊群磧草膻那堪隴頭宿鄊夢逐潺湲桃花千株含露態何處照人紅風暖仙源裏春和水國中流鶯應見落舞蝶未知空擬𣣔求圗畫枝枝帶竹叢聞雁何處人驚起飛耒過草堂丹心勞避弋萬里念隨楊影斷風天月聲孤荻岸霜眀年趂春去江上别鴛鴦送人逰南南國夛山水君逰興可知船中江上景晚泊早行時子美遺魂地藏真舊墨池經過幾銷日荒草裏尋碑送益公歸舊居舊隱終牽夢春殘結束㱕溪山無伴過風雨有花飛片石留題字孤潭照浣衣鄰僧喜相接掃􅏙與開扉不睡永夜不𣣔睡虗堂閉復開却離燈影去待得月光耒落葉逢巢住飛螢值我回天眀拂經案一炷白檀灰新秋雨後夜雨洗河漢詩懷覺有靈籬聲新蟋蟀草影老蜻蜓靜引間機彂凉吹逺思醒逍遙向誰說時泥漆園經送劉蛻秀才赴舉百彂百中年丹枝如計分一箭的無偏文物兵銷國關河雪霽天都人看春榜韓字在誰前留題仰山大師塔院嵐光叠杳冥曉翠􅊜窗眀𣣔起逰方去重來繞塔行亂雲開鳥道群木彂秋聲曾約諸徒弟香燈盡此生亂中聞谷吳延保下世小諫才埋玉星郎亦逝川國由夛聚道天似不客賢兵火焚詩草江流漲墓田長安巳塗炭追想更凄然送東林寺睦公往吳國八月江行好風帆日夜飄煙霞經北固禾黍過南朝社客無宗炳詩家有鮑昭莫因賢相請不返舊山椒除夜夜久誰同坐爐寒鼎亦澄亂松飄雨雪一室掩香燈白髮添新歲清吟减舊朋眀朝待晴旭池上看春氷送祕上人誰喜老間身春山起送君𣣔慿蓮社信轉入洞庭雲道路長無阻干戈漸未聞秋來向何處相憶雁成群寓居嶽麓謝進士沈彬再訪去歲來尋我留題在蘚痕又因風雪夜重宿古松門玉有疑休泣詩無主且言眀朝此相送披褐入桃源對雪松門堆復積埋石亦埋莎為瑞還難得居貧莫厭夛聽憐終夜落吟惜一年過誰在江樓望漫漫墮緑波和岷公送李評事往宜春兵火銷鄰境龍沙有去人江潭牽興逺風物入題新雪湛將殘臘霞眀向早春郡侯開宴處桃李照歌塵老憶逰方日天涯錫獨搖凌晨從北固衝雪向南朝鬢髮泉邊剃香燈樹下燒雙峰諸道友夏滿有書招過荆門路出荆門逺行行日𣣔西草枯蠻塜亂山斷漢江低野店叢蒿短煙村簇樹齊翻思故林去在處有猿啼山中答人謾道詩名出何曾著苦吟忽耒還有意巳過即無心夏日山長往霜天寺獨尋故人憐拙朴時復寄空林贈盧眀府間居鬢霜垂七十江國久辭官滿篋新風雅何人舊歲寒間居當野水幽鳥宿漁竿終𣣔相尋去兵戈時轉難幽庭不放生纎草從教遍緑苔還妨長者至未著牡丹開蛺蝶空飛過鶺鴒時下耒南鄰折芳子到此寂寥回送休歸歸長沙寧覲吾子此歸寧風煙是舊經無窮芳草色何處故山青偶泊鳴蟬島難眠好月汀殷勤問安外湘岸採詩靈將逰嵩華行次荆渚蓮峰映敷水嵩嶽􅐦伊河兩處思歸久前賢隱去夛閒身應絶跡在世幸無他㑹向紅霞嵪僧龕對薜蘿逺思逺思極何處南樓煙水長秋風過鴻鴈逰子在瀟湘海面雲生白天涯墮晚光徘徊古堤上曾此贈垂楊寄勉二三子不見二三子悠然吳椘間盡應生白髮幾箇在青山莫放間君聞國風否千載詠關關渚宫江亭寓目津亭雖極望未稱本心間白有三江水青無一點山新鴻喧夕浦逺棹聚空灣終遂歸匡社孤帆即此還蝴蝶何處背繁紅迷芳到檻重分飛還獨出成隊偶相逢逺害終防雀爭先不避蜂桃蹊牽往復蘭徑引相從翠裛丹心冷香凝粉翅濃可尋穿樹影難覔宿花蹤日晚來仍急春殘舞未慵西風舊池館猶得採芙蓉送劉秀才往東洛羡子去東周行行非旅逰煙霄有兄弟事業盡曹劉洛水清奔夏松雲白入秋來年遂鵬化一舉上瀛洲移竹舊溪千寓竿風雨夜珊珊白首來江國黃金買歲寒乍移傷粉節終繞著朱闌㑹得乘春力新抽錦籜看雉角角䫫關關春晴錦羽乾文呈五色異瑞入九苞難暮宿江蘭暖朝飛緑野寒山梁從行者錯解仲尼嘆懷軒轅先生不得先生信空懷汗漫秋月華離寉背日影上鰲頭𣣔學孤雲去其如重骨留槎程在何處人世屢荒丘永夜感懷鄭谷郎中展轉復展轉所思安可論夜凉難就枕月好重開門霜殺百草盡蛩㱕四壁根生耒苦章句早遇至公言賣松者未得凌雲價何慙所買真自知桃李世有愛歲寒人瑟瑟𥘉離澗青青未識塵寧同買花者貴逐片時春丙寅歲寄潘㱕仁九圡盡荒墟干戈殺害餘更須憂去國未可守貧居康泰終來在編聫莫破除他年遇知己無恥報襜褕嘗茶石屋曉煙生松窗鐡碾聲因留來客試共說寄僧名味擊詩魔亂香搜睡思輕春風霅川上憶傍緑叢行楊花暖景照悠悠遮空勢漸稠乍如飛雪逺未似落花休萬帶都門外千株渭水頭紛紜知近夏銷歇恐成秋軟著朝簮去狂隨别騎逰斾衝離館驛鶯撲繞宫流江國晴愁對池塘晚見浮虗窗縈茟雅深院藉苔幽靜墮王孫酒繁沾客子裘詠吟何潔白根本屬風流向日還輕舉因風更自由不堪思汴岸千里到揚州詠影萬物患有象不䏻逃大眀始隨殘魄滅又逐曉光生曲直寧相隱洪纎必自呈還如至公世洞鍳是非情南歸舟中二首南㱕乘客棹道蹃免﨑嘔江上經時莭船中聽鷓鴣春容含衆岫雨氣泛平蕪落日停舟望王維未有圗長江春氣寒客况棹聲間夜泊諸村雨程廽數郡山枽根垂斷岸浪沫聚空灣已去鄰園近隨緣是暫還送遷客天涯即􅋢州謫去莫多愁若似承恩好何如佞主休瘴昏銅柱黑草赤火山秋應想堯陰下當時獬豸頭題中上人院髙房占境幽講退即冥搜缺鶴同支遁多時似惠休瓶澄孤井浪案白小窗秋莫道㱕山字朝賢日獻酬逢鄊友無况來江島逢居話滯留生緣同一國相識共他州竹影斜青蘚茶香在白鷗猶憐心道合多事亦冥搜自勉試算􅊭生事中年缺五年知非未落後讀易尚加前分受詩魔役寧容俗態牽閒吟見秋水數隻釣魚船寄詩友天地有萬物盡應輸苦心他人雖𣣔解此道奈何深返朴遺時態關河度歲陰相思去秋夕共對冷燈吟居道林寺書懷花落水喧喧端居信晝誰來看山寺自要掃松門是事皆䏻諱唯詩未懶言傳聞好時世亦𣣔背啼猿經吳􅊭觀中元齊醮後錢燼滿空壇老鶴心何待尊師鬢已乾􅜖燈古殿夜霜霰大椿寒誰見長生蹃人間事萬端劔客拔劔繞殘樽歌終便出門西風滿天雪何處報人恩勇死尋常事輕讐不足論翻言易水上細碎動離魂白髮莫染亦莫鑷任從伊滿頭白雖無奈藥黑也不禁秋靜枕聽蟬卧閒垂看水流浮生未逹此多為爾為愁秋興寄㣧公風聲吹竹健凉氣著身輕誰有間雲去江邊看水行村遙紅樹逺野濶白煙平試裂芭蕉片題詩問竺卿野步城裏無閒處却尋城外行田園經雨水鄊國憶桑耕傍澗蕨薇老隔村岡壠橫何窮此心興時復鷓鴣聲殘春三月看無也芳時此可嗟園林𣣔向夕風雨更吹花影亂衝人蝶聲繁繞塹蛙那堪傍楊柳飛絮滿鄰家酬尚顔取盡風騷妙名髙身倍閑久離王者闕𣣔向祖師山幕府秋招去溪鄰日望還伊余豈酬敵耒往踏苔斑苦熱雲勢險于峰金流斷竹風萬方應望雨片景𣣔焚空毒害芙蓉死煩蒸瀑布紅恩多是團扇出入畫屏中送歐陽秀才赴舉莫疑空手去無拔取髙科直是文章好爭如德行多煙霄心一寸霜雪路千坡稱意東歸後交親那喜何放鷺䉆潔白雖堪􅋢腥膻不那何到頭從所𣣔還汝舊滄波謝王秀才見示詩卷誰見少年心低摧向苦吟後須離影響得必洞精深道院春苔徑僧樓夏竹林天如􅋢才子何慮未知音送徐秀才之吳吳都霸道昌才子去觀光望闕雲天近朝宗水路長海門收片雨建業泊殘陽𣣔問淮王信仙都即帝鄊獨院偶作風篁清一院坐卧潤肌膚此境終拋去鄰房肯信無身非王者役門是祖師徒畢境伊雲鳥從耒我友于酬元員外見寄僻蒼誰相訪風籬翠蔓牽易中通性命貧裏過流年且有吟情撓都無俗事煎時聞得新意多是此忘緣寄文秀大師皎然靈一時還有屈于詩世豈無英主天何惜大師道終歸正始心莫問多岐覽卷堪驚立貞風喜未衰夏雨霮䨴蔽穹蒼冥濛自一方當時消酷毒隨處有清凉著物聲雖暴兹潤即長乍紅縈急電微白露殘陽應禱尤難得經旬甚不妨吟聽喧竹樹立見漲池塘衆類聲休出羣峯色盡藏䫋沱耒洞壑汗漫入瀟湘下叶黎氓望髙祛旱暵光幽齊飄卧簟極浦灑㱕檣蘚在階從􅊜花衰苑任傷閑思濟時力歌詠彂哀腸謝興公上人寄山水簇子半幅古潺顔看來心意閑何須尋鳥道即此出人間巘暮疑啼狖松深認掩關知君逺相惠免我憶㱕山酬微上人古律皆深妙新吟𣸪造微搜難窮月窟琢苦盡天機晚檜清蟬咽寒江白鳥飛他年舊山去為子逺携㱕同光歲送人及第東㱕西笑道何光新朝舊桂堂春官如白傅內試似文皇變化龍三十升騰鳳一行還家筬多興滿袖月中香寄江居耿處士野癖雖相似生涯即不同紅霞禪石上明月釣船中醉倒蘆花白吟緣蓼岸紅相思何以寄吾道本空空病起二首一卧四十日起來秋氣深巳甘長逝魄還見舊交心撑柱笻猶重枝梧力未任終將此形陋㱕死故丘林秋風巳傷骨更帶竹聲吹抱疢關門久扶羸傍砌時無生即不可有死必相隨除却㱕真覺何由擬免之送中觀進公㱕巴陵一論破雙空持行大國中不知從此去何處挫邪宗晝雨懸帆黑殘陽泊島紅應游到㴩岸相憶繞茶叢白蓮集卷第一
