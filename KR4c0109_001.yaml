body:
  text: 廬岳僧齊巳撰夏日草堂作沙泉帶草堂𥿄帳卷空牀静是真消息吟非俗肺腸園林坐青影梅杏嚼紅香誰住原西寺鐘聲送夕陽寄鏡湖方干䖏士賀監舊山川空耒近百年聞君與琹鶴終日在漁船島露㴱秋石湖澄半夜天雲門幾囬去題徧好林泉送人歸吴此説歸耕釣迢迢向海涯春寒逰子路村晚主人家山緑過茶重尋舊隣里菱藕正開花仰避地依真境安閑似舊溪干戈百里外泉石亂峯西草瑞香難歇松靈盖盡低尋應報休馬瓶錫向南携夜坐百蟲聲裏坐夜色共冥冥逺憶諸峰頂曽棲此性靈月華澄有象詩思在無形徹曙都忘寝虗牕日照經新栽松野僧教種法苒苒出蓬蒿百歲催人老千年待爾髙静宜兼竹石幽合近猿猱他日成陰後秋風吹海濤期友人早晚逐兹耒閑門日為開亂蛩鳴白草殘菊藉蒼苔困卧誰驚𧺫閑行自𣣔廽何時此携手吾子本夛才和鄭谷郎中看棋箇是仙家事何人合用心幾時終一局萬木老千岑有路如飛出無機似陸沉樵夫可䏻解也此廢光陰寄銭塘羅給事憤憤嘔䜛書無人誦子虗傷心天祐末搔首懿宗𥘉海樹青叢短湖山翠點踈秋濤㸔足否羅刹石邊居戊辰歲湘中寄鄭谷郎中白髮乆慵簪常聞病亦吟瘦應成鶴骨閑想似禅心上國楊花亂滄洲荻笋深不堪思翠盖西望獨沾襟寓言造化安䏻保山川鑿𣣔飜精華銷地底珠玉聚侯門始作驕奢本終為禍亂根亡家與亡國去此更何言寄王振拾遺戊辰歲折檻意何如􅊭安信不虗近来焚諌草深去覔山居餘分眀知在䖏難寄亂離書經賈島舊居先生居䖏所野燒幾為灰若有吟䰟在應随夜魄廽地寕銷志氣天忍罪清才古木霜風暁江禽共宿来送人逰塞槐桞野橋邊行塵暗馬前秋風来漢地客路入胡天鴈聚河流濁羊群磧艸膻那堪隴頭宿鄊夣逐潺湲桃花千株含露態何䖏照人紅風暖仙源裏春和水國中流鶯應見落舞蝶未知空擬𣣔求圗画枝枝帶竹叢聞雁何䖏人驚𧺫飛耒過草堂丹心劳避弋萬里念随楊影㫁風天月聲孤荻㟁霜眀年趂春去江上别鴛鴦送人逰南南國夛山水君逰興可知船中江上景晚泊早行時子羙遺䰟地藏真舊墨池經過幾銷日荒草裏尋碑送益公歸舊居舊隐終牽夣春殘結束㱕溪山無伴過風雨有花飛片石留題字孤潭照浣衣鄰僧喜相接掃􅏙與開扉不睡永夜不𣣔睡虗堂閉復開却離燈影去待得月光耒落葉逢巢住飛萤值我廻天眀拂經案一炷白檀灰新秋雨後夜雨洗河漢詩懐覺有靈籬聲新蟋蟀草影老蜻蜓静引閑機彂凉吹逺思醒逍遙向誰説時泥漆園經送劉蜕秀才赴舉百彂百中年丹枝如計分一箭的無偏文物兵銷國闗河雪霽天都人㸔春榜韓字在誰前留題仰山大師塔院嵐光叠杳冥曉翠􅊜窓眀𣣔𧺫逰方去重来繞塔行亂雲開鳥道群木彂秋聲曾約諸徒弟香燈盡此生亂中聞谷呉延保下世小諫纔埋玉星郎亦逝川國由夛聚道天似不客賢兵火焚詩草江流漲墓田長安巳塗炭追想更凄然送東林寺睦公往呉國八月江行好風㠶日亱飄煙霞經北固禾黍過南朝社客無宗炳詩家有鲍昭莫囙賢相請不返舊山椒除亱亱久誰同坐爐寒鼎亦澄亂松飄雨雪一室掩香燈白髮添新歲清吟减舊朋眀朝待晴旭池上㸔春氷送秘上人誰喜老閑身春山𧺫送君𣣔慿蓮社信轉入洞庭雲道路長無阻干戈漸未聞秋来向何䖏相憶雁成群庽居岳麓謝進士沈彬再訪去歲来尋我留題在蘚痕又囙風雪亱重宿古松門玉有疑休泣詩無主且言眀朝此相送披褐入桃源對雪松門堆復積埋石亦埋莎為瑞還難得居貧莫厭夛聽憐终亱落吟惜一年過誰在江樓望漫漫堕緑波和岷公送李評事往宜春兵火銷鄰境龍沙有去人江潭牽興逺風物入題新雪湛將殘臘霞眀向早春郡侯開宴䖏桃李照歌塵老憶逰方日天涯錫獨摇凌晨従北固衝雪向南朝鬂髮泉邊剃香燈樹下燒雙峰諸道友夏滿有書招過荆門路出荆門逺行行日𣣔西草枯蠻塜亂山㫁漢江低野店叢蒿短煙村簇樹齊飜思故林去在䖏有猿啼山中荅人謾道詩名出何曾著苦吟忽耒還有意巳過即無心夏日山長往霜天寺獨尋故人憐拙朴時復寄空林贈盧眀府閑居鬂霜垂七十江國久辭官滿篋新風雅何人舊歲寒閑居當野水幽鳥宿漁竿終𣣔相尋去兵戈時轉難幽庭不放生纎草従教遍緑苔還妨長者至未著牡丹開蛺蝶空飛過鶺鴒時下耒南鄰折芳子到此寂寥回送休歸歸長沙寕覲吾子此歸寕風煙是舊經無窮芳草色何䖏故山青偶泊鳴蝉島難眠好月汀殷勤問安外湘㟁採詩灵將逰嵩華行次荆渚蓮峰映敷水嵩嶽􅐦伊河兩䖏思歸久前賢隐去夛閒身應絶跡在世幸無他㑹向紅霞嵪僧龕對薜蘿逺思逺思極何䖏南樓煙水長秋風過鴻鴈逰子在瀟湘海面雲生白天涯堕晚光徘徊古堤上曾此贈垂楊寄勉二三子不見二三子悠然吴椘間盡應生白髮幾箇在青山莫放間君聞國風否千載詠闗闗渚宫江亭寓目津亭雖極望未稱本心閑白有三江水青無一點山新鴻喧夕浦逺棹聚空灣終遂歸匡社孤帆即此還蝴蝶何䖏背繁紅迷芳到檻重分飛還獨出成隊偶相逢逺害終防雀争先不避蜂桃蹊牽往復蘭徑引相従翠裛丹心冷香凝粉翅濃可尋穿樹影難覔宿花蹤日晚来仍急春殘舞未慵西風舊池館猶得採芙蓉送劉秀才往東洛羡子去東周行行非旅逰煙霄有兄弟事業盡曹劉洛水清奔夏松雲白入秋来年遂鵬化一舉上瀛洲移竹舊溪千寓竿風雨亱珊珊白首来江國黄金買歲寒乍移傷粉節終遶著朱阑㑹得乗春力新抽錦籜看雉角角䫫關關春晴錦羽乾文呈五色異瑞入九苞難暮宿江蘭暖朝飛緑野寒山梁從行者錯觧仲尼嘆懐轩辕先生不得先生信空懐汗漫秋月華離寉背日影上鰲頭𣣔学孤雲去其如重骨留槎程在何䖏人世屡荒丘永亱感懐鄭谷郎中展轉復展轉所思安可論亱凉難就枕月好重開门霜殺百草盡蛩㱕四壁根生耒苦章句早遇至公言賣松者未得凌雲價何慙所買真自知桃李世有爱歲寒人瑟瑟𥘉離涧青青未識塵寕同買花者貴逐片時春丙寅歲寄潘㱕仁九圡盡荒墟干戈殺害餘㪅湏憂去國未可守貧居康泰終来在編聫莫破除他年遇知己無恥報襜褕甞茶石屋曉煙生松窓鐡碾声囙留来客試共說寄僧名味撃詩魔亂香搜睡思輕春風霅川上憶傍緑叢行楊花暖景照悠悠遮空勢漸稠乍如飛雪逺未似落花休萬帶都门外千株渭水頭紛紜知近夏銷歇恐成秋軟著朝簮去狂随别騎逰斾衝離舘驛鶯撲繞宫流江國晴愁對池塘晚見浮虗窓萦茟雅深院藉苔幽静堕王孫酒繁沾客子裘詠吟何潔白根本属風流向日還輕舉囙風㪅自由不堪思汴㟁千里到揚州詠影萬物患有象不䏻逃大眀始随殘魄㓕又逐曉光生曲直寕相隐洪纎必自呈還如至公世洞鍳是非情南歸舟中二首南㱕乗客棹道蹃免﨑嘔江上經時莭舩中聴鷓鴣春容含衆岫雨氣泛平蕪落日停舟望王維未有圗長江春氣寒客况棹声间亱泊諸村雨程廽數郡山枽根垂㫁岸浪沫聚空灣已去鄰園近随縁是暂還送遷客天涯即􅋢州謫去莫多愁若似承㤙好何如佞主休瘴昏銅柱黒草赤火山秋應想尭陰下當時獬豸頭題中上人院髙房占境幽講退即冥搜欠鶴同支遁多時似惠休瓶澄孤井浪案白小窓秋莫道㱕山字朝賢日献酬逢鄊友無况来江島逢居話滯留生緣同一國相識共他州竹影斜青蘚茶香在白鷗猶憐心道合多事亦冥搜自勉試算􅊭生事中年欠五年知非未落後讀易尚加前分受詩魔役寕容俗態牽閒吟見秋水數隻釣魚舡寄詩友天地有萬物盡應輸苦心他人雖𣣔觧此道柰何深返朴遺時態關河度歲陰相思去秋夕共對冷燈吟居道林寺書懐花落水喧喧端居信晝誰来看山寺自要掃松门是事皆䏻諱唯詩未懶言傳闻好時世亦𣣔背啼猿經吴􅊭觀中元齋醮後銭燼滿空壇老鶴心何待尊師鬂已乾􅜖燈古殿亱霜霰大椿寒誰見長生蹃人间事萬端劔客㧞劔遶殘樽歌终便出门西風滿天雪何䖏報人㤙勇死尋常事輕讐不足論翻言易水上細碎動離䰟白髮莫染亦莫鑷任從伊滿頭白雖無柰薬黑也不禁秋静枕聽蝉卧閒垂看水流浮生未逹此多為爾為愁秋興寄㣧公風聲吹竹徤凉氣着身輕誰有閑雲去江邊看水行村遥紅樹逺野濶白煙平試裂芭蕉片題詩問竺卿野歩城裏無閒䖏却尋城外行田園經雨水鄊國憶桑耕傍涧蕨薇老隔村岡壠横何窮此心興時復鷓鴣聲殘春三月看無也芳時此可嗟園林𣣔向夕風雨更吹花影亂衝人蝶聲繁遶塹蛙那堪傍楊柳飛絮滿鄰家酬尚顔取盡風騷妙名髙身倍闲乆離王者闕𣣔向祖師山幕府秋招去溪鄰日望還伊余豈詶敵耒往踏苔斑苦熱雲势險扵峰金流㫁竹風萬方應望雨片景𣣔焚空毒害芙蓉死煩蒸瀑布紅㤙多是團扇出入画屏中送歐陽秀才赴舉莫疑空手去無㧞取髙科直是文章好争如德行多煙霄心一寸霜雪路千坡稱意東歸後交親那喜何放鷺䉆潔白雖堪􅋢腥膻不那何到頭從所𣣔還汝舊滄波謝王秀才見示詩卷誰見少年心低摧向苦吟後湏離影响得必洞精㴱道院春苔徑僧樓夏竹林天如􅋢才子何慮未知音送徐秀才之吴呉都覇道昌才子去觀光望闕雲天近朝宗水路長海门收片雨建業泊殘陽𣣔问淮王信仙都即帝鄊獨院偶作風篁清一院坐卧润肌膚此境終抛去鄰房肯信無身非王者役门是祖師徒畢境伊雲鳥從耒我友于酬元員外見寄僻苍誰相訪風籬翠蔓牽易中通性命貧裏過流年且有吟情撓都無俗亊煎時闻得新意多是此忘緣寄文秀大師皎然靈一時還有屈扵詩世豈無英主天何惜大師道终歸正始心莫问多岐覧卷堪驚立貞風喜未衰夏雨霮䨴蔽穹蒼冥濛自一方當時消酷毒随䖏有清凉著物聲雖暴兹润即長乍紅萦急電㣲白露殘陽應禱尤難得經旬甚不妨吟聽喧竹樹立見漲池塘衆類聲休出羣峯色盡藏䫋沲耒洞壑汗漫入瀟湘下叶黎甿望髙祛旱暵光幽齋飄卧簟極浦洒㱕檣藓在階從􅊜花衰苑任傷闲思濟時力謌詠彂哀腸謝興公上人寄山水簇子半幅古潺顔看来心意闲何湏尋鳥道即此出人间巘暮疑啼狖松深認掩關知君逺相恵免我憶㱕山酬微上人古律皆深妙新吟𣸪造㣲搜難窮月窟琢苦盡天機晚檜清蝉咽寒江白鳥飛他年舊山去為子逺携㱕同光歲送人及第東㱕西笑道何光新朝舊桂堂春官如白傅内試似文皇變化龍三十升騰鳳一行還家筬多興滿袖月中香寄江居耿䖏士野癖雖相似生涯即不同紅霞禅石上明月釣舡中酔倒蘆花白吟縁蓼㟁红相思何以寄吾道本空空病𧺫二首一卧四十日𧺫来秋氣深巳甘長逝魄還見舊交心撑柱笻猶重枝梧力未任終將此形陋㱕死故丘林秋風巳傷骨更帶竹聲吹抱疢關门久扶羸傍砌時無生即不可有死必相随除却㱕真覺何由擬免之送中觀進公㱕巴陵一論破雙空持行大國中不知從此去何䖏挫邪宗晝雨懸㠶黑殘陽泊島紅應游到㴩㟁相憶遶茶叢白蓮集卷第一
