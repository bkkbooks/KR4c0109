body:
  text: 廬嶽僧齊己撰登祝融峰猿鳥不共到我來身𣣔浮四邉空碧落絶頂正清秋宇宙知何極華夷見細流壇西獨立久白日轉神州寄貫休子美曾吟處吾師𣸪去吟是何多勝地銷得二公心錦水流春濶峨睂叠雪深時逢蜀僧說㦯道近逰黔送唐禀正字㱕萍川霜鬚藝閣吏久掩白雲扉求謁元戎後還騎病馬㱕煙村蔬飲淡江驛雪泥肥知到中林日春風長澗薇寄懷江西栖公龍沙為别日廬阜得書年不見來香社相思繞白蓮江僧㱕海寺椘路接吳煙老病何堪說扶羸寄此篇山中喜得友生書柴門關樹石未省夢塵埃落日啼猿裏同人有信來自成為拙隱難以謝夛見說相思處前峰對古臺謝人惠扇子及茶鎗旗封蜀茗圓潔製蛟綃好客分烹煮青蠅避動搖陸生誇妙法班女恨􅋽颷多謝崔居士相思寄寂寥寄監利司空學士詩家為政别清苦日聞新亂後無荒地㱕來盡逺人寬容民賦稅憔悴吏精神何必河陽縣空傳桃李春答陳秀才萬事皆可了有詩門最深古人難得志吾子苦留心野叠􅋽雲朵苔重怪木陰他年立名字笑我老雙林逰橘洲春日上芳洲經春蘭杜幽此時尋橘岸昨日在城樓鷺立青楓杪沙沉白浪頭漁家好生計􅉉底繫扁舟寄武陵道友阮肇迷仙處禪門接紫霞不知尋鶴路幾里入桃花晚樹陰搖蘚春潭影弄砂何當見招我乞與片生涯謝人惠藥五金元造化九錬更精新敢謂長生客將遺必死人久餐應换骨一服已通神終逐淮王去永拋浮世塵還族弟卷豈要私相許君詩自入神風騷何句出瀑布一聫新苦若長如此名須逺逐身閑齊舒復卷留滯忽經旬送周秀逰峽又向夔城去知難動旅魂自非亡國客何慮斷腸猿灔澦分髙仞瞿塘露泄痕眀年期此約􅊭穩到荆門荆門夏日寄洞山節公叠光搖翠木靈洞叠雲深五月經行處千秋檜柏陰山形􅎔北渚僧格繼東林莫惜相招信余心是此心再經蔣山與諸長老夜話逺迹都如鴈南行又北回老僧猶記得往歲已曾耒話遍名山境燒殘黑檪灰無因伴師往㱕思在天台寄當陽張眀府玉泉神運寺寒罄徹琴堂有境靈如此為官興亦長吏愁清白甚民樂賦輸忘聞說巴山縣今來尚憶張逰三覺山白石路重重縈行勢忽窮孤峰擎像閣萬木蔽星空世論隨時變禪懷厯劫同良宵正冥目海日上窗紅庭際晚菊上主人九月將𣣔盡幽叢始綻芳都緣含正氣不是背重陽採去蜂聲逺尋來蝶路長王孫㱕未晚猶得泛金觴送趙長史㱕閩川荆門與閩越關戍隔三千風雪揚帆去臺隍栺海邉客情消旅大王化似堯年莫失春廽約江城穀雨前擬嵇康絶交寄湘中貫微何處同嵇懶吾徒道異諸本無文字學何往來書嶽寺逍遙夢侯門勉强居相知在玄契莫訝八行踈寄許州清古北來儒士說許下有吟僧白日身長倚清秋塔上層言雖依景得理要入無徴敢望夛相示孱微老不勝謝丁秀才見示賦卷五首新裁剪搜羅盡指㱕誰曾師古律君自負天機聖后求賢久名公得雋稀乘秋好擕去直望九霄飛驚秋褰簾聽秋信晚傍竹聲㱕多故堪傷骨孤峰好拂衣梧桐凋緑盡菡蓞墮紅稀却恐吾形影嫌心與口違夏日雨中寄幕中知己北風吹夏雨和竹亞南軒豆枕欹􅋽冷蓮峰入夢魂窗多斜迸􅊜庭遍暴流痕清興知無限晴來示一言夜次湘隂風濤出洞庭帆影入澄清何處驚鴻起孤舟趂月行時難多戰地野闊絶春耕骨肉知存否林園近郡城寄唐禀正字䟱野還如舊何曾稱在城水邉無伴立天際有山橫落日雲霞赤髙窗茟硯眀鮑昭夛所得時憶寄湯生宿舒湖希上人房入寺先來此經窗半在湖秋風新菡萏暮雨老菰蒲任聼浮生速䏻消默㘴無語來燈熖短嘒唳彂髙梧戊辰歲江南感懷忽忽動中私人間何所之老過離亂世生在太􅊭時桃李春無主杉松寺有期曾吟子山賦何啻舊凌遲送林上人㱕永嘉舊居東越常懸思山門在永嘉秋光浮椘水帆影背長沙城黑天台雨村眀海嶠霞時尋謝公跡春草有瑶花答友生山居寄示嘉遁有新吟因僧寄竹林靜思來鳥外閑味繞松陰兵寇慿陵甚溪山幾許深休為反招隱携取一相尋新秋霽後晚眺懷先公雨霽湘椘晚水􅋽天亦澄山中應解夏渡口有行僧鳥列滄洲隊雲棑碧落層孤峰磬聲絶一點石龕燈池上感興所向似無端風前冷憑闌旁人應悶見片水自閑看碧底紅鱗鬛澄邉白羽翰南山衆木葉飄著竹聲乾和曇域上人寄贈之什百病煎衰朽栖遲戰國中思量青壁寺行㘴赤松風道寄虗元合書傳往復空可憐禪月子香火國門束弔雙泉大師真塔塔聳層峰後碑鎸巨石新不知將一句分付與何人靜㘴雲生衲空山月照真後徒逰禮者猶認指迷津暮冬送璘上人㱕華容故園雖不逺那免愴行思莾蒼􅊭湖路霏微過雪時全無山阻隔㦯有客相隨得見交親後春風動栁絲秋夜聽業上人彈琴萬物都寂寂堪聞彈正聲人心盡如此天下自和􅊭湘水㵼秋碧古風吹太清往年廬嶽奏今夕更分眀謝人惠丹藥别後聞餐餌相逢訝道情肌膚紅色透髭髮黑光生仚洞誰傳與松房自煉成常蒙逺公惠亦覺骨毛輕荆門病中寄懷貫微上人我衰君亦老相憶更何言際泥安禪力難醫必死根梅寒爭雪彩日冷釀氷痕早晚東㱕去同尋入石門匡山逺大師常與諸賢逰石門洞玩錦繡谷答孔秀才早向文章裡䏻降少壯心不愁人不􅋢閑處自閒吟水國雲雷濶僧園竹樹深無嫌我衰颯時此一相尋秋江兩岸山青映中流一棹聲逺無風浪動正向夕陽橫島嶼蟬分宿沙洲客獨行浩然心自合何必濯吾纓船窗孤舸憑幽窗清波逼面􅋽舉頭還有礙低眼即無妨瞥過沙禽翠斜分夕照光何時到山寺上閣看江鄊永夜永日還欹枕良宵亦曲肱神閑無萬慮壁冷有殘燈香影浮龕象瓶聲著井氷尋思到何處海上斷崖僧中春愴懷寄二三知己眼暗心還白逢春强憑欄因聞積雨夜却憶舊山寒竹撼煙叢滑花燒露朵乾故人相㑹處應話此衰殘自遣了然知是夢既覺更何求死入孤峰去灰飛一燼休雲無空碧在天靜月華流免有諸徒弟時來吊石頭送陳霸㱕閩􅋽風動行興含笑話􅎔途已得身名了全忘客道孤鄊程過百越帆影繞重湖家在飛鳴外音書可寄無寄孫闢呈鄭谷郎中衡嶽去都忘清吟戀省郎淹流才半月酬唱頗盈箱雪長松柳格茶添語話香因論樂安子年少老篇章荆門送人自峨􅖭逰南嶽峨􅖭來已逺衡嶽去猶賖南浦懸帆影西風亂荻花天涯遙夢澤山衆近長沙有興夛新作携將天府誇謝主人石筍西園罷宴逰東閣念林丘特减花邉峭來添竹裏幽憶過陽朔見曾記太湖求從此頻吟繞㱕山意亦休經安公寺大聖威靈地安公晏㘴蹤未知長寂默不見久從容塔影髙羣木江聲壓暮鐘此逰幽勝後來夢亦應重秋夕寄諸姪每到秋殘夜燈前憶故鄊園林紅橘柚窗户碧瀟湘離别身垂老艱難路去長弟兄應健在兵火理耕桑謝炭正擁寒灰次何當惠寂寥且留連夜向未敢滿爐燒必恐吞難盡唯愁撥易消豪家揑為獸紅迸錦首燋夏滿日偶作寄孫支使其年閏五月一百二十日煎熬幾不勝憶㱕滄海寺冷倚翠崕稜舊扇猶􅍾執新秋更鬱蒸何當見􅋽月擁衲訪詩朋寄清溪道友山門搖落空霜霰滿杉松眀月行禪處青苔繞石重泉聲喧萬壑鐘韵遍千峰終去焚香老同師大士蹤謝重緣舊山水障子敢望重緣飾微茫洞壑春㘴看終未是㱕卧始應真已覺心中朽猶憐四面新不因公子鍳零落幾成塵寺居鄰井雙梧上一蟬鳴隔墻依稀舊林日撩亂繞山堂難默吟風口終清飲露腸老僧加護物應任噪殘陽剃髮金刀閃冷光一剃一清􅋽未免隨朝夕依前長雪霜夏林欹石膩春澗沐泉香向老凋踈盡寒天不出房謝髙輦先輩寄新唱和集敢謂神仚手多懷老比丘編聫來鹿野酬唱在龍樓洛浦精靈懾邙山鬼魅愁二南風雅道從此化東周送徐秀才逰吳國西江東注急孤棹若流星風浪相隨白雲中獨過青他時誰共說此路我曾經好向吳朝看衣冠盡漢庭憶在匡廬日憶在匡廬日秋風八月時松聲虎溪寺塔影鴈門師步碧葳𬎼徑吟香菡蓞池何當舊泉石㱕去洗心脾寄三覺寺從益上人又云三覺山山下人來說夛時不下山是應終未是閑得且須閑海面雲㱕竇猿邉月上關尋思亂峰頂空送衲僧還殘秋感愴日日加衰病心心趣寂寥殘陽起閑望萬木聳寒條椘寺新為客吳江舊看潮此懷何以寄風雨暮蕭蕭寄南徐劉員外二首竟陵兵革際㱕復舊園林早歲為官苦常聞說此心海邉山夜上城寺秋尋應訝松風約蹉跎直到今晝公評衆製姚監選諸文風雅誰收我編聫獨有君餘生終此道萬事盡浮雲爭得重携手探幽椘水濆貽王秀才功到難搜處知難始是詩自䏻探虎子何慮屈男免此道真清氣前賢早白髭須教至公手不惜付丹枝贈孫生詩家詩自别君是繼詩人道出千途外功爭一字新寂寥中影跡霜雪裏精神待折東堂桂㱕來更苦辛酬元員外清洛碧嵩根寒流白照門園林經難别桃李幾株存衰老江南日凄凉海上村閑來晒朱紱淚滴舊煙蘿與楊秀才話別庾信哀何極仲宣悲苦夛因思學文賦不勝弄干戈自古有如此于今終若何到頭重策蹇㱕去舊烟蘿寄何崇丘員外門底桃源水􅉼空復映山髙吟煙雨霽殘日郡樓間變俗真無事分題是不閑尋思章岸見全未有年顔贈劉五經往年長白山彂憤忍飢寒掃葉雪霜􅊜讀書唇齒乾羣經通講解八十尚輕安今日江南寺相逢話世難送逰山道者我亦逰山者常經舊所經雪消天外碧春曉海中青可見亂離世况臨衰病形憐君此行興獨入白雲屏舟中江上望玉梁山懷李尊師殘照玉梁巔哦峨逺棹前古來傳勝異人去學神仚白鹿老碧壑黃猿啼紫煙誰心共無事局上度流年角聞說征人說嗚烏何處邉孤城沙塞地殘月雪霜天㑹轉吳風急吹長磧雁連應傷漢車騎名未勒燕然言詩畢竟將何狀根元在正思達人皆一貫迷者自夛岐觸類風騷逺懷賢肺腑衰河橋送別者二子好相知酬王秀才離亂幾時休儒生厄逺逰亡家非漢代何處覔荆求旅夢寒燈屋鄊懷晝雨樓相逢話相殺誰復念風流春居寄友生莎􅏙荒蕪甚名應共此情江村雷雨彂竹屋夢魂驚社過夛來燕花繁漸老鶯相思意何􅋀新作未曾評寄答武林幕中何支使二首十萬雄軍幕三千上客才何當談笑外逺慰寂寥來騷雅鏘金擲風流醉玉頺爭知江雪寺老病向寒灰南州無百戰北地有長征間殺何從事傷哉蘇子卿江樓聫雪句野寺看春耕門外滄浪水風波雜雨聲浙江晚渡去年曾到此久立滯前程歧路時難處風濤晚未􅊭汀蟬含老韵岸荻簇枯聲莫泥關河險夛逰自逺行送人下第東㱕再謁舊主人一戰偶不捷東㱕計未空還携故書劔去謁舊英雄椘雪連吳樹西江正北風男免藝若是㑹合值眀公寄謝髙先輩見寄二首穿鑿堪傷骨風騷久痛心永言無絶唱忽此惠希音楊栁江湖晚芙蓉島嶼深何因㑹仙手臨水一披襟詩在混茫水難搜到極玄有時還積思度歲未終篇片
