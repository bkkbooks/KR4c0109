  - {type: variant, offset: 32, length: 0, content: '', WYG: 首鳳樓髙映綠隂隂凝重多含雨露深莫謂一枝柔軟力幾曾牽破别離心館娃宫畔響廊前依託吳王養翠煙劍去國亡臺殿毁却隨紅樹噪秋蟬穠低似中陶潛酒軟極如傷宋玉風多謝將軍遶營種翠中閑卓戰旗紅髙僧愛惜遮江寺逰子傷殘露野橋爭似著行垂上苑碧桃紅杏對揺揺答長沙丁秀才書月月便車奔帝闕年年貢士過荆臺如何三度槐花落未見故人携巻來戒小師不肯吟詩不聴經禪宗異岳懶逰行他年白首當人問將底言談對後生題舊拄杖親採匡廬瀑布西層崖懸壁更安梯携行三}
