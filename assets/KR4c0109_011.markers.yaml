  - {type: variant, offset: 0, length: 0, content: '', WYG: 撰猛虎行磨爾牙錯爾爪狐莫威兎莫狡飢來吞噬取腸飽横行不怕日月星皇天産爾為生獰前村半夜聞吼聲何人按劍燈熒熒西山叟西山中多狼虎去嵗傷兒復傷婦官家不問孤老身還在前山山下住君子行聖人不生麟龍何瑞梧桐不髙鳳凰何止吾聞古之有君子行藏以時進退求已榮必為天下榮恥必為天下恥苟進不如此退不如此亦何必用虚偽之文章取榮名而自美善哉行大鵬刷翮謝溟渤青雲萬層髙突出下視秋濤空渺瀰舊處魚龍皆細物人生在世何容易眼濁心昏信生死願除嗜慾待身輕携手同尋列仙事日日曲日日日東上日日日西没任是神仙容也須成朽骨浮雲滅復生芳草死還出不知千古萬古人𦵏向青山為底物耕叟春風吹蓑衣暮雨滴箬笠夫婦耕共勞兒孫饑對泣田園髙且痩賦税重復急官倉䑕雀羣只待新租入苦熱行離宫劃開赤帝怒喝起六龍奔日馭下土熬熬若煎煮蒼生惶惶無處處火雲崢嶸焚泬寥東皋老農腸欲焦何當一雨蘇我苗為君擊壤歌帝堯苦寒行氷峯撑空寒矗矗雲凝水凍埋海陸殺物之性傷人之慾既不能斷蒺藜荆棘之根株又不能展鳳凰麒麟之拳跼如此則何如為和煦為膏為雨自然天下之榮枯融融於萬户春風曲春風有何情旦暮來林園不問桃李主吹落紅無言城中懐山友春城來往桃李碧煖艶紅香斷消息吾徒自有山中隣白晝㝠心坐嵐壁讀李賀歌集赤水無精華荆山亦枯槁𤣥珠與虹玉璨璨李賀抱清晨醉起臨春臺吳綾蜀錦胸襟開狂多兩手掀蓬萊珊瑚掇盡空土堆風琴引挼吳絲雕楚竹髙託天風拂為曲一一宫商在素空鸞鳴鳳語翹梧桐夜深天碧松風多孤窓寒夢驚流波愁魂傍枕不肯去翻疑住處隣湘娥金風聲盡薰風發冷泛虚堂韻難歇常恐聴多耳漸煩清音不絶知音絶夏雲曲紅嵯峨爍晚波乖龍慵卧旱鬼多爞爞萬里壓天塹颺雷電光空閃閃好雨不雨風不風徒倚穹蒼作巖險男巫女覡更走魂焚香祝天天不聞天若聞必能使爾為潤澤洗埃氛而又變之成五色捧日輪將以表唐堯虞舜之明君讀李白集竭雲濤刳巨鼇捜括造化空牢牢㝠心入海海神怖驪龍不敢為珠主人間物象不供取飽飲逰神向𤣥圃鏘金鏗玉千餘篇膾吞炙嚼人口傳須知一一丈夫氣不是綺羅兒女言祈真壇玉甃瑶壇二三級學仙弟子參差入霓旌隊仗下不下松檜森森天露濕殿前寒氣束香雲朝祈暮禱𤣥元君茫茫俗骨醉更昏樓臺十二遥崑崙崑崙縱廣一萬二千里中有五色雲霞五色水何當斷慾便飛去不要九轉神丹換精髓黄雀行雙雙野田雀上下同飲啄暖去栖蓬蒿寒歸傍籬落殷勤避羅網乍可遇鵰鶚鵰鶚雖不仁分明在寥廓石竹花石竹花開照庭石紅鮮自禀離宫色一枝兩枝初笑風猩猩血潑低低叢常嗟世眼無真鑒却被丹青苦相䧟誰為根尋造化功為君吐出淳元膽白日當午方盛開彤霞灼灼臨池臺繁香濃艶如未已粉蝶逰蜂狂欲死寄南岳白蓮道士能於長嘯猿猱休啼月皎皎蟋蟀不吟山悄悄大耳仙人滿頷鬚醉倚長松一聲嘯古劍歌古人手中鑄神物百鍊百淬始提出今人不要强硎磨蓮鍔星文未曾没一彈一撫聞錚錚老龍影奪秋燈明何時得遇英雄主用爾平治天下去湘妃廟湘煙濛濛湘水急汀露凝紅裛蓮濕蒼梧雲疊九嶷深二女魂飛江上立相携泣鳳盖龍輿追不及廟荒松朽啼飛猩笋鞭迸出階基傾黄昏一岸隂風起新月如眉生濶水巫山髙巫山髙巫女妖雨為暮兮雲為朝楚王憔悴魂欲銷秋猿嘷嘷日將夕紅霞紫煙凝老壁千巖萬壑花皆坼但恐芳菲無正色不知今古行人行幾人經此無秋情雲深廟逺不可覔十二峯頭挿天碧贈持法華經僧衆人有口不説是即説非吾師有口何所為蓮經七軸六萬九千字日日夜夜終復始乍吟乍諷何悠揚風篁古松含秋霜但恐天龍夜义乾闥衆㽬塞虚空耳皆聳我聞念經功徳緣舌根可等金剛堅他時刼火洞燃後神光璨璨如紅蓮受持身心苟精潔尚能使煩惱大海水枯竭魔王輪幢自摧折何况更如理行如理説刳腸龜爾既能於靈應久存其生爾既能於瑞胡得迷其死刳腸徒自屠曵尾復何累可憐濮水流一葉泛莊子贈巖居僧石如麒麟巖作室秋苔漫壇淨於漆袈裟盖頭心在無黄猿白猿啼日日觀李瓊處士畫海濤巨鼇轉側長鰌翻狂濤顛浪髙漫漫李瓊奪得造化本都盧縮在秋毫端一揮一畫皆筋骨滉瀁崩騰大鯨臬葉撲仙槎擺欲沉下頭應是驪龍窟昔年曾夢涉蓬瀛唯聞撼動珊瑚聲今來正歎陸沉久見君此畫思前程千尋萬派功難測海門山小濤頭白今人錯認錢塘城羅刹石底奔雷霆昇天行身不沉骨不重驅青鸞駕白鳳幢盖飄揺入冷空天風瑟瑟星河動瑶闕參差阿母家樓臺戲閉凝彤霞五三仙子乗龍車堂前碾爛蟠桃花迴頭却顧蓬山頂一㸃濃嵐在深井還人巻李白李賀遺機杼散在人間不知處聞君収在芙蓉江日鬭鮫人織秋浦金梭軋軋文離離吳娃越女羞上機鴛鴦浴煙鸞鳳飛澄江曉映餘霞輝仙人手持玉刀尺寸寸酬君珠與璧裁作霞裳何處披紫皇殿裏深難覔輕薄行玉鞭金鐙驊騮蹄横眉吐氣如虹霓五陵春暖芳草齊笙歌到處花成泥日沉月上且閗雞醉來莫問天髙低伯陽道徳何唾咦仲尼禮樂徒卑栖浮雲行大野有賢人大朝有聖君如何彼浮雲掩蔽白日輪安得東南風吹散八表外使之天下人共見堯眉彩煌煌京洛行聖君垂衣裳蕩蕩若朝旭大觀無遺物四夷來率服清晨迴北極紫氣盖黄屋雙闕聳雙鼇九門如川瀆梯山航海至晝夜車相續我恐紅塵深變為黄河曲弔汨羅落日倚闌干徘徊汨羅曲寃魂如可弔煙浪聲似哭我欲考黿鼉之心烹魚龍之腹爾既啖大夫之血食大夫之肉千載之後猶斯暗伏將謂唐堯之尊還如荒悴之君更有逐臣於焉𦵏魂得以縱其噬恣其吞贈念法華經僧念念念兮入惡易念念念兮入善難念經念佛能一般愛河竭處生波瀾言公少年真法器白晝不出夜不睡心心緣經口緣字一室寥寥燈照地沉檀巻軸寶函盛簷蔔香薰水精記空山木落古寺閑松枝鶴眠霜霰乾牙根舌根水滴寒珊瑚搥打紅琅玕但恐蓮花七朶一時坼朶朶似君心地白又恐天風吹天花繽紛如雨飄袈裟况聞此經甚㣲妙百千諸佛真祕要靈山説後始傳來聞者雖多持者少更堪誦入陀羅尼唐音梵音相雜時舜絃和雅薰風吹文王武王絃更悲如此爭不遣碧空中有龍來聽有鬼來聽亦使人間聞者敬見者敬自然心虚空性清淨此經真體即毘盧雪嶺白牛君識無短歌寄鼓山長老雪峯雪峯髙且雄峩峩堆積青㝠中六月赤日燒不鎔飛禽瞥過人難通常聞中有白象王五百象子皆威光行圍坐遶同一色森森影動栴檀香於中一子最雄猛稱尊獨踞鼔山頂百千春屬隂闕影身照曜吞秋景我聞岷國民歸依前王後王皆師資寧同梁武遇逹磨過後彈指空傷悲漁父夜釣洞庭月朝醉巴陵市却歸君山下魚龍窟邊睡生涯在何處白浪千萬里曾笑楚臣迷蒼黄汨羅水採蓮曲越溪女越江蓮齊菡蓞雙嬋娟嬉逰向何處採摘且同船浩唱發容與清波生漪漣時逢島嶼泊幾共鴛鴦眠襟袖既盈溢馨香亦相傳薄暮歸去來苧蘿生碧煙啄木啄木啄啄鳴林響壑貪心既緣利嘴斯鑿有朽百尺㣲蟲斯宅以啄去害啄更彌劇層崖豫章聳幹蒼蒼無縱爾啄摧我棟梁靈松歌靈松靈松是何根株盤擗枝幹與羣木殊世眼爭知蒼翠容薜蘿遮體深朦朧先秋瑟瑟生谷風青隂倒卓寒潭中八月天威行肅殺萬木雕零向霜雪唯有此松髙下枝一枝枝在無摧折癡凍頑氷如鐵堅重重鎖到槎牙顛老鱗枯節相把捉踉蹡立在青崖前有時深洞興雷雹飛電繞身光閃爍乍似蒼龍驚起時攫霧穿雲欲騰躍夜深山月照髙枝踈影細落莓苔磯千年朽枿魍魎出一株寒韻鏘琉璃安得良工妙圗雘寫將偃蹇懸煙閣飛瀑聲中戰嵗寒紅霞影裏擎蕭索蠧蠧不自蠧而蠧於木蠧極木心以豐爾腹偶或成之胡為朂人人而不真由爾亂神蠧兮蠧兮可全其生無託爾形霜松雪檉行路難行路難君好看驚波不在黤黮間小人心裏藏崩湍七盤九折寒􅍶崒翻車倒盖猶堪出未似是非脣舌危闇中潛毁平人骨君不見楚靈均千古沉寃湘水濵又不見李太白一朝却作江南客謝徽上人見恵二龍障子以短歌酬之我見蘇州崑山金城中金城柱上有二龍老僧相傳道是僧繇手尋常入海共龍鬭又聞蜀國玉局觀有孫遇跡盤屈身長八十尺逰人爭看不敢近頭覬寒泉萬丈碧近有五羊徽上人閑工小筆得意新畫龍不誇頭􅊁及鬚鱗只求筋骨與精神徽上人真藝者恵我雙龍不言價等閑不敢將懸掛恐似葉公好假龍及見真龍却驚怕送人往長沙荆門歸路指湖南千里風帆興可諳好聴鷓鴣啼雨處木蘭舟晚泊春潭偶題時事懶言多忌諱野吟無主苦縱横君看三百篇章首何處分眀著姓名寄山中叟清泉碧樹夏風凉紫蕨紅粳午㸑香應笑晨持一盂苦腥羶市裏呌家常贈琴客曾擕五老峯前過幾向雙松石上彈此境此聲誰更愛掀天羯鼓滿長安勉吟僧千途萬轍亂真源白晝勞形夜斷魂忍着袈裟把名紙學他低折五侯門送人歸華下蓮花峯翠濕凝秋舊業園林在下頭好束詩書且歸去而今不愛事風流夏日城中作二首三面僧隣一面牆更無風路可吹凉他年捨此歸何處青壁紅霞裹石房竹低莎淺雨濛濛小檻幽窓暑月中有境牽懐人不㑹東林門外翠横空黙坐燈引飛蛾拂熖迷露淋栖鶴壓枝低㝠心坐睡蒲團稳夢到天台過剡溪水邊行身着袈裟手杖藤水邊行止不妨僧禽栖日落猶孤立隔浪秋山千萬層寄鄭谷郎中人間近遇}
