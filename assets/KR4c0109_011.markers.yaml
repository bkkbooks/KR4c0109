  - {type: variant, offset: 731, length: 938, content: 二曰暗㑹重城不鎖夢每夜自歸山十三曰直擬禹力不到處河聲流向西十四曰返本又因風雨夜重到古松門十五曰功勲馬曾金鏃中身有寳刀痕十六曰抛擲琴書流二國風雨出秦闗十七曰背非山河終決勝椘漢且横行十八曰進退日午游都市天寒住華山十九曰禮義送我杯中酒與君身上衣二十曰兀坐自從青草出便不下堦行詩有四十門一曰皇道明堂坐天子月朔朝諸侯二曰始終養雛成大鶴種子作高松三曰悲喜兩行燈下淚一𥿄嶺南書四曰隱顯道晦金雞伏時來木馬鳴五曰惆悵此别又千里少年能幾時六曰道情誰來看山寺自是掃松門七曰得意此生還自喜餘事不相侵八曰背時白髪無心鑷青山得意多九曰正風一春能幾日無雨亦多風十曰返顧逺憶諸峰頂曾栖此性靈十一曰亂道苦雨漲秋濤狂風翻野燒十二曰抱直湏知三尺劍只爲不平人十三曰世情要路争先進閒門避處多十四曰康救傍人皆黙語當路好提防十五曰貞孝無家空托夢主祭不從人十六曰薄情君恩秋後薄日夕向人疎十七曰忠正敢將心為主豈愳語從人十八曰相成怪得登科晚湏逢聖主知十九曰嗟歎淚流襟上血髪白鏡中絲二十曰俟時明主未廵狩白頭猶釣魚二十一曰清苦在處人投卷移居雨著衣二十二曰騷愁巳難消永夜況復聽秋霖二十三曰睠戀欲起游方興重来繞塔行二十四曰想像溪霞流火色松日照爐光二十五曰志氣未抛无逺路難作便歸人二十六曰雙擬冥目冥心坐花開花落時二十七曰向時黒壤生紅木黄猿領白兒二十八曰傷心六國空流血孤祠掩落花二十九曰鑒戒因思後庭曲懶上景陽樓三十曰神僊一為嵩嶽客幾䘮雒陽人三十一曰破除大都時到此不是世無情三十二曰蹇塞氣蒸垂柳重寒勒牡丹遲三十三曰鬼怪山魅隔窗舞鵩鳥入簾飛三十四曰亂道日落月未上鳥栖人獨行三十五曰世情如何人少重都為帶寒開三十六曰雅風日落無行客天寒有去鴻三十七曰嗟歎拭淚沾襟血梳頭滿面絲三十八曰是非湏知項籍劍不及魯陽戈三十九曰理義送我杯中酒典君身上衣四十曰清潔大雪路亦宿深山水也齊詩有六斷一曰合題可憐半夜婵娟月正對五侯殘酒卮二曰背題尋常風雨夜應有鬼神看三曰即事翻嫌易水上細碎動離魂四曰因起閒尋古廊畫記得列仙名五曰不盡意此心只待相逢說時復登樓看逺山六曰取時西風起過鴈一一向瀟湘詩有三格上格用意那堪懷逺道猶自上高樓九江有浪舡難濟三峽無猿客自愁中格用氣直饒人買去還向柳邊栽四海魚龍精魄冷三山鸞鳳骨毛寒下格用事片石猶臨水無人把釣竿一輪湘渚月萬古獨醒人貫休晚泊湘江風騷㫖格, WYG: ''}
