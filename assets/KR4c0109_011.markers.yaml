  - {type: variant, offset: 30, length: 0, content: '', WYG: 人相訪來勉送吳國三五新戒歸法王遺制付仁王難得難持刼數長努力只須堅守䕶三千八萬是垣墻夏日寄清溪道者老病不能求藥鉺朝昏秪是但焚燒不知誰為収灰骨纍石栽松傍寺橋送恵空北逰君向峴山逰聖境我將何以記多才丁寧墮淚碑前過寫取斯文寄我來寄懐歸州馬判官三年為倅興何長歸計應多事少忙又見秋風霜裛樹滿山椒熟水雲香觀荷葉露珠霏㣲曉露成珠顆宛轉田田未}
