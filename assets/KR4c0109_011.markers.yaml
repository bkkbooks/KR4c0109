  - {type: variant, offset: 31, length: 0, content: '', WYG: 風任器方圎性終在不妨翻覆落池中苦熱懐玉泉寺寄仁上人火雲如燒接蒼梧原野煙連大澤枯謾費葛衫葵扇力爭禁泉石潤肌膚觀盆池白蓮素蕚金英歕露開倚風凝立獨徘徊應思瀲灔秋池底更有歸天伴侣來折楊栁詞}
