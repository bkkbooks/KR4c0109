  - {type: variant, offset: 28, length: 1, content: 式, WYG: 八字長吉才狂太白顛二公文陣勢横前誰言後代無髙手奪得秦皇鞭鬼鞭謝隂符經事遂鼎湖遺劍履時來渭水擲魚竿欲知賢聖存亡道自向心機反覆看勉送藏休上人一林霜雪未霑頭爭遣藏休肯便休學盡世間難學事始堪隨處任虚舟幽齋偶作幽院纔容箇小庭踈篁低短不堪情春來猶頼隣僧樹時引流鶯送好聲贈念法華經僧萬境心隨一念平紅芙蓉折愛河清持經功力能如是任駕白牛安稳行對菊無艶無妖别有香栽多不為待重陽莫嫌醒眼相看過却是真心愛澹黄閉門正是閉時爭合閉大家開處不須開還防朗月清風夜有箇}
