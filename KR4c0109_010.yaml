front:
  text: 白蓮集卷第十雜歌行四十首七言絶句四十一首
  hash: sha256:8ca585044e0e5fb9d80fc7d1f87158efbe6f23796122c461a91efde0153e96b6
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0109_SBCK_010-1a}
body:
  text: 廬嶽僧齊己撰猛虎行磨爾牙錯爾爪狐莫威兔莫狡飢來吞噬取腸飽橫行不怕日月星皇天産爾為生獰前村半夜聞吼聲何人按劍燈熒熒西山叟西山中多狼虎去歲傷兒復傷婦官家不問孤老身還在前山山下住君子行聖人不生麟龜何瑞梧桐不高鳳凰何止吾聞古之有君子行藏以時進退求己榮必為天下榮恥必為天下恥苟進不如此退不如此亦何必用虛僞之文章取榮名而自美善哉行大鵬刷翮謝溟渤青雲萬層高突出下視秋濤空渺漲舊處魚龍皆細物人生在世何容易眼濁心昏信生死願除嗜欲待身輕携手同尋列仙事日日曲日日日東上日日日西沒任是神仙客也須成朽骨浮雲滅復生芳草死還出不知千古萬古人葬向青山為底物耕叟春風吹簑衣暮雨滴箬笠夫婦耕共勞兒孫飢對泣田園高且瘦賦稅重復急官倉鼠雀群只待新租入苦熱行離宫劃開赤帝怒喝起六龍奔日馭下土熬熬若煎煮蒼生煌煌無處避火雲峥嶸焚泬㵳東皋老農腸欲焦何當一雨蘇我苗為君擊壤歌帝堯苦寒行氷峰撑空寒矗矗雲凝水凍埋海陸殺物之性傷人之欲既不能蒺䔧荆棘之根株又不䏻展鳳凰麒麟之拳局如此則何如為和煦為膏為雨自然天下之榮枯融融于萬户春風曲春風有何情旦暮來林園不問桃李主吹落紅無言城中懷山友春城來往桃李碧艷暖紅香斷消息吾徒自有山中鄰白晝冥心坐嵐壁讀李賀歌集赤水無精華荆山亦枯槁玄珠與虹玉燦燦李賀抱清晨醉起臨春臺吳綾蜀錦胸襟開狂多兩手掀蓬萊珊瑚掇盡空土堆風琴引撥吳絲雕楚竹高託天風拂為曲一一宫商在素空鸞鳴鳯語翹梧桐夜深天碧松風多孤窗寒夢驚流波愁魂傍枕不肯去翻疑住處鄰湘娥金風聲盡薰風發冷泛虛堂韻難歇常恐聽多耳漸煩清音不絶知音絶夏雲曲紅嵯峨爍晚波乖龍慵卧旱鬼多爞爞萬壓天塹揚雷電光空閃閃好雨不雨風不風徙倚穹蒼作岩險男巫女覡更走魂焚香祝天天不聞天若聞必䏻使爾為潤澤洗埃氛而又變之成五色捧日輪將以表唐堯虞舜之明君讀李白集竭雲濤刳巨鰲搜掊造化空牢牢冥心入海海神怖驪龍不敢為珠主人間物象不供取飽食逰神向玄圃鏘金鏗玉千餘篇膾吞炙嚼人口傳須知一一丈夫氣不是綺羅男女言祈貞壇玉甃瑶壇二三級學仙弟子參差入霓旌隊仗下不下松檜森森天露濕殿前寒氣束香雲朝祈暮禱玄元君茫茫俗骨醉更昏樓臺十二遙崑崙崑崙縱廣一萬二千里中有五色雲霞五色水何當斷欲便飛去不要九轉神丹换精髓黃雀行雙雙野田雀上下同飲啄暖去栖蓬蒿寒歸傍籬落殷勤避羅網乍可遇鵬鶚鵬鶚雖不仁分明在寥廓石竹花石竹花開照庭石紅鮮自禀離宫色一枝兩枝初笑風猩猩血潑低低叢嘗嗟世眼無真鑒却被丹青苦相陷誰為根尋造化功為君吐出平原膽白日當午方盛開彤霞灼灼臨池臺繁香濃艷如未已粉蝶逰蜂狂欲死寄南嶽白蓮道士䏻于長嘯猿猱休啼月皎皎蟋蟀不吟山悄悄大耳仙人滿頷須醉倚長松一聲嘯古劍歌古人手中鑄神物百煉百淬始提出今人不要强硎磨蓮鍔星文未曾沒一彈一撫聞錚錚老龍影奪秋燈明何時得遇英雄主用爾平治天下去湘妃廟湘烟𪷟濛湘水急汀露凝紅裛蓮濕蒼梧雲疊九嶷深二女魂飛江上立相携泣鳳蓋龍追不及廟荒松朽啼飛猩笋鞭迸出階基傾黃昏一岸隂風起新月如眉生濶水巫山高巫山高巫女妖雨為暮兮雲為朝椘王憔悴魂欲消秋猿嘷嗥日將夕紅霞紫烟凝老壁千岩萬壑花皆坼但恐芳菲無正色不知今古行人行幾人經此無秋情雲深廟逺不可覔十二峰頭插天碧贈持法華經僧衆人有口不說是即說非吾師有口何所為蓮經七軸六萬九千字日日夜夜終復始乍吟乍諷何悠揚風篁古松含秋霜但恐天龍夜義乾闥衆㽬塞虛空耳皆聳我聞念經功德緣舌根可等金剛堅他時劫火洞燃後神光燦燦如紅蓮受持身心苟精潔尚䏻使煩惱大海水枯竭魔王輪幢自摧折何況更如理行如理說刳腸龜爾既䏻于靈應久存其生爾既䏻于瑞胡得迷其死刳腸徒自屠曵尾復何纍可憐濮水流一葉泛莊子贈岩居僧石如麒麟岩作室秋壇漫壇淨于漆袈裟蓋頭心在無黃猿白猿啼日日觀李璚處士畫海濤巨鰲轉側長鰌翻狂濤顛浪高漫漫李瓊奪得造化本都盧縮在秋毫端一揮一畫皆筋骨滉漾崩騰大鯨瓦仙搓擺欲沉下頭應是驪龍窟昔年曾夢涉蓬瀛唯聞撼動珊瑚聲今來正嘆陸沉久見君此畫思前程千尋萬派功難測海門山小濤頭白今人錯認錢塘城羅剎石底奔雷霆升天行身不沈骨不重驅青鸞駕白鳳幢蓋飄颻入冷空天風瑟瑟星河動瑶闕參差阿母家樓臺戲閉凝彤霞五三仙子乘龍車堂前碾爛蟠桃花回首却顧蓬山頂一點濃嵐在深井還人卷李白李賀遺機杼散在人間不知處聞君收在芙蓉江日鬪鮫人織秋浦金梭軋軋文離離吳娃越女羞上機鴛鴦浴烟鸞鳳飛澄江曉映餘霞輝仙人手持玉刀尺寸寸酬君珠與璧裁作霞裳何處披紫皇殿裏深難覔輕薄行玉鞭金蹬驊騮蹄橫眉吐氣如虹霓五陵春暖芳草齊笙歌到處花成泥日沈月上且鬪雞醉來莫問天高低伯陽道德何唾咦仲尼禮樂徒卑栖浮雲行大野有賢人大朝有聖君如何彼浮雲掩閉白日輪安得東南風吹散八表外使之天下人共見堯眉彩煌煌京洛行聖君垂衣裳蕩蕩若朝旭大觀無遺物四夷來率服清晨廽北極紫氣蓋黃屋雙闕聳雙鰲九門如川瀆梯山航海至晝夜車相續我恐紅塵深變為黃河曲弔汨羅落日倚闌干徘徊汨羅曲冤魂如可弔烟浪聲似哭我欲考黿鼉之心烹魚龍之腹爾既啖大夫之血食大夫之肉千載之後猶斯暗伏將謂唐堯之尊還如荒悴之君更有逐臣于焉葬魂得以縱其噬恣其吞贈念法華經僧念念念兮入惡易念念念兮入善難念經念佛䏻一般愛河竭處生波瀾言公少年真法器白晝不出夜不睡心心緣經口緣字一空寥寥燈照地沉檀卷軸寶函盛薝蔔香薰水精記空山木落古寺閒松枝鶴眠霜霰乾牙根舌根氷滴寒珊瑚捶打紅琅玕但恐蓮花七朵一時坼朵朵似君心地白又恐天風吹天花繽紛如雨飄袈裟況聞此經甚微妙百千諸佛真祕要靈山說後始傳來聞者雖多持者少更堪誦入陀羅尼唐音梵音相雜時舜絃和雅薰風吹文王武王絃更悲如此爭不遣空碧中有龜來聽有鬼來聽亦使人間人聞者敬見者敬自然心虛空性清淨此經真體即毗盧雪嶺白牛君識無短歌寄鼓山長老雪峰雪峰髙且雄峩峩堆積青冥中六月赤日燒不鎔飛禽瞥過人難通嘗聞中有白象王五百象子皆威光行圍坐繞同一色森森影動㫋檀香于中一子最雄猛稱尊獨踞虎山頂百千眷屬隂影身照曜吞我景我聞岷國民皈依前王後王皆師資寧同梁武遇達摩過後彈指空傷悲漁父夜釣洞庭月朝醉巴陵寺却歸君山下魚龍窟邊睡生涯在何處白浪千萬里曾笑楚臣迷蒼黃汨羅水采蓮曲越溪越女江蓮齊菡蓞雙嬋娟嬉逰向何處采摘且同船浩唱發容與清波生漪漣時蓬島嶼泊幾共鴛鴦眠襟袖既盈溢馨香亦相傳薄暮歸去來苧羅生碧煙啄木啄木啄木鳴林響壑貪心既緣利觜斯鑿有朽百尺微蟲斯宅以啄去害啄更彌劇層崖豫章聳幹蒼蒼毋縱爾啄殘我棟梁靈松歌靈松靈松是何根株盤劈枝幹與群木殊世眼爭知蒼翠容薜蘿遮躰深朦朧先秋瑟瑟生谷風青隂倒卓寒潭中八月天威行肅煞萬木凋零向霜雪唯有此松髙下枝一枝枝在無摧折癡凍頑氷如鐵堅重重鎖到槎牙顛老鱗枯節相把捉踉蹡立在青崖前有時深洞興雷雹飛電繞身光閃爍乍似蒼龍驚起時攫霧穿雲欲騰躍夜深山月照高枝疏影細落莓苔磯千年朽枿罔兩出一株寒韻鏘琉璃安得良工妙圖䑾寫將偃蹇埋煙閣飛瀑聲中戰歲寒紅霞影裏擎蕭索蠧螙不自螙而蠧于木蠧極木心以豐爾腹偶或成之胡為朂人人而不貞由爾亂神螙兮螙兮可全其生無託爾形霜松雪柳行路難行路難君好看驚波不在黤黮間小人心裡藏崩湍七盤九折寒崷崒翻車倒蓋尤堪出未似是非唇舌危暗中潛毁平人骨君不見楚靈均千古沉冤湘水濱又不見李太白一朝却作江南客謝徽上人見惠二龍障子以短歌酬之我見蘇州崑山金城中金城柱上有二龍老僧相傳道是僧繇手尋常入海共龍鬪又聞蜀國玉局觀有孫逼跡盤屈身長八十尺逰人爭看不敢近頭覬寒泉萬丈碧近有五羊徽上人閒工小筆得意新畫龍不誇頭角及鬚鱗只求筋骨與精神徽上人真萟者惠我雙龍不言價等閒不敢將懸掛恐似葉公好假龍及見真龍却驚怕絶句四十二首送人往長沙荆門歸路指湖南千里風帆興可諳好聽鷓鴣啼雨處木蘭舟晚泊春潭偶題時事懶言多忌諱野吟無主苦縱橫君看三百篇章首何處分明著姓名寄山中叟清泉碧樹夏風涼紫蕨紅粳午爨香應笑晨持一盂苦腥膻市裏呌家常贈琴客曽携五老峰前過幾向雙松石上彈此境此聲誰更愛掀天羯鼓滿長安勉吟僧千途萬轍亂真源白晝勞形夜斷魂忍著袈裟把名紙學他低折五侯門送人歸華下蓮華峰翠濕凝秋舊業園林在下頭好束詩書且歸去而今不愛事風流夏日城中作二首三面僧鄰一面牆更無風露可吹涼他年舍此歸何處青壁紅霞裹石房竹低莎淺雨濛濛小檻幽窗暑月中有境牽懷人不㑹東林門外翠橫空默坐燈引飛蛾拂熖迷露淋栖鶴壓枝低冥心坐睡蒲團穩夢到天台過剡溪水邊行身著袈裟手杖藤水邊行止不妨僧禽棲日落猶孤立隔浪秋山千萬層寄鄭谷郎中人間近遇風騷匠鳥外曾逢心印師除此二門無别妙水邊松下獨尋思翡翠水邊飛去青難辨竹裏歸來色一般磨吻鷹鸇莫相害白鷗鴻鶴滿沙灘與節供奉大德逰京口寺留題栁岸晴緣十里來水邊精舍絶塵埃煮茶嘗橘興何極直到殘陽未欲回謝荆幕孫郎中見示樂府歌集二十八字長吉才狂太白顛二公文陳勢橫前誰言後代無高手奪得秦王鞭鬼鞭謝隂符經勉送藏休上人二首事遂鼎湖遺劍履時來渭水擲魚竿欲知賢聖存亡道自向心機反覆看一林霜雪未霑頭爭遣藏休肯便休學盡世間難學事始堪隨處任虛舟幽齊偶作幽院才容箇小庭疏篁低短不堪情春來猶賴鄰僧樹時引流鶯送好聲贈念法華經僧萬境心隨一念平紅芙蓉折愛河清持經功力䏻如是任駕白牛安穩行對菊無艷無妖别有香栽多不為待重陽莫嫌醒眼相看過却是真心愛淡黃閉門正是閉時爭合閉大家開處不須開還防朗月清風夜有箇詩人相訪來勉送吳國三五新戒歸法王遺制付仁王難得難持劫數長努力只須堅守護三千八萬是垣墻夏日寄清溪道者老病不能求藥餌朝昏祗是但焚燒不知誰為收灰骨壘石栽松傍寺橋送惠空北逰君向峴山逰聖境我將何以記多才丁寧墮淚碑前過寫取斯文寄我來寄懷歸州馬判官三年為倅興何長歸計應多事少忙又見秋風霜裛樹滿山椒熟水雲香觀荷葉露珠霏微曉露成珠顆宛轉田田未有風任器方圓性終在不妨翻覆落池中苦熱懷玉泉寺寄仁上人火雲如燒接蒼梧原野烟連大澤枯謾費葛衫葵扇力爭禁泉石潤肌膚觀盆池白蓮素蕚金英噴露開倚風凝立獨徘徊應思㶑灧秋池底更有歸天伴侣來折楊柳詞四首鳳樓高映緑隂隂凝重多含雨露深莫謂一枝柔軟力幾層牽破别離心館娃宫畔響廊前依託吳王養翠烟劍去國亡臺殿毁却隨紅樹噪秋蟬穠低似中陶潛酒軟極如傷宗玉風多謝將軍繞營種翠中間草戰旗紅高僧愛惜遮江寺逰子傷殘露野橋爭似著行垂上苑碧桃紅杏對搖搖答長沙丁秀才月月便車奔帝闕年年貢士過荆臺如何三度槐花落未見故人携卷來戒小師不肯吟詩不聽經禪宗異嶽懶逰行他年白首當人問底言談對後生題舊拄杖親采匡廬瀑布西層崕懸壁更安梯携行三十年吟伴未有詩人酬歐陽秀才卷三十篇多十九章聲風力撼疏篁不堪更有精搜處誰見瀟瀟雨夜堂聞雁瀟湘浦暖全迷鶴還川寒祗有鵰誰向孤舟憶兄弟坐看蓮影度河橋送高麗二僧南逰日邊鄉井别年深中國靈踪欲遍尋何處名山逢長老分明認取祖師心謝猿皮貴向獵師家買得携來乞與坐禪床不知摘月秋潭畔曽對何人啼斷腸酬光上人禪言難後到詩言坐石心同立月魂應記前秋㑹吟處五更猶在老松根送僧歸日本日東來向日西逰一鉢閒尋遍九州却憶雞林本師寺欲歸還待海風秋庚午歲十五夜對月海澄空碧正團團吟想玄宗此夜寒玉兔有情應記得西邊不見舊長安白蓮集卷第十陳氏直齊書解云唐僧齊己白蓮集十卷風騷旨格一卷今兼得之為合璧矣元書北宋刻傳世久湮滅首卷數字尚俟善本補完與皎然貫休三集並傳嘉靖八年歲己丑金閶後學栁僉志
