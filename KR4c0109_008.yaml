  text: 白蓮集卷第八
  hash: sha256:6e4473934f54e85722a9cdde75d825f8289468be4e224612c1db39379065646e
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0109_SBCK_008-1a}
body:
  text: 廬嶽僧齊己撰湘中寓居春日感懷江禽野獸兩堪傷避射驚彈合自忙頭角任多無獬豸羽毛雖衆讓鴛鴦落苔紅小櫻桃熟侵井青纎燕麥長吟把離騷憶前事汨羅春恨撼殘陽瀟湘寒清健碧逺相含珠媚根源在極南流古遞今空作島逗山冲壁自為潭遷來賈誼愁無限謫過靈均恨不堪畢竟輸他老漁叟緑簔青竹釣濃藍寄友生風騷情味近如何門底寒流屋裏莎曽摘園蔬留我宿共吟江月看鴻過時危苦恨無收拾道妙深誇有琢磨涼夜欹眠應得夢平生心肺似君多酬答退上人鬚鬢三分白二分一生蹤跡出人群嵩丘夢憶諸峰雪衡嶽禪依五寺雲青衲幾臨高瀑濯苦吟曽許斷猿聞荒村殘臘相逢夜月滿鴻夛楚水濆山中春懷心魂役役不曽歸萬象相牽向極微所得或憂逢郢刃凡言皆欲奪天機逰深晚谷香充鼻坐苦春松粉滿衣何物不為狼藉境桃花和雨落霏霏寄鄭谷郎中上國誰傳消息過醉眠醒坐對嵯峨身離道士衣裳少筆答禪師句偈多南岸郡鐘涼度枕西齊竹露冷沾莎還應笑我降心外惹得詩魔助佛魔寄萍鄉唐禀正字新書聲價滿皇都高卧林中更起無春興酒香熏肺腑夜吟雲氣濕髭鬚同登水閣僧皆别共上魚船鶴亦孤長憶前年送行處洞門殘日照菖蒲秋夕書懷涼多夜永擁山袍片石閒欹不覺勞蟋蟀繞床無夢寐梧桐滿地有蕭騷平生樂道心常切五字逢人價合高破落西窗向殘月露聲如雨滴蓬蒿亂後經西山寺松燒寺破是刀兵谷變陵遷事可驚雲裡乍逢新住主石邊重認舊題名閒臨菡萏荒池坐亂踏鴛鴦破瓦行欲伴髙僧重結社此身無計捨前程題梁賢巽公房吳王廟側有高房簾影南軒日正長吹苑野風桃葉碧壓畦春露菜花黃懸燈向後惟冥默憑案前頭即渺茫知有虎溪歸夢切寺門松折社僧亡塘上閒作閒行閒坐藉莎煙此興堪思二古賢陶靖節居彭澤畔賀知章在鏡湖邊鴛鴦著對能飛繡菡萏成群不語仙形影騰騰夕陽裏數峰危翠滴漁船江上望逺山寄鄭谷郎中公時退居仰山危碧層層映水天半垂岡壠下民田王維愛甚難拋畫支遁高多不惜錢巨石盡含金玉器亂峰閒鎖楝梁煙秦爭漢奪空勞力却是巢由得穩眠送人自蜀廽南逰錦水東浮情尚鬱湘波南泛思何長蜀魂巴狖悲殘夜越鳥燕鴻呌夕陽烟月幾般為客路林泉四絶是吾鄉尋幽必有僧相指宋杜題詩近舊房寄無願上人六十八去七十歲與師年鬢不爭多誰言生死無消處還有修行那得何間事安䏻窮好惡故人堪憶舊經過㑹歸原上焚身後一陳灰飛也任他懷瀟湘即事寄友人浸野淫空淡蕩和十年鄰住聽漁歌城臨逺棹浮煙泊寺近間人泛月過岸引緑蕪春雨細汀連斑竹晚風多可憐千古懷沙處還有魚龍弄白波謝橘洲人寄橘洞庭栽種似瀟湘緑繞人家帶夕陽霜裛露蒸千樹熟浪廽風撼一洲香洪崖遣後名何逺陸績懷來事更長藏貯待供賓客好石榴宜稱映舟光自貽心中身外更何猜坐石看雲養聖胎名在好詩誰逐去跡依閒處自歸來時添瀑布新瓶水旋换㫋檀舊印灰晴出寺門驚往事古松千尺半蒼苔寄益上人長想尋君道路遙亂山霜後火新燒近聞移住鄰衡嶽幾度題詩上石橋古木傳聲連峭壁一燈懸影過中宵風騷味薄誰相愛欹枕常多夢鮑昭行次宜春寄湘西諸友幸無名利路相迷雙履尋山上柏梯衣鉢祖辭梅嶺外香燈社别橘洲西雲中石壁青侵漢樹下苔錢緑繞溪我愛逺逰君愛住此心他約與誰携送略禪者歸南嶽林下鐘殘又拂衣錫聲還獨向南飛千峰冷截冥鴻處一徑險通禪客歸青石上行苔片片古杉邊宿雨霏霏勞生有願應回首忍著無心與物違寄知己已得浮生到老閒且將新句擬玄關自知清興來無盡誰道淳風去不還三百正聲傳世後五千真理在人間此心終待相逢說時復登樓看莫山寄吳拾遺新作將誰推重輕皎然評裡見權衡非無苦到難搜處合有清垂不朽名疏雨晚冲蓮葉響亂蟬涼抱檜梢鳴野橋閒背殘陽立翻憶蘇卿送子卿春晴感興連旬隂翳曉來晴水滿圓塘照日明岸草短長邊過客江花紅白裡啼鶯野無征戰時堪望山有樓臺暖好行桑柘依依禾黍緑可憐歸去是張衡謝道友拄杖翦自南岩瀑布邊寒光七尺乳珠連持來未入塵埃路乞與應憐老病年欹影夜歸青石澗卓痕秋過緑苔錢他時携上嵩峰頂把倚長松看洛川東林寄别修睦上人行心乞得見秋風雙履難留更住蹤紅葉正多離社客白雲無限向嵩峰囊中自缺詩千首身外誰知事幾重此别不知為後約年華相似逼衰容夏日原西避暑寄吟友熱煙疏竹古原西日日乘涼此杖藜閒處雨聲隨霹靂旱田人望隔虹霓蟬依獨樹乾吟苦鳥憶平川渴過齊別有相招好泉石瑞花瑶草盡堪携懷匡阜荆川連歲滯逰方拄杖塵封六尺光洗面有香思石溜冥心無撓憶山牀閒機但愧時機速靜論須慚世論長昨夜分明夢歸去薜蘿幽徑繞禪房靜坐繩床欹坐任崩頺雙眼醒醒閉復開日月更無間裏過風騷時有靜中來天真自得生難捨世幻論驚死不廽何處堪投此踪跡水邊去上髙臺寄湘中諸友碧雲諸友盡黃眸石點花飛更説無嵐翠濕衣松接院芙蓉薰面寺臨湖沃洲高卧心何僻匡社長禪興亦孤爭似椘王文物國金鏕紫綬讓前途答無願上人書鄭生驅蹇峴山回傳得安公好信來千里阻修俱老骨八行重叠慰寒灰春殘桃李猶開户雪滿杉松始上臺必有南逰山水興漢江平穩好浮杯送㣧公歸閩西朝歸去見髙情應戀香燈近聖明關令莫疑非馬辨道安還跨赤驢行充齊野店蔬無味灑笠平原雪有聲忍惜文章便閒得看他趨競取時名感時忽忽枕前蝴蝶夢悠悠覺後利名塵無窮今日明朝事有限生來死去人終與狐狸為窟穴謾師龜鶴養精神可憐顔子能消息虛室坐忘心最真湖上逸人淡蕩光中翡翠飛田田初出柳絲絲吟㳂緑島時逢鶴醉泛清波或見龜七澤釣師應識我中原逐鹿不知誰秋風水寺僧相近一徑蘆花到竹籬懷巴陵垂白堪思大亂前薄逰曽駐洞庭邊尋僧古寺沿沙岸倚杖殘陽落水天蘭芷蔫烟騷客廟烟波晴閣釣師船此時欲買君山住懶就商人乞個錢渚宫謝楊秀才自嵩山相訪嵩峰有客逺相尋塵滿麻衣袖苦吟花盡草長方閉户道孤身老正傷心紅堆落日雲千仭碧撼涼風竹一林惆悵雅聲消歇去喜君聊此暫披襟荆門寄沈彬罷趣明聖懶徔知鶴氅褵褷遂性披道有靜君堪託迹詩無賢子擬傳誰松聲白石邊行止日影紅霞裏夢思珍重兩篇千里達去年江上雪飛時讀隂符經繞窗風竹骨輕安閒借隂符仰卧看絶利一源真有謂空勞萬卷是無端清虛可保升雲易嗜欲終知入聖難三要洞開何用閉高臺時去憑欄杆寄吳國知舊淮甸當年憶旅逰衲衣棕笠外何求城中古巷尋詩客橋上殘陽背酒樓晴色水雲天合影晚聲名利市爭頭可憐王化融融裏惆悵無僧似惠休移居上台言任養疏愚乞與西城水滿湖吹榻好風終日有趣涼閒客片時無檀欒翠擁清蟬在菡萏紅殘白鳥孤欲問存思搜抉妙幾聨詩什敵三都喜彬上人逺見訪高吟欲繼沃洲師千里相尋問課虛殘臘江山行盡處滿衣風雪刲閒居携來律韻清何甚趣入幽微㫖不疏莫惜天機細捶琢他時終可擬芙蕖荆州新秋寺居寫懷詩五首上南平王竹如翡翠侵簾影苔學琉璃布地紋髙卧更應無此樂逺逰何必愛他雲閒聽謝眺吟為政靜看蕭何坐致君只恐老身衰朽速他年不得頌鴻勳井梧黃落暮蟬清久駐金臺但暗驚事佛未憐諸弟子談空爭動上公卿合歸鳥外藏幽跡敢向人前認好名滿印白檀燈一盞可䏻酬謝得聰明金湯裡面境何求寶殿東邊院最幽栽種已添新竹影畫圖兼列逺山秋形容豈合親公子章句爭堪狎士流虛負岷峨老僧約年年雪水下汀洲漢江西岸蜀江東六稔安禪教化中託迹幸將王粲别歸心寧與子山同尊罍豈識曹參酒賓坐還親宋玉風又見去年三五夕一輪寒魄破烟空石龕閒鎖舊居峰何事膺門歲月重五七詩中叨見過三千客外許疏慵迎涼蟋蟀喧閒思積雨莓苔沒屐踪㑹待英雄啓金口却教擔錫入雲松送李秀才歸湘中詞客携文訪病夫因吟送别憶湘湖寒消浦溆催鴻雁暖入溪山養鷓鴣僧向月中尋嶽麓雲從城上去蒼梧君歸為問峰前寺舊住松房鎖在無寄吳國西供奉别來相憶夢多迷君住東朝我椘西瑶闕合陪龜象位春山休記鷓鴣啼承恩位與千官别應制才將十子齊幾笑逺公慵送客殷勤只到寺前溪謝人惠端溪硯端人鑿斷碧雲潯善價爭教惜萬金礱琢己曽經敏手研磨終見透堅心安排得主難移動舍貯隨時任淺深保重更求裝鈿匣閒將濡染寄知音送吳先輩赴京烟霄已遂明經第江漢重來問苦吟託興偶憑風月逺忘機終在寂寥深千篇未聽常徒口一字須防作者心此日與君聊話後老身難約更相尋和西蜀可準大師逺寄之什莫知何路去追攀空想人間出世間杜口已同居士室傳心休問祖師山禪中不住方為定說處無生始是閒珍重希音逺相寄亂峰西望叠孱顔荆門暮冬與節公話别漳河湘岸柳開頭離别相逢四十秋我憶黃梅夢南國君懷明主去東周幾程霜雪經殘臘何處封疆過舊逰好及春風承帝澤莫忘衰朽卧林丘賀孫支使郎中遷居别認公侯禮上才築金何翅舊燕臺地連東閣橫頭買門對西園正面開不隔紅塵趨棨㦸只拖珠履赴尊罍應逢明月清霜夜閒鎖笙歌宴此來庭際新移松竹三莖瘦竹兩株松瑟瑟翛翛韵且同抱節乍離新澗雪盤根逺别舊林風歲寒相倚無塵地䕃影分明有月中更待陽和信催促碧梢青杪看凌空荆門寄題禪月大師影堂澤國聞師泥日後蜀王全禮葬餘灰白蓮塔向青泉鎖禪月堂臨錦水開西嶽千篇傳古律大師著西嶽集三十卷盛傳於世南宗一卷印靈臺不堪隻履還西去葱嶺如今無使廽賀雪上清凝結下乾坤為瑞為祥表致君日月影徔光外過山河影向靜中分歌揚郢路誰同聽聲灑梁園客共聞堪想畫堂簾捲次輕隨舞袖正紛紛荆州寄貫微上人舊齊休憶對松關各在王侯顧遇間命服已沾天渥澤衲衣猶擁祖斕斑相思莫救燒心火留滯難移壓腦山得失兩途俱不是笑他髙卧碧孱顔送休師歸長沙寧覲高堂親老本師存多難長懸兩處魂已說戰塵消漢口便隨征棹别荆門晴吟野濶無耕地晚宿灣深有釣村他日更思衰老否七年相伴琢詩言江上夏日無處清隂似剡溪火雲奇崛倚空齊千山冷叠湖光外一扇涼搖椘色西碧樹影疏風易斷緑蕪平逺日難低故園舊寺臨湘水斑竹煙深越鳥啼渚宫春日因懷有作舊業樹連湘樹逺家山雲與嶽雲平僧來已說無耕釣鴈去那知有弟兄客思莫牽蝴蝶夢鄉心自憶鷓鴣聲沙頭南望堪腸斷誰把歸舟載我行松化為石近聞金華山古松化為石盤根幾聳翠岩前却偃凌雲化至堅乍結精華齊永劫不隨凋變已千年逢賢必用鎸辭立遇聖終將刻印傳肯似荆山鑿餘者蘚封頑滯卧嵐煙寄澧陽吳使君南客西來話使君涔陽風雨變行春四鄰耕釣趨仁政千里煙花壓路塵去獸未勝除狡吏還珠爭似復逋民紅蘭浦暖携才子爛醉連題賦白蘋湘江送客湘江秋色湛如氷椘客離懷暮不勝千里碧雲聞塞雁幾程青草見巴陵寒濤響叠晨征虜岸葦藂明夜泊燈鸚鵡洲邊若廽首為思前事一捫膺暮逰嶽麓寺寺樓高出碧崖棱城裏誰知在上層初雪灑來喬木暝逺禽飛過大江澄閒消不睡憐長夜靜照無言謝一燈回首何邊是空地四村桑麥遍丘陵林下留别道友住亦無依去是閒何心終戀此林間片雲孤鶴東西路四海九州多少山靜坐趂涼移樹影興隨題處著苔斑秋來洗浣行衣了還爾鄰僧舊竹關道林寺居寄嶽麓禪師二首門前石路徹中峰樹影泉聲在半空尋去未應勞上下往來殊已倦西東髭根盡白孤雪並心迹全忘片月同長憶高窗夏天裏古松青檜午時風山袍不稱下紅塵各是閒居島外身兩處烟霞門寂寂一般苔蘚石磷磷禪關悟後寧疑物詩格玄來不傍人月照經行更誰見露華松粉點衣巾亂後江西遇孫魴舊居因寄舊逰重到倍悲涼吟憶同人倚寺牆何處莫蟬喧逆旅此中山鳥噪垂楊寰區有主權兵器風月無人掌桂香欲寄此心空北望寒鴻天末失歸行宜春江上寄仰山長老二首水隔孤城城隔山水邊時望憶師閒清泉白石中峰上落日半空栖鳥還雲影觸衣分朵朵雨聲吹磬散潺潺傳心莫學羅浮去後輩思量待扣關雨晴天半碧光流影倒殘陽濕郡樓絶頂有人經劫在浮生無客暫時逰窗開萬壑春泉亂塔鎖孤燈萬木稠欲為吾師拂衣去白雲紅葉又新秋螢透窗穿竹住還移萬䫫俱閒始見伊難把寸光藏暗室自持孤影助明時空庭散逐金風起亂葉爭投玉露垂後代儒生懶收拾夜深飛過讀書帷湘中送翁員外歸闕船滿琴書與酒杯清湘影裏片帆開人歸南國鄉園去鴈逐西風日夜來天藝漸低分海樹山程欲盡見城臺此身未别江邊寺猶看星郎奉詔回寄居道林寺作嵐濕南朝殿塔寒此中因淂謝塵寰已同庭樹千株老未負溪雲一片閒石鏡舊逰臨皎潔嶽蓮曾上徹孱顔如今衰颯成多病黃葉風前晝掩關沙鷗暖傍漁船睡不驚可憐孤潔似華亭晚來灣浦衝平碧晴過汀洲拂淺青翡翠靜中修羽翼鴛鴦閒處事儀形何如飛入深宫去留與興亡作典經和翁員外題馬太師宅賈相公井飛塵不敢下相干暗脈傍應潤牡丹心任短長投玉綆底須三五映金盤神工舊制泓澄在天澤時加㶑灔寒太傅欲旌前古事星郎屬思久憑欄看雲何峰觸石濕苔錢便逐高風離瀑泉深處卧來真隱逸上頭行去是神仙千尋有影滄江底萬里無踪碧落邊長憶舊山青壁裏繞庵閒伴老僧禪對雪寄荆幕知己猛藝微開萬里清月中看似日中明此時鷗鷺無人見何處關山有客行郢唱轉髙誰敢和巴歌相顧自銷聲江齊卷箔含毫久應想梁王禮經送相里秀才赴舉兩上東堂不見春文明重去有誰親曽逢少海尊前客舊是神仙㑹裏人已遂風雲催化羽却將雷電助燒鱗明年自此登龍後回首京門一路塵荆門疾中喜謝尊師自南嶽來相里秀才自京至閒堂晝卧眼初開强起徐行繞砌苔鶴氅人徔衡嶽至鶉衣客自雒陽來坐聞鄰樹栖幽鳥吟見江雲發早雷西笑東逰此相别兩塗消息待誰回吟興自述前習都由未盡空生知頑學妙難窮一千首出悲哀外五十年銷雪月中興去不妨歸靜慮情來何止發真風曾無一字千聲利豈愧操心負至公送謝尊師自南嶽出入京曽聽鹿鳴逢世亂因披羽服隱衡陽幾多事隔丹霄興三十年成兩鬢霜芝术未甘消勇氣風騷無那激剛腸中朝舊有知音在可是悠悠入帝鄉送司空學士赴京弘文初命下江邊難戀沙鷗與釣船藍綬乍稱新學士白衫初脫舊神仙龍山送别風生路雞樹從容雪點筵重謁往年金榜主便將才術佐陶甄白蓮集卷第八
