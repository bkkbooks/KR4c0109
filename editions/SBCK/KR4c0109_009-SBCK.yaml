  text: 白蓮集卷第九
  hash: sha256:c5bbcd2e7b66a1503f93368b49d059d4369b21729efe194f2fa61f0daddf5a96
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0109_SBCK_009-1a}
body:
  text: 廬岳僧齊己撰春寄尚顔含桃花謝杏花開杜宇新啼燕子来好事可䏻無分得名山長似有人催簷聲未斷前旬雨電影還連後夜雷心跡共師争幾許俗人嫌處自遲廽寄梁先輩慈恩塔下曲江邊别後多應夢到仙時去與誰論此事亂来何處覔同年陳琳筆硯甘前席甪里煙霞待共眠愛惜麻衣好顔色未教朱紫汚天然荆渚偶作無味吟詩即把經竟􅀅疎野訪誰行身依江寺庭無􅀣山繞天涯路有兵竹瓦雨聲漂永日紙窗燈熖照殘更徔容一覺清涼夢歸到龍潭埽石枰城中晚夏思山葛衣沾汗功雖健紙扇摇風力甚卑苦熱恨無行脚處微涼喜到立秋時竹軒静看蜘蛛掛莎徑閑聽蟋蟀移天外有山歸即是豈同逰子暮何之憶舊山誰請衰羸住北州七年魂㫁舊山丘心清檻底瀟湘月骨冷禅中太華秋高節未聞馴虎豹片言何以傲王侯應湏脱洒孤峯去始是分明個剃頭寄骵休南州歸去為尋醫病色應除是舊時久别莫忘廬阜約􅁍来湏有洞庭詩金陵往􅀊同窺井峴首前秋共讀碑兩處山河見興廢相思更切卧雲期過陸鴻漸舊居陸生自有傳于井石又云行坐誦佛書故有此句椘客西来過舊居讀碑尋傳見終初佯狂未必輕儒業高尚何妨誦佛書種竹㟁香連菡萏煑茶泉影落蟾蜍如今若更生来此知有何人贈白驢時太守贈白驢寄懷鍾陵舊逰因寄知己洪井僧来説舊逰西江東岸是城樓昔年淹跡因王化長日凭欄看水流貞觀上人栖􅀣石陳陶處士在林丘終拖老病重尋去得到匡廬死便休遣懷病膓休洗老休醫七十䏻饒百􅀊期不死任還蓬島客無生自有雪山師浮雲聚散堪􅀜慮明月相逢好展眉既兆未萌閒酌度不知中抱自尋思懐武陵因寄幕中韓先輩何徔事武陵嘉致迹多幽每見圖經恨白頭溪浪碧通何處去桃花紅過郡前流嘗聞相幕鴛鴻日向神仙洞府逰鑿井耕田人在否如今天子正徵搜贈樊䖏士小子聲名天下知滿簪霜雪白麻衣誰􅀅一著争先後共向長安定是非有路未曽謀日用無貪終不亂天機閒尋道士過仙觀賭得黄庭兩卷歸荆渚逢禅友澤國相逢話一宵雲山偶别隔前朝社思匡岳無宗炳詩憶揚州有鮑昭晨野黍離春漠漠水天星燦夜迢迢閒吟莫忘傳心祖曽立堦前雪到腰送僧歸洛中赤日彤霞照晚坡東州道路興如何蝉離椘柳鳴猶少葉到嵩雲落漸多海内自為閒去住􅀜頭誰問舊經過丁寕與訪春山寺白樂天真在也麽道林寓居秋泉一片􅀣千株暮汲寒燒外有餘青嶂者邊来已熟紅塵那畔去應疎風騷未肯忘雕琢瀟灑無妨更剃除即問沃州開士僻愛禽憐駿意如何僊掌峭形寒倚夕陽天毛女蓮花翠影連雲外自為高出手人間誰合闘揮拳鶴抛青漢来岩檜僧隔黄河望頂烟晴露紅霞長滿掌只應栖託是神僊中秋月空碧無雲露濕衣群星光外湧清規東樓莫碍漸高影四海待看當午時還許分明吟皓魄肯教幽暗取丹枝可憐半夜婵娟影正對五侯殘酒池送禪者逰南岳忽隨南棹去潯陽誰住江邊􅀣下房塵夢是非都覺了野雲心地更何妨漸臨瀑布聽猿思􅁍背岣嶁看鴈行想到中峰上層寺石窗秋霽見瀟湘聞道林諸友嘗茶因有寄旗槍冉冉綠叢圓穀雨初晴呌杜鵑摘帶岳華蒸曉露碾和松粉煑春泉高人夢惜藏岩􅂻白硾封題寄火前應念苦吟耽睡起不堪無過夕陽天􅀅歸舊山留别錯公舊峰前昨下来時白石叢叢問紫薇章句不堪歌有道溪山只合退無機雲含暖態晴猶在鶴養閒神晝不飛欲去更思過丈室二年頻此挹清暉聞尚顔上人剏居有寄麓山南面橘洲西别搆新齋與竹齊野客已聞􅀅鶴贈江僧未説有詩題窗臨杳靄寒千嶂枕遍潺湲月一溪可想乍移吟榻䖏松隂冷濕壁新泥庚午􅀊九日作門底秋苔嫩似藍此中消息興何堪亂離偷過九月九頭尾筭来三月三雲影半晴開夢澤菊花微暖傍江潭故人今日在不在胡雁背風飛向南逢進士沈彬欲話趨時首重搔因君倍惜剃頭刀千般貴在䏻過逹一片心閒不那高山叠好雲藏玉鳥海翻狂浪隔金鰲時應記得長安事曽向文塲屬思勞聞王員外新恩有寄欲退無因貴逼来少儀官美右丞才青袍早訪淹花幕霜简方聞謝柏臺金諾静宜資講誦玉山寒稱奉罇罍西峰有客思相賀門隔瀟湘雪未開秋夕言懐寄所知休問􅀩莊材不材孤燈影共傍寒􅁅忘詮話道心甘死候體論詩口􅂴開窗外風濤連建業夢中雲木憶天台相疎􅁍是相知分誰訝經年一度来答禅者五老峰前相遇時兩無言語只揚眉南宗北祖皆如此天上人間更問誰山衲静披雲片片銕刀涼削鬂絲絲閒吟莫學湯􅀙事抛􅁍袈裟負本師寄尚顔公受徐州薛尚書見知莫向孤峯道息機有人偷眼羡吾師滿身光化年前寵幾軸開平􅀊􅂻詩北闕故人隨䘮亂南山舊寺在參差清吟但憶徐方政應恨當時不見時梓栗杖送人禪家何物贈分襟只有天台杖一尋拄去客歸青洛逺采来僧入白雲深逰山曽把探龍穴出世期􅀅指佛心此日江邊贈君後􅁍携笻竹向東林寄朗陵二禪友瀟湘曽宿話詩評荆椘連秋阻野情金錫罷逰雙鬂白鐵盂終守一齋清篇章老欲齊高手風月閒思到極精南望山門石何處滄浪雲夢浸天横燈幽光耿耿草堂空窗隔飛蛾恨不通紅燼自凝清夜朶赤心長謝碧紗籠雲藏水國城臺􅂻雨閉松門殿塔中金屋玉堂開照睡豈知螢雪有深功寄金陵幕中李郎中龍門支派富才䏻年少飛翔便大鵬久待尊罍臨鉄瓮又徔幢節鎮金陵精神一隻秋空鶴騷雅千尋夏井冰長憶相招宿華館數宵忘寢盡寒燈寄韓蜕秀才松門高不似侯門蘚徑鞋踪觸處分逺事即為無害鳥多閒便是有情雲那憂寵辱来驚我且寄風騷去敵君知伴李膺琴酒外絳紗閒卷共論文湘中春興雨歇江明苑􅀣乾物妍時泰恣逰盤更無輕翠勝楊柳盡覺濃華在牡丹終日去還抛寂寞遶池廽􅁍凭欄杆紅芳片片由青帝忍向西園看落殘送錯公栖公南逰洪偃湯休道不殊高颿共載興何俱北京䘮亂離丹鳳南國煙花入鷓鴣明月團圓臨桂水白雲重叠起蒼梧威儀本是朝天士蹔向遼荒住得無寄南嶽諸道友南望衡陽積瘴開去年曽􅂿雪逰囬謾為椘客蹉跎過􅁍是邊鴻的當来乳竇孤明含海日石橋危滑長春苔終尋十八高人去共坐蒼崕養聖胎送韓蜕秀才赴舉槐花館馹莫塵昏此去分明吏部孫才氣合居科第首風流幸是薦紳門春和洛水清無浪雪洗髙峰碧㫁根堪想都人齊指􅀧列仙相次上崑崙溪居寓言秋蔬數壠傍潺湲頗覺生涯異俗緣詩興難窮花草外野情何限水雲邊蟲聲遶屋無人語月影當松有鶴眠寄向東溪老樵道莫摧丹桂博青錢遣懷詩病相兼老病深世醫徒更費千金餘生豈必虚抛擲未死何妨樂詠吟流水不廽休歎息白雲無跡莫追尋閒身自有閒消處黄葉清風蝉一林自湘中􅀅入蜀留别諸友巾舄初隨入蜀舡風帆吼過洞庭烟七千里路到何處十二峰雲更那邊巫女暮歸林淅􅅹巴猿吟㫁月婵娟来年五月峨嵋雪坐看消融滿錦川寄匡阜諸公松頭柏頂碧森森虚檻寒吹夏景深静社可追長往跡白蓮難問久修心山圍四面􅂊容寺月到中宵始滿林争學忘言住幽勝吾師遺集盡清吟峰前林下東西寺地角天涯来往僧泉月浄流閒世界杉松深鏁晝香燈争無大士重修社合有諸賢更服膺曽寄隣房掛瓶錫雨聞簷溜解春冰送人入蜀何必閒吟蜀道難知君心出嶮巇間尋常秋泛江陵去容易春浮錦水還兩面碧懸神女峽幾重青入丈人山文君酒市逢初雪滿貰新沽洗旅顔酬廬山張處士髪枯身老任浮沈􅂴泥秋風更役吟新事向人堪結舌舊詩開卷但傷心苔床卧憶泉聲繞麻履行思􅀣影深終謝柴桑與彭澤醉逰訪入東林寄峴山道人鳳門高對鹿門青往􅀊經過恨未平辨鼎上人方話道卧龍丞相忽追兵爐峰已負重廽計華岳終懸未去情聞説東周天子聖㑹揺金錫􅁍西行送王處士逰蜀又掛寒帆向錦川木蘭舟裏過殘年自修姹姹爐中物擬作飄飄水上僊三峽浪喧明月夜萬州山到夕陽天来年的有荆南信廽札應緘十色箋懷金陵李推官僧自牧秣陵長憶共吟逰儒釋風騷盡上流蓮幕少年輕謝眺雪山真子鄙湯休也應有作懷清苦莫謂無心過白頭欲附别来千萬意病身初起向殘秋寄尋萍公聞在湓城多寄住隨時談笑混塵埃孤峰忽憶便歸去浮世要看還下来萬頃野煙春雨㫁九條寒浪晚窗開虎溪橋上龍潭寺曽此相尋􅂿雪廽得李推官近寄懷荆門前嵗使乎囬求得星郎近制来連日借吟終不已一燈忘寢又重開秋風漫作牽情賦春草真爲入夢才堪笑陳宫諸狎客當時空有個追陪對菊蝶醉蜂狂半折時冷烟清露壓離披欲傾琥珀盃浮爾好把茱萸朶配伊孔雀毛衣應者是鳳凰金翠更無之何因栽向僧園裏門外重陽過不知憶東林因送二生歸好向東林度此生半天山脚寺門平紅霞嶂底潺潺色清夜房前瑟瑟聲偶别十年成瞬息欲来千里阻刀兵可憐二子同歸去南國烟花路好行渚宫西城池上居城東移錫住城西綠繞春波引杖藜翡翠滿身衣有異鷺鷥通體格非低風揺柳眼開煙小暖逼蘭芽出土齊猶有幽深不相似剡溪乘棹入耶溪中秋夕愴懷寄荆幕孫郎中白蓮香散沼痕乾綠篠隂濃蘚地寒年老寄居思隐切夜涼留客話時難行僧盡去雲山逺賓雁同来澤國寛時謝孔璋操檄外每將空病問衰殘酬湘幕徐員外見寄東海儒宗事業全氷稜孤峭􅀋神仙詩同李賀精通鬼文擬劉軻妙入禅珠履早曽􅀙相府玳簪今又别賓筵篇章幾謝傳西椘空想雄風度十年寄蜀國廣濟大師氷壓霜壇律格清三千傳授盡門生禅心静入空無跡詩句閒搜寂有聲滿國繁華徒自樂兩朝更變未曽驚終思相約岷峨去不得携笻一路行答獻上人卷衲衣禅客袖篇章江上相尋共感傷秦甸亂来栖白沒苎山空後皎然亡清留島月秋凝露苦寄巴猿夜呌霜珍重南宗好才子􅁅心􅑡目外無妨寄武陵貫微上人二首知泛滄浪棹未還西峯房鏁夜潺潺春陪相府逰仙洞雪共賓寮對柱山詩裏幾添新菡萏衲痕應换舊斕斑莫忘一句曹溪妙堪塞孫孫騁度􅀜吳頭東面椘西邊雲接蒼梧水浸天兩地别離身已老一言相合道休傳風騷妙欲凌春草蹤跡閒思繞岳蓮不是傲他名利世吾師本在雪山巔懷體休上人仲宣樓上望重湖君到瀟湘得健無病遇何人分藥餌詩逢誰子論功夫杉蘿寺裏尋秋早橘柚洲邊度日晡許送自身歸華岳待来朝暮拂瓶盂招湖上兄弟去􅀊得君消息在兩憑人信過重湖忍貪風月當年少不寄音書慰老夫藥鼎近聞傳祕訣詩門曽説擁寒爐漢江江路西来便好傍扁舟訪我無江居寄􅀜中知己多病多慵漢水邊流年不覺已皤然舊栽花地添黄竹新盆池换白蓮雪月未忘招逺客雲山終待去安禅八行書札君休問不似風騷寄一篇中秋十五夜寄人高河瑟瑟轉金盤噴露吹光逆凭欄四海魚龍精魄冷五山鸞鶴骨毛寒今宵盡向圓時望後夜誰當缺處看何事清光與蟾􅈷􅁍教才子少留難謝人自鍾陵寄紙筆故人猶憶苦吟勞所惠何殊金錯刀霜雪翦裁新剡硾鋒鋩管束本宣毫知君倒篋情何厚借我臨池價斗高詞客分張看欲盡不堪来處隔秋濤移居西湖作二首火雲陽熖欲燒空小檻幽窗想舊峰白汗此時流枕簟清風何處動杉松殘更正好眠涼月逺寺俄聞報曉鐘只待秋聲滌心地衲衣新洗健形容官園􅀣影晝隂隂咫尺清涼莫浣心桃李别教人主掌烟花不稱我尋蜩螗晚噪風枝稳翡翠閒眠宿處深争似出塵地行止東林苔徑入西林看金陵圖六朝圖畫􅀾争多最是陳宫計數訛若愛蒼生似歌舞隋皇自合恥干戈寄南嶽岳泰禅師江頭黙想坐禅峰白石山前萬丈空山下獵人應不到雪深花鹿在菴中片雲水底分明天上雲可憐形影似我身何妨舒作􅀙龍勢一雨吹消萬里塵寄清溪道者萬重千叠紅霞嶂夜燭朝香白石龕常寄溪窗凭危檻看經影落古龍潭病中勉送小師往清涼山禮大聖豐衣足食處莫住聖迹靈踪好遍尋忽遇文殊開慧眼他年應記老師心謝人惠拄杖何處雲根采得来黒龍狂欲作風雷知師念我形骸老教把經行拄綠苔送楚雲上人往南岳刺血冩法華經剝皮刺血誠何苦欲冩靈山九㑹文十指􅅹乾終七軸後來求法更無君送胎髪筆寄仁公内惟胎髪外秋毫綠玉新裁管束牢老病手疼無那爾􅁍資年少冩風騷謝西川曇域大師玉筯篆書玉筯真文久不興李斯傳到李陽氷正愁千載無来者果見僧中有個僧偶作寄王秘書七􅁝湘水秋深夜五字河橋日暮時借問秘書郎此意静弹高詠有誰知謝人惠紙烘焙幾工成曉雪輕明百幅叠春氷何消才子題詩外分與能書貝葉僧答文勝大師清桂書􅂊把文章干聖主便承恩澤换禅衣應嫌六祖傳空衲只向曹溪永息機寄懷曾口寺文英大師著紫袈裟名已貴吟紅菡蓞價兼高秋風曽憶西逰䖏門對平湖滿白濤懷道林寺道友四絶堂前萬木秋碧參差影壓江流閒思宋杜題詩板一月凭欄到夜休放鶴放猿絶句四首上辭主人華亭来復去芝田丹頂霜毛性可憐縱與乘軒終悞主不如還放􅁍遼天堪憶春雲十二峰野桃山杏摘香紅王孫可念愁金鏁縱放斷膓明月中放鷺鷥白蘋紅蓼碧江涯日暖雙雙立睡時願揭金籠放歸去􅁍隨沙鶴闘輕􅁝放鸚鵡隴西蒼巘結巢高本為無人識翠毛今日籠中强言語乞歸天外啄含桃白蓮集卷第九
