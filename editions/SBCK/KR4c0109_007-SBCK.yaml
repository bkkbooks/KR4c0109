body:
  text: 廬岳僧齊己撰題東林十八賢貞堂白藕花前舊影堂劉雷風骨畫龍章共輕天子諸侯貴同愛吾師一法長陶令醉多招不得謝公心亂入無方何人到此思高躅嵐黙苔痕滿粉牆謝靈運欲入社逺大師以其心亂􅁍之題南岳般若寺諸峯翠少中峯翠五寺名高此寺名石路險盤嵐靄滑僧窗高倚泬㵳明凌空殿閣由天設遍地松杉是自生更有上方難上處紫苔紅蘚逺峥嶸寄廬岳僧一聞飛錫别區中飛入西南瀑布峰天際雪埋千片石洞門冰折幾株松煙霞明媚栖心地苔蘚縈紆出世蹤莫问江邊舊居寺火燒兵刼㫁秋鍾逰谷山寺城裏尋常見碧􅏢水邊朝莫送歸僧数峰雲脚垂平地一徑松聲徹上層寒澗不生浮世物隂崕尤積去年氷此生有底難抛事時復携笻信歩登椘寺寒夜作寒爐局促坐成勞黯澹燈光照二毛水寺閉来僧寂寂雪風吹去雁嗷嗷江山積叠歸程逺魂夢穿㳂過處髙畢竟忘言是吾道袈裟不稱揖蕭曹送太禅師歸南岳石龕閒鏁白猿邊歸去程途半在舡林簇曉霜離水寺路穿新燒入山泉已㝷嵐壁臨空盡􅁍看星辰向地懸有興寄題紅葉上不妨收拾别為編山中寄凝密大師兄弟一爐薪盡室空然萬象何妨在眼前時有興来還覔句已無心去即安禅山門影落秋風􅀣水國光凝夕照天借问荀家兄弟内八龍頭角讓誰先海棠花繁于桃李盛于梅寒食旬前社後歸半月暄和留豔態兩時風雨免傷摧人憐格異詩重賦蝶戀香多夜更来尤得殘紅向春暮牡丹相􅁇發池臺題贈湘西龍安寺利禅師頭白巳無行脚念自開荒寺住煙蘿門前路到瀟湘盡石上雲歸岳麓多南祖衣盂曾禮謁東林泉月舊經過閒来松外看城郭一片紅塵隔逝波寄文浩百法當時六祖在黄梅五百人中眼獨開入室偈聞傳絶唱升堂客謾恃多才鉄牛無用成貞角石女能生是聖胎聞说欲抛經論去莫教惆悵􅁍空廻謝人寄詩集所聞新事即戈矛欲去终疑是暗投逺客寄言還有在此􅀅謂惣無休千篇著述诚難得一字知音不易求時入思量向何處月圓孤凭水邊樓謝元願上人逺檀溪集白首蕭條居漢浦清吟編集號檀溪有人收拾應如玉無主知音只似泥入理半筒黄葉句遣懐多擬碧雲題猶能為我相思在千里封来夢澤西寄道林寺諸友吟興終依異境長舊逰時入静思量江聲􅂻過東西寺􅀣影中行上下方春色濕僧巾屨膩松花沾鶴骨毛香老来何計重歸去千里重湖浪渺茫贈智滿三藏灌頂清涼一滴通大毗盧藏遍虚空欲飛薝葡花無盡湏待陁羅尼有功金杵力摧魔界黑水精光透夜燈紅可堪東獻明天子命服新酹賛國風謝王先輩湘中囬惠示卷軸少小即懷風雅情獨能遺象琢湻精不教霜雪侵􅀇鬂便向雲霄换好名携去湘江聞皷瑟袖来緱嶺伴吹笙多君百首貽衰颯畱把吟行访竺卿荆渚寄懐西蜀無染大師兄大溈心付白崕前寳月分輝照蜀天聖主降情延北内諸侯稽首问南禅清秋不動驪龍海紅日無私罔象川欲聽吾宗舊山说地邊身老椘江邊谢武陵徐廵官逺􅀉五七字詩集五字才将七字争為君聊敢试懸衡鼎湖菡萏摇金影蓬島鸞凰舞翠聲還是靈龜巢得稳要湏仙子駕方行兩編珍重遥相惠何日燈前盡此情重宿舊房與愚上人静话曾此栖心過十冬今来瀟灑屬生公檀欒舊植青添翠菡萏新栽白换紅北面城臨燈影合西隣壁近講聲通不知門下趋士何似當時石解空謝南平王賜山雞五色文章􅀋彩鸞椘人羅得半摧殘金籠莫恨傷冠幘玉粒湏慚剪羽翰孤立影危丹檻裏雙栖伴在白雲端上台愛育通幽細􅁍放溪山去不難荆門病中雨後書懐寄幙中知己病根翻作憶山勞一雨聊堪浣鬱陶心白未䏻忘水月眼青猶得見秋毫蝉聲晚促枝枝急雲影晴分片片高還憶赤松兄弟否别来應見鶴衣毛宿江寺島僧留宿慰衰顔舊住何妨老未還身共錫聲離鳥外迹同雲影過人間曾無夢入朝天路憶有詩題隔海山珍重来晨渡江去九華青裏扣松􅀜謝貫微上人寄示古風今體四軸四軸騷詞書八行捧吟肌骨遍清涼謾求龍􅀣能醫眼休问圗澄學洗膓今體盡搜􅀄剖判古風湻鑿未􅀇黄不知誰肯降文陣閟􅀧旌旗敵子房荆州貫休大師舊房疎篁抽笋栁垂隂舊是休公種境吟入貢文儒来請益出官卿相駐過尋右軍書畫神傳髓康樂文章夢授心消得青城千嶂下白蓮標塔帝恩深寄谷山長老逰遍名山祖遍尋􅁍来塵世渾光隂肯􅀅的的吾師意擬付茫茫弟子心豈有虚空􅃒道眼不妨文字问知音滄浪萬頃三更月天上何如水底深寄黄暉處士􅀩氏藝傳黄士子獨聞相􅁇得名髙鋒鋩妙奪金雞距纖利精分玉兎毫濡染只應親賦咏風流不稱近弓刀何妨寄我臨池興忍使江淹役夢勞荆門勉懐寄道林寺諸友榮枯得丧理昭然誰効離騷更问天生下便知真夢幻老来何必歎流年清風不變诗應在明月無蹤道可傳珍重匡廬沃州主披衣抛􅁍好林泉荅崔校書雪色衫衣绝􅀧塵明知富貴是浮雲不隨喧滑迷貞性何用潺湲洗汚聞北闕㑹抛紅駊騀東林社憶白氛氲清吟有興頻相示欲答多慚蠧蝕文乞櫻桃去年曽賦此花詩幾􅃪南園爛熟時嚼破紅香堪换骨摘殘丹顆欲燒枝流鶯偷啄心應醉行客潛窺眼亦癡聞说張筵就珠􅀣任􅀙攀折半離披寄南雅上人曾得音書慰暮年相思多故信難傳清吟何處題紅葉舊社空懐墮白蓮山水本同真􅃐向侯門剛有薄因緣他時不得君招隐㑹逐南歸椘客船寄歐陽侍郎時在嘉州饋遣又聞繁惣在嘉州職重身闲倚市樓大象影和山面落兩江聲合郡前流棊輕國手知難敵詩是天才肯易酧畢竟男兒自髙達徔来心不是悠悠與崔校書静話言懐同年生在咸通裏事物為儒趣盡高我性已甘披􅃝衲君心猶待脱藍􅂁霜髭曉幾臨銅鏡雪髩寒疎落剃刀出世朝天俱未得不妨還往有風騷謝人惠拄杖卭州靈境産修篁九節材應表九陽造化已能分尺度保持争合與尋常幽林翦破清秋影髙手携来綠玉光深谢魯儒憐潦倒欲教撑拄遶禅床謝秦府推官寄丹臺集秦王手筆序丹臺不錯褒揚最上才鳳阙幾傳為匠碩龍门曽用振風雷錢郎未竭精華去元白終存作者来兩軸蚌胎驪頷耀枉臨禅室伴寒􅁅題畫鷺鷥兼简孫郎中曽向滄江看不真􅁍因圗晝見精神何妨金粉資髙格不用丹青􅀧此身蒲葉㟁長堪映帶荻花叢晚好相親思量畫得勝籠得野性由来不戀人賀行軍太傅得白氏東林集楽天歌詠有遺編留在東林伴白蓮百氏典墳隨喪亂一家風雅獨完全常闻荆渚通侯論果遂呉都使者傳仰賀斯文歸朗鑒永資聲政入薫􅃶韶陽微公曲江晴影石千株吾子思歸夢㫁􅀄有信北来山叠叠無言南去雨疎疎祖師門接園林路丞相家同井邑居閒野老身留得否相招多是秀才書􅀅之匡廬過潯陽颿過潯陽晚霽開西風北鴈似相催大孤浪後青堆沒五老雲中翠叠来此路便堪歸水石何門更合向塵埃逺公林下蓮池畔箇箇髙人盡有才寄湘幕王重書記抛擲浟江舊釣磯日􅂙籌畫廢吟詩可能有事􅀜心後得似無人識面時官好近闻加茜服藥靈曾说换霜髭髙才直氣平生志除􅁍徒知即不知宿沈彬進士書院相期只為話篇章􅂿雪曽来宿此房喧滑盡消城滿滴窗扉初揜岳茶香舊山春暖生薇蕨大國塵昏懼殺傷應有太平時節在寒宵未卧共思量静院花院相重􅀧破苔誰心肯此話心􅁅好風時傍疎篁起幽鳥晚􅀙何處来筆研興狂詩沈謝香燈魂㫁憶宗雷浮生已問空王了急箭光隂一任催送白處士逰峨嵋閒身誰道是覊逰西指峨嵋碧頂頭琴鶴幾程隨客棹風霜何處宿龍湫尋僧石磴臨天井研藥秋崖倒瀑流莫為寰瀛多事在客星相逐不逥休寄顧蟾處士好于山水久聞為客過蒼梧休说移家歸鏡湖山水顛狂應盡在髩毛凋落免貧無和僧搶入雲中峭帶鶴驅成澗底孤春醉醒来有餘興因人乞與武陵圗懐金陵知舊海門相别住荆門六度秋光兩髩根萬象倒心難蓋口一生無事可傷魂石頭城外青山叠北固窗前白浪翻盡是共逰題板處有谁惆悵拂苔痕驚秋曉窗驚覺向秋風萬里心凝澹蕩中池影碎翻紅菡萏井聲乾落綠梧桐破除閒事渾歸道銷耗勞生旋逐空妖殺尤原狐兎意豈知邱壠是英雄聞沈彬赴吳都請辟長訝髙眠得穩無果隨徵辟起江湖鴛鴦已列尊罍貴鷗鶴休懷釣渚孤白首不妨扶漢祚清才何讓賦吳都可能更憶相尋夜雪滿諸峰大一爐寄江夏仁公寺閣髙連黄鶴樓簷前檻底大江流幾因秋霽澄空外獨為詩情到上頭白日有餘閒送客紫衣何啻貴封侯别来多少新吟也不寄南宗老比丘中春林下偶作浄境無人可共携閒眠未起日光低浮生莫把還丹續萬事須􅀅至理齊花在月明蝴蝶夢雨餘山綠杜鵑啼何能向外求攀折岩桂枝條拂石梯送劉秀才歸桑水寕覲歸和初喜戢戈矛乍捧鄉書感去留鴈序分飛離漢口鴒原騫翥在鰲頭家隣紫塞仍千里路過黄河更幾州應到髙堂問安後􅁍携文入帝京游寄曹松舊製新題削復刊工夫過甚琢瑯玕藥中求見黄芽動詩裏思聞白雪難扣寂頗同心在㝎鑿空何止髪冲冠夜來月苦懷髙論數樹霜邊獨傍欄酧蜀國歐陽學士因緣劉表駐經行又聽秋風墮葉聲鶴髪不堪言此世峨嵋空約在他生已徔禅祖􅂙真性敢向詩家認好名深愧故人憐潦倒毎傳仙語下南荆寄荆幕孫郎中珠履風流憶富春三千鵷鷺讓精神詩工鑿破清求妙道論研通白見貞四座共推操檄徤一家誰信買書貧别來鄉國魂應㫁劍閣東西盡􅀾塵謝王詹事垂訪鳥外孤峰未得歸人間觸䫫是無機方悲鹿軫栖江寺忽訝軺車降竹扉王澤乍聞譚渙汗國風那得話􅀇微應驚老病炎天裏枯骨肩横一衲衣題南平後園牡丹暖披烟艷照西園翠幄朱欄䕶列仙玉帳笙歌留盡日瑶䑓伴侶待歸天香多覺受風光剩紅重知含雨露偏上客分明記開處明年開更勝今年和李書記繁極全分青帝功開時獨占上春風呉姬舞雪非貞豔漢后題詩是怨紅逺蝶戀香抛别苑野鶯銜得出深宫君看萬態當筵處羞殺薔薇􅀧碎叢謝孫郎中寄示一念禅餘味國風早因持論偶名公久傷琴䘮人亡後忽有雲和雪唱同鎚琢静聞晜象外是非閒見寂寥中時来日往緣真趣不覺秋江度塞鴻愛吟正堪凝思揜禅扄又被詩魔惱竺卿偶凭窗扉徔落照不眠風雪到殘更皎然未必迷前習支遁寕非悟後生傳冩㑹逢精鑒者也應知是詠閒情寄懷東林寺匡白監事南岳别來無後約東林歸住有前緣閒搜好句題紅葉静斂雙眉對白蓮雁塔影分疎檜月虎溪聲合幾峰泉修心若似伊耶舍傳記須添十九賢謝人惠十色花牋并碁子陵州碁子浣花牋深媿携来自錦川海蚌琢成星落落吳綾隐出鴈翩翩留防桂苑題詩客惜寄桃源敵手仙捧受不堪思出處七千餘里劍門前夏日寓居寄友人北逰兵阻復南還因寄荆州病揜􅀜日月坐銷江上寺清涼魂斷剡中山披緇影迹堪藏拙出世身心合向閒多謝扶風大君子相思時對寂寥間中秋十四日夜對月上南平主人今宵前夕皆堪玩何必圓時始竭才空説輪中自天子不知何處有樓臺終憂明夜雲􅃒􅁍且掃閒居坐看来玉􅈷銀蟾似多意乍臨棠樹影徘􅆦謝人惠十才子圖丹青妙冩十才人玉峭氷稜姑射神醉舞離披真鸑鷟狂吟崩倒瑞麒麟翻騰造化山曽竭采掇珠璣海幾貧猶得知音與圖畫草堂閒挂似相親荆門病中寄懷鄉人歐陽侍郎彬谁㑹荆州一老夫夢勞神役憶匡廬碧雲雁影紛紛去黄葉蝉聲漸漸無口澹莫分飡氣味身羸但覺病肌膚可憐饌玉燒蘭者肯慰寒隈雪夜爐送譚三藏入京阿闍􅀺與佛身同灌頂難施利濟功持呪力湏資運祚度人心要似虚空東周路􅂿紅塵裏北極門瞻紫氣中好進梵文沾帝澤􅁍歸天䇿繼真風三藏住椘國天䇿寺寄酬秦府高推官輦天台衢岳舊曽尋閒憶留題白石林􅀊月己殘衰颯髩風騷猶壮寂寥心緱山碧樹􅃒藏密丹穴紅霞揜映深争得相逢一携手拂衣同去􅃪􅀇音叙懐寄髙推官搜新編舊與誰評自向無聲認有聲己覺愛来多廢道可堪傳去更沽名風松韻裏忘形坐霜月光中共影行還勝御溝寒夜水狂吟衝尹甚傷情送朱侍御自雒陽歸閬州寍覲尋常西望故園時幾䖏魂隨落照飛客路舊縈秦甸出鄉程今繞漢陽歸已過巫峽沉青靄忽認峨嵋在翠微徔此倚門休望斷交親喜换老萊衣貽惠暹上人􅀴論功餘更業詩又扵難裏縱天機吳朝客見投文去楚國僧迎著紫歸已得聲名先振俗不妨風雪更探微金陵髙憶恩門在終挂雲颿重一飛酧西蜀廣濟大師見寄猶得吾師􅁇頌聲百篇相愛寄南荆卷開錦水霞光爛吟入峨嵋雪氣清椘外已甘推絶唱蜀中誰敢共懸衡應懐無可同無本終向風騷作弟兄江寺春殘寄幕中知己二首誰遣西来負岳雲自由歸去更何因山龕薜荔應殘雪江寺玫瑰又度春早􅀊便師無學士臨年􅁍作有為人何妨夜宴時相憶佯醉佯狂笑老身社蓮慚與幕蓮同岳寺蕭條儉府雄冷淡獨開香火裏殷妍行列綺羅中秋加玉露何傷白夜醉金缸不那紅閒憶遺民此心地一般無染喻真空寄玉泉寶仁上人往􅀊曽尋聖跡時樹邊三遶禮吾師敢瞻䕶法􅀅軍記且喜焚香弟子知後㑹未期心的的前峰欲下歩遲遲今来老劣難行甚空寂無緣但寄詩荆渚懐寄僧逹禅弟三首電擊流年七十三齒衰氣沮竟何堪誰云有句傳天下自愧無心寄嶺南曉漱氣嫌通市井晚烹香憶落雲潭鄰峯道者還弹指蘚剥藤纒舊石龕十五年前㑹虎溪白蓮齋後便来西干戈時變信雖絶吳椘路長魂不迷黄葉喻曽同我悟碧雲情近與誰携春殘相憶荆江岸一隻杜鵑頭上啼鶴嶺僧来細語君依然髙尚迹難群自抛南岳三生石長傍西山數片雲丹訪葛洪無舊竈詩尋靈觀有遺文莫􅀅離别為相隔心似虚空幾處分寄孫魴秀才郡樓東面市牆西顔子生涯竹屋低書案飛揚風落絮地苔狼藉燕銜泥吟窗晚凭春篁密行徑斜穿夏菜齊别後相思頻夢到二年同此賦閒題送李評事往宜春蘭舟西去是通津名郡賢侯下禮頻山遍寺樓看仰岫臺連城閣上宜春鴻心夜過鄉心亂雪韻朝飛句韻新别有官榮身外趣月江松徑訪禅人中春感興春風日日雨時時寒力潛徔暖􅀔衰一氣不言含有象萬靈何處謝無私詩通物理行堪掇道合天機坐可窺應是正人持造化盡驅幽細入爐鎚早鶯何處經年絶好音暖風吹出囀喬林羽毛新刷陶潛菊喉舌初調叔夜琴藏雨並棲紅杏密避人雙入綠楊深曉来枝上千般語應共桃花説舊心酬尚顔上人紫綬蒼髭百􅀊侵綠苔芳草繞堦深不妨好鳥喧髙卧切忌閒人聒正吟魯鼎寂寥休辨口刼􅁅銷變莫宣心還憐我有􅑡搜癖時把新詩過竹尋寄倪曙郎中風雨冥冥春闇移紅殘綠滿海棠枝帝鄉久别江鄉住椿筍何如櫻筍時海内擅名君作賦林間外學我為詩近聞南國升南省應笑無機老病師喜得自牧上人書吳都使者泛驚濤靈一傳書慰毳袍别興偶隨雲水逺知音本自國風高身依閑淡中銷日髪向清涼處落刀聞著括囊新集了擬教誰與序離騷白蓮集卷第七
