body:
  text: 廬岳僧齊己撰寄鄭谷郎中清名喧省閣雅頌出吾唐叠嶠供秋望無雲到夕陽自封修葯院别掃著僧牀㡬夣中朝亊依依鵷鷺行㱕雁塞门春已暖連影􅁸蘋風雲夣千行去湘川一亱空江人休舉網虜將又虚􅃓莫失南来伴衡陽􅀣即紅登大林寺觀白太傅題版九疊蒼崕裏禅家鑿翠開清時誰夣到白傅獨尋来怪石和僧㝎闲雲共鶴廽任兹休去者心是不然􅁅贈􅔟松先輩今􅀊赴春闈逹如夫子稀山中把卷去牓下注官㱕椘月吟前落江禽酒外飛闲遊向諸寺却看白麻衣夏日江寺寄無上人講終齋磬罷何䖏稱真心古寺髙杉下炎天獨院深燕和江鳥語墻奪暮花陰大府多才子閒􅂈在竹林夏日梅雨中寄睦公梅月来林寺冥冥各闭门已應雙􅂂跡全􅃿亂雲根琢句心無味看􅀴眼亦昬何時見晴霽招我凭巖軒傷鄭谷郎中鍾􅁜千首㑅茟绝亦身終知落干戈裏誰家煨燼中吟齋春長蕨釣渚亱鳴鴻惆悵秋江月曾招我看同􅎔行題友壁山衲冝何䖏􅀴行避暑深峰西多古寺日午亂松陰鶴黙堪分静蝉涼觧助吟􅇻勤題壁去秋早此相尋别東林後寄囬修睦昨亱􅀙香社辭君出薜蘿晚来巾舃上已􅁴俗塵多逺路萦芳草遥空共白波南朝在天末此去重􅀴過古松雷電不敢伐鱗皴势萬端蠧依枯莭死虵入朽根盤影浸僧禅􅊜声吹鶴夣寒尋常風雨亱應有鬼神看夏日栖霞寺書懐寄張逸人人中林下現名自有闲忙建業紅塵􅀬栖霞白石凉􅀝身檉儿稳洒面瀑流香不似髙齋裡花連竹影長訪自牧上人不遇然諾竟如何諸侯見重多髙房度江雨􅀴月長寒莎道本同騷雅書曾到薜蘿相尋未相見危阁望滄波題東林白蓮大士生兠率空池滿白蓮秋風眀月下齋日影堂前色後群芳坼香殊百和然誰知白染性一片好心田寄懐江西徴岷二律師亂後江邊寺堪懐二律師幾畨新弟子一様􅃇威儀院影連春竹窓声接雨池共缘山水癖乆别共題詩東林作寄金􅁜知已十八賢貞在時来拂蘚看已知前亊逺更結後人難泉滴勝清磬松香掩白檀慿君聴朝貴誰􅁒􅌅簮冠山寺喜道者闰年春過後山寺始花􅄏還有無心者闲尋此境来鳥幽声忽㫁茶好味重廽知住南岩乆冥心㘴緑苔再逰匡山紫霄兼二老相對􅀝空寒乆别成衰病重来更上難􅈳危雲母滑崖旱瀑流乾目㫁嵐煙際神僊有石壇贈浙西李推官他皆恃勲貴君獨􅋢詩􅀇終日秋光裡無人竹影邉東樓生􅀝月北固積吟煙闻說鴛行裏夛才復少年題终南山隐者室终南山北面直下是長安自掃青苔室閒謌白石看風吟窓􅀣老日晒竇雲乾時向圭峰宿僧房瀑布寒禅庭蘆竹十二韵呈鄭谷郎中錯錯在禅庭髙冝與竹名徤添秋雨响乾助亱風清雀静知枯折僧閒見笋生對吟殊洒落負􅂔甚􅀌貞宻謝编欄固齊由灌溉􅊭松姿真可敵桞態薄難并映帶兼苔石参差逸画楹雪霜消後色蟲鳥黙時聲逺憶滄洲岸寒連暮角城幽根狂亂迸􅹤葉動相撑避暑湏􅎔㘴迯眠必遶行未逢仙手詠俗眼見猶􅁿送孫􅃫秀才赴舉九重方側席四海仰文眀好把孤吟去便随公道行梁園浮雪􅂔汴水漲春聲此日登僊衆君應最後生落花朝開暮亦衰雨打復風吹古屋無人䖏殘陽滿地時静依青藓片闲綴緑莎枝繁艶根株在眀年向此期秋苔獨憐蒼翠文長與􅄫寥存鶴静窺秋片僧闲踏冷痕月眀䟱竹􅈳雨歇敗莎根別有深宫裡兼花鎻㫁䰟老將逐膚與􅊭戎曾居第一功眀時不用武白首向秋風馬病霜飛草􅃓闲鴈過空􅅜孫已成立膽􅂔亦英雄城中示友人乆與寒􅁅合人中亦􅁴闲重城不鎖夣毎亱自㱕山雨破冥鴻出梧桐井月還唯君道心在来往􅄫寥间送友人逰湘中懐才難自住此去亦如僧何䖏西風亱􅀌吟旅舍燈路㳂湘􅀣叠山入椘雲層君有東来扎㱕鴻亦可慿􅀴費㣲君􅃇居髙眠當聖代雲鳥未為􅀌天子徵不􅁸闲人親得無猿猱狂􅁒墜水石怪難圗􅄫寞荒齋外松杉相􅀝枯巖􅁜釣䑓夫子垂竿䖏空江照古䑓無人更如此白浪自成堆鶴静尋山去魚狂入海廽登臨秋值晚􅀣石盡夛苔原上晚望􅀝杖􅂓攄望寒原逺近分亱来何䖏火燒出古人墳野势盤空澤江流合暮雲殘陽催百鳥各自著栖羣送惠空上人㱕塵中名利热鳥外水雲闲吾子夛髙趣秋風獨自還空囊随客棹幾宿泊湖山應有吟僧在鄰居􅀣影间酬章水知己新吟忽有􅀉千里到荆门落日雲􅀄碧殘年眼漸昏己為難敵手誰更入深論後信夛相􅀉吾生重此言闲居漸􅁴春光􅆺塵銷㑅圡膏㣲寒放楊柳纎草入風騷睡少全無病身輕乍去袍前溪泛紅片何䖏落金桃次韵酬鄭谷郎中林下髙眠􅁸相招得句時闲门流水入静話鷺鷥知毎許題成晚夛嫌雪阻期西齋㘴来乆風竹撼疎籬思逰峨睂􅀉林下諸友剛有峨睂念秋来錫􅁒飛㑹抛湘寺去便逐蜀㠶㱕難世堪言善闲人合見機􅇻勤別諸友莫􅌅椘江薇送劉秀才南逰南去謁諸侯名山亦得逰便應尋瀑布乘興上岣嶁髙鳥随雲􅁸寒星向地流相思應北望天晚石槁頭示諸侄莫问年將朽加飡已不夛形容渾痩削行止强牽拖死也何􅁨惱生而有詠謌候门終謝去却掃􅃇松蘿荆渚病中囙思匡廬遂成三百字􅀉梁先輩生老病􅂮者早闻天竺書相随幾汨􅃿不了堪欷歔自理自可􅆘他人誰與祛應當入􅄫㓕乃淂長銷除前月巳骨立今朝還貌舒披衣試歩􅂂􅀝策􅂓躊蹰江月青眸冷秋風白髮䟱新題憶剡硾􅃇約懐匡廬張野乆絶跡楽天曾卜居空龕掩薜荔瀑布歕蟾蜍古檜鳴􅀇鶴􅋽泉躍錦魚狂吟樹䕃映縱踏花蔫菸唇舌旣已闲心脾亦􅊌攄松窓有􅅯息石􅈳無趦趄夣冷通仙􅇅神融合太虚千峯杳靄際萬􅊤眀清􅀄長往期非晚半生閒有餘依劉未是詠訪戴寕忘諸稽古堪求己觀時好笑渠埋頭逐小利􅃿脚拖長裾道種將闲養情田把薬鉏幽香彂蘭蕙􅁾莾摧丘墟􅊌謂囊盈物那言庾滿儲㣲煙動晨爨細雨滋園蔬藓亂珍禽羽门稀長者車冥機坐兀兀著􅂂行徐徐毎計親朱􅂂夛怜奉隼􅒅簮嫌紅玳􅈘社念金芙蕖海内競鉄馬篋中藏􅁓驢常言謝時去此意將何如竟􅁜遇晝公髙跡何来此逰方漸老身􅁒􅄬蓮岳夏􅀄過竟􅁜春錫影離雲逺衣痕拂藓新無言即相别此䖏不迷津闻貫休下世吾師詩匠者真箇碧雲流争淂梁太子更為文選樓錦江新種􅀣㜈女􅃇山秋􅁒去焚香裏啼猿峽阻修金山寺山帶金名逺樓䑓􅐦翠層􅜕龍光照象風浪影揺燈檻外揚州樹舡通建業僧塵埃何􅀁到青石㘴如氷早秋雨後晚望暑􅂔時將薄蟲聲亱轉稠江湖􅀴一雨日月换新秋有景堪援茟何人未上樓􅁒承凉冷興西向碧嵩逰過西塞山空江􅊭野流風島葦颼颼殘日銜西塞􅀌㠶向北洲邊鴻渡漢口椘􅀣出吴頭終入髙雲裏身依片石休溪齋二首豈敢言招隐㱕休喜自安一溪雲卧稳四海路行難瑞獸藏頭角幽禽惜羽翰子猷何䖏在老盡碧琅玕杉竹映溪關􅁱􅁱共􅀊寒幽人眠日晏花雨落春殘道玅言何强詩􅀇論甚難闲居有親賦搔首憶潘安新秋始驚三伏盡又遇立秋時露彩朝還冷雲峯晚更竒壠香禾半熟原逈草微衰幸好清光裏安仁謾􅁸悲􅀉上荆渚囙夣廬岳乃阁壁賦詩夣繞嵯峨裏神踈骨亦寒覚来誰共說壁上自圗看古翠松藏寺春紅杏􅊜壇㱕心幾時遂日向漸衰殘己夘􅀊值凍阻㱕有作河氷連地凍朔􅂔􅐦春寒闭户思㱕逺出门移歩難湖雲粘鴈重廟􅀣括風乾㘴看孤燈㷔微微向晚殘送盧說亂後􅄬知己兵㓂殘江墅生涯盡蕩除亊堪煎桂玉時莫􅀝詩書暮狖啼空半春山列雨餘舟中有新作廻􅀉示慵踈讀峴山碑三載羊公政千年峴首碑何人㪅堕淚此道亦殊時兵火燒文缺江雲觸蘚滋那堪望􅀺庻帀地是瘡痍過鹿门作鹿门埋孟子峴首載羊公萬古千秋裏青山眀月中政􅀙㐮􅃆絶詩過洞庭空塵路誰囬眼松聲两䖏風題玉泉寺大師影堂大化終華頂霊蹤示玉泉由来􅀒髙尚合向好山川洞壑藏諸怪杉松列痩煙千秌空􅀣影猶似覆長禅秌日銭塘作秌光眀水國㳺子􅀝長亭海浸全呉白山澄百越青英雄貴􅀺庶封圡絶精霊勾踐䰟如在應漸􅀾血腥送人赴舉分有争忘得時来湏出山白雲終許在清世莫空還馹􅀣秌聲徤行衣雨􅀧斑眀年􅀙月裏滿握度春關答人寒亱􅀁􅀉通宵亦孤㘴但念􅃇峰雲白日還如此清闲本共君二毛凋一半百􅀊去三分早晚尋流水同㱕麋鹿群酬洞庭陳秀才何必要識面見詩驚苦心此门􅀙自古難学至如今青草湖雲濶黄􅁜廟木深精搜當好景得即動知音題鶴鳴泉八韵嘹嚦遺踪去澄眀物掩難噴開山面碧飛落寺门寒汲引随瓶滿分流逐䖏安幽虫乗葉過渇狖擁條看上有危峰叠旁冝怪石盤冷吞雙􅀣影甘润百毛端異早闻鎸玉靈終别建壇潇湘在何䖏終日自波澜登金山寺四面白波聲中流翠嶠横望来堪目㫁上徹始心􅊭鳥向天涯去雲連水國生重来與誰約題罷自吟行􅀉吴都沈員外彬歸休興􅀂何朱紱盡還他自有園林濶誰争山水夛村煙晴莾蒼僧罄晚嵯峨野酔題拈隐相思何䖏麽􅀉眀月山僧山稱眀月好月出遍山眀要上諸峰去無妨半亱行白猿真雪色幽鳥古琹聲吾子居来乆應忘我在城􅀉哭西川壇長廣濟大師千萬僧中寳三朝帝寵身還原未化火举國􅁙全真文集編金在碑銘刻玉新有誰於異代弹指禮遺塵酬西川椘巒上人卷玉壘峨􅖭秀岷江錦水清古人搜不盡吾子得何精可信由前集堪闻正後生東西五千里夛謝􅀉無成覧延西上人卷今體雕鎪妙古風研考精何人忘律韵爲子辨詩聲賈島苦兼此孟郊清獨行荆门見編集媿我老無成􅀉洛下王􅉓訓先軰二首賈島存正始王維􅅏格言千篇千古在一詠一驚䰟離别無他􅀉相思共此门陽春堪永恨郢路轉塵昏北極新英主髙科􅃇少年風流傳貴逹談笑取榮遷浴水秋空底嵩峰暁翠巔尋常誰並馬橋上戲成篇酬岳陽李主簿卷把卷思髙興瀟湘濶浸门無雲生翠浪有月動清䰟􅀝檻應窮底凝情合到源爲君吟􅀁􅀉難甚至忘筌􅀉懐江西僧逹禅翁長憶􅃇山日與君同聚沙未䏻精貝葉便学詠楊花苦甚傷心骨清還切齒牙何妨􅁇餘習前世是詩家送吴守眀先軰逰蜀憑君逰蜀去細爲話幽竒丧亂嘉􅁜馹塵埃賈島詩未應過錦府且合上峨􅖭既遂髙科後東西任􅀁之􅀉普眀大師可凖蓮嶽三微者論詩􅃇與君相􅅏曾幾􅀊酬唱有新文翠竇容闲憇嵐峯許共分當年􅀂同訪合得伴吟雲還黄􅊭素秀才卷求己甚忘筌得之􅀴渾然僻䏻離詭差清不尚妖妍冷淡闻姚監精竒見浪僊如君好風格自可􅁇前賢與張先軰話别為者各自話離心及第還全蜀逰方歸二林巴江漲椘野入吴深他日傳消息東㱕不易尋􅀉朱拾遺一闻㱕􅇅下幾畨熟金桃滄海期仍晚清資路漸髙研氷濡諌茟賦雪擁朝袍豈念空林下冥心㘴石劳荆门送興禅師灑落南宗子逰方跡似雲青山尋䖏處赤葉路纷紛虎共松岩􅀫猿和石溜闻何峯一回首憶我在人羣過西山施睂吾舊居大志終難􅁸西峯卧翠堆牀前到秋􅊤枕上過春雷鶴見丹成去僧闻栗熟来荒齋松竹老鸞鶴自徘徊喜夏雨四郊雲影合千里雨聲来盡洗紅埃去併將清􅂔回潺湲浮椘甸蕭散露荆臺􅁒賦随車瑞濡毫謁䛕才酬元員外見􅀉八韵􅃇隐夣牽仍㱕心只似蒸逺青憐島峭􅁿白􅋢雲騰艶冶叢翻蜨腥膻地聚蝇雨聲連洒竹詩興􅁇填膺訪戴情彌切依劉力不勝衆人忘苦苦獨自愧兢兢䖏世無他望流年有病僧時惭大雅客遺韵許相承浣口泊舟曉望天柱峯根盤潛岳半頂遍日輪邉冷碧無雲􅀧危稜有瀑懸秀輕毛女下名與􅂦湖偏誰見扶持力峩峩出後天􅀉椘萍上人北面香爐秀南邉瀑布寒自来還獨去夏滿又秋殘日影松杉亂雲容洞壑寛何峯是憐側片石許相安竹裏作六韵我来深䖏㘴剩􅁴有吟思忽似瀟湘㟁􅁒生風雨時冷煙濛古屋乾箨堕秋墀􅈳􅀬囙頻入身闲得遍欹􅂿多鞭節損題亂粉痕􅈥猶見前山叠微􅃼隔短籬􅀉江西幕中孫鲂員外簮􅂂為官興芙蓉結社縁應思陶令酔時訪逺公禅茶影中殘月松聲裏落泉此门曾共説知未遂終焉盆池盆沼䧟花邉􅀌眀似玉泉􅉼虚心不淺待月底長圓􅊭稳承天泽依微泛曙煙何湏照菱鏡即此鍳􅎀妍喜乾晝上人逺相訪彼此垂七十相逢意􅀂何聖眀殊未至離亂㪅應夛澹
