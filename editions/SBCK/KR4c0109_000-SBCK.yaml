body:
  text: 荆南節度副使朝議郎撿挍秘書少監御史中丞賜紫金魚袋孫光憲撰風雅之道孔聖之刪備矣美刺之􅀃卜商之序眀矣降自屈宋逮乎齊梁窮詩源流權衡辭義曲盡商􅅦則成格言其惟劉氏之文心乎後之品評不復過此有唐御宇詩律尤精列姓字掇英秀不啻十數家惟丹陽殷璠優劣升黜咸當其分性之深扵詩者謂其不誣顧我何人敢議臧否茍成美有闕得非交游之罪邪禪師齊巳本胡氏子實長沙人家邇溈慕大禪伯入頓門落髮擁毳逰方宴坐宿念未忘存口口口師趣尚孤㓗詞韻清潤平淡而意逺冷峭而口口口口口口口口口口口口口鄭谷郎中與師口口口口口口􅃻門誰訪口口客即口師應是逢新雪髙吟得好詩格清無俗字思苦有蒼髭諷味都忘倦抛琴復捨棊其為詩家流之之稱許也如此晚歳􅀅之岷峨假途渚宫太師南平王築淨室以居之捨淨財以供之雖出入朱門而不移素履議者以唐末詩僧惟貫休禪師骨氣混成境意倬異殆難儔敵至於皎然靈一􅀅已禪者並驅扵風騷之途不近不逺也江之南漢之北緇儒業縁情者靡不希其聲彩自非雅道昭著安得享兹大名鄙以旅宦荆臺最承欵狎較風人之情致賾大士之㫖㱕周旋十年互見閫域師平生詩藁未遑刪汰俄驚遷化門人西文併以所集見授因得編就八百一十篇勒成一十卷題曰白蓮集盖以久棲東林不忘勝事余既繕寫㱕扵廬岳附逺大師文集之末口口口口口逓為輝光其佳句全篇或偶對開卷輙得無煩指摘濡毫梗㮣良深悲慕天福三年戊戌三月一日序白蓮集目錄卷一八十一首夏日草堂作寄鏡湖方干處士送人歸呉仰夜坐新栽松期友人和鄭谷郎中看棊寄錢塘羅給事戊辰􅀊寄鄭谷郎中寓言寄王振拾遺經賈島舊居送人遊塞桃花聞鴈送人逰南送益公歸舊居不睡新秋雨後送劉蜕秀才赴舉留題仰山大師塔院鄭谷吳延保下世送東林寺睦公往吳除夜送秘上人謝進士沈彬再訪對雪和岷公送李評事過荆門山中答人贈盧明府閑居幽庭送休師歸長沙將逰嵩嶽行次荆渚逺思寄勉二三子渚宫江亭寓目蝴蝶送劉秀才往東洛移竹雉懐軒轅先生永夜感懷寄鄭谷賣松者丙寅􅀊寄潘歸仁嘗茶楊花詠影南歸舟中二首送遷客題中上人院逢鄉友自勉寄詩友居道林寺書懐經吳平觀劍客白髮秋興寄㣧公野步殘春酬尚顔苦􅀬送歐陽秀才赴舉放鷺鷥謝王秀才見示詩卷送徐秀才之吳獨院偶作酬元員外見寄寄文秀大師夏雨謝興公寄山水簇子酬微上人送人及第東歸寄江居耿處士病起二首送中觀進公歸巴陵卷二寄鄭谷郎中歸鴈觀白太傅詩版贈曹松先輩夏日寄無上人梅雨中寄睦公傷鄭谷郎中臨行題友生壁别東林回寄修睦古松夏日書懷寄張逸人訪自牧上人不遇題東林白蓮寄懷徵岷二律師東林作寄金陵知己山寺喜道者至再逰匡山贈淛西李推官題終南山隐者室禪庭蘆竹呈鄭谷送孫鳳秀才赴舉落花秋苔老將城中示友人送友人逰湘中經費徵君舊居嚴陵釣臺原上晚望送惠空上人歸酬章水知己閑居次韻酬鄭谷郎中思逰峨眉寄諸友送劉秀才南逰示諸姪荆渚疾中寄先輩竟陵遇晝公聞貫休下世金山寺早秋雨後晚望過西塞山溪齋二首新秋寄上荆渚因夢廬岳乃圖壁賦詩己卯歳值凍阻歸作送盧說亂後投知己讀峴山碑過鹿門作題玉泉寺大師影堂秋日錢塘作送人赴舉答人寒夜所寄酬洞庭陳秀才題鶴鳴泉八韻登金山寺寄吳都沈員外彬寄明月山僧寄哭西川廣濟大師酬西川楚巒上人卷覽延栖上人卷寄王彝訓二首酬岳陽李主簿卷寄懐僧逹禪弟送吳守明先輩逰蜀寄普明大師可準還黄平素秀才卷與張先輩話别寄朱拾遺荆門送興禪師過西山施肩吾舊居喜夏雨酬元員外見寄八韻浣口曉望天柱峰寄楚萍上人竹裏作六韻寄江西幕中孫魴盆池喜乾晝上人逺相訪卷三過陳陶處士舊居寄敬亭清越湘江漁父書古寺僧房湖西逸人瀟湘二十韻江行早發宜陽道中作落日春興逺山和鄭谷郎中幽棲之什勉謙光鴻藴二姪渚宫自勉二首謝㴩湖茶寄歸州馬判官倦客送靈􅈯上人逰五臺靜坐謝虚中上人寄示天策閣詩荆門寄懐章供奉江令石月下作逰四絶亭觀宋杜詩版勉詩僧謝人墨送人逰玉泉寺寄鄭谷郎中春雨明月峰謝人惠紫栗拄杖送人逰湖湘小松金江寓居晚夏金江荅友生寄李洞秀才過商山蟬八韻鷺鷥二首送僧歸南嶽夏日林下作村居寄懷酬王秀才贈無本上人寄華山司空圖題真州精舍懷道林寄仁用上人潯陽道中作東林雨後望爐峰寄雙泉大師師兄送人潤州尋兄弟貽張生送人逰雍京春草懷華頂道人寄自牧上人靜坐送人逰衡岳荅知己寄書新筍寄唐洙處士謝人惠竹蠅拂新燕謝王先輩寄氊寄還髙輦先輩卷和孫支使院中庭竹苦􅀬懐爐峰舊居送僧逰龍門香山寺江上值春雨七十作謝虚中寄新詩送彬座主赴龍安夏日荆渚書懐春日西湖作謝中上人寄茶送節大徳歸闕覽清尚卷送晝公歸彭澤舊居卷四登祝融峰寄貫休送唐禀歸萍川寄懐江西栖公山中喜得友生書謝人惠扇及茶寄監利司空學士答陳秀才㳺橘洲寄武陵道友謝人惠藥還族弟卷送周秀逰峽荆門寄洞山節公再經􅅄山與諸長老夜話寄當陽張明府逰三覺山庭際晚菊上主人送趙長史歸閩川擬嵇康絶交寄貫微寄許州清古謝丁秀才見示賦卷驚秋雨中寄幕中知己夜次湘隂寄唐禀正字宿舒湖希上人房戊辰歳江南感懐送休上人歸永嘉荅友生山居寄示新秋霽後懷先公池上感興和曇域上人寄贈弔雙泉大師頁塔送璘上人歸華容秋夜聽業上人彈琴謝人惠丹藥病中寄貫微上人荅孔秀才秋江舩窗永夜中春寄二三知己自遣送陳霸歸閩寄孫闢呈鄭谷荆門送人逰南岳謝主人石筍經安公寺秋夕寄諸姪謝炭夏日寄孫支使寄清溪道友謝重緣山水障子寺居剃髪謝髙輦先輩送徐秀才游吳憶在匡廬日寄從益上人殘秋感愴寄劉員外二首貽王秀才贈孫生酬元員外與楊秀才話别寄何崇丘員外贈劉五經送逰山道者江上望玉梁山角言詩酬王秀才春居寄友生荅幕中何支使浙江晚渡送人下第歸謁舊主寄謝髙先輩見寄二首卷五寄仰山光味長老貽廬岳陳沆秀才邊上蟋蟀寄西山鄭谷神讀􅂙同契聞落葉謝王先輩昆弟見示新詩寄酬髙輦推官逢詩僧話道謝歐陽侍郎寄示西墅新居酬孫魴掃地書匡山隐者壁送乾康禪師入山野鴨傷秋懐東湖寺寄峴山願公三首清夜作贈白處士崔秀才宿話懐天台華頂僧送人赴官水鶴湘中感興九日逢虚中虚受贈李明府暮春乆雨作渚宫莫問詩十五首并序新秋病起雜題十五首病起見王化圖畫苔錢庭竹生涯秋扇衰葉庭柏庭蓮庭菊庭石庭莎苔色秋月閒雲夜坐聞雪寄所知懐洞庭欲逰龍山有作再㑹晝公送人㳺武陵湘中酬九經者寄贈集灘二公夏日作行路難送玉泉道者囬山寺謝王拾遺見訪題張氏池亭送人南逰題明公房寄顧處士貽徐生謝虚中上人晚秋見寄卷六寄東林言之禪子寒節日寄鄉友聞從弟卜居有寄寄懐西蟾師弟撲滿子寄西川惠光大師憶别匡山寄晝上人又寄彭澤乾晝上人覽孫中丞看可準大師詩序有寄病中枕上聞蟬寄雲蓋山先禪師落葉次耒陽作舟中晚望祝融峰弔杜工部墳嶽中寄殷處士送幽禪師燒詠茶十二韻寄陽岐西峰僧廻鴈峰贈詢公上人秋興古寺老松無餘處士書齋歳暮江寺住新燕喻吟過湘江唐宏書齋讀賈島集寄山中道友懐終南僧送二友生歸宜陽懐從弟岳陽道中作赴鄭谷郎中招書李秀才壁聞尚顔下世薔薇送隆上人宿簡寂觀遇元上人早梅聽泉送孫逸人歸廬山聽李尊師彈琴寄武陵微上人匡山寓居栖公道林寺陶太尉井寄松江陸龜􅀩閉門看水寄栖白上人自題孫支使來借詩集夏日言懐早秋寄友生送王秀才往松滋喜􅈯公自武陵至假山并序謝可準上人寄詩集秋空與聶尊師話道送相里秀才自京至却回謝人寄南榴卓子寄舊居鄰友送朱秀才歸閩龍潭作酬謝尊師見贈二首送氷禪再往湖中喜表公往楚王城春雪初晴喜友至殘春雨中懐友人送崔判官赴歸倅寒食懐寄友人懐巴陵舊逰招乾晝上人宿話荆門秋日寄友人哭鄭谷郎中卷七東林十八賢貞堂題南岳般若寺寄廬岳僧㳺谷山寺楚寺寒夜作送太禪師歸南岳寄凝密太師兄弟海棠花贈龍安寺利禪師寄文浩百法謝人寄新詩集謝无願寄檀溪集寄道林寺諸友贈智滿三藏謝王先輩示卷軸寄西蜀無染大師兄謝徐廵官寄詩集與愚上人靜話謝平南王賜山雞病中書懷寄知己宿江寺謝微上人示古風貫休大師舊房寄谷山長老寄王暉處士勉懐寄道林寺諸友荅崔校書乞櫻桃寄南雅上人寄歐陽侍郎與崔校書言懷謝人惠拄杖謝秦府推官寄丹臺集題畫鷺鷥兼簡孫郎中賀太傅得白氏集韶陽微公將之匡岳過潯陽寄湘幕王重書記宿沈彬進士書院靜院送白處士逰峨嵋寄顧蟾處士懐金陵知舊驚秋聞沈彬赴吳都請辟寄江夏仁公中春林下偶作送劉秀才歸覲寄曹松酬蜀國歐陽學士寄荆幕孫郎中謝王詹事垂訪題南平後園牡丹和李書記謝孫郎中寄示愛吟寄懐東林匡白監事謝人惠花牋碁子夏日寓居寄友人對月上南平主人謝人惠十才子圖病中寄歐陽侍郎送譚三藏入京酬秦府推官髙輦叙懐寄髙推官送朱侍御歸覲貽惠暹上人酬廣濟大師見寄春殘寄知己二首寄玉泉寳仁上人感懐寄僧逹三首寄孫魴秀才送李評事往宜春中春感興早鶯酬尚顔上人宿倪曙郎中喜得自牧上人書卷八湘中寓居感懐瀟湘寄友生酬荅退上人山中春懷寄鄭谷郎中寄萍鄉唐禀正字秋夕書懐亂後經西山寺題梁賢巽公房塘上閑作江上望逺山寄鄭谷送人自蜀廻南逰寄无願上人瀟湘即事寄友人謝西洲人寄橘自貽寄益上人行次宜春寄諸友送略禪者歸南岳詠懐寄知己寄吳拾遺春晴感興謝道友拄杖東林寄修睦上人原西避暑寄吟友懐匡阜靜坐寄湘中諸友荅无願上人書送胤公歸闕感時湖上逸人懐巴陵謝楊秀才見訪荆門寄沈彬讀隂符經寄吳國知舊移居喜彬上人逺訪新秋冩懐五首送李秀才歸湘中寄吳國西供奉謝人惠端溪硯送吳先輩赴京和可準師逺寄之什暮冬與節公話别賀孫支使遷居庭際新移松竹題禪月大師影堂賀雪荆州寄貫微上人送休師歸長沙寕覲江上夏日渚宫春日有作松化為石寄澧陽吳使君湘江送客暮逰岳麓寺林下留别道友寄岳麓禪師二首亂後遇孫魴因寄寄仰山長老二首螢送翁員外歸闕寄居道林寺作沙鷗題賈相公井看雲對雪寄荆幕知己送相里秀才赴舉荆門疾中吟興自述送謝尊師入京送司空學士赴京卷九春寄尚顔寄梁先輩荆渚偶作城中晚夏思山舊山寄骵休過陸鴻漸舊居寄鍾陵舊遊知己遣懷懷武陵寄韓先輩贈樊處士荆渚逢禪友送僧歸洛中道林寓居仙掌中秋月送禪者遊南岳聞諸友嘗茶因有寄歸舊山留别錯公聞尚顔剏居有寄庚午歳九日作逢進士沈彬聞王員外新恩有寄秋夕言懷寄所知荅禪者寄尚顔梓栗杖送人寄朗陵二禪友燈寄金陵幕中李郎中寄韓蜕秀才湘中春雨送錯公栖公南遊寄南岳諸道友送韓蜕秀才赴舉溪居寓言遣懐將入蜀留别諸友寄匡阜諸公二首送人入蜀酬廬山張處士寄峴山道人送王處士遊蜀懷李推官僧自牧寄萍公得李推官近寄懐對菊憶東林因送二生歸渚宫西城池上居中秋夕愴懐有作酬徐員外見寄寄蜀國廣濟大師荅獻上人卷寄貫微上人二首懐體休上人招湖上兄弟江居寄闗中