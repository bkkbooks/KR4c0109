body:
  text: 廬岳僧齊己撰過陳陶䖏士舊居一室貯琴樽詩皆大雅言亱過秋竹寺酔打老僧门逺燒来籬下寒􅂼簇石根闲庭除鶴跡半是杖頭痕􅀉敬亭清越敬亭山色古廟與寺松連住北修行過春風四十年􅂦嘗天柱茗詩硾剡溪牋冥目應思著終南北􅇅前湘江漁父湘潭春水滿㟁逺草青青有客釣煙月無人論酔醒门前蛟蜃􅂔簑上蕙蘭馨曾受蒙荘子逍遥一卷􅀴書古寺僧房緑􅀣深深䖏長眀㷔㷔燈春時逰寺客花落闭门僧萬法心中􅄫􅀌泉石上澄勞生莫相问喧黙不相應湖西逸人老隐洞庭西漁樵共一溪琹前􅀌鶴影石上逺僧題橘柚園林熟兼葭􅈳路迷君䏻許隣並分藥斸春畦瀟湘二十韵二水逺難論􅀙離向坎奔冷穿千嶂脉清過幾州门阔去多凝白傍来盡帶渾􅀴逰闻舜禹表裹見乾坤浦静魚闲釣湾凉鴈自屯月来分野底雲度見秋痕暮􅂔藏鄰寺寒濤聒近村離騷傳永恨皷瑟奏遺魂霧擁魚龍窟槎欹島嶼根秋風㠶上下落日􅀣沉昏桞少砂洲缺苔多古㟁存禽巢依橘柚􅆩􅈳入蘭蓀色自江南絶名闻海内尊吴頭雄莫遏漢口壮堪吞寥泬晴方映馮夷信忽飜渡遥峰翠叠汀小荻花繁势接湖煙漲聲和瘴雨歕急摇吟客舫狂濺野人樽䟽鑿誰窮夲澄鲜自有源對兹傷九曲含濁出崑崙江行早彂舟子相呼􅁸長江未五㪅幾程星月在猶載夣魂行鳥亂村林過人喧水栅横蒼􅃼􅊭野外漸認逺峰名宜陽道中作宜陽南面路下嶽又􅀴過楓葉紅遮店芒花白滿坡猿無山漸薄鴈衆水還夛日落猶前去諸村牧監􅁔落日晚照背髙臺殘鐘殘角催䏻銷幾度月已是半生来吹葉隂風彂漫空暝色囬囙思古人事㪅變􅀞成埃春興桺暖鶯多語花眀艸盡長風流在詩句牽率在池塘呌切禽名宇飛􅋉蝶性荘時来真可惜自勉掇蘭芳逺山天際雲根破寒山列翠廻幽人當立乆白鳥背飛来瀑濺何州地僧尋幾嵪苔終湏拂巾􅂂獨去謝塵埃和鄭谷郎中幽棲之什誰知闲退跡门􅏙入寒汀静􅀝雲僧杖􅀌看野燒星墨霑吟石黑苔染釣舡青相對惟溪寺􅀄宵闻念􅀴勉道林謙光鴻藴二首舊林諸侄在還住􅊭師房共焚修地同闻水石香莫將闲世界擬敵好時光湏看南山下無名塜滿岡渚宫自勉二首晨午殊豊足伊何撓肺腸形容侵老病山水憶韜藏必謝金䑓去還携鉄錫將東林露壇畔舊對白蓮房畢竟擬何求随縁去住休天涯逰勝境海上宿仙洲夣好尋無跡詩成旋不㽜􅀙人笑輕事獨自憶荘周謝㴩湖茶㴩湖唯上貢何以惠尋常還是詩心苦堪消蠟面香碾聲通一室烹色帶殘陽􅀂有新春者西来信勿忘􅀉㱕州馬判官郡帶女䫋名民康境亦寕宴梳秋鬂白闲㘴暮山青贈客􅎛􅀄熟尋僧酒半醒應懐舊居䖏􅁔管隔墙􅃪倦客闭眼即關门人间事倦闻如何迎好客不似看闲雲少􅁒資三要多言讓十分踈慵本吾性任笑早離羣送􅂕􅈯上人逰五䑓此去清凉頂期瞻大聖容便應過洛水即未上嵩峰殘照催行影幽林惜駐蹤想登金阁望東北極兵峰静㘴㘴卧與行住入禅還出吟也應長日月消淂箇身心嘿論相少黄梅付嘱􅅧门前古松􅏙時􅁸歩淸陰謝虗中上人􅀉示題天策阁詩天策二首作境幽搜亦􅀇阁横三椘上題挂九霄邉寺額囙摽勝詩人合遇賢他時誰􅀝檻吟此豈􅁯筌荆门􅀉懐章供奉兼呈幕中知己紫衣居貴上青衲老關中事佛门相似朝天路不同神凝無􅁖夣詩澹老真風闻道知音在官髙信莫通江令石思量江令意􅋢石甚悠悠貪向深宫去􅂮同忘國休両株荒草裏千古暮江頭若似黄金貴隋軍也不留月下作良夜如清晝幽人在小庭滿空垂列宿那箇是文星世界㱕誰是心䰟向自寕何當見堯舜重為造生靈逰道林寺四絶亭覌宋杜詩版宋杜詩題在風騷到此真獨来終日㸔一為拂秋塵古石生寒􅌇春松脱老鳞髙僧眼根净應見客吟神勉詩僧莫把毛生刺低回謁李膺湏防知佛者觧笑􅋢名僧道性宜如水詩情合似氷還同蓮社客聫唱遶香燈謝人墨珍重􅀊寒煙携来路幾千只應真典誥消得苦磨研正色浮端硯精光動蜀牋囙君强濡染捨此即􅁯筌送人逰玉泉寺西風大雪開萬向空堆客䝿猶尋去僧髙肯不来潭澄猿覷月竇冷鹿眠苔公子將才子聫題與未迴􅀉鄭谷郎中詩心何以傳􅀁證自同禅覔句如探虎逢知似得僊神清太古在字好雅風全曾沐星郎許終慙是斐然春雨􅁒布如膏势先闻動地雷雲龍相得􅁸風電一時来霡霂農桑野冥􅄥楊柳䑓何人待晴暖庭有牡丹開眀月峰眀月峰頭石曾闻学月眀别舒長亱彩髙照一村耕頗亂無私理徒驚鄙俗情􅀓云遭鑿後頑白在峥嵘謝人惠紫栗拄杖仙掌峰前得何當此見遺百年衰朽骨六尺􅀊寒姿雪外兼松凭泉邉待月欹他時出山去猶謝見相随送人逰湘湖君逰南國去旅夣􅀂為寕一路随鴻雁千峯遶洞庭林眀楓盡落野黑燒􅀄􅀴有興尋僧否湘西寺􅆟灵小松彂地􅅻過脉蟠根已有灵巖霜百草白深院一株青後亱蕭騷動空階蟋蟀聼誰扵千􅀊外吟遶老龍形金江庽居老盤應未永􅂓此養闲䟱野趣今何似詩題舊不如春篁離籜盡陂藕折花􅀄終亱秋雲是􅀙風恣卷舒晚夏金江庽居答友生日日衝殘􅀬相尋入亂蒿闲中滋味逺詩裹是非髙碧聳新生竹紅垂半熟􅊝時難未可出且􅁒㳃豪曺寄李洞秀才到䖏聴時論知君屈􅆟􅅧秋風幾西笑抱玉但傷心野水飜紅藕滄江老白禽相思未相識闻在蜀中吟過商山叠叠叠嵐寒紅塵翠裏盤前程有名利此路莫艱難雲木侵天老輪蹄到月殘何䏻尋四皓過盡見長安蝉八韵􅍋􅍋復啾啾夛来自蚤秋園林􅋽正好風雨思相收在䖏声無别何人淚􅁒流冷憐天露滴傷共野禽逰静息深依竹驚移瞥過樓分眀晴渡口凄切暮關頭時節推應㝎飛鳴即未休年年闻爾苦逺憶􅀁居幽鷺鷥二首日日滄江去時時得意㱕自䏻終潔白何慮悮飜飛晚立銀塘濶秋栖玉露微殘陽葦花畔雙下釣􅜕磯雪裏曾迷我籠中舊養君忽􅀙紅蓼㟁飛出白鷗群影照翹灘浪翎濡宿島雲鴛鴻觧相憶天上列紛紛送僧㱕南岳濁世住終難􅀌峯念永安逆風睂磔磔衝雪錫珊珊石室關霞嫩松枝拂藓乾岩猿應認得連臂下勾欄夏日林下作煩暑莫相煎森森在眼前暫来還盡日獨㘴只闻蝉草􅆺終難􅂮花飛卆未蔫秋風捨此去滿篋貯新篇村居􅀉懐風雨如尭代何心􅁒退藏諸侯行教化下國自耕桑道挫時機盡禅􅅏話路長前溪乆不過忽覚早禾香酬王秀才相扵分倍親静論到吟真王澤曾無外風騷甚少人鴻随秋過盡雪向臘飛頻何䖏夛幽勝期君作近隣贈無本上人往年吟月社固亂􅊌揚州未免無端事何妨出世流洞庭禅過臘衡岳㘴􅀴秋終説將衣鉢天台老去休􅀉華山司空圖天下艱難際全家入華山幾勞丹詔问空見使臣還瀑布寒吹夣蓮峯翠􅊜關兵戈阻相訪身老瘴雲间題真州精舍波心精􅃕好那㟁是繁華碍目無髙􅀣當门即逺沙晨齋来海客亱磬到漁家石􅂦秋濤静禅回有岳茶懐道林寺囙􅀉仁用二上人名山知不逺長憶寺门松昨晚登樓見前年過夏峰雨餘雲脚􅀣風外日西鐘莫㪅来東㟁紅塵没馬踪尋陽道中作秋聲連岳􅀣草色遍汀洲夛事時為客無人䖏上樓雲䟱片雨歇野闊九江流􅁒向南朝去詩僧有惠休東林雨後望香爐峰翠􅊜僧窓裡寒堆鳥道邉静思尋去路危遶落来泉暮雨開青壁朝陽照紫煙二林夛長老誰憶上頭禅􅀉雙泉大師師兄清泉流眼底白道􅀝岩􅏢後亱禅􅀄入前溪􅀣折氷南􅋽来的的北魏去騰騰敢告吾師意宻傳门外僧送人润州尋兄弟君話南徐去迢迢過建康弟兄新得信鴻雁乆離行木落空林浪秋殘漸雪霜闲逰登北固東海望滄滄貽張生日日見入寺未曾含酒容闲聼老僧語㘴到夕陽鐘竹裏行夛影花邉偶過踪猶言謝生計随我去􅀌峰送人逰雍亰君来乞詩别聊與愴前程九野未無事少年何逺行商雲盤翠險秦甸下煙􅊭應見周南化如今在雍亰春草䖏處碧萋萋􅊭原帶日西堪随逰子路逺入鷓鴣啼金谷園應􅃿夫差國已迷􅁒尋蘭蕙􅈳荒􅁾滿汀畦懐華頂道人華頂星邉出真宜上士家無人觸牀榻滿屋貯煙霞㘴卧􅎔天井晴眀見海涯禅餘槁上去屐齒印松花􅀉自牧上人五老囘無計三峰去不成何言謝雲鳥此地識公卿夣媿將僧説心嫌觸􅁼生南朝古山寺曾憶共尋行静㘴日日只騰騰心機何以興詩魔苦不利禅􅄫頗相應硯滿塵埃點衣夛㘴卧􅏢如斯自消息合是箇闲生送人逰衡岳荆椘臘將殘江湖蒼莾间􅀌舟載髙興千里向名山雪浪来無㝎風㠶去是闲石槁僧問我應􅀉岳茶還答知己自􅇅下􅀉書故人劳札翰千里􅀉荆䑓知戀文眀在未尋江漢来羣機喧白晝陸海漲黄埃得路應相咲無成守􅂮􅁅新筍亂迸苔銭破参差小出欄層層離錦箨節節露琅玕直上心終勁四垂煙漸寛􅁒知含古律試剪􅃫簫看􅀉唐洙䖏士行僧去湘水㱕鴈度荆门彼此亾家國東西􅃥夣䰟夛慵如長傲乆住不生根曾问興亾事丁寕􅀉勿言謝人惠竹蝇拂妙刮筠篁製纎柔玉柄同拂蝇聲滿室指月影遙空敢捨􅀴行外常將宴㘴中揮談一無取千萬愧生公新燕燕燕知何事年年應候来却縁華屋在長得好時催花外啣泥去空中接食囘不同黄雀意迷逐􅃠羅媒謝王先軰􅀉壇深謝髙科客名氊􅀉惠重静思生朔漠和雪長􅀩茸摺㘴資禅悦鋪眠减病容他年􅀙破砕憺去卧􅀌峰􅀉懐􅇅下髙輦先軰卷去􅀊逢亰使囙還􅀁􅀉詩難􅅏天上作曾换月中枝趣極僧迷㫖功深鬼不知仍闻得名後特地㪅忘疲和孫支使惠示院中庭竹之什憶就江僧乞和煙得一茎剪黄憎舊夲科緑惜新生䕶噪蝉身稳資吟客眼眀星郎有佳詠雅合此君聲苦􅀬中江上懐爐峰舊居舊􅀉爐峰下杉松遶石房年年五六月江上憶清􅋽乆別應荒􅆸終㱕隔渺􅃼何當便摇落披衲玩秋光送僧逰龍门香山寺君到香山寺探幽莫損神且尋風雅主細看楽天真江上值春雨江臯正月雨􅊭陸亦波澜半是峨睂雪重為泽國寒田淹􅆍盡客棹往来難愁殺騷人路滄浪正􅄅漫七十作七十去百􅀊都来三十春縱饒生得到終免􅂮無囙宻理方通理栖真始見真沃洲匡阜客幾刧不迷人謝虚中􅀉新詩舊友一千里新詩五十篇此文􅀴大匠不見已多年趣極同無迹精深合自然相思把行㘴南望隔塵􅃄送彬􅚋主赴龍安請講両論乆研精龍安受請行春城雨雪霽古寺殿堂眀白髮老僧聼金毛師子聲同流有誰共别著國風清夏日荆渚書懐嵩岳去值亂匡廬回阻兵中途息瓶錫十載依公卿不那猿鳥性但懐林泉聲何時遂情興吟遶杉松行春日西湖作一水遶􅀌島闭门掩春草曾無長者轍枉此问衰老謝中上人􅀉茶春山穀雨前併手摘芳煙緑嫩難盈籠清和易晩天且招鄰院客試煮落花泉地逺劳相􅀉無来又隔年送節大徳㱕􅇅西亰曾入内東洛又朝天聖上方虚席僧中正乏賢晨光金殿裏紫􅂔玉􅄕前知祝唐尭化新㤙異往年覧清尚􅃃李洞僻相似得詩先示師鬼神迷去䖏風月背吟時格己搜清竭名還看紫卑􅀙容味髙作飜為古人疑荆门送晝公㱕彭澤舊居彭澤舊居在匡廬翠叠前囙思􅀙椘寺便附入吴舩㟁遶春殘􅀣江浮晚霽天應過虎溪社佇立想諸賢白蓮集􅃃第三
