body:
  text: 廬岳僧齊己撰登祝融峰猿鳥不共到我来身􅁒浮四邉空碧落絶頂正清秋宇宙知何極華夷見細流壇西獨立乆白日轉神州􅀉貫休子羙曾吟䖏吾師􅂧去吟是何多勝地銷得二公心錦水流春濶峨睂叠雪深時逢蜀僧説㦯道近逰黔送唐禀正字㱕萍川霜􅂡芸阁吏乆掩白雲扉求謁元戎後還騎病馬㱕煙村蔬飲淡江驛雪泥肥知到中林日春風長涧薇􅀉懐江西栖公龍沙為别日廬阜得書年不見来香社相思遶白蓮江僧㱕海寺椘路接吴煙老病何堪説扶羸􅀉此篇山中喜得友生書柴门關􅀣石未省夣塵埃落日啼猿裏同人有信来自成為拙隐難以謝夛見説相思䖏前峰對古䑓謝人惠扇子及茶鎗旗封蜀茗圓潔製蛟綃好客分烹煑青蝇避動揺陸生誇妙法班女恨􅋽颷多謝崔居士相思􅀉寂寥􅀉監利司空學士詩家為政别清苦日闻新亂後無荒地㱕来盡逺人寛容民賦税憔悴吏精神何必河陽縣空傳􅊝李春答陳秀才萬事皆可了有詩门􅆟深古人難得志吾子苦􅅏心野叠􅋽雲朶苔重怪木陰他年立名字笑我老雙林逰橘洲春日上芳洲􅀴春蘭杜幽此時尋橘㟁昨日在城樓鷺立青楓杪沙沉白浪頭漁家好生計􅉉底繫扁舟􅀉武陵道友阮肇迷仙䖏禅门接紫霞不知尋鶴路幾里入􅊝花晚􅀣陰摇藓春潭影弄砂何當見招我乞與片生涯謝人惠薬五金元造化九錬更精新敢謂長生客將遺必􅂮人乆飡應换骨一服已通神終逐淮王去永抛浮世塵還族弟卷豈要私相許君詩自入神風騷何句出瀑布一聫新苦􅀂長如此名湏逺逐身闲齋舒復卷􅅏滯忽􅀴旬送周秀逰峽又向夔城去知難動旅䰟自非亡國客何慮㫁腸猿灔澦分髙􅌇瞿塘露􅂥痕眀年期此約􅊭稳到荆门荆门夏日􅀉洞山節公叠光摇翠木霊洞叠雲深五月􅀴行䖏千秋檜栢陰山形􅎔北渚僧格􅁇東林莫惜相招信余心是此心再􅀴􅃽山與諸長老亱話逺迹都如鴈南行又北囬老僧猶記得往􅀊已曾耒話遍名山境焼殘黑檪􅁅無囙伴師往㱕思在天台􅀉當陽張眀府玉泉神運寺寒罄徹琹堂有境霊如此為官興亦長吏愁清白甚民楽賦輸忘闻説巴山縣今来尚憶張逰三􅁴山白石路重重萦行势忽窮􅀌峰擎像阁萬木蔽星空世論随時變禅懐厯刼同良宵正冥目海日上牎紅庭際晚菊上主人九月將􅁒盡幽叢始綻芳都縁含正􅂔不是背重陽採去蜂聲逺尋来蝶路長王孫㱕未晚猶得泛金觴送趙長史㱕闽川荆门與闽越關戍隔三千風雪揚㠶去䑓隍栺海邉客情消旅大王化似尭年莫失春廽約江城穀雨前擬􅄞康絶交􅀉湘中貫微何䖏同􅄞􅂴吾徒道異諸本無文字学何往来書嶽寺逍遥夣侯门勉强居相知在􅀇契莫訝八行踈􅀉許州清古北来儒士說許下有吟僧白日身長倚清秋塔上層言雖依景得理要入無徴敢望夛相示孱㣲老不勝謝丁秀才見示賦卷五首新裁剪搜羅盡指㱕誰曾師古律君自負天機聖后求賢乆名公得雋稀乘秋好擕去直望九霄飛驚秋褰􅄕􅃪秋信晚傍竹聲㱕多故堪傷骨􅀌峰好拂衣梧桐凋緑盡菡蓞堕紅稀却恐吾形影嫌心與口違夏日雨中􅀉幕中知己北風吹夏雨和竹亞南軒豆枕欹􅋽冷蓮峰入夣魂窓多斜迸􅊜庭徧􅁀流痕清興知無限晴来示一言亱次湘隂風濤出洞庭㠶影入澄清何䖏驚鴻􅁸􅀌舟趂月行時難多􅀾地野阔絶春耕骨􅁏知存否林園近郡城􅀉唐禀正字䟱野還如舊何曾稱在城水邉無伴立天際有山横落日雲霞赤髙窓茟硯眀鮑昭夛􅀁得時憶􅀉湯生宿舒湖希上人房入寺先来此􅀴窓半在湖秋風新菡萏暮雨老菰蒲任聼浮生速䏻消默㘴無語来燈熖短嘒唳彂髙梧戊辰􅀊江南感懐忽忽動中私人间何􅀁之老過離亂世生在太􅊭時桃李春無主杉松寺有期曾吟子山賦何啻舊凌遲送林上人㱕永嘉舊居東越常懸思山门在永嘉秋光浮椘水㠶影背長沙城黑天台雨村眀海嶠霞時尋謝公跡春草有瑶花答友生山居􅀉示嘉遁有新吟囙僧􅀉竹林静思来鳥外闲味遶松陰兵㓂慿􅁜甚溪山幾許深休爲反招隐携取一相尋新秋霽後晚眺懐先公雨霽湘椘晚水􅋽天亦澄山中應觧夏渡口有行僧鳥列滄洲隊雲棑碧落層􅀌峰磬聲絶一點石龕燈池上感興􅀁向似無端風前冷凭阑旁人應闷見片水自闲看碧底紅鱗鬛澄邉白羽翰南山衆木葉飄著竹聲乾和曇域上人􅀉贈之什百病􅋩衰朽栖遅􅀾國中思量青壁寺行㘴赤松風道􅀉虗元合書傳往復空可憐禅月子香火國门束弔雙泉大師真塔塔聳層峰後碑鎸巨石新不知將一句分付與何人静㘴雲生衲空山月照真後徒逰禮者猶認指迷津暮冬送璘上人㱕華容故園雖不逺那免愴行思莾蒼􅊭湖路霏㣲過雪時全無山阻隔㦯有客相随得見交親後春風動栁絲秋亱􅃪業上人弹琹萬物都􅄫􅄫堪闻弹正聲人心盡如此天下自和􅊭湘水㵼秋碧古風吹太清往年廬岳奏今夕更分眀謝人惠丹薬别後闻飡餌相逢訝道情肌膚紅色透髭髪黑光生仚洞誰傳與松房自煉成常􅀩逺公惠亦覚骨毛􅁿荆门病中􅀉懐貫㣲上人我衰君亦老相憶更何言際泥安禅力難醫必􅂮根梅寒争雪彩日冷釀氷痕早晚東㱕去同尋入石门匡山逺大師常與諸賢逰石门洞玩錦綉谷答孔秀才早向文章裡䏻降少壮心不愁人不􅋢闲䖏自閒吟水國雲雷濶僧園竹􅀣􅅧無嫌我衰颯時此一相尋秋江両㟁山青映中流一棹聲逺無風浪動正向夕陽横島嶼蝉分宿沙洲客獨行浩然心自合何必濯吾纓舩窓􅀌舸凭幽窓清波逼面􅋽舉頭還有碍低眼即無妨瞥過沙禽翠斜分夕照光何時到山寺上阁看江鄊永亱永日還欹枕良宵亦曲肱神闲無萬慮壁冷有殘燈香影浮龕象瓶聲著井氷尋思到何䖏海上㫁崖僧中春愴懐􅀉二三知己眼暗心還白逢春强凭欄囙闻積雨亱却憶舊山寒竹撼煙叢滑花焼露朶乾故人相㑹䖏應話此衰殘自遣了然知是夣既覚更何求􅂮入􅀌峰去􅁅飛一燼休雲無空碧在天静月華流免有諸徒弟時来吊石頭送陳覇㱕闽􅋽風動行興含笑話􅎔途已得身名了全忘客道􅀌鄊程過百越㠶影遶重湖家在飛鳴外音書可􅀉無􅀉孫闢呈鄭谷郎中衡岳去都忘清吟戀省郎淹流才半月詶唱頗盈箱雪長松檉格茶添語話香囙論楽安子年少老篇章荆门送人自峨􅖭逰南岳峨􅖭来已逺衡岳去猶賖南浦懸㠶影西風亂荻花天涯遥夣澤山衆近長沙有興夛新作携將天府誇謝主人石筍西園罷宴逰東阁念林丘特减花邉峭来添竹裏幽憶過陽􅃋見曾記太湖求􅀙此頻吟遶㱕山意亦休􅀴安公寺大聖威霊地安公晏㘴蹤未知長􅄫黙不見乆􅀙容塔影髙羣木江聲壓暮鐘此逰幽勝後来夣亦應重秋夕􅀉諸姪毎到秋殘亱燈前憶故鄊園林紅橘柚窓户碧瀟湘離别身垂老艱難路去長弟兄應徤在兵火理耕桑謝炭正擁寒􅁅次何當惠寂寥且􅅏連亱向未敢滿爐燒必恐吞難盡唯愁撥易消豪家揑為獸紅迸錦首燋夏滿日偶作􅀉孫支使其年闰五月一百二十日􅋩􅆈幾不勝憶㱕滄海寺冷倚翠崕稜舊扇猶􅍾執新秋更欝蒸何當見􅋽月擁衲訪詩朋􅀉清溪道友山门摇落空霜霰滿杉松眀月行禅䖏青苔遶石重泉聲喧萬壑鐘韵遍千峰終去焚香老同師大士蹤謝重縁舊山水障子敢望重縁飾㣲茫洞壑春㘴看終未是㱕卧始應真已覚心中朽猶憐四面新不囙公子鍳零落幾成塵寺居鄰井雙梧上一蝉鳴隔墙依稀舊林日撩亂遶山堂難嘿吟風口終清飲露腸老僧加䕶物應任噪殘陽剃髪金刀闪冷光一剃一清􅋽未免随朝夕依前長雪霜夏林欹石膩春涧沐泉香向老凋踈盡寒天不出房謝髙輦先軰􅀉新唱和集敢謂神仚手多懐老比丘編聫来鹿野酬唱在龍樓洛浦精霊懾邙山鬼魅愁二南風雅道􅀙此化東周送徐秀才逰吴國西江東注急􅀌棹􅀂流星風浪相随白雲中獨過青他時誰共説此路我曾􅀴好向吴朝看衣冠盡漢庭憶在匡廬日憶在匡廬日秋風八月時松聲虎溪寺塔影鴈门師歩碧葳􅅋􅈳吟香菡蓞池何當舊泉石㱕去洗心脾􅀉三覚寺􅀙益上人又云三覚山山下人来説夛時不下山是應終未是闲得且湏闲海面雲㱕竇猿邉月上關尋思亂峰頂空送衲僧還殘秋感愴日日加衰病心心趣寂寥殘陽􅁸闲望萬木聳寒條椘寺新為客吴江舊看潮此懐何以􅀉風雨暮蕭蕭􅀉南徐劉員外二首竟􅁜兵革際㱕復舊園林早􅀊為官苦常闻説此心海邉山亱上城寺秋尋應訝松風約蹉跎直到今晝公評衆製姚監選諸文風雅誰收我編聫獨有君餘生終此道萬事盡浮雲争得重携手探幽椘水濆貽王秀才功到難搜䖏知難始是詩自䏻探虎子何慮屈男􅅜此道真清􅂔前賢早白髭湏教至公手不惜付丹枝贈孫生詩家詩自别君是􅁇詩人道出千途外功争一字新寂寥中影跡霜雪裏精神待折東堂桂㱕来更苦辛酬元員外清洛碧嵩根寒流白照门園林􅀴難别桃李幾株存衰老江南日凄凉海上村闲来晒朱紱涙滴舊煙蘿與楊秀才話別􅁃信哀何極仲宣悲苦夛囙思学文賦不勝弄干戈自古有如此扵今終􅀂何到頭重策蹇㱕去舊􅃄蘿􅀉何崇丘員外门底桃源水􅉼空復映山髙吟煙雨霽殘日郡樓间变俗真無事分題是不闲尋思章㟁見全未有年顔贈劉五􅀴往年長白山彂憤忍飢寒掃葉雪霜􅊜讀書唇歯乾羣􅀴通講觧八十尚􅁿安今日江南寺相逢話世難送逰山道者我亦逰山者常􅀴􅃇􅀁􅀴雪消天外碧春曉海中青可見亂離世况臨衰病形憐君此行興獨入白雲屏舟中江上望玉梁山懐李尊師殘照玉梁巔哦峨逺棹前古来傳勝異人去学神仚白鹿老碧壑黄猿啼紫煙誰心共無事局上度流年角闻説征人説嗚烏何䖏邉􅀌城沙塞地殘月雪霜天㑹轉吴風急吹長磧雁連應傷漢車􅀐名未勒燕然言詩畢竟将何状根元在正思達人皆一貫迷者自夛岐觸􅀋風騷逺懐賢肺腑衰河橋送別者二子好相知酬王秀才離亂幾時休儒生厄逺逰亾家非漢代何䖏覔荆求旅夣寒燈屋鄊懐晝雨樓相逢話相殺誰復念風流春居􅀉友生莎􅏙荒蕪甚名應共此情江村雷雨彂竹屋夣䰟驚社過夛来燕花繁漸老鶯相思意何􅋀新作未曾評􅀉答武林幕中何支使二首十萬雄軍幕三千上客才何當談笑外逺慰寂寥来騷雅鏘金擲風流酔玉頺争知江雪寺老病向寒􅁅南州無百􅀾北地有長征间殺何􅀙亊傷㢤蘇子卿江樓聫雪句野寺看春耕门外滄浪水風波雜雨聲浙江晚渡去年曾到此乆立滯前程歧路時難䖏風濤晚未􅊭汀蝉含老韵㟁荻簇枯聲莫泥關河险夛逰自逺行送人下第東㱕再謁􅃇主人一􅀾偶不捷東㱕計未空還携故書劔去謁舊英雄椘雪連吴􅀣西江正北風男􅅜藝若是㑹合值眀公􅀉謝髙先軰見􅀉二首穿鑿堪傷骨風騷乆痛心永言無絶唱忽此惠希音楊栁江湖晚芙蓉㠀嶼􅅧何囙㑹僊手臨水一披􅁭詩在混􅃼水難搜到極􅀇有時還積思度􅀊未終篇片
