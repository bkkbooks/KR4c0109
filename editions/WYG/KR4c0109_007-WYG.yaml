body:
  text: 題東林十八賢真堂白藕花前舊影堂劉雷風骨畫龍章共輕天子諸侯貴同愛吾師一法長陶令醉多招不得謝公心亂入無方何人到此思髙躅嵐㸃苔痕滿粉墻謝靈運欲入社逺大師以其心亂不納題南岳般若寺諸峯翠少中峰翠五寺名髙此寺名石路險盤嵐靄滑僧牕髙倚泬寥眀凌空殿閣由天設遍地杉松是自生更有上方難上處紫苔紅蘚遶崢嶸寄廬岳僧一聞飛錫别區中深入西南瀑布峯天際雪埋千片石洞門氷折幾株松烟霞明媚栖心地苔蘚縈紆出世蹤莫問江邊舊居寺火燒兵刼斷秋鐘逰谷山寺城裏尋常見碧稜水邊朝暮送歸僧數峯雲脚垂平地一徑松聲徹上層寒澗不生浮世物隂崖猶積去年氷此身有底難抛事時復携笻信步登楚寺寒夜作寒爐局促坐成勞暗淡燈光照二毛水寺閉來僧寂寂雪風吹去鴈嗷嗷江山積疊歸程逺魂夢穿沿過處髙畢竟忘言是吾道袈裟不稱揖蕭曹送太禪師歸南岳石龕閑鏁白猿邊歸去程途半在船林簇曉霜離水寺路穿新燒入山泉已尋嵐壁臨空盡却看星辰向地懸有興寄題紅葉上不妨収拾别為編山中寄凝宻大師兄弟一爐薪盡室空然萬象何妨在眼前時有興來還覔句已無心去即安禪山門影落秋風樹水國光凝夕照天借問荀家兄弟内八龍頭角讓誰先海棠花繁於桃李盛於梅寒食旬前社後開半月暄和留艶態兩時風雨免傷摧人憐格異詩重賦蜨戀香多夜更來猶得殘紅向春暮牡丹相繼發池臺題贈湘西龍安寺利禪師頭白已無行脚念自開荒寺住煙蘿門前路到瀟湘盡石上雲歸岳麓多南祖衣盂曾禮謁東林泉月舊經過閑來松外看城郭一片紅塵隔逝波寄文浩百法間欲擁毳參禪當時六祖在黄梅五百人中眼獨開入室偈聞傳絶唱昇堂客謾恃多才鐵牛無用成真角石女能生是聖胎聞説欲抛經論去莫教惆悵却空迴謝人寄新詩集所聞新事即戈矛欲去終疑是暗投逺客寄言還有在此門將謂惣無休千篇著述誠難得一字知音不易求時入思量向何處月圓孤凭水邊樓謝元願上人逺寄檀溪集白首蕭條居漢浦清吟編集號檀溪有人収拾應如玉無主知音只似泥入理半同黄葉句遣懐多擬碧雲題猶能為我相思在千里封來夢澤西寄道林寺諸友吟興終依異境長舊逰時入靜思量江聲裏過東西寺樹影中行上下方春色濕僧巾屨膩松花沾鶴骨毛香老來何計重歸去千里重湖浪渺茫贈智滿三藏灌頂清涼一滴通大毘盧藏遍虚空欲飛薝蔔花無盡須待陁羅尼有功金杵力摧魔界黑水精光透夜燈紅可堪東獻眀天子命服新酬贊國風謝王先輩湘中迴恵示巻軸少小即懐風雅情獨能遺象琢淳精不教霜雪侵𤣥鬢便向雲霄換好名携去湘江聞鼓瑟袖來緱嶺伴吹笙多君百首貽衰颯留把吟行訪竺卿荆渚寄懐西蜀無染大師兄大溈心付白崖前寶月分輝照蜀天聖主降情延北内諸侯稽首問南禪清秋不動驪龍海紅日無私罔象川欲聴吾宗舊山説地邊身老楚江邊謝武陵徐巡官逺寄五七字詩集五字才將七字争為君聊敢試懸衡鼎湖菡萏揺金影蓬島鸞凰舞翠聲還是靈龜巢得稳要須仙子駕方行兩編珍重遥相惠何夕燈前盡此情重宿舊房與愚上人靜話曾此栖心過十冬今來瀟灑屬生公檀欒舊植青添翠菡萏新栽白換紅北面城臨燈影合西隣壁近講聲通不知門下趨筵士何似當時石解空謝南平王賜山鷄五色文章類彩鸞楚人羅得半摧殘金籠莫恨傷冠幘玉粒須慙剪羽翰孤立影危丹檻裏雙栖伴在白雲端上台愛育通幽細却放溪山去不難荆門病中雨後書懐寄幕中知已病根翻作憶山勞一雨聊堪浣鬱陶心白未能忘水月眼青猶得見秋毫蟬聲晚簇枝枝急雲影晴分片片髙還憶赤松兄弟否别來應見鶴衣毛宿江寺島僧留宿慰衰顔舊住何妨老未還身共錫聲離鳥外跡同雲影過人間曾無夢入朝天路憶有詩題隔海山珍重來晨渡江去九華青裏扣松闗謝貫微上人寄示古風今體四軸四軸騷詞書八行捧吟肌骨遍清涼謾求龍樹能醫眼休問圗澄學洗腸今體盡捜初剖判古風淳鑿未𤣥黄不知誰肯降文陣闇㸃旌旗敵子房荆州貫休大師舊房疎篁抽笋栁垂隂舊是休公種境吟入貢文儒來請益出官卿相駐過尋右軍書畫神傳髓康樂文章夢授心銷得青城千嶂下白蓮標塔帝恩深寄谷山長老逰遍名山祖遍尋却來塵世渾光隂肯將的的吾師意擬付茫茫弟子心豈有虚空遮道眼不妨文字問知音滄浪萬頃三更月天上何如水底深寄黄暉處士蒙氏藝傳黄氏子獨聞相繼得名髙鋒鋩妙奪金雞距纖利精分玉兎毫濡染只應親賦咏風流不稱近弓刀何妨寄我臨池興忍使江淹役夢勞荆門勉懐寄道林寺諸友榮枯得䘮理昭然誰效離騷更問天生下便知真夢幻老來何必歎流年清風不變詩應在明月無蹤道可傳珍重匡廬沃洲主拂衣抛却好林泉答崔挍書雪色衫衣絶㸃塵明知富貴是浮雲不隨喧滑迷真性何用潺湲洗汚聞北闕㑹抛紅駊騀東林社憶白氛氲清吟有興頻相示欲答多慙蠧蝕文乞櫻桃去年曾賦此花詩幾聴南園爛熟時嚼破紅香堪換骨摘􅋊丹顆欲燒枝流鶯偷啄心應醉行客潛窺眼亦癡聞説張筵就珠樹任從攀折半離披寄南雅上人曾得音書慰暮年相思多故信難傳清吟何處題紅葉舊社空懐墮白蓮山水本同真趣向侯門剛有薄因緣他時不得君招隠㑹逐南歸楚客船寄歐陽侍郎時在嘉川饋遣又聞繁惣在嘉州職重身閑倚寺樓大象影和山面落兩江聲合郡前流棊輕國手知難敵詩是天才肯易酬畢竟男兒自髙達從來心不是悠悠與崔挍書靜話言懐同年生在咸通裏事佛為儒趣盡髙我性已甘披祖衲君心猶待脱藍袍霜髭曉幾臨銅鏡雪髩寒疎落剃刀出世朝天俱未得不妨還往有風騷謝人恵拄杖卭州靈境産修篁九節材應表九陽造化已能分尺度保持爭合與尋常幽林剪破清秋影髙手携來緑玉光深謝魯儒憐潦倒欲教撐拄遶禪床謝秦府推官寄丹臺集秦王手筆序丹臺不錯褒揚最上才鳳闕幾傳為匠石龍門曾用振風雷錢郎未竭精華去元白終存作者來兩軸蚌胎驪頷耀枉臨禪室伴寒灰題畫鷺鷥兼簡孫郎中曾向滄江看不真却因圗畫見精神何妨金粉資髙格不用丹青㸃此身蒲葉岸長堪映帶荻花叢晚好相親思量畫得勝籠得野性由来不戀人賀行軍太傅得白氏東林集樂天歌詠有遺編留在東林伴白蓮百氏典墳隨䘮亂一家風雅獨完全常聞荆渚通侯論果遂吳都使者傳仰賀斯文歸朗鑒永資聲政入薰絃韶陽㣲公曲江晴影石千株吾子思歸夢斷初有信北来山疊疊無言南去雨疎疎祖師門接園林路丞相家同井邑居閒野老身留得否相招多是秀才書將之匡岳過潯陽帆過潯陽晚霽開西風北鴈似相催大孤浪後青堆没五老雲中翠疊来此路便堪歸水石何門更合向塵埃逺公林下蓮池畔箇箇髙人盡有才寄湘幕王重書記抛擲浟江舊釣磯日參籌畫廢吟詩可能有事闗心後得似無人識面時官好近聞加茜服藥靈曾説換霜髭髙才直氣平生志除却徒知即不知宿沈彬進士書院相期只為話篇章踏雪曾来宿此房喧滑盡消城漏滴窓扉初掩岳茶香舊山春暖生薇蕨大國塵昬懼殺傷應有太平時節在寒宵未卧共思量靜院花院相重㸃破苔誰心肯此話心灰好風時傍疎篁起幽鳥晚從何處來筆硯興狂師沈謝香燈魂斷憶宗雷浮生已問空王了箭急光隂一任催送白處士逰峨嵋閒身誰道是羈逰西指峨嵋碧頂頭琴鶴幾程隨客棹風霜何處宿龍湫尋僧石磴臨天井斸藥秋崖倒瀑流莫為寰瀛多事在客星相逐不迴休寄顧蟾處士好於山水久聞為客過蒼梧休説携家歸鏡湖山水顛狂應盡在鬚毛凋落免貧無和僧搶入雲中峭帶鶴驅成澗底孤春醉醒來有餘興因人乞與武陵圗懐金陵知舊海門相别住荆門六度秋光兩鬢根萬象到心難盖口一生無事可傷魂石頭城外青山疊北固窓前白浪翻盡是共逰題板處有誰惆悵拂苔痕喜得自牧上人書吳都使者泛驚濤靈一傳書慰毳袍别興偶隨雲水逺知音本自國風髙身依閑淡中消日髪向清涼處落刀聞著括囊新集了擬教誰與序離騷驚秋曉窓驚覺向秋風萬里心凝淡蕩中池影碎翻紅菡萏井聲乾落緑梧桐破除閑事渾歸道銷耗勞生旋逐空妖殺九原狐兎意豈知丘隴是英雄聞沈彬赴吳都請辟長訝髙眠得穏無果隨徵辟起江湖鴛鴦已列罇罍貴鷗鶴休懐釣渚孤白首不妨扶漢祚清才何讓賦吳都可能更憶相尋夜雪滿諸峯火一爐寄江夏仁公寺閣髙連黄鶴樓簷前檻底大江流幾因秋霽澄空外獨為詩情到上頭白日有餘閑送客紫衣何啻貴封侯别來多少新吟也不寄南宗老比丘中春林下偶作淨境無人可共携閑眠未起日光低浮生莫把還丹續萬事須將至理齊花在月明蝴蝶夢雨餘山緑杜鵑啼何能向外求攀折巖桂枝條拂石梯送劉秀才歸桑水寧覲歸和初喜戢戈矛乍捧鄉書感去留鴈序分飛離漢口鴒原騫翥在鼇頭家隣紫塞仍千里路過黄河更幾州應到髙堂問安後却携文入帝京逰寄曹松舊制新題削復刋工夫過甚琢琅玕藥中求見黄芽易詩裏思聞白雪難扣寂頗同心在定鑿空何止髪衝冠夜來月苦懐髙論數樹霜邊獨傍欄酬蜀國歐陽學士因緣劉表駐經行又聴西風墮葉聲鶴髪不堪言此世峨嵋空約在他生已從禪祖參真性敢向詩家認好名深愧故人憐潦倒每傳仙語下南荆寄荆慕孫郎中珠履風流憶富春三千鵷鷺讓精神詩工鑿破清求妙道論研通白見真四坐共推操檄健一家誰信買書貧别來鄉國魂應斷劍閣東西盡戰塵謝王詹事垂訪鳥外孤峯未得歸人間觸類是無機方悲鹿軫栖江寺忽訝軺車降竹扉王澤乍聞譚涣汗國風那得話𤣥㣲應驚老病炎天裏枯骨肩横一衲衣題南平後園牡丹暖披煙艶照西園翠幄朱欄護列仙玉帳笙歌留盡日瑶臺伴侣待歸天香多覺受風光剰紅重知含雨露偏上客分眀記開處眀年開更勝今年和李書記繁極全分青帝功開時獨占上春風吳姬舞雪非真艶漢后題詩是怨紅逺蜨戀香抛别苑野鸎銜得出深宫君看萬態當筵處羞殺薔薇㸃碎叢謝孫郎中寄示一念禪餘味國風早因持論偶名公久傷琴䘮人亡後忽有雲和雪唱同鎚琢靜聞罤象外是非閒見寂寥中時來日往緣真趣不覺秋江度塞鴻愛吟正堪凝思掩禪扃又被詩魔惱竺卿偶凭窓扉從落照不眠風雪到殘更皎然未必迷前習支遁寧非悟後生傳寫㑹逢精鑒者也應知是咏閒情寄懐東林寺匡白監寺南岳别来無後約東林歸住有前縁閑捜好句題紅葉靜斂霜眉對白蓮鴈塔影分疎檜月虎溪聲合幾峰泉修心若似伊耶舍傳記須添十九賢謝人恵十色花牋并棊子陵州棊子浣花牋深愧携來自錦川海蚌琢成星落落吳綾隠出鴈翩翩留防桂苑題詩客惜寄桃源敵手仙捧受不堪思出處七千餘里劍門前夏日寓居寄友人北逰兵阻復南還因寄荆州病掩闗日月坐銷江上寺清涼魂斷剡中山披緇影跡堪藏拙出世身心合向閒多謝扶風大君子相思時到寂寥間中秋十四日夜對月上南平主人今宵前夕皆堪玩何必圎時始竭才空説輪中有天子不知何處有樓臺終憂眀夜雲遮却且埽閒居坐看來玉兎銀蟾似多意乍臨棠樹影徘徊謝人恵十才子圗丹青妙寫十才人玉峭氷稜姑射神醉舞離披真鸑鷟狂吟崩倒瑞麒麟飜騰造化山曾竭採掇珠璣海幾貧猶得知音與圗畫草堂閑挂似相親荆門病中寄懐鄉人歐陽侍郎彬誰㑹荆州一老夫夢勞神役憶匡廬碧雲鴈影紛紛去黄葉蟬聲漸漸無口淡莫分飡氣味身羸但覺病肌膚可憐饌玉燒蘭者肯慰寒偎雪夜爐送譚三藏入京阿闍棃與佛身同灌頂難施利濟功持咒力須資運祚度人心要似虚空東周路踏紅塵裏北極門瞻紫氣中好進梵文霑帝澤却歸天䇿繼真風三藏住楚國天䇿寺寄酬秦府髙推官輦天台衡嶽舊曾尋閑憶留題白石林嵗月已殘衰颯鬢風騷猶壯寂寥心緱山碧樹遮藏宻丹穴紅霞掩映深爭得相逢一携手拂衣同去聴𤣥音叙懐寄髙推官捜新編舊與誰平自向無聲認有聲已覺愛來多廢道可堪傳去更沽名風松韻裏㤀形坐霜月光中共影行還勝御溝寒夜水狂吟衝尹甚傷情送朱侍御自洛陽歸閬州寧覲尋常西望故園時幾處魂隨落照飛客路舊縈秦甸出鄉程今遶漢陽歸已過巫峽沉青靄忽認峨嵋在翠㣲從此倚門休望斷交親喜換老萊衣貽恵暹上人經論功餘更業詩又於難裏縱天機吳朝客見投文去楚國僧迎著紫歸已得聲名先振俗不妨風雪更探㣲金陵髙憶恩門在終挂雲帆重一飛酬西蜀廣濟大師見寄猶得吾師繼頌聲百篇相愛寄南荆巻開錦水霞光爛吟入峨嵋雪氣清楚外已甘推絶唱蜀中誰敢共懸衡應懐無可同無本終向風騷作弟兄江寺春殘寄幕中知已二首誰遣西來負岳雲自由歸去竟何因山龕薜荔應殘雪江寺玫瑰又度春早嵗便師無學士臨年却作有為人何妨夜醼時相憶佯醉佯狂笑老身社蓮慚與幕蓮同岳寺蕭條儉府雄冷淡獨開香火裏殷妍行列綺羅中秋加玉露何傷白夜醉金缸不䢷紅閑憶遺民此心地一般無染喻真空寄玉泉寶仁上人往嵗曾尋聖跡時樹邊三遶禮吾師敢望護法將軍記且喜焚香弟子知後㑹未期心的的前峯欲下步遲遲今來老劣難行甚空寂無緣但寄詩荆渚感懐寄僧達禪弟三首電擊流年七十三齒衰氣沮竟何堪誰云有句傳天下自媿無心繼嶺南曉潄氣嫌通市井晚烹香憶落雲潭隣峯道者應彈指蘚剝藤纒舊石龕十五年前㑹虎溪白蓮齊後便來西干戈時變信雖絶吳楚路長魂不迷黄葉喻曾同我悟碧雲情近與誰携春殘相憶荆江岸一隻杜鵑頭上啼鶴嶺僧來細話君依前髙尚跡難羣自抛南岳三生石長傍西山數片雲丹訪葛洪無舊竈詩尋靈觀有遺文莫將離别為相隔心似虛空幾處分寄孫魴秀才郡樓東面寺墻西顔子生涯竹屋低書案飛颺風落絮地苔狼籍燕銜泥吟窓晚凭春篁宻行徑斜穿夏菜齊别後相思頻夢到二年同此賦閑題送李評事往宜春蘭舟西去是通津名郡賢侯下禮頻山遍寺樓看仰岫臺連城閣上宜春鴻心夜過鄉心亂雪韻朝飛句韻新别有官榮身外趣月江松徑訪禪人中春感興春風日日雨時時寒力潛從暖勢衰一氣不言含有象萬靈何處謝無私詩通物理行堪掇道合天機坐可窺應是正人持造化盡驅幽細入罏鎚早鸎何處經年絶好音暖風催出囀喬林羽毛新刷陶潛菊喉舌初調叔夜琴藏雨並栖紅杏密避人雙入綠楊深曉來枝上千般語應共桃花説舊心酬尚顔上人紫綬蒼髭百嵗侵綠苔芳草遶堦深不妨好鳥喧髙卧切忌閑人聒正吟魯鼎寂寥休辨口刼灰銷變莫宣心還憐我有㝠捜癖時把新詩過竹尋寄倪曙郎中風雨㝠㝠春闇移紅殘綠滿海棠枝帝鄉久别江鄉住椿笋何如櫻笋時海内擅名君作賦林間外學我為詩近聞南國升南省應笑無機老病師白蓮集巻七欽定四庫全書白蓮集巻八唐釋齊已撰
