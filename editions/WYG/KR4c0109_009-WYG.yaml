body:
  text: 春寄尚顔含桃花謝杏花開杜宇新啼燕子来好事可能無分得名山長似有人催簷聲未斷前旬雨電影還連後夜雷心跡共師爭幾許俗人嫌處自遲迴寄梁先輩慈恩塔下曲江邊别後多應夢到仙時去與誰論此事亂來何處覔同年陳琳筆硯甘前席甪里煙霞待共眠愛惜麻衣好顔色未敎朱紫汚天然荆渚偶作無味吟詩即把經竟將踈野訪誰行身依江寺庭無樹山遶天涯路有兵竹瓦雨聲漂永日紙窓燈焰照􅋊更從容一覺清凉夢歸到龍潭掃石枰城中晩夏思山葛衣霑汗功雖健紙扇揺風力甚卑苦熱恨無行脚處㣲凉喜到立秋時竹軒靜看蜘蛛掛莎徑閑聴蟋蟀移天外有山歸即是豈同逰子暮何之憶舊山誰請衰羸住北州七年魂斷舊山丘心清檻底瀟湘月骨冷禪中太華秋髙節未聞馴虎豹片言何以傲王侯應須脱灑孤峯去始是分明箇剃頭寄體休南州君去為尋醫病色應除似舊時久别莫忘廬阜約却來須有洞庭詩金陵往嵗同窺井峴首前秋共讀碑兩處山河見興廢相思更切卧雲期過陸鴻漸舊居陸生自有傳於井石又云行坐誦佛書故有此句楚客西來過舊居讀碑尋傳見終初佯狂未必輕儒業髙尚何妨誦佛書種竹岸香連菡蓞煮茶泉影落蟾蜍如今若更生來此知有何人贈白驢時太守贈白驢寄懐鍾陵舊逰因寄知已洪井僧來説舊逰西江東岸是城樓昔年淹跡因王化長日凭欄看水流真觀上人栖樹石陳陶處士在林丘終拖老病重尋去得到匡廬死便休遣懐病腸休洗老休醫七十能饒百嵗期不死任還蓬島客無生自有雪山師浮雲聚散堪闗慮眀月相逢好展睂既兆未萌閑酌度不如中抱自尋思懐武陵因寄幕中韓先輩何從事武陵嘉致跡多幽每見圗經恨白頭溪浪碧通何處去桃花紅過郡前流常聞相幕鴛鴻興日向神仙洞府逰鑿井耕田人在否如今天子正徵捜贈樊處士小子聲名天下知滿簪霜雪白麻衣誰將一着爭先後共向長安定是非有路未曾迷日用無貪終不亂天機閑尋道士過仙觀賭得黄庭兩巻歸荆渚逢禪友澤國相逢話一宵雲山偶别隔前朝社思匡岳無宗炳詩憶揚州有鮑昭晨野黍離春漠漠水天星粲夜遥遥閑吟莫忘傳心祖曾立堦前雪到􅆎送僧歸洛中赤日彤霞照晚坡東州道路興如何蟬離楚栁鳴猶少葉到嵩雲落漸多海内自為閑去住闗頭誰問舊經過丁寧與訪春山寺白樂天真在也麽道林寓居秋泉一片樹干株暮汲寒燒外有餘青嶂者邊來已熟紅塵那畔去應踈風騷未肯忘雕琢瀟洒無妨更剃除即問沃洲開士僻愛禽憐駿意何如仙掌峭形寒倚夕陽天毛女蓮花翠影連雲外自為髙出手人間誰合鬭揮拳鶴抛青漢來巖檜僧隔黄河望頂煙晴露紅霞長滿掌只應栖託是神仙中秋月空碧無雲露濕衣羣星光外湧清規東樓莫礙漸髙影四海待看當午時還許分明吟皓魄肯教幽暗取丹枝可憐半夜嬋娟影正對五侯殘酒池送禪者逰南嶽忽隨南棹去衡陽誰住江邊樹下房塵夢是非都覺了野雲心地更何妨漸臨瀑布聴猿思却背岣嶁看鴈行想到中峯上層寺石窓秋霽見瀟湘聞道林諸友嘗茶因有寄槍棋冉冉綠叢圎榖雨初晴呌杜鵑摘帶嶽華蒸曉露碾和松粉煮春泉髙人夢惜藏巖裏白硾封題寄火前應念苦吟耽睡起不堪無過夕陽天將歸舊山留别錯公舊峯前昨下來時白石叢叢間紫薇章句不堪歌有道溪山只合退無機雲含暖態晴猶在鶴養閑神晝不飛欲去更思過丈室二年頻此揖清暉聞尚顔上人剏居有寄麓山南面橘洲西别搆新齋與竹齊野客已聞將鶴贈江僧未説有詩題窓臨杳靄寒千嶂枕遍潺湲月一溪可想乍移禪榻處松隂冷濕壁新泥庚午嵗九日作門底秋苔嫩似藍此中消息興何堪亂離偷過九月九頭尾算來三十三雲影半晴開夢澤菊花㣲暖傍江潭故人今日在不在胡鴈背風飛向南逢進士沈彬欲話趨時首重搔因君倍惜剃頭刀千般貴在能過達一片心閑不那髙山疊好雲藏玉鳥海翻狂浪隔金鼇時應記得長安事曾向文塲屬思勞聞王員外新恩有寄欲退無因貴逼來少儀官美右丞才青袍早許淹花幕霜簡方聞謝栢臺金諾靜宜資講誦玊山寒稱奉罇罍西峯有客思相賀門隔瀟湘雪未開秋夕言懐寄所知休問蒙莊材不材孤燈影共傍寒灰忘筌話道心甘死候體論詩口懶開窓外風濤連建業夢中雲木憶天台相踈却是相知分誰訝經年一度來答禪者五老峯前相遇時兩無言語只揚眉南宗北祖皆如此天上人間更問誰山衲靜披雲片片鐵刀凉削鬢絲絲閑吟莫學湯從事抛却袈裟負本師寄尚顔公受徐州薛尚書見知莫向孤峯道息機有人偷眼羨吾師滿身光化年前寵幾軸開平嵗裏詩北闕故人隨䘮亂南山舊寺在參差清吟但憶徐方政應恨當時不見時梓栗杖送人禪家何物贈分襟只有天台杖一尋拄去客歸青洛逺採來僧入白雲深逰山曾把探龍穴出世期將指佛心此日江邊贈君後却携笻竹向東林寄朗陵二禪友瀟湘曾宿話詩評荆楚連秋阻野情金錫罷逰雙鬢白鐵盂終守一齋清篇章老欲齊髙手風月閑思到極精南望山門石何處滄浪雲夢浸天横燈幽光耿耿草堂空窓隔飛蛾恨不通紅燼自凝清夜朶赤心長謝碧紗籠雲藏水國城臺裏雨閉松門殿塔中金屋玉堂開照睡豈知螢雪有深功寄金陵幕中李郎中龍門支派富才能年少飛翔便大鵬久侍罇罍臨鐵瓮又從􅓚節鎮金陵精神一隻秋空鶴騷雅千尋夏井氷長憶相招宿華館數宵忘寢盡寒燈寄韓蜕秀才松門髙不似侯門蘚逕鞋蹤觸處分逺事即為無害鳥多閑便是有情雲那憂寵辱來驚我且寄風騷去敵君知伴李膺琴酒外絳紗閑巻共論文湘中春興雨歇江明苑樹乾物妍時泰恣逰盤更無輕翠勝楊柳盡覺濃華在牡丹終日去還抛寂寞遶池迴却凭欄干紅芳片片由青帝忍向西園看落殘送錯公栖公南逰洪偃湯休道不殊髙帆共載興何俱北京䘮亂離丹鳳南國煙花入鷓鴣明月團圎臨桂水白雲重疊起蒼梧威儀本是朝天士暫向遼荒住得無寄南岳諸道友南望衡陽積瘴開去年曾踏雪逰迴謾為楚客蹉跎過却是邊鴻的當來乳竇孤眀含海日石橋危滑長春苔終尋十八髙人去共坐蒼崖養聖胎送韓蜕秀才赴舉槐花館驛暮塵昏此去分眀吏部孫才器合居科第首風流幸是縉紳門春和洛水清無浪雪洗髙峯碧斷根堪想都人齊指㸃列仙相次上崑崙溪居寓言秋蔬數壠傍潺湲頗覺生涯異俗緣詩興難窮花草外野情何恨水雲邊蟲聲遶屋無人語月影當松有鶴眠寄向東溪老樵道莫摧丹桂博青錢遣懐詩病相兼老病深世醫徒更費千金餘生豈必虚抛擲未死何妨樂咏吟流水不迴休歎息白雲無跡莫追尋閑身自有閑消處黄葉清風蟬一林自湘中將入蜀留别諸友巾舄初隨入蜀船風帆吼過洞庭煙七千里路到何處十二峯雲更那邊巫女暮歸林淅瀝巴猿吟斷月嬋娟来年五月峨嵋雪坐看消融滿錦川寄匡阜諸公二首松頭栢頂碧森森虚檻寒吹夏景深靜社可追長往跡白蓮難問久修心山圍四面纔容寺月到中宵始滿林爭學忘言住幽勝吾師遺集盡清吟峯前林下東西寺地角天涯來往僧泉月淨流閑世界杉松深鏁晝香燈爭無大士重修社合有諸賢更服膺曾寄隣房掛缾錫雨聞巖溜解春氷送人入蜀何必閑吟蜀道難知君心出嶮巇間尋常秋泛江陵去容易春浮錦水還兩面碧懸神女峡幾重青出丈人山文君酒市逢初雪滿貰新沽洗旅顔酬廬山張處士髪枯身老任浮沉懶泥秋風更役吟新事向人堪結舌舊詩開巻但傷心苔床卧憶泉聲遶麻履行思樹影深終謝柴桑與彭澤醉逰閑訪入東林寄峴山道人鳳門髙對鹿門青往嵗經過恨未平辯鼎上人方話道卧龍丞相忽追兵爐峯已負重迴計華岳終懸未去情聞説東周天子聖㑹揺金錫却西行送王處士逰蜀又掛寒帆向錦川木蘭舟裏過殘年自修姹姹爐中物擬作飄飄水上仙三峡浪喧明月夜萬州山到夕陽天來年的有荆南信迴札應緘十色牋懐金陵李推官僧自牧秣陵長憶共吟逰儒釋風騷盡上流蓮幕少年輕謝眺雪山真子鄙湯休也應有作懐清苦莫謂無心過白頭欲附别來千萬意病身初起向殘秋寄尋萍公聞在湓城多寄住隨時談笑渾塵埃孤峯忽憶便歸去浮世要看還下來萬頃野煙春雨斷九條寒浪晚窓開虎溪橋上龍潭寺曾此相尋踏雪迴得李推官近寄懐荆門前嵗使乎迴求得星郎近制來連日借吟終不已一燈㤀寢又重開秋風漫作牽情賦春草真為入夢才堪笑陳宫諸狎客當時空有箇追陪對菊蝶醉蜂狂半拆時冷煙清露壓離披欲傾琥珀盃浮爾好把茱萸朶配伊孔雀毛衣應者是鳳凰金翠更無之何因栽向僧園裏門外重陽過不知憶東林因送二生歸好向東林度此生半天山脚寺門平紅霞嶂底潺潺色清夜房前瑟瑟聲偶别十年成瞬息欲來千里阻刀兵可憐二子同歸興南國煙花路好行渚宫西城池上居城東移錫住城西緑遶春波引杖藜翡翠滿身衣有異鷺鶿通體格非低風揺栁眼開煙小暖逼蘭芽出土齊猶有幽深不相似剡溪乗棹入耶溪中秋夕愴懐寄荆幕孫郎中白蓮香散沼痕乾緑篠隂濃蘚地寒年老寄居思隐切夜凉留客話時難行僧盡去雲山逺賔鴈同來澤國寛時謝孔璋操檄外每將空病問衰殘酬湘幕徐員外見寄東海儒宗事業全氷稜孤峭類神仙詩同李賀精通鬼文擬劉軻妙入禪珠履早曾從相府玳簮今又别賓筵篇章幾謝傳西楚空想雄風度十年寄蜀國廣濟大師氷壓霜壇律格清三干傳授盡門生禪心靜入空無跡詩句閑捜寂有聲滿國繁華徒自樂兩朝更變未曾驚終思相約岷峨去不得携笻一路行答獻上人巻衲衣禪客袖篇章江上相尋共感傷秦甸亂來栖白没杼山空後皎然亡清留島月秋凝露苦寄巴猿夜呌霜珍重南宗好才子灰心㝠目外無妨寄武陵貫㣲上人二首知泛滄浪棹未還西峯房鎖夜潺潺春陪相府逰仙洞雪共賔寮對玉山詩裏幾添新菡萏衲痕應換舊斕斑莫忘一句曹溪妙堪塞孫孫騁度闗吳頭東面楚西邊雲接蒼梧水浸天兩地别離身已老一言相合道休傳風騷妙欲凌春草蹤跡閑思遶嶽蓮不是傲他名利世吾師本在雪山巔懐體休上人仲宣樓上望重湖君到瀟湘得健無病遇何人分藥餌詩逢誰子論功夫杉蘿寺裏尋秋早橘柚洲邊度日晡許送自身歸華嶽待來朝暮拂缾盂招湖上兄弟去嵗得君消息在兩憑人信過重湖忍貪風月當年少不寄音書慰老夫藥鼎近聞傳祕訣詩門曾説擁寒爐漢江江路西來便好榜扁舟訪我無江居寄闗中知已多病多慵漢水邊流年不覺已皤然舊栽花地添黄竹新陷盆池換白蓮雪月未忘招逺客雲山終待去安禪八行書札君休問不似風騷寄一篇中秋十五夜寄人髙河瑟瑟轉金盤歕露吹光逆凭欄四海魚龍精魄冷五山鸞鶴骨毛寒今宵盡向圎時望後夜誰當缺處看何事清光與蟾兎却教才子少留難謝人自鍾陵寄紙筆故人猶憶苦吟勞所恵何殊金錯刀霜雪剪裁新剡硾鋒鋩管束本宣毫知君倒篋情何厚借我臨池價斗髙詞客分張看欲盡不堪來處隔秋濤移居西湖作二首火雲陽熖欲燒空小檻幽窓想舊峯白汗此時流枕簟清風何處動杉松殘更正好眠凉月逺寺俄聞報曉鐘只待秋聲滌心地衲衣新洗健形容官園樹影晝隂隂咫尺清凉莫浣心桃李别教人主掌煙花不稱我追尋蜩螳晚噪風枝稳翡翠閑眠宿處深爭似出塵地行止東林苔徑入西林看金陵圗六朝圗畫戰爭多最是陳宫計數訛若愛蒼生似歌舞隋皇自合恥干戈寄南嶽泰禪師江頭黙想坐禪峯白石山前萬丈空山下獵人應不到雪深花鹿在庵中片雲水底分眀天上雲可憐形影似吾身何妨舒作從龍勢一雨吹銷萬里塵寄清溪道者萬重千疊紅霞嶂夜燭朝香白石龕常寄溪窓凭危檻看經影落古龍潭病中勉送小師往清凉山禮大聖豐衣足食處莫住聖跡靈蹤好遍尋忽遇文殊開慧眼他年應記老師心謝人惠拄杖何處雲根採得來黑龍狂欲作風雷知師念我形骸老教把經行拄緑苔送楚雲上人往南嶽刺血寫法華經剥皮刺血誠何苦欲寫靈山九㑹文十指瀝乾終七軸後來求法更無君送胎髪筆寄仁公内唯胎髪外秋毫緑玉新裁管束牢老病手疼無那爾却資年少寫風騷謝西川曇域大師玉筯篆書玉筯真文乆不興李斯傳到李陽氷正悲千載無來者果見僧中有箇僧偶作寄王秘書七絲湘水秋深夜五字河橋日暮時借問秘書郎此意靜彈髙詠有誰知謝人惠紙烘焙幾工成曉雪輕眀百幅疊春氷何銷才子題詩外分與能書貝葉僧答文勝大師清桂書纔把文章干聖主便承恩澤換禪衣應嫌六祖傳空衲只向曹溪永息機寄懐曽口寺文英大師着紫袈裟名已貴吟紅菡萏價兼髙秋風曽憶西逰處門對平湖滿白濤懐道林寺道友四絶堂前萬木秋碧參差影壓湘流閒思宋杜題詩板一日憑欄到夜休放鶴辭主人絶句四首華亭來復去芝田丹頂霜毛性可憐縱與乗軒終悞主不如還放却遼天放猿堪憶春雲十二峯野桃山杏摘香紅王孫可念愁金鎖從放斷腸明月中放鷺鷥白蘋紅蓼碧江涯日暖雙雙立睡時願揭金籠放歸去却隨沙鶴鬭輕絲放鸚鵡隴西蒼巘結巢髙本為無人識翠毛今日籠中强言語乞歸天外琢含桃白蓮集巻九欽定四庫全書白蓮集巻十唐釋齊已撰
