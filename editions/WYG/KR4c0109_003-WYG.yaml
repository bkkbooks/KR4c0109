body:
  text: 唐釋齊已撰過陳陶處士舊居一室貯琴樽詩皆大雅言夜過秋竹寺醉打老僧門逺燒來籬下寒蔬簇石根閑庭除鶴跡半是杖頭痕寄敬亭清越敬亭山色古廟與寺松連住此修行過春風四十年鼎嘗天柱茗詩硾剡溪牋㝠目應思著終南北闕前湘江漁父湘潭春水滿岸逺草青青有客釣煙月無人論醉醒門前蛟蜃氣蓑上蕙蘭馨曾受䝉莊子逍遥一巻經書古寺僧房緑樹深深處長明夜夜燈春時遊寺客花落閉門僧萬法心中寂孤泉石上澄勞生莫相問喧黙不相應湖西逸人老隠洞庭西漁樵共一溪琴前孤鶴影石上逺僧題橘柚園林熟蒹葭徑路迷君能許隣並分藥斸春畦瀟湘二十韻二水逺難論從離向坎奔冷穿千嶂脈清過㡬州門闊去都凝白傍來盡帶渾經游聞舜禹表裏見乾坤浦靜魚閑釣灣凉鴈自屯月來分夜底雲度見秋痕暮氣藏鄰寺寒濤聒近村離騷傳永恨鼓瑟奏遺魂霧擁魚龍窟槎欹島嶼根秋風㠶上下落日樹沉昏栁少砂洲缺苔多古岸存禽巢依橘柚獺逕入蘭蓀色自江南絶名聞海内尊吳頭雄莫遏漢口壯堪吞寥泬晴方映馮夷信忽翻渡遥峯翠疊汀小荻花繁勢接湖煙漲聲和瘴雨歕急揺吟客舫狂濺野人樽疏鑿誰窮本澄鮮自有源對兹傷九曲含濁出崑崙江行早發舟子相呼起長沙未五更㡬看星月在猶帯夢魂行鳥亂村林逈人喧水栅横蒼茫平野外漸認逺峯名宜陽道中作宜陽南面路下嶽又經過楓葉紅遮店芒花白滿坡猿無山漸薄鴈衆水還多日落猶前去諸村牧豎歌落日晩照背高臺殘鐘殘角催能銷幾度落已是半生來吹葉隂風發漫空暝色廻因思古人事更變盡塵埃春興桞暖鶯多語花明草盡長風流在詩句牽率遶池塘呌切禽名宇飛忙蜨姓荘時來真可惜自勉掇蘭芳逺山天際雲根破寒山列翠廻幽人當立久白鳥背飛來瀑濺何州地僧尋幾嶠苔終須拂巾履獨去謝塵埃和鄭谷郎中幽棲之什誰知閑退跡門逕入寒汀靜倚雲僧杖孤看野燒星墨霑吟石黑苔染釣船青相對唯溪寺初宵聞念經勉道林謙光鴻藴二姪舊林諸姪在還住本師房共掃焚修地同聞水石香莫将閑世界擬敵好時光須看南山下無名塜滿岡渚宮自勉二首晨午殊豐足伊何撓肺腸形容侵老病山水憶韜藏必謝金臺去還携鐵錫将東林露壇畔舊對白蓮房畢竟擬何求隨縁去住休天涯遊勝境海上宿仙洲夢好尋無跡詩成旋不留從他笑輕事獨自憶莊周謝㴩湖茶㴩湖唯上貢何以恵尋常還是詩心苦堪消蠟面香碾聲通一室烹色帶殘陽若有新春者西來信勿忘寄歸州馬判官郡帶女嬃名民康境亦寧晏梳秋鬢白閑坐暮山青贈客椒初熟尋僧酒半醒應懐舊居處歌管隔牆聴倦客閉眼即關門人間事倦聞如何迎好客不似看閑雲少欲資三要多言讓十分疎慵本吾性任笑早離羣送靈􅈯上人遊五臺此去清凉頂期瞻大聖容便應過洛水即未上嵩峰殘照催行影幽林惜駐蹤想登金閣望東北極兵鋒靜坐坐卧與行住入禪還出吟也應長日月消得箇身心嘿論相如少黄梅付囑深門前古松徑時起步清隂謝虚中上人寄示題天䇿閣詩天䇿二首作境幽搜亦𤣥閣横三楚上題挂九霄邊寺額因標勝詩人合遇賢他時誰倚檻吟此豈忘筌荆門寄懐章供奉兼呈幕中知已紫衣居貴上青衲老關中事佛門相似朝天路不同神凝無惡夢詩澹老真風聞道知音在官高信莫通江令石思量江令意愛石甚悠悠貪向深宫去死同亡國休兩株荒草裏千古暮江頭若似黄金貴隋軍也不留月下作良夜如清晝幽人在小庭滿空垂列宿那箇是文星世界歸誰是心魂向自寧何當見堯舜重為造生靈遊道林寺四絶亭觀宋杜詩版宋杜詩題在風騷到此真獨來終日看一為拂秋塵古石生寒仞春松脱老鱗高僧眼根靜應見客吟神勉詩僧莫把毛生刺低佪謁李膺須防知佛者解笑愛名僧道性宜如水詩情合似冰還同蓮社客聨唱遶香燈謝人墨珍重嵗寒煙携來路㡬千只應真典誥消得苦磨研正色浮端硯精光動蜀牋因君强濡染捨此即忘筌送人遊玉泉寺西峯大雪開萬疊向空堆客貴猶尋去僧高肯不來潭澄猿覷月竇冷鹿眠苔公子将才子聨題興未廻寄鄭谷郎中詩心何以傳所證自同禪覓句如探虎逄知似得仙神清太古在字好雅風全曾沐星郎許終慙是斐然春雨欲布如膏勢先聞動地雷雲龍相得起風電一時來霡霂農桑野㝠濛楊桞臺何人待晴暖庭有牡丹開明月峯明月峯頭石曾聞學月明别舒長夜彩高照一村耕頗亂無私理徒驚鄙俗情傳云遭鑿後頑白在崢嶸謝人惠紫栗拄杖仙掌峰前得何當此見遺百年衰朽骨六尺嵗寒姿雪外兼松凭泉邊待月欹他時出山去猶謝見相隨送人遊湘湖君遊南國去旅夢若為寧一路隨鴻鴈千峯遶洞庭林明楓盡落野黒燒初經有興尋僧否湘西寺最靈小松發地纔過膝蟠根巳有靈嚴霜百草白深院一株青後夜蕭騷動空階蟋蟀聴誰於千嵗外吟遶老龍形金江寓居考槃應未永聊此飬閑疎野趣今何似詩題舊不如春篁離籜盡陂藕折花初終要秋雲是從風恣巻舒晩夏金江寓居答友生日日衝殘熱相尋入亂蒿閑中滋味逺詩裏是非高碧聳新生竹紅垂半熟桃時難未可出且欲淬豪曹寄李洞秀才到處聴時論知君屈最深秋風㡬西笑抱玉但傷心野水翻紅藕滄江老白禽相思未相識聞在蜀中吟過商山疊疊疊嵐寒紅塵翠裏盤前程有名利此路莫艱難雲木侵天老輪蹄到月殘何能尋四皓過盡見長安蟬八韻咽咽復啾啾多來自早秋園林凉正好風雨思相収在處聲無别何人淚欲流冷憐天露滴傷共野禽遊静息深依竹驚移瞥過樓分明晴渡口凄切暮關頭時節推應定飛鳴即未休年年聞爾苦逺憶所居幽鷺鷥二首日日滄江去時時得意歸自能終潔白何慮悞翻飛晩立銀塘濶秋栖玉露微殘陽葦花畔雙下釣魚磯雪裏曽迷我籠中舊飬君忽從紅蓼岸飛出白鷗羣影照翹灘浪翎濡宿島雲鴛鴻解相憶天上列紛紛送僧歸南岳濁世住終難孤峰念永安逆風眉磔磔衝雪錫珊珊石室關霞嫩松枝拂蘚乾巖猿應認得連臂下勾欄夏日林下作煩暑莫相煎森森在眼前暫來還盡日獨坐只聞蟬草媚終難死花飛卒未蔫秋風捨此去滿篋貯新篇村居寄懐風雨如堯代何心欲退藏諸侯行教化下國自耕桑道挫時機盡禪留話路長前溪久不過忽覺早禾香詶王秀才相於分倍親靜論到吟真王澤曾無外風騷甚少人鴻隨秋過盡雪向臘飛頻何處多幽勝期君作近隣贈無本上人徃年吟月社因亂散揚州未免無端事何妨出世流洞庭禪過臘衡岳坐經秋終説将衣鉢天台老去休寄華山司空圗天下艱難際全家入華山㡬勞丹詔問空見使臣還瀑布寒吹夢蓮峰翠濕闗兵戈阻相訪身老瘴雲間題真州精舎波心精舎好那岸是繁華礙目無高樹當門即逺沙晨齋來海客夜磬到漁家石鼎秋濤靜禪廻有岳茶懷道林寺因寄仁用二上人名山知不逺長憶寺門松昨晩登樓見前年過夏峰雨餘雲脚樹風外日西鐘莫更來東岸紅塵没馬蹤潯陽道中作秋聲連岳樹草色遍汀洲多事時為客無人處上樓雲疎片雨歇野闊九江流欲向南朝去詩僧有恵休東林雨後望香爐峯翠濕僧窗裏寒堆鳥道邊静思尋去路急遶落來泉暮雨開青壁朝陽照紫煙二林多長老誰憶上頭禪寄雙泉大師師兄清泉流眼底白道倚巖稜後夜禪初入前溪樹折冰南凉來的的北魏去騰騰敢把吾師意宻傳門外僧送人潤州尋兄弟君話南徐去迢迢過建康弟兄新得信鴻鴈久離行木落空林浪秋殘漸雪霜閑遊登北固東望海蒼蒼貽張生日日見入寺未曾含酒容閑聴老僧語坐到夕陽鐘竹裏行多影花邊偶過蹤猶言謝生計隨我去孤峯送人遊雍京君來乞詩别聊與愴前程九野未無事少年何逺行商雲盤翠險秦甸下煙平應見周南化如今在雍京春草處處碧萋萋平原帶日西堪隨遊子路逺入鷓鴣啼金谷園應没夫差國巳迷欲尋蘭蕙徑荒穢滿汀畦懷華頂道人華頂星邊出真宜上士家無人觸牀榻滿屋貯煙霞坐卧臨天井晴明見海涯禪餘石橋去屐齒印松花寄自牧上人五老廻無計三峰去不成何言謝雲鳥此地識公卿夢媿将僧説心嫌觸類生南朝古山寺曾憶共尋行靜坐日日只騰騰心機何以興詩魔苦不利禪寂頗相應硯滿塵埃㸃衣多坐卧稜如斯自消息合是箇閒僧送人遊衡岳荆楚臘将殘江湖蒼莽間孤舟載高興千里向名山雪浪來無定風帆去是閑石橋僧問我應寄岳茶還答知已自闕下寄書故人勞札翰千里寄荆臺知戀文明在還尋江漢來羣機喧白晝陸海漲黄埃得路應相笑無成守死灰新筍亂迸苔錢破㕘差出小欄層層離錦籜節節露琅玕直上心終勁四垂煙漸寛欲知含古律試剪鳳簫看寄唐洙處士行僧去湘水歸鴈度荆門彼此亡家國東西役夢魂多慵如長傲久住不生根曾問興亡事丁寧寄勿言謝人恵竹蠅拂妙刮筠篁製纎柔玉柄同拂蠅聲滿室指月影揺空敢捨經行外常将宴坐中揮談一無取千萬媿生公新燕燕燕知何事年年應候來却縁華屋在長得好時催花外銜泥去空中接食廻不同黄雀意迷逐網羅媒謝王先輩寄氊深謝高科客名氊寄恵重靜思生朔漠和雪長䝉茸摺坐資禪悦鋪眠減病容他年從破碎擔去卧孤峯寄還闕下高輦先輩巻去嵗逄京使因還所寄詩難留天上作曽換月中枝趣極僧迷㫖功深鬼不知仍聞得名後特地更忘疲和孫支使恵示院中庭竹之什憶就江僧乞和煙得一莖剪黄憎舊本科緑惜新生䕶噪蟬身穏資吟客眼明星郎有佳詠雅合此君聲苦熱中江上懐爐峰舊居舊寄爐峰下杉松遶石房年年五六月江上憶清凉久别應荒廢終歸隔𣺌茫何當便揺落披衲玩秋光送僧遊龍門香山寺君到香山寺探幽莫損神且尋風雅主細㸔樂天真江上值春雨江臯正月雨平陸亦波瀾半是峨嵋雪重為澤國寒農田淹寖盡客棹徃來難愁殺騷人路滄浪正𣺌漫七十作七十去百嵗都來三十春縱饒生得到終免死無因密理方通理栖真始見真沃州匡阜客幾刼不迷人謝虚中寄新詩舊友一千里新詩五十篇此文經大匠不見已多年趣極同無迹精深合自然相思把行坐南望隔塵煙送彬座主赴龍安請講兩論久研精龍安受請行春城雨雪霽古寺殿堂明白髪老僧聴金毛師子聲同流有誰共别著國風清夏日荆渚書懐嵩岳去值亂匡廬廻阻兵中途息瓶錫十載依公卿不那猿鳥性但懐林泉聲何時遂情興吟遶杉松行春日西湖作一水遶孤島閑門掩春草曾無長者轍枉此問衰老謝中上人寄茶春山榖雨前併手摘芳煙緑嫩難盈籠清和易晩天且招隣院客試煑落花泉地逺勞相寄無來又隔年送節大徳歸闕西京曾入内東洛又朝天聖上方虚席僧中正乏賢晨光金殿裏紫氣玉簾前知祝唐堯化新恩異徃年覽清尚巻李洞僻相似得詩先示師鬼神迷去處風日背吟時格已搜清竭名還着紫卑從容味高作翻為古人疑荆門送晝公歸彭澤舊居彭澤舊居在匡廬翠疊前因思從楚寺便附入吳船岸遶春殘樹江浮曉霽天應過虎溪社佇立想諸賢白蓮集巻三欽定四庫全書白蓮集巻四唐釋齊已
