seq: 2
front:
  text: 名喧省闥雅頌出吾唐疊巘供秋望無雲到夕陽自封修藥院别埽著僧牀㡬夢中朝事依依鵷鷺行
  hash: sha256:83edebea27e1aade5cdbd057de4e28a09646fea79d4ae9ac21908f12177ee3c6
body:
  text: 歸鴈塞門春巳暖連影起蘋風雲夢千行去瀟湘一夜空江人休舉網虜将又虚弓莫失南來伴衡陽樹即紅登大林寺觀白太傅題版九疊蒼崖裏禪家鑿翠開清時誰夢到白傅獨尋來怪石和僧定閑雲共鶴廻任兹休去者心是不然灰贈曹松先輩今嵗赴春闈達如夫子稀山中把巻去牓下注官歸楚月吟前落江禽酒外飛閑庭向諸寺却㸔白麻衣夏日江寺寄無上人講終齋磬罷何處稱真心古寺高杉下炎天獨院深鷰和江鳥語牆奪暮花隂大府多才子閑過在竹林夏日梅雨中寄睦公梅月來林寺㝠㝠各閉門巳應雙履跡全没亂雲根琢句心無味看經眼亦昬何時見清霽招我慿巖軒傷鄭谷郎中鍾陵千首作筆絶亦身終知落干戈裏誰家煨燼中吟齋春長蕨釣渚夜鳴鴻惆悵秋江月曾招我看同臨行題友生壁山衲宜何處經行避暑深峯西多古寺日午亂松隂鶴黙堪分靜蟬凉解助吟慇懃題壁去秋早此相尋别東林後廻寄修睦昨夜從香社辭君出薜蘿晚來巾舄上已覺俗塵多逺路縈芳草遥空共白波南朝在天末此去重經過古松雷電不敢伐鱗皴勢萬端蠧依枯節死虵入朽根盤影浸僧禪濕聲吹鶴夢寒尋常風雨夜應有鬼神看夏日栖霞寺書懐寄張逸人人中林下現名自有閑忙建業紅塵熱栖霞白石凉倚身檉几穏灑面瀑流香不似高齋裏花連竹影長訪自牧上人不遇然諾竟如何諸矦見重多高房度江雨經月長寒莎道本同騷雅書曾到薜蘿相尋未相見危閣望滄波題東林白蓮大士生兜率空池滿白蓮秋風明月下齋日影堂前色後羣芳坼香殊百和燃誰知不染性一片好心田寄懷江西徵岷二律師亂後江邊寺堪懐二律師㡬番新弟子一様舊威儀院影連春竹窗聲接雨池共縁山水癖久别共題詩東林作寄金陵知已十八賢真在時來拂榻看巳知前事逺更結後人難泉滴勝清磬松香掩白檀慿君聴朝貴誰欲厭簪冠山寺喜道者至閏年春過後山寺始花開還有無心者閑尋此境來鳥幽聲忽斷茶好味重廻知住南巖久㝠心坐緑苔再遊匡山紫霄兼五老相對倚空寒久别成衰病重來更上難徑危雲母滑崖旱瀑流乾目斷嵐煙際神仙有石壇贈浙西李推官他皆侍勲貴君獨愛詩𤣥終日秋光裏無人竹影邊東樓生倚月北固積吟煙聞説鴛行裡多才復少年題終南山隠者室終南山北靣直下是長安自埽青苔室閑欹白石看風吹窗樹老日曬竇雲乾時向圭峰宿僧房瀑布寒禪庭蘆竹十二韻呈鄭谷郎中錯錯在禪庭高宜與竹名健添秋雨響乾助夜風清雀靜知枯折僧閑見笋生對吟殊洒落負氣甚孤貞宻謝編欄固齊由灌溉平松姿真可敵桞態薄難并映帶兼苔石㕘差近畫楹雪霜消後色蟲鳥黙時聲逺憶滄洲岸寒連暮角城幽根狂亂迸勁葉動相撐避暑須臨坐逃眠必遶行未逄仙手詠俗眼見猶輕送孫鳳秀才赴舉九重方側席四海仰文明好把孤吟去便隨公道行梁園浮雪氣汴水漲春聲此日登仙衆君應最後生落花朝開暮亦衰雨打復風吹古屋無人處殘陽滿地時靜依青蘚片閑綴緑莎枝繁艶根株在明年向此期秋苔獨憐蒼翠文長與寂寥存鶴靜窺秋片僧閑踏冷痕月明疎竹徑雨歇敗莎根别有深宫裏兼花鎖斷魂老将破虜與平戎曾居第一功明時不用武白首向秋風馬病霜飛草弓閑鴈過空兒孫已成立膽氣亦英雄城中示友人久與寒灰合人中亦覺閑重城不鎖夢每夜自歸山雨破㝠鴻出桐枯井月還唯君道心在來徃寂寥間送友人遊湘中懐才難自住此去亦如僧何處西風夜孤吟旅舎燈路沿湘樹疊山入楚雲層若有東來扎歸鴻亦可慿經費徵君舊居高眠當聖代雲鳥未為孤天子徵不起閑人親得無猿猱狂欲墜水石怪難圗寂寞荒齋外松杉相倚枯嚴陵釣臺夫子垂竿處空江照古臺無人更如此白浪自成堆鶴靜尋僧去魚狂入海廻登臨秋值晩樹石盡多苔原上晚望倚杖聊攄望寒原逺近分夜來何處火燒出古人墳野勢盤空澤江流合暮雲殘陽催百鳥各自著栖羣送恵空上人歸塵中名利熱鳥外水雲閑吾子多高趣秋風獨自還空囊隨客棹㡬宿泊湖山應有吟僧在鄰居樹影間酬章水知巳新吟忽有寄千里到荆門落日雲初碧殘年眼正昬巳為難敵手誰更入深論後信多相寄吾生重此言閑居漸覺春光媚塵銷作土膏微寒放楊桞纎草入風騷睡少全無病身輕乍去袍前溪汎紅片何處落金桃次韻酬鄭谷郎中林下高眠起相招得句時閑門流水入靜話鷺鷥知每許題成晩多嫌雪阻期西齋坐來久風竹撼疎籬思遊峨眉寄林下諸友剛有峨眉念秋來錫欲飛㑹抛湘寺去便逐蜀㠶歸難世堪言善閑人合見機殷勤别諸友莫厭楚江薇送劉秀才南遊南去謁諸侯名山亦得逰便應尋瀑布乘興上岣嶁高鳥隨雲起寒星向地流相思應北望天晩石橋頭示諸姪莫問年将朽加餐巳不多形容渾瘦削行止强牽拖死也何憂惱生而有詠歌侯門終謝去却埽舊松蘿荆渚病中因思匡廬遂成三百字寄梁先輩生老病死者早聞天竺書相隨㡬汩沒不了堪欷歔自理自可適他人誰與祛應當入寂滅乃得長銷除前月已骨立今朝還貌舒披衣試步履倚䇿聊躊躇江月青眸冷秋風白髪疎新題憶剡硾舊約懷匡廬張野久絶跡樂天曾卜居空龕掩薜荔瀑布歕蟾蜍古檜鳴𤣥鶴凉泉躍錦魚狂吟樹䕃映縱踏花蔫菸唇舌既巳閒心脾亦散攄松窗有偃息石徑無趦趄夢冷通仙闕神融合太虗千峰杳靄際萬壑明清初長徃期非晚半生閑有餘依劉未是詠訪戴寕忘諸稽古堪求巳觀時好笑渠埋頭逐小利没脚拖長裾道種将閑飬情田把藥鉏幽香發蘭蕙穢莽摧丘墟敢謂囊盈物那言庾滿儲微煙動晨㸑細雨滋園蔬蘚亂珍禽羽門希長者車㝠機坐兀兀著履行徐徐每許親朱履多憐奉隼旟簪嫌紅玳瑁社念金芙蕖海内競鐵馬篋中藏紙驢常言謝時去此意將何如竟陵遇晝公高跡何來此逰方漸老身欲投蓮岳夏初過竟陵春錫影離雲逺衣痕拂蘚新無言即相别此處不迷津聞貫休下世吾師詩匠者真箇碧雲流爭得梁太子更為文選樓錦江新塜樹婺女舊山秋欲去焚香禮啼猿峽阻修金山寺山帶金名逺樓臺壓翠層魚龍光照象風浪影揺燈檻外揚州樹船通建業僧塵埃何所到青石坐如冰早秋雨後晩望暑氣時将薄蟲聲夜轉稠江湖經一雨日月換新秋有景堪援筆何人未上樓欲承凉冷興西向碧嵩逰過西塞山空江平野流風島葦颼颼殘日銜西塞孤㠶向北洲邊鴻渡漢口楚樹出吳頭終入高雲裏身依片石休溪齋二首豈敢言招隠歸休喜自安一溪雲卧穏四海路行難瑞獸藏頭角幽禽惜羽翰子猷何處在老盡碧琅玕杉竹映溪關脩修共嵗寒幽人眠日晏花雨落春殘道妙言何强詩𤣥論甚難閑居有親賦搔首憶潘安新秋始驚三伏盡又遇立秋時露彩朝還冷雲峰晩更竒壠香禾半熟原迥草微衰幸好清光裏安仁謾起悲寄上荆渚因夢廬岳乃圖壁賦詩夢繞嵳峩裏神疎骨亦寒覺來誰共説壁上自圗看古翠松藏寺春紅杏濕壇歸心㡬時遂日向漸衰殘巳卯嵗值凍阻歸有作河冰連地凍朔氣壓春寒開户思歸逺出門移步難湖雲粘鴈重廟樹刮風乾坐看孤燈焰微微向曉殘送盧説亂後投知巳兵冦殘江墅生涯盡蕩除事堪煎桂玉時莫倚詩書暮狖啼空半春山列雨餘舟中有新作廻寄示慵疎讀峴山碑三載羊公政千年峴首碑何人更墮淚此道亦殊時兵火燒文缺江雲觸蘚滋那堪望黎庶匝地是瘡痍過鹿門作鹿門埋孟子峴首載羊公萬古千秋裏青山明月中政從襄沔絶詩過洞庭空塵路誰廻眼松聲兩處風題玉泉寺大師影堂大化終華頂靈蹤示玉泉由來負高尚合向好山川洞壑藏諸怪杉松列瘦煙千秋空樹影猶似覆長禪秋日錢塘作秋光明水國遊子倚長亭海浸全吳白山澄百越青英雄貴黎庶封土絶精靈勾踐魂如在應慙戰血腥送人赴舉分有爭忘得時來須出山白雲終許在清世莫空還驛樹秋聲健行衣雨㸃斑明年從月裏滿握度春關答人寒夜所寄通宵亦孤坐但念舊峯雲白日還如此清閑本共君二毛凋一半百嵗去三分早晚尋流水同歸麋鹿羣酬洞庭陳秀才何必要識面見詩驚苦心此門從自古難學至如今青草湖雲闊黄陵廟木深精捜當好景得即動知音題鶴鳴泉八韻嘹唳遺蹤去澄明物掩難噴開山面碧飛落寺門寒汲引隨瓶滿分流逐處安幽䖝乘葉過渴狖擁條看上有危峯疊旁宜怪石盤冷吞雙樹影甘潤百毛端異早開鐫玉靈終别建壇瀟湘在何處終日自波瀾登金山寺四靣白波聲中流翠嶠横望來堪目斷上徹始心平鳥向天涯去雲連水國生重來與誰約題罷自吟行寄吳都沈貟外彬歸休興若何朱紱盡還他自有園林濶誰爭山水多村煙晴莽蒼僧磬晚嵯峨野醉題招隠相思可寄麽寄明月山僧山稱明月好月出遍山明要上諸峰去無妨半夜行白猿真雪色幽鳥古琴聲吾子居來久應忘我在城寄哭西川壇長廣濟大師千萬僧中寳三朝帝寵身還源未化火舉國𦵏全真文集編金在碑銘刻玉新有誰於異代彈指禮遺塵酬西川楚巒上人巻玉壘峨嵋秀岷江錦水清古人捜不盡吾子得何精可信繇前習堪聞正後生東西五千里多謝寄無成覽延栖上人巻今體雕鏤妙古風研考精何人忘律韻為子辨詩聲賈島苦兼此孟郊清獨行荆門見編集媿我老無成寄洛下王彛訓先輩二首賈島存正始王維留格言千篇千古在一詠一驚魂離别無他寄相思共此門陽春堪永恨郢路轉塵昬北極新英主高科舊少年風流傳貴逹談笑取榮遷洛水秋空底嵩峰曉翠巔尋常誰並馬橋上戲成篇酬岳陽李主簿卷把巻思高興瀟湘濶浸門無雲生翠浪有月動清魂倚檻應窮底凝情合到源為君吟所寄難甚至忘筌寄懐江西僧逹禪翁長憶舊山日與君同聚沙未能精貝葉便學詠楊花苦甚傷心骨清還切齒牙何妨繼餘習前世是詩家送吳守明先輩遊蜀慿君遊蜀去細為話幽竒喪亂嘉陵驛塵埃賈島詩未應過錦府且合上峨嵋既逐高科後東西任所之寄普明大師可凖蓮嶽三徵者論詩舊與君相留曾㡬嵗酬唱有新文翠竇容閑憩嵐峯許共分當年若同訪合得伴吟雲還黄平素秀才巻求已甚忘筌得之經渾然僻能離詭異清不尚妖妍冷澹聞姚監精竒見浪仙如君好風格自可繼前賢與張先輩話别為予同志者各自話離心及第還全蜀逰方歸二林巴江經峡漲楚野入吳深他日傳消息東西不易尋寄朱拾遺一聞歸闕下㡬畨熟金桃滄海期仍晩清資路漸高研冰濡諫筆賦雪擁朝袍豈念空林下㝠心坐石勞荆門送興禪師灑落南宗子遊方跡似雲青山尋處處赤葉路紛紛虎共松巖宿猿和石溜聞何峰一廻首憶我在人羣過西山施肩吾舊居大志終難起西峯卧翠堆牀前倒秋壑枕上過春雷鶴見丹成去僧聞栗熟來荒齋松竹老鸞鶴自徘徊喜夏雨四郊雲影合千里雨聲來盡洗紅埃去併将清氣廻潺湲浮楚甸蕭散露荆臺欲賦隨車瑞濡毫竭諛才酬元貟外見寄八韻舊隠夢牽仍歸心只似蒸逺青憐島峭輕白愛雲騰艶冶叢翻蜨腥膻地聚蝇雨聲連灑竹詩興繼填膺訪戴情彌切依劉力不勝衆人忘苦苦獨自愧兢兢處世無他望流年有病僧時慙大雅客遺韻許相承浣口泊舟曉望天柱峯根盤潜岳半頂逼日輪邊冷碧無雲㸃危稜有瀑懸秀輕毛女下名與鼎湖偏誰見扶持力峩峩出後天寄楚萍上人北靣香爐秀南邊瀑布寒自來還獨去夏滿又秋殘日影松杉亂雲容洞壑寛何峯是隣側片石許相安竹裏作六韻我來深處坐剩覺有吟思忽似瀟湘岸欲生風雨時冷煙濛古屋乾籜堕秋墀徑熟因頻入身閒得遍欹踏多鞭節損題亂粉痕隳猶見前山疊微茫隔短籬寄江西幕中孫魴貟外簮履為官興芙蓉結社縁應思陶令醉時訪逺公禪茶影中殘月松聲裏落泉此門曾共説知未遂終焉盆池盆沼陷花邊孤明似玉泉涵虚心不淺待月底長圎平穏承天澤依微泛曙煙何須照菱鏡即此鑒媸妍喜乾晝上人逺相訪彼此垂七十相逢意若何聖明殊未至離亂更應多澹泊門難到從容日易過餘生消息外只合聴詩魔白蓮集巻二欽定四庫全書白蓮集巻
