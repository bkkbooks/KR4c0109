body:
  text: 撰登祝融峯猿鳥共不到我來身欲浮四邊空碧落絶頂正清秋宇宙知何極華夷見細流壇西獨立久白日轉神州寄貫休子美曾吟處吾師復去吟是何多勝地銷得二公心錦水流春闊峨嵋疊雪深時逄蜀僧説或道近遊黔送唐禀正字歸萍川霜鬚芸閣吏久掩白雲扉來謁元戎後還騎病馬歸烟村蔬飲淡江驛雪泥肥知到中林日春風長澗薇寄懐江西栖公龍沙為别日廬阜得書年不見來香社相思遶白蓮江僧歸海寺楚路接吳煙老病何堪説扶羸寄此篇山中喜得友生書柴門關樹石未省夢塵埃落日啼猿裏同人有信來自成為拙隠難以謝多才見説相思處前峯對古臺謝人恵扇子及茶鎗旗封蜀茗圎潔製鮫綃好客分烹煑青蠅避動揺陸生誇妙法班女恨涼飈多謝崔居士相思寄寂寥寄監利司空學士詩家為政别清苦日聞新亂後無荒地歸來盡逺人寛容民賦税憔悴吏精神何必河陽縣空傳桃李春答陳秀才萬事皆可了有詩門最深古人難得志吾子苦留心野疊涼雲朶苔重怪木隂他年立名字笑我老雙林遊橘洲春日上芳洲經春蘭杜幽此時尋橘岸昨日在城樓鷺立青楓杪沙沉白浪頭漁家好生計簷底繫扁舟寄武陵道友阮肇迷仙處禪門接紫霞不知尋鶴路㡬里入桃花晩樹隂揺蘚春潭影弄砂何當見招我乞與片生涯謝人恵藥五金元造化九鍊更精新敢謂長生客将遺必死人久餐應換骨一服已通神終逐淮王去永抛浮世塵還族弟巻豈要私相許君詩自入神風騷何句出瀑布一聨新詣若長如此名須逺逐身閑齋舒復巻留滯忽經旬送周秀遊峽又向䕫城去知難動旅魂自非亡國客何慮斷腸猿灔澦分高仞瞿塘露淺痕明年期此約平穏到荆門荆門夏日寄洞山節公湖光揺翠木靈洞疊雲深五月經行處千秋檜柏隂山形臨北渚僧格繼東林莫惜相招信余心是此心再經蒋山與諸長老夜話逺迹都如鴈南行又北廻老僧猶記得徃嵗已曾來話遍名山境燒殘黑櫟灰無因伴師徃歸思在天台寄當陽張明府玉泉神運寺寒磬徹琴堂有境靈如此為官興亦長吏愁清白甚民樂賦輸忘聞説巴山縣今來尚憶張遊三覺山白石路重重縈紆勢忽窮孤峰擎像閣萬木蔽星空世論隨時變禪懐厯刼同良宵正㝠目海日上牕紅庭際晚菊上主人九月将欲盡幽叢始綻芳都縁含正氣不是背重陽採去蜂聲逺尋來蝶路長王孫歸未晚猶得泛金觴送趙長史歸閩川荆門與閩越闗戍隔三千風雪揚帆去臺隍指海邊客情消旅火王化似堯年莫失春廻約江城榖雨前擬嵇康絶交寄湘中貫微何處同嵇懶吾徒道異諸本無文字學何有徃來書嶽寺逍遥夢侯門勉强居相知在𤣥契莫訝八行疎寄許州清古北來儒士説許下有吟僧白日身長倚清秋塔上層言雖依景得理要入無徴敢望多相示孱微老不勝謝丁秀才見示賦巻五首新裁剪捜羅盡指歸誰曾師古律君自負天機聖后求賢久明公得雋稀乘秋好携去直望九霄飛驚秋褰簾聴秋信晩傍竹聲歸多故堪傷骨孤峰好拂衣梧桐凋緑盡菡萏墮紅稀却恐吾形影嫌心與口違夏日雨中寄幕中知已北風吹夏雨和竹亞南軒豆枕欹涼冷蓮峰入夢魂牕多斜迸濕庭徧瀑流痕清興知無限晴來示一言夜次湘隂風濤出洞庭帆影入澄清何處驚鴻起孤舟趂月行時難多戰地野闊絶春耕骨肉知存否林園近郡城寄唐禀正字疎野還如舊何曾稱在城水邊無伴立天際有山横落日雲霞赤高牕筆硯明鮑昭多所得時憶寄湯生宿舒湖希上人房入寺先來此經窗半在湖秋風新菡萏暮雨老菰蒲任聴浮生速能消黙坐無語來燈焰短嘒唳發髙梧戊辰嵗江南感懐忽忽動中私人間何所之老過離亂世生在太平時桃李春無主杉松寺有期曾吟子山賦何啻舊凌遲送林上人歸永嘉舊居東越常懸思山門在永嘉秋光浮楚水㠶影背長沙城黑天台雨村明海嶠霞時尋謝公跡春草有瑶花答友生山居寄示嘉遁有新吟因僧寄竹林靜思來鳥外閑味遶松隂兵冦慿陵甚溪山㡬許深休為反招隠携取一相尋新秋霽後晩眺懐先公雨霽湘楚晚水涼天亦澄山中應解夏渡口有行僧鳥列滄洲隊雲排碧落層孤峰磬聲絶一㸃石龕燈池上感興所向似無端風前吟凭欄旁人應悶見片水自閑看碧底紅鱗鬛澄邊白羽翰南山衆木葉飄着竹聲乾和曇域上人寄贈之什百病煎衰朽栖遲戰國中思量青壁寺行坐赤松風道寄虚无合書傳徃復空可憐禪月子香火國門東弔雙泉大師真塔塔聳層峰後碑鐫巨石新不知将一句分付與何人靜坐雲生衲空山月照真後徒遊禮者猶認指迷津暮冬送璘上人歸華容故園雖不逺那免愴行思莽蒼平湖路霏㣲過雪時全無山阻隔或有客相隨得見交親後春風動桞絲秋夜聴業上人彈琴萬物都寂寂堪聞彈正聲人心盡如此天下自和平湘水㵼秋碧古風吹太清徃年廬岳奏今夕更分明謝人恵丹藥别後聞飡餌相逄訝道情肌膚紅色透髭髪黑光生仙㓊誰傳與松房自鍊成常䝉逺分恵亦覺骨毛輕荆門病中寄懐貫微上人我衰君亦老相憶更何言除泥安禪力難醫必死根梅寒爭雪彩日冷譲冰痕早晩東歸去同尋入石門匡山逺大師嘗與諸賢遊石門洞玩錦繡谷答孔秀才早向文章裏能降少壮心不愁人不愛閑處自閑吟水國雲雷闊僧園竹樹深無嫌我衰颯時此一相尋秋江兩岸山青映中流一棹聲逺無風浪動正向夕陽横島嶼蟬分宿沙洲客獨行浩然心自合何必濯吾纓船窗孤舸凭幽窗清波逼面涼舉頭還有礙低眼即無妨瞥過沙禽翠斜分夕照光何時到山寺上閣看江鄉永夜永日還欹枕良宵亦曲肱神閑無萬慮壁冷有殘燈香影浮龕象瓶聲着井冰尋思到何處海上斷崖僧中春愴懐寄二三知已眼暗心還白逢春强凭欄因聞積雨夜却憶舊山寒竹撼煙叢滑花燒露朶乾故人相㑹處應話此衰殘自遣了然知是夢既覺更何求死入孤峯去灰飛一燼休雲無空碧在天靜月華流免有諸徒弟時來弔石頭送陳霸歸閩凉風動行興含笑話臨途巳得身名了全忘客道孤鄉程過百越帆影遶重湖家在飛鴻外音書可寄無寄孫闢呈鄭谷郎中衡岳去都忘清吟戀省郎淹留才半月詶唱頗盈箱雪長松檉格茶添語話香因論樂安子年少老篇章荆門送人自峨嵋游南岳峨嵋來已逺衡岳去猶賖南浦懸帆影西風亂荻花天涯遥夢澤山衆近長沙有興多新作携将大府誇謝主人石筍西園罷宴遊東閣念林丘特減花邊峭來添竹裏幽憶過陽朔見曾記太湖求從此頻吟遶歸山意亦休經安公寺大聖威靈地安公宴坐蹤未知長寂黙不見久從容塔影高羣木江聲壓暮鐘此遊幽勝後來夢亦應重秋夕寄諸姪毎到秋殘夜燈前憶故鄉園林紅橘柚窗户碧瀟湘離别身垂老艱難路去長弟兄應徤在兵火裏耕桑謝炭正擁寒灰次何當恵寂寥且留連夜向未敢滿爐燒必恐吞難盡唯愁撥易消豪家揑為獸紅迸錦茵燋夏滿日偶作寄孫支使其年閏五月一百二十日煎熬㡬不勝憶歸滄海寺冷倚翠崖稜舊扇猶􅋵執新秋更欝蒸何當見涼月擁衲訪詩朋寄清溪道友山門揺落空霜霰滿杉松明月行禪處青苔遶石重泉聲喧萬壑鐘韻遍千峰終去焚香老同師大士蹤謝重縁舊山水障子敢望重縁飾微茫洞壑春坐看終未是歸卧始應真巳覺心中朽猶憐四靣新不因公子鑒零落㡬成塵寺居鄰井雙梧上一蟬鳴隔墻依稀舊林日撩亂遶山堂難嘿吟風口終清飲露腸老僧加䕶物應任噪殘陽剃髪金刀閃冷光一剃一清凉未免隨朝夕依前長雪霜夏林欹石膩春澗沭泉香向老凋疎盡寒天不出房謝高輦先輩寄新唱和集敢謂神仙手多懐老比丘編聨來鹿野酬唱在龍樓洛浦精靈懾邙山鬼魅愁二南風雅道從此化東周送徐秀才游吳國西江東注急孤棹若流星風浪相隨白雲中獨過青他時誰共説此路我曾經好向吳朝看衣冠盡漢庭憶在匡廬日憶在匡廬日秋風八月時松聲虎溪寺塔影鴈門師步碧葳蕤徑吟香菡萏池何當舊泉石歸去洗心脾寄三覺山從益上人山下人來説多時不下山是應終未是閑得且須閑海靣雲歸竇猿邊月上關尋思亂峰頂空送衲僧還殘秋感愴日日加衰病心心趣寂寥殘陽起閒望萬木聳寒條楚寺新為客吳江舊看潮此懐何以寄風雨暮蕭蕭寄南徐劉員外二首竟陵兵革際歸復舊園林早嵗為官苦常聞説此心海邊山夜上城外寺秋尋應訝嵩峰約蹉跎直到今晝公評衆製姚監選諸文風雅誰収我編聨獨有君餘生終此道萬事盡浮雲爭得重携手探幽楚水濆貽王秀才功到難捜處知難始是詩自能探虎子何慮屈男兒此道真清氣前賢早白髭須教至公手不惜付丹枝贈孫生見君詩自别君是繼詩人道出千途外功爭一字新寂寥中影跡霜雪裏精神待折東堂桂歸來更苦辛酬元貟外清洛碧嵩根寒流白照門園林經難别桃李㡬株存衰老江南日凄凉海上村閑來曬朱紱淚滴舊朝恩與楊秀才話别庾信哀何極仲宣悲苦多因思學文賦不勝弄干戈自古有如此於今終若何到頭重䇿蹇歸去舊烟蘿寄何崇丘貟外門底桃源水涵空復映山高吟煙雨霽殘日郡樓間變俗真無事分題是不閒尋思章岸見全未有年顔贈劉五經徃年長白山發憤忍飢寒掃葉雪霜濕讀書脣齒乾羣經通講解八十尚輕安今日江南寺相逄話世難送游山道者我亦遊山者常經舊所經雪消天外碧春曉海中青可見亂離世况臨衰病形憐君此行興獨入白雲屛舟中江上望玉梁山懐李尊師殘照玉梁巔峩峩逺棹前古來傳勝異人去學神仙白鹿老碧壑黄猿啼紫煙誰心共無事局上度流年角聞説征人説嗚嗚何處邊孤城沙塞地殘月雪霜天㑹轉邉風急吹長磧鴈連應傷漢車騎名未勒燕然言詩畢竟将何状根元在正思逹人皆一貫迷者自多岐觸類風騷逺懐賢肺腑衰河橋送别者二子好相知詶王秀才離亂㡬時休儒生厄逺遊亡家非漢代何處覓荆求旅夢寒燈屋鄉懐晝雨樓相逄話相殺誰復念風流春居寄友生莎逕荒蕪甚君應共此情江村雷雨發竹屋夢魂驚社過多來鷰花繁漸老鶯相思意何切新作未曾評寄答武陵幕中何支使二首十萬雄軍幕三千上客才何當談笑外逺慰寂寥來騷雅鏘金擲風流醉玉頺爭知江雪寺老病向寒灰南州無百戰北地有長征閒殺何從事傷哉蘇子卿江樓聨雪句野寺看春耕門外滄浪水風波雜雨聲浙江晚渡去年曾到此久立滯前程岐路時難處風濤晚未平汀蟬含老韻岸荻簇枯聲莫泥關河險多遊自逺行送人下第東歸再謁舊主人一戰偶不㨗東歸計未空還携故書劍去謁舊英雄楚雪連吳樹西江正北風男兒藝若是㑹合值明公寄謝高先輩見寄二首穿鑿堪傷骨風騷久痛心永言無絶唱忽此恵希音楊桞江湖晩芙蓉島嶼深何因㑹仙手臨水一披襟詩在混茫水難捜到極𤣥有時還積思度嵗未終篇片月雙松際高樓闊水邊前賢多此得風味若為傳白蓮集巻四欽定四庫全書白蓮集巻五唐釋齊已
