body:
  text: 撰夏日草堂作沙泉帶草堂紙帳巻空床静是真消息吟非俗肺腸園林坐清影梅杏嚼紅香誰住原西寺鐘聲送夕陽寄鏡湖方干處士賀監舊山川空來近百年聞君與琴鶴終日在漁船島露深秋石湖澄半夜天雲門幾廻去題徧好林泉送人歸吳此説歸耕釣迢迢向海涯春寒逰子路村晚主人家野岸紛垂栁深山緑過茶重尋舊隣里菱藕正開花贈仰上人避地依真境安閒似舊溪干戈百里外泉石亂峯西草瑞香難歇松靈葢盡低尋應報休馬瓶錫向南携夜坐百蟲聲裏坐夜色共𠖇𠖇逺憶諸峯頂曽棲此性靈月華澄有象詩思在無形徹曙都忘寢虚忩日照經新栽松野僧教種法苒苒出蓬蒿百嵗催人老千年待爾高静宜兼竹石幽合近猿猱他日成隂後秋風吹海濤期友人早晩逐兹來閒門日為開亂蛩鳴白草殘菊藉蒼苔困卧誰驚起閒行自欲迴何時此携手吾子本多才和鄭谷郎中看棋箇是仙家事何人合用心㡬時終一局萬木老千岑有路如飛出無機似陸沉樵夫可能解也此廢光隂寄錢塘羅給事憤憤嘔䜛書無人誦子虚傷心天祐末搔首懿宗初海樹青叢短湖山翠㸃疎秋濤看足否羅刹石邊居戊辰嵗湘中寄鄭谷郎中白髪久慵簪常聞病亦吟瘦應成鶴骨閒想似禪心上國楊花亂滄洲荻笋深不堪思翠巘西望獨沾襟寓言造化安能保山川鑿欲翻精華銷地底珠玉聚侯門始作驕奢本終為禍亂根亡家與亡國去此更何言寄王振拾遺戊辰嵗折檻意何如平安信不虚近來焚諫草深去覓山居志定榮枯外身全寵辱餘分明知在處難寄亂離書經賈島舊居先生居處所野燒㡬為灰若有吟魂在應隨夜魄迴地寧銷志氣天忍罪清才古木霜風曉江禽共宿來送人游塞槐桞野橋邊行塵暗馬前秋風來漢地客路入胡天鴈聚河流濁羊羣磧草膻那堪隴頭宿鄉夢逐潺湲桃花千株含露態何處照人紅風暖仙源裏春和水國中流鶯應見落舞蜨未知空擬欲求圗畫枝枝帶竹叢聞鴈何處人驚起飛來過草堂丹心勞避弋萬里念隨陽影斷風天月聲孤荻岸霜明年趂春去江上别鴛鴦送人遊南南國多山水君逰興可知船中江上景晩泊早行時子美遺魂地藏真舊墨池經過㡬銷日荒草裏尋碑送益公歸舊居舊隠終牽夢春殘結束歸溪山無伴過風雨有花飛片石留題字孤潭照浣衣鄰僧喜相接埽逕與開扉不睡永夜不欲睡虚堂閉復開却離燈影去待得月光來落葉逢巢住飛螢值我迴天明拂經案一炷白檀灰新秋雨後夜雨洗河漢詩懐覺有靈籬聲新蟋蟀草影老蜻蜓靜引閒機發凉吹逺思醒逍遥向誰説時泥漆園經送劉蜕秀才赴舉百發百中技長陽獻賦年丹枝如計分一箭的無偏文物兵銷國關河雪霽天都人看春榜韓字在誰前留題仰山大師塔院嵐光疊杳㝠曉翠濕窗明欲起逰方去重來繞塔行亂雲開鳥道羣木發秋聲曽約諸徒弟香燈盡此生亂中聞鄭谷吳延保下世小諫纔埋玉星郎亦逝川國由多聚盗天似不容賢兵火焚詩草江流漲墓田長安已塗炭追想更凄然送東林寺睦公徃吳國八月江行好風㠶日夜飄煙霞經北固禾黍過南朝社客無宗炳詩家有鮑昭莫因賢相請不返舊山椒除夜夜久誰同坐爐寒鼎亦澄亂松飄雨雪一室掩香燈白髪添新嵗清吟減舊朋明朝待晴旭池上看春冰送祕上人誰喜老閒身春山起送君欲慿蓮社信轉入洞庭雲道路長無阻干戈漸未聞秋來向何處相憶鴈成羣寓居嶽麓謝進士沈彬再訪去嵗來尋我留題在蘚痕又因風雪夜重宿古松門玉有疑休泣詩無主且言明朝此相送披褐入桃源對雪松門堆復積埋石亦埋莎為瑞還難得居貧莫厭多聴憐終夜落吟惜一年過誰在江樓望漫漫墮緑波和岷公送李評事徃宜春兵火銷鄰境龍沙有去人江潭牽興逺風物入題新雪湛將殘臘霞明向早春郡侯開宴處桃李照歌塵送僧老憶遊方日天涯錫獨揺凌晨從北固衝雪向南朝鬢髪泉邊剃香燈樹下燒雙峯諸道友夏滿有書招過荆門路出荆門逺行行日欲西草枯蠻塜亂山斷漢江低野店叢蒿短煙村簇樹齊翻思故林去在處有猿啼山中答人謾道詩名出何曾著苦吟忽來還有意已過即無心夏日山長徃霜天寺獨尋故人憐拙朴時復寄空林贈盧明府閒居鬢霜垂七十江國久辭官滿篋新風雅何人舊嵗寒閒居當野水幽鳥宿漁竿終欲相尋去兵戈時轉難幽庭不放生纎草從教徧綠苔還防長者至未著牡丹栽蛺蜨空飛過鶺鴒時下來南鄰折芳子到此寂寥迴送休師歸長沙寧覲吾子此歸寧風煙是舊經無窮芳草色何處故山青偶泊鳴蟬島難眠好月汀殷勤問安外湘岸採詩靈將遊嵩華行次荆渚蓮峯映敷水嵩嶽壓伊河兩處思歸久前賢隠去多閒身應絶跡在世幸無他㑹向紅霞嶠僧龕對薜蘿逺思逺思極何處南樓煙水長秋風過鴻鴈遊子在瀟湘海面雲生白天涯墮晩光徘徊古堤上曽此贈垂楊寄勉二三子不見二三子悠然吳楚間盡應生白髪幾箇在青山暇日還宜愛餘生莫放閒君聞國風否千載詠關關渚宫江亭寓目津亭雖極望未稱本心閒白有三江水青無一㸃山新鴻喧夕浦逺棹聚空灣終遂歸匡社孤㠶即此還蝴蜨何處背繁紅迷芳到檻重分飛還獨出成隊偶相逄逺害終防雀争先不避蜂桃蹊牽徃復蘭徑引相從翠裛丹心冷香凝粉翅濃可尋穿樹影難覓宿花蹤日晩來仍急春殘舞未慵西風舊池館猶得採芙蓉送劉秀才徃東洛羡子去東周行行非旅遊煙霄有兄弟事業盡曹劉洛水清奔夏嵩雲白入秋來年遂鵬化一舉上瀛洲移竹舊溪千萬竿風雨夜珊珊白首來江國黄金買嵗寒乍移傷粉節終遶著朱欄㑹得承春力新抽錦籜看雉角角類關關春晴錦羽乾文呈五色異瑞入九苞難暮宿紅蘭暖朝飛緑野寒山梁從行者錯解仲尼歎懷軒轅先生不得先生信空懷汗漫秋月華離鶴背日影上鼇頭欲學孤雲去其如重骨留槎程在何處人世屢荒丘永夜感懷寄鄭谷郎中展轉復展轉所思安可論夜涼難就枕月好重開門霜殺百草盡蛩歸四壁根生來苦章句早遇至公言賣松者未得凌雲價何慙所買真自知桃李世有愛嵗寒人瑟瑟初離澗青青未識塵寧同買花者貴逐片時春丙寅嵗寄潘歸仁九土盡荒墟干戈殺害餘更須憂去國未可守貧居康泰終來在編聨莫破除他年遇知巳無恥報襜褕嘗茶石屋晩煙生松窗䥫碾聲因留來客試共説寄僧名味擊詩魔亂香捜睡思輕春風霅川上憶傍緑叢行楊花暖景照悠悠遮空勢漸稠乍如飛雪逺未似落花休萬帶都門外千株渭水頭紛紜知近夏銷歇恐成秋軟著朝簪去狂隨别騎逰斾衝離館驛鶯撲繞宫樓江國晴愁對池塘晚見浮虚窗縈筆雅深院藉苔幽靜墮王孫酒繁粘客子裘詠吟何潔白根本屬風流向日還輕舉因風更自由不堪思汴岸千里到揚州詠影萬物患有象不能逃大明始隨殘魄滅又逐曉光生曲直寧相隠洪纎必自呈還如至公世洞鑒是非情南歸舟中二首南歸乘客棹道路免﨑嶇江上經時節船中聴鷓鴣春容含衆岫雨氣泛平蕪落日停舟望王維未有圖長江春氣寒客况棹聲閑夜泊諸村雨程廻數郡山桑根垂斷岸浪沫聚空灣巳去鄰園近隨縁是暫還送遷客天涯即愛州謫去莫多愁若似承恩好何如傍主休瘴昬銅柱黑草赤火山秋應想堯隂下當時獬豸頭題中上人院高房占境幽講退即㝠捜欠鶴同支遁多詩似恵休瓶澄孤井浪案白小窗秋莫道歸山字朝賢日獻酬逢鄉友無况來江島逢君話滯留生縁同一國相識共他州竹影斜青蘚茶香在白甌猶憐心道合多事亦㝠捜自勉試算平生事中年欠五年知非未落後讀易尚加前分受詩魔役寧容俗態牽閑吟見秋水數隻釣魚船寄詩友天地有萬物盡應輸苦心他人雖欲解此道奈何深返朴遺時態關門度嵗隂相思去秋夕共對冷燈吟居道林寺書懐花落水喧喧端居信晝昬誰來看山寺自要掃松門是事皆能諱唯詩未嬾言傳聞好時世亦欲背啼猿經吳平觀中元齋醮後殘燼滿空壇老鶴心何待尊師鬢巳乾幡燈古殿夜霜霰大椿寒誰見長生路人間事萬端劍客㧞劍遶殘樽歌終便出門西風滿天雪何處報人恩勇死尋常事輕讐不足論翻嫌易水上細碎動離魂白髪莫染亦莫鑷任從伊滿頭白雖無耐藥黑也不禁秋靜枕聴蟬臥閑垂㸔水流浮生未逹此多為爾為愁秋興寄𦙍公風聲吹竹健涼氣著身輕誰有閑心去江邊看水行村遥紅樹逺野闊白煙平試裂芭蕉片題詩問竺卿野步城裏無閑處却尋城外行田園經雨水鄉國憶桑耕傍澗蕨薇老隔村岡隴横何窮此心興時復鷓鴣聲殘春三月看無也芳時此可嗟園林欲向夕風雨更吹花影亂衝人蜨聲繁遶壍蛙那堪傍楊桞飛絮滿鄰家酬尚顔取盡風騷妙名高身倍閑久離王者闕欲向祖師山幕府秋招去溪隣日望還伊余豈詶敵來徃踏苔斑苦熱雲勢嶮於峰金流斷竹風萬方應望雨片景欲焚空毒害芙蓉死煩蒸瀑布紅恩多是團扇出入畫屏中送歐陽秀才赴舉莫疑空手去無援取高科直是文章好爭如徳行多煙霄心一寸霜雪路千坡稱意東歸後交親那喜何放鷺鷥潔白雖堪愛腥膻不那何到頭從所欲還汝舊滄波謝王秀才見示詩巻誰見少年心低摧向苦吟後須離影響得必洞精深道院春苔徑僧樓夏竹林天如愛才子何慮未知音送徐秀才之吳吳都霸道昌才子去觀光望闕雲天近朝宗水路長海門收片雨建業泊殘陽欲問淮王信仙都即帝鄉獨院偶作風篁清一院坐卧潤肌膚此境終抛去鄰房肯信無身非王者役門是祖師徒畢竟伊雲鳥從來我友于酬元員外見寄僻巷誰相訪風籬翠蔓牽易中通性命貧裏過流年且有吟情撓都無俗事煎時聞得新意多是此忘縁寄文秀大師皎然靈一時還有屈於詩世豈無英主天何惜大師道終歸正始心莫問多岐覽巻堪驚立真風喜未衰夏雨霮䨴蔽穹蒼㝠濛自一方當時消酷毒隨處有清涼著物聲雖暴滋農潤即長乍紅縈急電微白露殘陽應禱尤難得經旬甚不妨吟聴喧竹樹立見漲池塘衆類聲休出羣峰色盡藏頺沲來洞壑汗漫入瀟湘下叶黎甿望高袪旱暵光幽齋飄卧簟極浦洒歸檣蘚在堦從濕花衰苑任傷開思濟時力謌詠發哀腸謝興公上人寄山水簇子半幅古潺顔看來心意閑何須尋鳥道即此出人間巘暮疑啼狖松深認掩關知君逺相恵免我憶歸山酬後上人古律皆深妙新吟復造微捜難窮月窟琢苦盡天機晚檜清蟬咽寒江白鳥飛他年舊山去為子逺携歸同光嵗送人及第東歸西笑道何光新朝舊桂堂春官如白傅内試似文皇變化龍三十升騰鳳一行還家㡬多興滿袖月中香寄江居耿處士野癖雖相似生涯即不同紅霞禪石上明月釣船中醉到蘆花白吟縁蓼岸紅相思何以寄吾道本空空病起二首一卧四十日起來秋氣深巳甘長逝魄還見舊交心撐拄筇猶重枝梧力未任終将此形陋歸死故丘林秋風已傷骨更帶竹聲吹抱疾關門久扶羸傍砌時無生即不可有死必相隨除却歸真覺何由擬免之送中觀進公歸巴陵一論破雙空持行大國中不知從此去何處挫邪宗晝雨懸㠶黑殘陽泊島紅應游到㴩岸相憶遶茶叢白蓮集巻一欽定四庫全書白蓮集巻二唐釋齊巳撰寄鄭谷郎中高
