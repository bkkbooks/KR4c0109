body:
  text: 寄東林言之禪子閒思相送後幽院閉苔錢使我吟還廢聞君病未痊聴秋惟困坐怕客但佯眠可惜東牕月無寥過一年寒節日寄鄉友嵗嵗逢寒食寥寥古寺家踏青思故里垂白看楊花原野稀疎雨江天冷澹霞滄浪與湘水歸恨共無涯聞西蟾從弟卜巖居嶽西有寄瀑布見髙低巖開巖壁西碧雲多舊作紅葉幾新題滴瀝中疎磬嵌空半倚梯仍聞樵子徑總不到前溪寄懐西蟾師弟蟾師有萬里八九月一身西北風之句萬里八九月一身西北風自從相示後長記在吟中見説南逰逺堪懐我姓同江邊忽得信迴到岳門東撲滿子秪愛滿我腹爭知滿害身到頭須撲破却散與他人寄西川惠光大師曇域禪月有名子相知面未曾筆精垂壁溜詩澀滴杉氷蜀國從栖泊蕪城幾廢興憶歸應寄夢東北過金陵憶别匡山寄彭澤乾晝上人憶别匡山日無端是逺逰却迴看五老飜悔上孤舟蹭蹬三千里蹉跎二十秋近來空寄夢時到虎溪頭又寄彭澤晝公聞君彭澤住結搆近陶公種菊心相似嘗茶味不同湖光秋枕上嶽翠夏牕中八月東林去吟香菡萏風因覽支使孫中丞看可準大師詩序有寄一千篇裏選三百首菁英玉尺新量出金刀舊剪成錦江增古翠仙掌減元精凖公曾以詩道訪司空圗於華下自此為風格留傳諸後生新秋病中枕上聞蟬枕上稍醒醒忽聞蟬一聲此時知不死昨日即前生更欲臨牕聴猶難䇿杖行尋應同蜕殻重飲露華清寄雲葢山先禪師曾尋湘水東古翠積秋濃長老禪栖處半天雲盖峯閑牀饒得石雜樹少於松近有誰堪話瀏陽妙指蹤落葉落多秋亦晚牕外見諸隣世上誰驚盡林間獨掃頻蕭騷微月夜重疊早霜晨昨日繁隂在鸎聲樹樹春次耒陽作遶岳復沿湘衡陽又耒陽不堪思北客從此入南荒旦夕多猿狖淹留少雪霜因經杜公墓惆悵學文章舟中晚望祝融峯天際卓寒青舟中望晚晴十年闗夢寐此日向崢嶸巨石凌空黑飛泉照野眀終當躡孤頂坐看白雲生弔杜工部墳鵬翅蹋於斯眀君知不知域中詩價大荒外土墳卑瘴雨無時滴蠻風有穴吹唯應李太白䰟魄往来疲嶽中寄殷處士出岳與入岳前題繼後題遍尋僧壁上多在雁峯西近説逰江寺將誰話石梯相思立髙巘山下草萋萋送幽禪師霜繁野葉飛長老巻行衣浮世不知處白雲相待歸磬和天籟響禪動岳神威莫便言長往勞生待發機燒獵獵寒蕪引承風勢不還放來應有主焚去到何山焰入空濛裏煙飛莽蒼間石中有良玉惆悵但傷顔詠茶十二韻百草讓為靈功先百草成甘傳天下口貴占火前名出處春無雁収時谷有鶯封題從澤國貢獻入秦京齅覺精新極嘗知骨自輕妍通天柱響摘遶蜀山眀賦客秋吟起禪師晝卧驚角開香滿室爐動綠凝鐺晚憶涼泉對閑思異果并松黄乾旋泛雲母滑随傾頗貴髙人寄尤宜别匱盛曾尋修事法妙盡陸先生寄陽岐西峯僧西峯殘照東瀑布洒㝠鴻閑憶髙牕外秋晴萬里空藤隂藏石磴衣毳落杉風日有誰來覔層層鳥道中迴鴈峯瘴雨過孱顔危邊有徑盤壯堪扶夀岳靈合置仙壇影北鴻聲亂青南客道難他年思隐遁何處憑闌干贈詢公上人威儀何貴重一室貯氷清終日松杉徑自多蟲蟻行像前孤立影鐘外數珠聲知悟修來事今為第幾生秋興所見背時情閒行亦獨行晚涼思水石危閣望崢嶸雨外殘雲片風中亂葉聲舊山吟友在相憶夢應清古寺老松百嵗禪師説先師指此松小年行道遶早見偃枝重月檻移孤影秋亭卓一峯終當因夜電拏攫便雲龍題無余處士書齋閑地從莎蘚誰人愛此心琴棊懐客逺風雪閉門深枕外江灘響牕西樹石隂他年衡岳寺為我一相尋嵗暮江寺住山衣枯槁容何處見年終風雪軍城外蒹葭古寺中孤村誰認磬極浦夜鳴鴻坐憶匡廬隐泉聲滴半空新燕棲託近佳人應憐巧語新風光華屋暖絃管牡丹晨逺采江泥膩雙飛麥雨勻差池自有便敢觸杏梁塵喻吟日用是何專吟疲即坐禪此生還可喜餘事不相便頭白無邪裏魂清有象先江花與芳草莫染我情田過湘江唐宏書齋四隣無俗跡終日大開門水晚來邊鴈林秋下楚猿一家隨難在雙眼向書昬况近騷人廟吟應是古魂讀賈島集遺篇三百首首首是遺寃知到千年外更逢何者論離秦空得罪入蜀但聴猿還似長沙祖惟餘賦鵩言寄山中諸友自歸城裏寺長憶宿山門終夜㝠心客諸峯呌月猿嵐光生眼力泉滴爽吟魂只待逰方遍還來掃樹根懐終南僧擾擾二京塵何門是了因萬重千疊嶂一去不來人鳥道春殘雪蘿龕晝定身寥寥石牕外天籟動衣巾送二友生歸宜陽二生俱我友清苦輩流稀舊國居相近孤㠶秋共歸殘陽沙鳥亂疎雨島楓飛幾宿多山處猿啼燭影微懐從弟孤牕燭影㣲何事阻吟思兄弟斷消息山川長路岐月沉栖鶴塢霜著呌猿枝可想為懐抱多愁多難時岳陽道中作客思尋常動未如今斷魂路岐經亂後風雪少人村大澤鳴寒雁千峯啼晝猿爭教此時白不上鬢鬚根赴鄭谷郎中招逰龍興觀讀題詩板謁七真儀像因有十八韻何處陪逰勝龍興古觀時詩懸大雅作殿禮七真儀逺繼周南美彌旌拱北思雄才垂朴畧後輩仰箴規對坐茵花暖偕行蘚陣隳僧絛初學結朝服久慵披到處琴棊傍登樓筆硯隨論禪忘視聴談老極希夷照日江光逺遮軒檜影欹觸鞋松子響窺立鶴雛癡始貴茶巡爽終憐酒散遲放懐還把杖憩石或搘頤眺逺凝清眄吟髙動白髭風鵬心不小蒿雀志徒卑顧我專無作於身忘有為叨因五字解毎忝重言期捨此應休也何人更賞之淹留仙境晚迴騎雪風吹書李秀才壁干戈阻上書南國寄貧居舊里荒應盡新年病未除牕風連島樹門逕接隣蔬我有閑來約相看雪滿殊聞尚顔下世岳僧傳的信聞在麓山亡郡有為詩客誰來弔影堂夢休尋灞滻跡已絶瀟湘逺憶同吟石新秋檜栢涼薔薇根本似玫瑰繁英刺外開香髙藂有架紅落地多苔去住閒人看晴明逺蝶來牡丹先幾日銷歇向塵埃送隆公上人獨携譚柄去千里指人寰未斷生徒望難教白日閒空江横落照大府向西山好騁陳那孔誰云刼石頑宿簡寂觀萬壑雲霞影千年松檜聲如何教下士容易信長生月共虛無白香和沆瀣清閑尋古廊畫記得列仙名遇元上人七澤過名山相逢黄落殘杉松開寺晚泉月話心寒祖遍諸方禮經曾幾處看應懐出家院紫閣近長安早梅萬木凍欲折孤根暖獨迴前村深雪裏昨夜一枝開風逓幽香去禽窺素艶來明年猶應律先發映春臺聴泉落石幾萬仞逺聲飄冷空髙秋初雨後半夜亂山中只有照壁月更無吹葉風幾曾廬岳聴到曉與僧同送孫逸人歸廬山獨自擔琴鶴還歸瀑布東逍遥非俗趣楊栁謾春風草遶村程緑花盤石磴紅他時許相覔五老亂雲中聴李尊師彈琴仙子㺯瑶琴仙山松月深此聲含太古誰聴到無心洒石霜千片歕崖泉萬尋何人傳指法携向海中岑寄武陵微上人善巻臺邊寺松筠遶祖堂秋聲度風雨曉色遍滄浪白石同誰坐清吟過我狂近聞為古律雅道更重光匡山寓居栖公外物盡已外閑逰且自由好山逢過夏無事住經秋樹影殘陽寺茶香古石樓何時定休講歸漱虎溪流湘西道林寺陶太尉井太尉遺孤井寒澄七百年未聞陵谷變終與姓名傳影浸無風樹光含有月天林僧曉來此滿汲洒金田寄松江陸龜蒙處士萬巻功何用徒稱處士休閑欹太湖石醉聴洞庭秋道在誰開口詩成自㸃頭中間欲相訪尋便阻戈矛閉門外事休闗念灰心獨閉門無人來問我白日又黄昏燈集飛蛾影牕銷迸雪痕中心自明了一句祖師言看水范蠡東浮闊靈均北泛長誰知逺煙浪别有好思量故國門前急天涯棹裏忙難収上樓興𣺌漫正斜陽寄栖白上人萬國爭名地吾師獨此閒題詩招上相看雪下南山内殿承恩久中條進表還常因秋貢客少得掩禪闗自題禪外求詩妙年來鬢巳秋未曾將一字容易謁諸侯挂夢山皆逺題詩石盡幽敢言梁太子傍采碧雲流孫支使來借詩集因有謝㝠捜從少小隨分得淳元聞説吟僧口多傳過蜀門相尋江島上共看夏雲根坐落遲遲日新題互把論夏日言懐苦被流年迫衰羸老病情得歸青嶂死便共白雲生樹枿燒爐響崖稜躡屐聲此心人信否魂夢自分眀早秋寄友生雨多殘暑歇蟬急暮風清誰有閑心去江邊看水行河遥紅蓼簇野闊白煙平試折秋蓮葉題詩寄竺卿送王秀才往松滋夏課松滋聞古縣眀府是詩家靜理餘無事歌眠盡落花江光揺夕照栁影帶殘霞君去應相與乗船泛月華喜􅈯公自武陵至已盡滄浪興還思湘楚行鬢全無舊黒詩别有新清暫憩臨寒水時來扣靜荆囊中有靈藥終不獻公卿假山并序假山者盖懐匡廬有作也往嵗當居東郭因夢覺遂圗於壁迄於十秋而攅青疊碧於寤寐間宛若捫蘿挽樹而昇彼絶頂今所作倣像一面故不盡萬壑千巖神仙鬼怪之宅聊得解懐既而功就乃激幽抱而作是詩終於一百八十言爾匡廬久别離積翠杳天涯靜室曾圗峭幽庭復創竒典衣酬土價擇日運工時信手成重疊隨心作蔽虧根盤驚院窄頂聳訝簷卑鎮地那言重當軒未厭危巨靈何忍擘秦政肯輕移曉覺莎煙觸寒聞竹籟吹藍灰澄古色泥水合凝滋引看僧來數牽吟客散遲九華渾髣髴五老頗參差蛛網藤蘿挂春霖瀑布垂加添雙石笋映帶小蓮池舊説雷居士曾聞逺大師紅霞中結社白壁上題詩顧此誠徒爾勞心是妄為經營慙培塿賞翫愧童兒㑹入千峯去閒蹤任屬誰謝西川可準上人逺寄詩集匡社經行外沃洲禪宴餘吾師還繼此後輩復何如江上傳風雅靜中時巻舒堪隨樂天集共伴白芙蕖秋空已覺秋空極更堪寥泬青只應容好月爭合有妖星耿耿髙河截翛翛一鴈經曾於洞庭宿上下徹心靈與聶尊師話道伯陽遺妙㫖杳杳與㝠㝠説即非難説行還不易行藥中迷九轉心外覔長生畢竟荒原上一盤蒿隴平送相里秀才自京至却迴夷門詩客至楚寺閉蕭騷老病語言澀少年風韻髙難於尋閬島險甚涉雲濤珍重西歸去無忘役思勞謝人寄南榴卓子幸附全材長良工斸器殊千株文栢有一尺錦榴無品格宜仙果精光稱玉壺憐君逺相寄多愧野蔬麤寄舊居隣友别後知何趣捜竒少客同幾層山影下萬樹雪聲中晚鼎烹茶綠晨厨㸑粟紅何時携巻出世代有名公送朱秀才歸閩荆門來幾日欲往又囊空逺客歸南越單衣背北風近鄉㣲有雪到海漸無鴻努力成詩業無謀謁至公龍潭作乍臨毛髪竪雙壁夾湍流白日鳥影過青苔龍氣浮蔽空雲出石應禱雨翻湫四面耕桑者先聞賀有秋依韻酬謝尊師見贈二首師欲調舉南國捜竒久偏傷杜甫墳重來經漢浦又去入嵩雲舊别人稀見新朝事漸聞莫將髙尚跡閑處傲明君嶽頂休髙卧荆門訪掩扉新詩遺我别舊約與誰歸賢路曾無滯良時肯自違眀年窺月窟仙桂露霏微送氷禪再往湖中行心寧肯住南去與誰羣碧落髙空處清秋一片雲穿林瓶影滅背雨錫聲分應笑逰方久龍鍾楚水濆喜表公往楚王城已聞人捨地結搆舊基平一面湖光白隣家竹影清應難尋輦道空説是王城誰信興亡跡今來有磬聲春雪初晴喜友生至數日不見日飄飄勢忽開雖無忙事出還有故人來已盡南簷滴仍殘北牖堆明朝望平逺相約在春臺殘春連雨中偶作懐人南隣阻杖藜屐齒遶床泥漠漠門長掩遲遲日又西不知何興味更有好詩題還憶東林否行苔傍虎溪送崔判官赴歸倅白首從顔巷青袍去佐官只應微俸祿聊補舊饑寒地説丘墟甚民聞旱歉殘春風吹綺席賓主醉相歡寒食日懐寄友人萬井追寒食閑扉獨不開梨花應折盡栁絮自飛來夢覺懐仙島吟行遶砌苔浮生已悟了時節任相催懐巴陵舊逰洞庭雲夢秋空碧共悠悠孟子狂題後何人更倚樓日西來逺棹風外見平流終欲重尋去僧窓古岸頭招乾晝上人宿話連夜因風雪相留在寂寥禪心誰指示詩巻自焚燒語黙鄰寒漏牕扉向早朝天台若長往還渡海門潮荆門秋日寄友人青溪知不逺白首要難歸空想煙雲裏春風鸞鶴飛誰論傳法偈自補坐禪衣未謝侯門去尋常即掩扉哭鄭谷郎中朝衣聞典盡酒病覺難醫下世無遺恨傳家有大詩新墳青嶂疊寒食白雲垂長憶招吟夜前年風雪時白蓮集巻六欽定四庫全書白蓮集巻七唐釋齊已撰
