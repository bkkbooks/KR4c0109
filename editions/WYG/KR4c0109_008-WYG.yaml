body:
  text: 湘中寓居春日感懐江禽野獸兩堪傷避射驚彈各自忙頭角任多無獬豸羽毛雖衆讓鴛鴦落苔紅小櫻桃熟侵井青纎燕麥長吟把離騷憶前事汨羅春浪撼殘陽瀟湘寒清健碧逺相合珠媚根源在極南流古逓今空作島逗山衝壁自為潭遷來賈誼愁無限謫過靈均恨不堪畢竟輸他老漁叟綠簔青竹釣濃藍寄友生風騷情味近如何門底寒流屋裏莎曾摘園蔬留我宿共吟江月看鴻過時危苦恨無収拾道妙深誇有琢磨涼夜欹眠應得夢平生心肺似君多酬答退上人鬚鬢三分白二分一生縱跡出人羣嵩丘夢憶諸峯雪衡岳禪依五寺雲青衲幾臨髙瀑濯苦吟曾許斷猿聞荒村殘臘相逢夜月滿鴻多楚水濆山中春懐心魂役役不曾歸萬象相牽向極㣲所得或憂逢郢刃凡言皆欲奪天機逰深晚谷香充鼻坐苦春松粉滿衣何物不為狼籍境桃花和雨落霏霏寄鄭谷郎中上國誰傳消息過醉眠醒坐對嵯峨身離道士衣裳少筆答禪師句偈多南岸郡鐘涼度枕西齋竹露冷霑莎還應笑我降心外惹得詩魔助佛魔寄萍鄉唐禀正字新書聲價滿皇都髙卧林中更起無春興酒香薰肺腑夜吟雲氣濕髭鬚同登水閣僧皆别共上漁舡鶴亦孤長憶前年送行處洞門殘日照菖蒲秋夕書懐涼多夜永擁山袍片石閑欹不覺勞蟋蟀遶床無夢寐梧桐滿地有蕭騷平生樂道心常切五字逢人價合髙破落西窓向殘月露聲如雨滴蓬蒿亂後經西山寺松燒寺破是刀兵谷變陵遷事可驚雲裏乍逢新住主石邊重認舊題名閑臨菡萏荒池坐亂踏鴛鴦破瓦行欲伴髙僧重結社此身無計捨前程題梁賢巽公房吳王廟側有髙房簾影南軒日正長吹苑野風桃葉碧壓畦春露菜花黄懸燈向後惟㝠黙凭案前頭即渺茫知有虎溪歸夢切寺門松折社僧亡塘上閑作閑行閑坐藉莎煙此興堪思二古賢陶靖節居彭澤畔賀知章在鏡湖邊鴛鴦著對能飛繡菡萏成羣不語仙形影騰騰夕陽裏數峯危翠滴漁船江上望逺山寄鄭谷郎中公時退居仰山危碧層層映水天半垂崗隴下民田王維愛甚難抛畫支遁髙多不惜錢巨石盡含金玉氣亂峯閑鎖棟梁煙秦爭漢奪空勞力却是巢由得穏眠送人自蜀迴南逰錦水東浮情尚鬱湘波南泛思何長蜀魂巴狖悲殘夜越鳥燕鴻呌夕陽煙月幾般為客路林泉四絶是吾鄉尋幽必有僧相指宋杜題詩近舊房寄无願上人六十八去七十嵗與師年鬢不爭多誰言生死無消處還有修行那得何開士安能窮好惡故人堪憶舊經過㑹歸原上焚身後一陣灰飛也任他懐瀟湘即事寄友人浸野淫空淡蕩和十年隣住聴漁歌城臨逺棹浮煙泊寺近閑人泛月過岸引綠蕪春雨細汀連斑竹晚風多可憐千古懐沙處還有魚龍㺯白波謝橘洲人寄橘洞庭栽種似瀟湘綠遶人家帶夕陽霜裛露蒸千樹熟浪圍風撼一洲香洪崖遣後名何逺陸績懐來事更長藏貯待供賔客好石榴宜稱映丹光自貽心中身外更何猜坐石看雲養聖胎名在好詩誰逐去跡依閑處自歸來時添瀑布新瓶水旋換旃檀舊印灰晴出寺門驚往事古松千尺半蒼苔寄益上人長想尋君道路遥亂山霜後火新燒近聞移住隣衡岳幾度題詩上石橋古木傳聲連峭壁一燈懸影過中宵風騷味薄誰相愛欹枕常多夢鮑昭行次宜春寄湘西諸友幸無名利路相迷雙履尋山上栢梯衣鉢祖辭梅嶺外香燈社别橘洲西雲中石壁青侵漢樹下苔錢綠遶溪我愛逺逰君愛住此心他約與誰携送畧禪者歸南岳林下鐘殘又拂衣錫聲還獨向南飛千峯冷截㝠鴻處一徑險通禪客歸青石上行苔片片古杉邊宿雨霏霏勞生有願應回首忍著無心與物違詠懐寄知已已得浮生到老閒且將新句擬𤣥闗自知清興來無盡誰道淳風去不還三百正聲傳世後五千真理在人間此心終待相逢説時復登樓看暮山寄吳拾遺新作將誰㩁重輕皎然評裏見權衡非無苦到難捜處合有清垂不朽名疎雨晚衝蓮葉響亂蟬涼抱檜梢鳴野橋閑背殘陽立翻憶蘇卿送子卿春晴感興連旬隂翳曉來晴水滿圎塘照日眀岸草短長邊過客江花紅白裏啼鶯野無征戰時堪望山有樓臺暖好行桑柘依依禾黍綠可憐歸去是張衡謝道友拄杖翦自南巖瀑布邊寒光七尺乳珠連持來未入塵埃路乞與應憐老病年欹影夜歸青石澗卓痕秋過綠苔錢他時携上嵩峯頂把倚長松看洛川東林寄别修睦上人行心乞得見秋風雙履難留更住蹤紅葉正多離社客白雲無限向嵩峯囊中自欠詩千首身外誰知事幾重此别不能為後約年華相似逼衰容夏日原西避暑寄吟友熱煙疎竹古原西日日乗涼此杖藜閑處雨聲隨霹靂旱田人望隔虹霓蟬依獨樹乾吟苦鳥憶平川渇過齊别有相招好泉石瑞花瑶草盡堪携懐匡阜荆州連嵗滯逰方拄杖塵封六尺光洗面有香思石溜𠖇心無撓憶山床閒機但媿時機速靜論須慙世論長昨夜分明夢歸去薜蘿幽逕遶禪房靜坐繩床欹坐任崩頽雙眼醒醒閉復開日月更無閑裏過風騷時有靜中来天真自得生難捨世幻誰驚死不迴何處堪投此蹤跡水邊晴去上髙臺寄湘中諸友碧雲諸友盡黄眸石㸃花飛更説無嵐翠濕衣松接院芙蓉薰面寺臨湖沃洲髙卧心何僻匡社長禪興亦孤爭似楚王文物國金鑣紫綬讓前途答无願上人書鄭生驅蹇峴山迴傳得安公好信来千里阻修俱老骨八行重疊慰寒灰春殘桃李猶開户雪滿松杉始上臺必有南逰山水興漢江平穏好浮杯送𦙍公歸闕西朝歸去見髙情應戀香燈近聖明闗令莫疑非馬辯道安還跨赤驢行充齋野店蔬無味灑笠平原雪有聲忍惜文章便閑得看他趨競取時名感時忽忽枕前蝴蝶夢悠悠覺後利名塵無窮今日眀朝事有限生來死去人終與狐狸為窟穴謾師龜鶴養精神可憐顔子能消息虚室坐忘心最真湖上逸人澹蕩光中翡翠飛田田初出栁絲絲吟沿綠島時逢鶴醉泛清波或見龜七澤釣師應識我中原逐鹿不知誰秋風水寺僧相近一徑蘆花到竹籬懐巴陵垂白堪思大亂前薄逰曾駐洞庭邊尋僧古寺沿沙岸倚杖殘陽落水天蘭芷蔫菸騷客廟煙波晴濶釣師船此時欲買君山住懶就商人乞箇錢渚宫謝楊秀才自嵩山相訪嵩峯有客逺相尋塵滿麻衣袖苦吟花盡草長方閉户道孤身老正傷心紅堆落日雲千仭碧撼涼風竹一林惆悵雅聲消歇去喜君聊此暫披襟荆門寄沈彬罷趍眀聖懶從知鶴氅褵褷遂性披道有靜君堪託跡詩無賢子擬傳誰松聲白石邊行止日影紅霞裏夢思珍重兩篇千里達去年江上雪飛時讀隂符經遶牕風竹骨輕安閒借隂符仰卧看絶利一源真有謂空勞萬巻是無端清虚可保昇雲易嗜慾終知入聖難三要洞開何用閉髙臺時去凭欄干寄吳國知舊淮甸當年憶旅逰衲衣梭笠外何求城中古巷尋詩客橋上殘陽背酒樓晴色水雲天合影晚聲名利市爭頭可憐王化融融裏惆悵無僧似惠休移居上台言任養疎愚乞與西城水滿湖吹榻好風終日有趂凉閑客片時無檀欒翠擁清蟬在菡萏紅殘白鳥孤欲問存思捜抉妙幾聫詩許敵三都喜彬上人逺見訪髙吟欲繼沃洲師千里相尋問課虚􅋊臈江山行盡處滿衣風雪到閑居携來律韻清何甚趣入幽㣲㫖不疎莫惜天機細搥琢他時終可擬芙蕖荆州新秋寺居寫懐詩五首上南平王竹如翡翠侵簾影苔學琉璃布地紋髙卧更應無此樂逺逰何必愛他雲閑聴謝眺吟為政靜看蕭何坐致君只恐老身衰朽速他年不得頌鴻勲井梧黄落暮蟬清久駐金臺但暗驚事佛未憐諸弟子談空爭動上公卿合歸鳥外藏幽跡敢向人前認好名滿印白檀燈一盞可能酬謝得聰眀金湯裏面境何求寶殿東邊院最幽栽種已添新竹影畫圗兼列逺山秋形容豈合親公子章句爭堪狎士流虚負岷峨老僧約年年雪水下汀洲漢江西岸蜀江東六稔安禪教化中託跡幸將王粲别歸心寧與子山同罇罍豈識曹參酒賔坐還親宋玉風又見去年三五夕一輪寒魄破煙空石龕閑鎻舊居峯何事膺門嵗月重五七詩中叨見過三千客外許疎慵迎涼蟋蟀喧閑思積雨莓苔没屐蹤㑹待英雄啟金口却教擔錫入雲松送李秀才歸湘中詞客擕文訪病夫因吟送别憶湘湖寒消浦溆催鴻鴈暖入溪山養鷓鴣僧向月中尋岳麓雲從城上去蒼梧君歸為問峯前寺舊住松房鎻在無寄吳國西供奉别來相憶夢多迷君住東朝我楚西瑶闕合陪龍象位春山休記鷓鴣啼承㤙位與千官别應制才將十子齊幾笑逺公慵送客殷勤只到寺前溪謝人恵端溪硯端人鑿斷碧溪潯善價爭教惜萬金礱琢已曾經敏手研磨終見透堅心安排得主難移動含貯隨時任淺深保重更求裝鈿匣閑將濡染寄知音送吳先輩赴京煙霄已遂眀經第江漢重來問苦吟託興偶憑風月逺忘機終在寂寥深千篇未聴常徒口一字須防作者心此日與君聊話後老身難約更相尋和西蜀可準大師逺寄之什莫知何路去追攀空想人間出世間杜口已同居士室傳心休問祖師山禪中不住方為定説處無生始是閑珍重希音逺相寄亂峯西望疊孱顔荆門暮冬與節公話别漳河湘岸栁闗頭離别相逢四十秋我憶黄梅夢南國君懐眀主去東周幾程霜雪經殘臘何處封疆過舊㳺好及春風承帝澤莫忘衰朽卧林丘賀孫支使郎中遷居别認公侯禮上才築金何啻舊燕臺地連東閣横頭買門對西園正面開不隔紅塵趨棨㦸只拖珠履赴罇罍應逢明月清霜夜閑鎻笙歌向此來庭際新移松竹三莖痩竹兩株松瑟瑟翛翛韻且同抱節乍離新澗雪盤根逺别舊林風嵗寒相倚無塵地䕃影分眀有月中更待陽和信催促碧梢青杪看凌空荆門寄題禪月大師影堂澤國聞師泥日後蜀王全禮𦵏餘灰白蓮塔向清泉鎻禪月堂臨錦水開西岳千篇傳古律大師著西岳集三十巻盛傳於世南宗一句邙靈臺不堪隻履還西去葱嶺如今無使迴賀雪上清凝結下乾坤為瑞為祥表致君日月影從光外過山河形向靜中分歌揚郢路誰同聴聲灑梁園客共聞堪想畫堂簾巻次輕隨舞袖正紛紛荆州寄貫㣲上人舊齋休憶對松闗各在王侯顧遇間命服已霑天渥澤衲衣猶擁祖斕斑相思莫救燒心火留滯難移壓腦山得失兩途俱不是笑他髙卧碧孱顔送休師歸長沙寧覲髙堂親老本師存多難長懸兩處魂已説戰塵消漢口便隨征棹别荆門晴吟野闊無耕地晚宿灣深有釣村他日更思衰老否七年相伴琢詩言江上夏日無處清隂似剡溪大雲竒崛倚空齊千山冷疊湖光外一扇凉揺楚色西碧樹影踈風易斷綠蕪平逺日難低故園舊寺臨湘水斑竹煙深越鳥啼渚宫春日因懐有作舊業樹連湘樹逺家山雲與嶽雲平僧来已説無耕釣鴈去那知有弟兄客思莫牽蝴蝶夢鄉心自憶鷓鴣聲沙頭南望堪腸斷誰把歸舟載我行松化為石近聞金華山古松化為石盤根幾聳翠崖前却偃凌雲化至堅乍結精華齊永刧不隨凋變已千年逢賢必用鐫辭立遇聖終將刻印傳肯似荆山鑿餘者蘚封頑滯卧嵐煙寄澧陽吳使君南客西來話使君涔陽風雨變行春四隣耕釣趨仁政千里煙花壓路塵去獸未勝除狡吏還珠爭似復逋民紅蘭浦暖携才子爛醉連題賦白蘋湘江送客湘江秋色湛如氷楚客離懐暮不勝千里碧雲聞塞鴈幾程青草見巴陵寒濤響疊晨征㯭岸葦藂明夜泊燈鸚鵡洲邊若迴首為思前事一捫膺暮逰岳麓寺寺樓髙出碧崖稜城裏誰知在上層初雪灑來喬木暝逺禽飛過大江澄閑消不睡憐長夜靜照無言謝一燈迴首何邊是空地四村桑麥遍丘陵林下留别道友住亦無依去是閒何心終戀此林間片雲孤鶴東西路四海九州多少山靜坐趂涼移樹影興隨題處著苔斑秋來洗浣行衣了還爾隣僧舊竹闗道林寺居寄岳麓禪師二首門前石路徹中峯樹影泉聲在半空尋去未應勞上下往来殊已倦西東髭根盡白孤雲竝心跡全忘片月同長憶髙窓夏天裏古松青檜午時風山袍不稱下紅塵各是閒居島外身兩處煙霞門寂寂一般苔蘚石磷磷禪闗悟後寧疑物詩格𤣥來不傍人月照經行更誰見露華松粉㸃衣巾亂後江西過孫魴舊居因寄舊逰重到倍悲涼吟憶同人倚寺墻何處暮蟬喧逆旅此中山鳥噪垂楊寰區有主權兵器風月無人掌桂香欲寄此心空北望塞鴻天末失歸行宜春江上寄仰山長老二首水隔孤城城隔山水邊時望憶師閒清泉白石中峯上落日半空栖鳥還雲影觸衣分朶朶雨聲吹磬散潺潺傳心莫學羅浮去後輩思量待扣闗雨晴天半碧光流影倒殘陽濕郡樓絶頂有人經劫在浮生無客暫時逰窓開萬壑春泉亂塔鎻孤燈萬木稠欲為吾師拂衣去白雲紅葉又新秋螢透窓穿竹住還移萬類俱閑始見伊難把寸光藏暗室自持孤影助眀時空庭散逐金風起亂葉爭投玉露垂後代儒生懶収拾夜深飛過讀書帷湘中送翁員外歸閩船滿琴書與酒盃清湘影裏片帆開人歸南國鄉園去鴈逐西風日夜来天勢漸低分海樹山程欲盡見城臺此身未别江邊寺猶看星郎奉詔迴寄居道林寺作嵐濕南朝殿塔寒此中因得謝塵寰已同庭樹千株老未負溪雲一片閒石境舊逰臨皎潔岳蓮曾上徹孱顔如今衰颯成多病黄葉風前晝掩闗沙鷗暖傍漁船睡不驚可憐孤潔似華亭晚來灣浦衝平碧晴過汀洲拂淺青翡翠靜中修羽翼鴛鴦閑處事儀形何如飛入漢宫去留與興亡作典經和翁員外題馬太傅宅賈相公井飛塵不敢下相干闇脉傍應潤牡丹心任短長投玉綆底須三五映金盤神工舊製泓澄在天澤時加瀲灔寒太傅欲旌前古事星郎屬思久憑欄看雪何峯觸石濕苔錢便逐髙風離瀑泉深處卧來真隐逸上頭行去是神仙千尋有影滄江底萬里無蹤碧落邊長憶舊山青壁裏遶菴閑伴老僧禪對雪寄荆幕知已猛勢㣲開萬里清月中看似日中明此時鷗鷺無人見何處闗山有客行郢唱轉髙誰敢和巴歌相顧自銷聲江齋巻箔含毫久應想梁王禮不經送相里秀才赴舉兩上東堂不見春文明重去有誰親曾逢少海樽前客舊是神仙㑹裏人已遂風雲催化羽却將雷電助燒鱗明年自此登龍後迴首荆門一路塵荆門疾中喜謝尊師自南嶽來相里秀才自京至閑堂晝卧眼初開强起徐行遶砌苔鶴氅人從衡嶽至鶉衣客自洛陽來坐聞隣樹栖幽鳥吟覺江雲發早雷西笑東逰此相别兩途消息待誰迴吟興自述前習都繇未盡空生知雅學妙難窮一千首出悲哀外五十年銷雪月中興去不妨歸靜慮情來何止發真風曾無一字千聲利豈愧操心負至公送謝尊師自南嶽出入京曾聴鹿鳴逢世亂因披羽服隠衡陽幾多事隔丹霄興三十年成兩鬢霜芝术未甘銷勇氣風騷無那激剛腸中朝舊有知音在可是悠悠入帝鄉送司空學士赴京𢎞文初命下江邊難戀沙鷗與釣船藍綬乍稱新學士白衫初脱舊神仙龍山送别風生路鷄樹從容雪照筵重謁往年金榜主便將才術佐陶甄白蓮集巻八欽定四庫全書白蓮集巻九唐釋齊已撰
