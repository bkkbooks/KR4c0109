body:
  text: 撰寄仰山光味長者大仰禪栖處杉松到頂隂下來雖有路歸去毎無心鳥道峰形直龍湫石影深經行誰得見半夜老猿吟貽廬岳陳沆秀才為儒老雙鬢勤苦竟何如四海方磨劍空山自讀書石圍泉眼碧秋落洞門虚莫慮捜賢僻徵君舊此居邊上漢地從休馬胡家自牧羊都来銷帝道渾不用兵防草上孤城白沙翻大漠黄秋風起邊鴈一一向瀟湘蟋蟀聲異蟪蛄聲聴須是正聴無風來竹院有月在莎庭雖不妨調瑟多堪伴誦經誰人向秋夕為爾欲忘形寄西山鄭谷神西望鄭先生焚修在杳㝠幾畨松骨朽未換鬢根青石闕涼調瑟秋壇夜拜星俗人應撫掌閑處誦黄庭讀參同契堪笑修仙侣燒金覓大還不知消息火只在寂寥闗鬢白爐中術魂飛海上山悲哉五千字無用在人間聞落葉楚樹雪晴後蕭蕭落晚風因思故國夜臨水幾株空煮茗燒乾脆行苔踏爛紅来年未離此還見碧叢叢謝王先輩昆弟逰湘中迴各見示新詩瀟湘多勝異宗社久徘徊兄弟同逰去幽竒盡采來只應求妙唱何以示寒灰上國携歸後惟呈不世才寄詶髙輦推官道自閑機長詩從靜境生不知春艶盡但覺雅風清竹膩題幽碧蕉乾裂脆聲何當九霄客重疊記無名逢詩僧禪𤣥無可並詩妙有何評五七字中苦百千年後清難求方至理不朽始為名珍重重相見忘機話此情話道大道多大笑寂寥何以論霜楓翻落葉水鳥啄閑門服藥還傷性求珠亦損魂無端鑿混沌一死不還源謝歐陽侍郎寄示新集宫錦三十段金梭新織來殷勤謝君子迢逓寄寒灰鸑鷟對鼓舞神仙雙徘徊誰當巧裁製披去升瑶臺西墅新居漸漸見苔青疎疎遍地生閑穿藤屐起亂踏石階行野鳥啼幽樹名僧笑此情殘陽竹隂裏老圃打門聲酬孫魴幽人還愛雲才子已從軍可信鴛鴻侣更思麋鹿羣新題雖有寄舊論竟難聞知已今如此編聫悉欲焚掃地日日掃復灑不容纎物侵敢望来客口道似主人心蟻過光中少苔依潤處深門前亦如此一徑入疎林書匡山隐者壁紅霞青壁底石室薜蘿垂應有迷仙者曾逢採藥時桃花饒兩頬松葉淺長髭直是來城市何人識得伊送乾康禪師入山過夏由來喧滑境難駐寂寥蹤逼夏揺孤錫離城入亂峯雲門應近寺石路或穿松知在栖禪外題詩寄北宗野鴨野鴨殊家鴨離羣忽逺飛長生緣甚痩近死為傷肥江海㳺空闊池塘啄細㣲紅蘭白蘋渚春暖刷毛衣傷秋旦暮餘生在肌膚十分無眠寒半榻朽立月一株枯夢已隨雙樹詩猶却萬夫名山未歸得可惜死江湖懐東湖寺鐵柱東湖岸寺髙人亦閒往年曾毎日來此看西山竹徑青苔合茶軒白鳥還而今在天末欲去已衰顔寄峴山願公三首形影更誰親應懷漆道人片言酬鑿齒半偈伏姚秦榛莽池經燒蒿萊寺過春心期重西去一共弔遺塵相思恨相逺至理那時何道笑忘言甚詩嫌背俗多青苔閑閣閉白日斷人過獨上西樓望荆門千萬坡彼此無消息所思江漢遥轉聞多患難甚説逺相招老至何悲歎生知便寂寥終期踏松影携手虎溪橋清夜作不惜白日短乍容清夜長坐聞風露滴吟覺骨毛涼興寢無諸病空閑有一床天眀振衣起苔砌落花香贈白處士莘野居何定浮生知是誰衣衫同墅叟指趣似禪師白髪應無也丹砂久服之仍聞創行計春暖向峨嵋崔秀才宿話事轉聞多事心休話苦心相留眀月寺共憶白雲岑蘚壁殘蟲韻霜軒倒竹隂開門又言别誰竟慰塵襟懐天台華頂僧華頂危臨海丹霞褁石橋曾從國清寺上看月眀潮好鳥親香火狂泉噴泬寥欲歸師智者頭白路迢迢送人赴官年少作初官還如行路難兵荒經邑里風俗久凋殘照硯花光淡漂書栁絮乾聊應充侍膳薄俸繼朝飱水鶴鴛鴦與鸂􅈃相狎豈慙君比雪還勝雪同羣亦出羣靜巢孤島月寒夢九皋雲歸路分眀箇飛鳴即可聞湘中感興漁翁那㑹我傲兀葦邊行亂世難逸跡乗流擬濯纓江花紅細碎沙鳥白分眀向夕題詩處春風斑竹聲九日逢虚中虚受楚后萍臺下相逢九日時干戈人事地荒廢菊花籬我已多衰病君猶盡黑髭皇天安罪得解語便吟詩贈李眀府名家宰名邑將謂屈鋒鋩直是難蘇俗能消不下堂氷痕生硯水栁影透琴床何必稱瀟灑獨為詩酒狂暮春久雨作積雨向春隂㝠㝠獨院深已無花落地空有竹藏禽簷溜聲何暴隣僧影亦沉誰知力耕者桑麥最闗心渚宫莫問詩一十五首并序予以辛已嵗蒙主人命居龍安寺察其疎鄙免以趨奉爰降手翰曰盖知心不在常禮也予不覺欣然而作顧謂形影曰爾本青山一衲白石孤禪今王侯搆室安之給俸食之使之樂然萬事都外㳺息自得則雲泉猿鳥不必為狎其放縱若是夫何繫乎自是龍門牆仭歴稔不復瞻覬况他家哉因創莫問之題凡一十五篇皆以莫問為首焉莫問疎人事王侯已任伊不妨隨野性還似在山時靜入無聲樂狂抛正律詩自為仍自愛敢望至公知莫問休持鉢從貧乞已疎侯門叨月俸齋食剰年儲簪履三千外形骸六十餘舊峯何練若松徑接匡廬莫問依劉跡金臺又度秋威儀非上客談笑愧諸侯禮許無拘撿詩推異輩流東林未歸得揺落楚江頭莫問無機性甘名百鈍人一床鋪冷落長日卧精神分已疎知舊詩還得意新多才碧雲客時或此相親莫問闗門意從來寡往還道應歸淡泊身合在空閒四面苔圍綠孤牕雨洒斑夢尋何處去秋色水邊山莫問休貪戀浮雲逐性情人間髙此道禪外剰他名夏雨松邊坐秋光水畔行更無時忌諱容易得題成莫問多山興晴樓獨凭時六年滄海寺一别白蓮池句早逢名匠禪曾見祖師㝠捜與真性清淨裏尋思莫問伊嵇懶流年已付他話通時事少詩着野題多夢外春桃李心中舊薜蘿浮生此不悟剃髪竟如何莫問休行脚南方已徧尋了應須自了心不是他心赤水珠何覔寒山偈莫吟誰同論此理杜口少知音莫問孱愚格天應只與閒合居長樹下那稱衆人間跡絶為真隐機忘是大還終當學支遁買取箇青山莫問無求意浮雲喻可知滿盈如不戒倚伏更何疑樂矣賢顔子窮乎聖仲尼已過知命嵗休把運行推莫問閒行趣春風野水涯千門無謝女兩岸有楊花好鶴曾為客真龍或作虵踟蹰自迴首日脚背樓斜莫問真消息中心只自知清風含笑詠眀月混希夷壊衲涼天擁𤣥文靜夜披善哉温伯子言外認揚眉莫問衰殘質流光速可悲寸心修未了長夀欲何為坐卧身多倦經行骨漸疲分眀説此苦珍重竺乾師莫問野騰騰勞形巳不能慇懃無上士珍重有名僧生覺心心黙行思步步氷終歸石房裏一㸃夜深燈病起見王化荆州新秋病起雜題一十五首病起見王化融融古帝鄉曉煙凝氣紫晚色作雲黄四野歌豐稔千門唱樂康老身仍未死猶詠好風光病起見圗畫病起見圖畫雲門興似燒衲衣椶笠重嵩岳華山遥命在齋猶赴刀閑髪盡凋秋光漸輕健欲去倚江橋病起見苔錢病起見苔錢規模遍地圓兒童掃不破子母自相連潤屋何曾有緣牆謾可憐虛教作銅臭空使外人傳病起見庭竹病起見庭竹君應悲我情何妨甚消痩却稱苦修行毎謝侵床影時迴傍枕聲秋來漸平復吟遶骨毛輕病起見生涯病起見生涯資緣覺甚奢方袍嫌垢敝律服變光華頗愧同諸俗何嘗異出家三衣如兩翼珍重汝寒鴉病起見秋扇病起見秋扇風前悟感傷念予當咽絶得爾致清涼沙鷺如揺影汀蓮似綻香不同媫妤詠託意怨君王病起見衰葉病起見衰葉飄然似我身偶乗風有韻初落地無塵縱得紅霑露爭如緑帶春因傷此懐抱聊寄一篇新病起見庭栢病起見庭栢青青我不任力扶乾痩骨勉對嵗寒心韻謝疎篁合根容片石侵衰殘想長夀時倚就閒吟病起見庭蓮病起見庭蓮風荷已颯然開時聞馥郁枕上正纒綿本在滄江闊移来碧沼圓却思香社裏葉葉漏聲連病起見庭菊病起見庭菊幾勞栽種工可能經卧疾相倚自成叢翠蕚低含露金英盡亞風那知予愛爾不在酒杯中病起見庭石病起見庭石豈知經夏眠不能資藥價空自作苔錢翠憶藍光底青思瀑影邊嵒僧應笑我細碎種階前病起見庭莎病起見庭莎緣階傍竹多遶行猶未得靜聽復如何蟋蟀幽中響蟪蛄深處歌不緣田地窄剰種任婆娑病起見苔色病起見苔色凝然陣未枯淺深圍柱礎詰曲遶廊廡碧翠文相間青黄勢自鋪為錢虚玷染畢竟不如無病起見秋月病起見秋月正當三五時清光應鑒我幽思更同誰惜坐身猶倦牽吟氣尚羸眀年七十六約此健相期病起見閑雲病起見閑雲空中聚又分滯留堪笑我舒巻不如君觸石終無跡從風或有聞仙山足鸞鳳歸去自同羣夜坐聞雪寄所知初宵飛霰急竹樹洒乾輕不是知音者難教愛此聲漸凌孤燭白偏激苦心清堪想同文友忘眠坐到眀懐洞庭憶過巴陵嵗無人問去留中宵滿湖月獨自在僧樓漁父真閒唱靈均是謾愁今來欲長往誰借木蘭舟欲逰龍山鹿苑有作龍山門不逺鹿苑路非遥合逐閒身去何須待客招年華殘兩鬢筋骨倦長宵聞説峯前寺新修白石橋再逢晝公竟陵西别後徧地起刀兵彼此無緣着雲山有處行久吟難敵句終忍不求名年鬢俱如雪相看眼且眀送人逰武陵湘中為子歌行樂西南入武陵風煙無戰士賔榻有吟僧山遶軍城疊江臨寺閣層遍尋幽勝了湘水泛清澄酬九經者九經三史學窮妙又窮㣲長白山初出青雲路欲飛江僧酬雪句沙鶴識麻衣家在黄河北南來偶未歸寄贈集灘二公聞有難名境因君住更名軒牕中夜色風月遶灘聲客好過無厭禽幽畫不成終期一尋去聊且寄吟情夏日作鷰雀語相和風池滿芰荷可驚成事晚殊喜得閒多竹衆涼欺水苔繁綠勝莎無慙孤聖代賦詠有詩歌行路難下浸與髙盤不為行路難是非真險惡翻覆作峯巒漆媿同時黒朱慙巧處丹令人畏相識欲畫白雲看送玉泉道者迴山寺却憶西峯頂經行絶愛憎别來心念念歸去雪層層石塢尋春笋苔龕續夜燈應悲塵土裏追逐利名僧謝王拾遺見訪兼寄篇什竹裏安禪處生涯一印灰經年乞食過昨日諫臣来愧把黄梅偈曾酬白雪才因令識鳥跡重疊在蒼苔題張氏池亭樹石叢叢别詩家趣向幽有時閒客散始覺細泉流蝶到琴棊畔花過島嶼頭月眀紅藕上應見白龜逰送人南逰且聴吟贈逺君此去蒙州瘴國頻聞説邊鴻亦不逰蠻花藏孔雀野石亂犀牛到彼誰相慰知音有郡侯題眀公房寺北聞湘浪牕南見嶽雲自然髙日用何要出人羣瓦滴殘松雨爐香匝印文近年精易道疑者曉紛紛寄顧處士半年離别夢來往即湖邊兩幅闗山雪尋常在眼前項容藏古翠張藻巻寒烟藍淀圗花鳥時人不惜錢貽徐生可能東海子清苦在貧居掃地無閑客堆牕有古書少年猶若此向老合何如去嵗頻相訪今來見亦疎謝虚中上人晚秋見寄楚外同文在荆門得信時幾重相别意一首晚秋詩日暮山沉雨蓮殘水滿池登樓試南望為子動歸思白蓮集巻五欽定四庫全書白蓮集巻六唐釋齊已撰
