body:
  text: 風騷㫖格六詩廬嶽僧齊己撰詩有六義詩有十體詩有十勢詩有二十式詩有四十門詩有六斷詩有三格風騷㫖格六詩一曰大雅二曰小雅三曰正風四曰變風五曰變大雅六曰變小雅大雅一氣不言含有象萬靈何處謝無私小雅天流皓月色池散芰荷香正風都來消帝力全不用兵防變風當道冷雲和不得滿郊芳草即成空變大雅蟬離椘樹鳴猶少葉到嵩山落更多變小雅寒禽沾古樹積雪占蒼苔詩有六義一曰風高齊日月方為道動合乾坤始是心二曰賦風和日暖方開眼雨潤煙濃不舉頭三曰比丹頂西施頰霜毛四皓鬚四曰興水諳彭澤濶山憶武陵深五曰雅卷簾當白晝移榻對青山逺道擎空鉢深山踏落花六曰頌君恩到銅柱蠻歀入交州詩有十體一曰高古千般貴在無過達一片心閒不奈何二曰清奇未曾將一字容易謁諸侯三曰逺近已知前古事更結後人看四曰雙分船中江上景晚泊早行時五曰背非山河終決勝椘漢且橫行六曰無虛山寺鐘樓月江城鼓角風七曰是非須知項籍劔不及魯陽戈八曰清潔大雪路亦宿深山水也齊九曰覆粧叠巘供秋望無雲到夕陽十曰闔門卷簾黃葉落鎖印子規啼詩有十勢獅子返擲勢離情遍芳草無處不萋萋猛虎踞林勢窗前間詠鴛鴦句壁上時觀獬豸圖丹鳳銜珠勢正思浮世事又到古城邊毒龍顧尾勢可能有事關心後得似無人識面時孤鴈失羣勢詩闕洪河側掌勢游人微動水高岸更生風龍鳳交吟勢崑玉已成廊廟器澗松猶是薜蘿身猛虎投澗勢仙掌月明孤影過長門燈暗數聲來龜潛巨浸勢養猿寒嶂疊擎鶴密林疏鯨吞巨海勢袖中藏日月掌上握乾坤詩有二十式一曰出入雨漲花爭出雲空月半生二曰高逸夜過秋竹寺醉打老僧門三曰出塵逍遙非俗趣楊柳謾春風四曰廽避鳥正啼隋柳人須出椘山五曰並行終夜冥心坐諸峯呌月猿六曰艱難覔句如探虎逢知似得仙七曰逹時高風飄雨雪一室掩香燈八曰度量還有冥心者間尋此境來九曰失時高秋初雨後夜半亂山中十曰靜興古屋無人到殘陽滿地時十一曰知時前村深雪裏昨夜一枝開十二曰暗㑹重城不鎖夢每夜自歸山十三曰直擬禹力不到處河聲流向西十四曰返本又因風雨夜重到古松門十五曰功勳馬曾金鏃中身有寶刀痕十六曰拋擲琴書流二國風雨出秦關十七曰背非山河終決勝椘漢且橫行十八曰進退日午游都市天寒住華山十九曰禮義送我杯中酒與君身上衣二十曰兀坐自從青草出便不下階行詩有四十門一曰皇道明堂坐天子月朔朝諸侯二曰始終養雛成大鶴種子作高松三曰悲喜兩行燈下淚一𥿄嶺南書四曰隱顯道晦金雞伏時來木馬鳴五曰惆悵此别又千里少年能幾時六曰道情誰來看山寺自是掃松門七曰得意此生還自喜餘事不相侵八曰背時白髮無心鑷青山得意多九曰正風一春能幾日無雨亦多風十曰返顧逺憶諸峰頂曾栖此性靈十一曰亂道苦雨漲秋濤狂風翻野燒十二曰抱直須知三尺劍只為不平人十三曰世情要路爭先進閒門避處多十四曰康救傍人皆默語當路好提防十五曰貞孝無家空托夢主祭不從人十六曰薄情君恩秋後薄日夕向人疏十七曰忠正敢將心為主豈愳語從人十八曰相成怪得登科晚須逢聖主知十九曰嗟歎淚流襟上血髮白鏡中絲二十曰俟時明主未巡狩白頭猶釣魚二十一曰清苦在處人投卷移居雨著衣二十二曰騷愁巳難消永夜況復聽秋霖二十三曰眷戀欲起游方興重來繞塔行二十四曰想像溪霞流火色松日照爐光二十五曰志氣未拋無逺路難作便歸人二十六曰雙擬冥目冥心坐花開花落時二十七曰向時黑壤生紅木黃猿領白兒二十八曰傷心六國空流血孤祠掩落花二十九曰鑒戒因思後庭曲懶上景陽樓三十曰神仙一為嵩嶽客幾喪雒陽人三十一曰破除大都時到此不是世無情三十二曰蹇塞氣蒸垂柳重寒勒牡丹遲三十三曰鬼怪山魅隔窗舞鵩鳥入簾飛三十四曰亂道日落月未上鳥栖人獨行三十五曰世情如何人少重都為帶寒開三十六曰雅風日落無行客天寒有去鴻三十七曰嗟歎拭淚沾襟血梳頭滿面絲三十八曰是非須知項籍劍不及魯陽戈三十九曰理義送我杯中酒典君身上衣四十曰清潔大雪路亦宿深山水也齊詩有六斷一曰合題可憐半夜嬋娟月正對五侯殘酒卮二曰背題尋常風雨夜應有鬼神看三曰即事翻嫌易水上細碎動離魂四曰因起閒尋古廊畫記得列仙名五曰不盡意此心只待相逢說時復登樓看逺山六曰取時西風起過鴈一一向瀟湘詩有三格上格用意那堪懷逺道猶自上高樓九江有浪船難濟三峽無猿客自愁中格用氣直饒人買去還向柳邊栽四海魚龍精魄冷三山鸞鳳骨毛寒下格用事片石猶臨水無人把釣竿一輪湘渚月萬古獨醒人貫休晚泊湘江風騷㫖格
