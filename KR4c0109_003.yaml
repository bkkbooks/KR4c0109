body:
  text: 廬嶽僧齊己撰過陳陶處士舊居一室貯琴樽詩皆大雅言夜過秋竹寺醉打老僧門逺燒來籬下寒𬞞簇石根間庭除鶴迹半是杖頭痕寄敬亭清越敬亭山色古廟與寺松連住北修行過春風四十年鼎嘗天柱茗詩硾剡溪箋冥目應思著終南北闕前湘江漁父湘潭春水滿岸逺草青青有客釣煙月無人論醉醒門前蛟蜃氣簑上蕙蘭馨曾受蒙莊子逍遙一卷經書古寺僧房緑樹深深處長眀焰焰燈春時逰寺客花落閉門僧萬法心中寂孤泉石上澄勞生莫相問喧默不相應湖西逸人老隱洞庭西漁樵共一溪琴前孤鶴影石上逺僧題橘柚園林熟兼葭徑路迷君能許鄰並分藥斸春畦瀟湘二十韻二水逺難論從離向坎奔冷穿千嶂脈清過幾州門闊去多凝白傍來盡帶渾經逰聞舜禹表裹見乾坤浦靜魚間釣灣涼鴈自屯月來分野底雲度見秋痕暮氣藏鄰寺寒濤聒近村離騷傳永恨鼓瑟奏遺魂霧擁魚龍窟槎欹島嶼根秋風帆上下落日樹沉昏桞少砂洲缺苔多古岸存禽巢依橘柚獺徑入蘭蓀色自江南絶名聞海內尊吳頭雄莫遏漢口壯堪吞寥泬晴方映馮夷信忽翻渡遙峰翠疊汀小荻花繁勢接湖煙漲聲和瘴雨噴急搖吟客舫狂濺野人樽疏鑿誰窮夲澄鮮自有源對兹傷九曲含濁出崑崙江行早彂舟子相呼起長江未五更幾程星月在猶載夢魂行鳥亂村林過人喧水柵橫蒼茫􅊭野外漸認逺峰名宜陽道中作宜陽南面路下嶽又經過楓葉紅遮店芒花白滿坡猿無山漸薄鴈衆水還夛日落猶前去諸村牧監歌落日晚照背髙臺殘鐘殘角催能銷幾度月已是半生來吹葉隂風彂漫空暝色回因思古人事更變畫成埃春興柳暖鶯多語花眀草盡長風流在詩句牽率在池塘呌切禽名宇飛忙蝶性莊時來真可惜自勉掇蘭芳逺山天際雲根破寒山列翠回幽人當立久白鳥背飛來瀑濺何州地僧尋幾嵪苔終須拂巾履獨去謝塵埃和鄭谷郎中幽棲之什誰知間退迹門􅏙入寒汀靜倚雲僧杖孤看野燒星墨霑吟石黑苔染釣船青相對惟溪寺𥘉宵聞念經勉道林謙光鴻藴二首舊林諸侄在還住􅊭師房共焚修地同聞水石香莫將間世界擬敵好時光須看南山下無名塜滿岡渚宫自勉二首晨午殊豐足伊何撓肺腸形容侵老病山水憶韜藏必謝金臺去還携鐵錫將東林露壇畔舊對白蓮房畢竟擬何求隨緣去住休天涯逰勝境海上宿仙洲夢好尋無迹詩成旋不畹從人笑輕事獨自憶莊周謝灉湖茶灉湖唯上貢何以惠尋常還是詩心苦堪消蠟面香碾聲通一室烹色帶殘陽若有新春者西來信勿忘寄歸州馬判官郡帶女䫋名民康境亦寧宴梳秋鬢白間坐暮山青贈客椒𥘉熟尋僧酒半醒應懷舊居處歌管隔墻聽倦客閉眼即關門人間事倦聞如何迎好客不似看間雲少𣣔資三要多言讓十分踈慵本吾性任笑早離羣送靈辨上人逰五臺此去清涼頂期瞻大聖容便應過洛水即未上嵩峰殘照催行影幽林惜駐蹤想登金閣望東北極兵峰靜坐坐卧與行住入禪還出吟也應長日月消淂箇身心默論相少黃梅付囑深門前古松􅏙時起步淸陰謝虗中上人寄示題天策閣詩天策二首作境幽搜亦玄閣橫三椘上題挂九霄邉寺額因摽勝詩人合遇賢他時誰倚檻吟此豈忘筌荆門寄懷章供奉兼呈幕中知己紫衣居貴上青衲老關中事佛門相似朝天路不同神凝無惡夢詩淡老真風聞道知音在官髙信莫通江令石思量江令意􅋢石甚悠悠貪向深宫去死同忘國休兩株荒草裏千古暮江頭若似黃金貴隋軍也不留月下作良夜如清晝幽人在小庭滿空垂列宿那箇是文星世界歸誰是心魂向自寧何當見堯舜重為造生靈逰道林寺四絶亭觀宋杜詩版宋杜詩題在風騷到此真獨來終日看一為拂秋塵古石生寒仞春松脫老鱗髙僧眼根淨應見客吟神勉詩僧莫把毛生刺低回謁李膺須防知佛者解笑􅋢名僧道性宜如水詩情合似氷還同蓮社客聫唱繞香燈謝人墨珍重歲寒煙携來路幾千只應真典誥消得苦磨研正色浮端硯精光動蜀箋因君強濡染捨此即忘筌送人逰玉泉寺西風大雪開萬向空堆客貴猶尋去僧髙肯不來潭澄猿覷月竇冷鹿眠苔公子將才子聫題與未回寄鄭谷郎中詩心何以傳所證自同禪覔句如探虎逢知似得仙神清太古在字好雅風全曾沐星郎許終慙是斐然春雨𣣔布如膏勢先聞動地雷雲龍相得起風電一時來霡霂農桑野冥𪷟楊柳臺何人待晴暖庭有牡丹開眀月峰眀月峰頭石曾聞學月眀别舒長夜彩髙照一村耕頗亂無私理徒驚鄙俗情傳云遭鑿後頑白在峥嶸謝人惠紫栗拄杖仙掌峰前得何當此見遺百年衰朽骨六尺歲寒姿雪外兼松憑泉邉待月欹他時出山去猶謝見相隨送人逰湘湖君逰南國去旅夢若為寧一路隨鴻雁千峯繞洞庭林眀楓盡落野黑燒𥘉經有興尋僧否湘西寺最靈小松彂地才過脈蟠根已有靈巖霜百草白深院一株青後夜蕭騷動空階蟋蟀聼誰于千歲外吟繞老龍形金江寓居老盤應未永聊此養間迹野趣今何似詩題舊不如春篁離籜盡陂藕折花𥘉終夜秋雲是從風恣卷舒晚夏金江寓居答友生日日衝殘熱相尋入亂蒿間中滋味逺詩裹是非髙碧聳新生竹紅垂半熟桃時難未可出且𣣔淬豪曺寄李洞秀才到處聽時論知君屈最深秋風幾西笑抱玉但傷心野水翻紅藕滄江老白禽相思未相識聞在蜀中吟過商山疊疊疊嵐寒紅塵翠裏盤前程有名利此路莫艱難雲木侵天老輪蹄到月殘何能尋四皓過盡見長安蟬八韻咽咽復啾啾夛來自蚤秋園林􅋽正好風雨思相收在處聲無别何人淚𣣔流冷憐天露滴傷共野禽逰靜息深依竹驚移瞥過樓分眀晴渡口凄切暮關頭時節推應㝎飛鳴即未休年年聞爾苦逺憶所居幽鷺鷥二首日日滄江去時時得意歸自能終潔白何慮悮翻飛晚立銀塘濶秋栖玉露微殘陽葦花畔雙下釣􅜕磯雪裏曾迷我籠中舊養君忽從紅蓼岸飛出白鷗群影照翹灘浪翎濡宿島雲鴛鴻解相憶天上列紛紛送僧歸南嶽濁世住終難孤峯念永安逆風睂磔磔衝雪錫珊珊石室關霞嫩松枝拂蘚乾岩猿應認得連臂下勾欄夏日林下作煩暑莫相煎森森在眼前暫來還盡日獨坐只聞蟬草媚終難死花飛卆未蔫秋風捨此去滿篋貯新篇村居寄懷風雨如堯代何心𣣔退藏諸侯行教化下國自耕桑道挫時機盡禪留話路長前溪久不過忽覺早禾香酬王秀才相于分倍親靜論到吟真王澤曾無外風騷甚少人鴻隨秋過盡雪向臘飛頻何處夛幽勝期君作近鄰贈無本上人往年吟月社固亂散揚州未免無端事何妨出世流洞庭禪過臘衡嶽坐經秋終説將衣鉢天台老去休寄華山司空圖天下艱難際全家入華山幾勞丹詔問空見使臣還瀑布寒吹夢蓮峯翠􅊜關兵戈阻相訪身老瘴雲間題真州精舍波心精舍好那岸是繁華礙目無髙樹當門即逺沙晨齋來海客夜磬到漁家石鼎秋濤靜禪回有嶽茶懷道林寺因寄仁用二上人名山知不逺長憶寺門松昨晚登樓見前年過夏峰雨餘雲腳樹風外日西鐘莫更來東岸紅塵沒馬蹤尋陽道中作秋聲連嶽樹草色遍汀洲夛事時為客無人處上樓雲迹片雨歇野闊九江流𣣔向南朝去詩僧有惠休東林雨後望香爐峰翠􅊜僧窗裡寒堆鳥道邉靜思尋去路危繞落來泉暮雨開青壁朝陽照紫煙二林夛長老誰憶上頭禪寄雙泉大師師兄清泉流眼底白道倚岩􅏢後夜禪𥘉入前溪樹折氷南􅋽來的的北魏去騰騰敢告吾師意密傳門外僧送人潤州尋兄弟君話南徐去迢迢過建康弟兄新得信鴻雁久離行木落空林浪秋殘漸雪霜間逰登北固東海望滄滄貽張生日日見入寺未曾含酒容間聼老僧語坐到夕陽鐘竹裏行夛影花邉偶過蹤猶言謝生計隨我去孤峰送人逰雍亰君來乞詩别聊與愴前程九野未無事少年何逺行商雲盤翠險秦甸下煙􅊭應見周南化如今在雍亰春草處處碧萋萋􅊭原帶日西堪隨逰子路逺入鷓鴣啼金谷園應沒夫差國已迷𣣔尋蘭蕙徑荒穢滿汀畦懷華頂道人華頂星邉出真宜上士家無人觸牀榻滿屋貯煙霞坐卧􅎔天井晴眀見海涯禪餘稿上去屐齒印松花寄自牧上人五老回無計三峰去不成何言謝雲鳥此地識公卿夢愧將僧説心嫌觸類生南朝古山寺曾憶共尋行靜坐日日只騰騰心機何以興詩魔苦不利禪寂頗相應硯滿塵埃點衣夛坐卧􅏢如斯自消息合是箇間生送人逰衡嶽荆椘臘將殘江湖蒼莾間孤舟載髙興千里向名山雪浪來無㝎風帆去是間石稿僧問我應寄嶽茶還答知己自闕下寄書故人勞札翰千里寄荆臺知戀文眀在未尋江漢來羣機喧白晝陸海漲黃埃得路應相笑無成守死灰新筍亂迸苔錢破參差小出欄層層離錦籜節節露琅玕直上心終徑四垂煙漸寬𣣔知含古律試剪鳳簫看寄唐洙處士行僧去湘水歸鴈度荆門彼此亡家國東西役夢魂夛慵如長傲久住不生根曾問興亡事丁寧寄勿言謝人惠竹蠅拂妙刮筠篁製纎柔玉柄同拂蠅聲滿室指月影遙空敢捨經行外常將宴坐中揮談一無取千萬愧生公新燕燕燕知何事年年應候來却緣華屋在長得好時催花外銜泥去空中接食回不同黃雀意迷逐網羅媒謝王先輩寄壇深謝髙科客名氊寄惠重靜思生朔漠和雪長蒙茸摺坐資禪悅鋪眠減病容他年從破碎憺去卧孤峰寄懷闕下髙輦先輩卷去歲逢亰使因還所寄詩難留天上作曾换月中枝趣極僧迷旨功深鬼不知仍聞得名後特地更忘疲和孫支使惠示院中庭竹之什憶就江僧乞和煙得一莖剪黃憎舊夲科緑惜新生護噪蟬身穩資吟客眼眀星郎有佳詠雅合此君聲苦熱中江上懷爐峰舊居舊寄爐峰下杉松繞石房年年五六月江上憶清􅋽久別應荒廢終歸隔渺茫何當便搖落披衲玩秋光送僧逰龍門香山寺君到香山寺探幽莫損神且尋風雅主細看樂天真江上值春雨江臯正月雨􅊭陸亦波瀾半是峨睂雪重為澤國寒田淹寢盡客棹往來難愁殺騷人路滄浪正渺漫七十作七十去百歲都來三十春縱饒生得到終免死無因密理方通理栖真始見真沃洲匡阜客幾劫不迷人謝虛中寄新詩舊友一千里新詩五十篇此文經大匠不見已多年趣極同無迹精深合自然相思把行坐南望隔塵煙送彬座主赴龍安請講兩論久研精龍安受請行春城雨雪霽古寺殿堂眀白髮老僧聼金毛師子聲同流有誰共别著國風清夏日荆渚書懷嵩嶽去值亂匡廬回阻兵中途息瓶錫十載依公卿不那猿鳥性但懷林泉聲何時遂情興吟繞杉松行春日西湖作一水繞孤島閉門掩春草曾無長者轍枉此問衰老謝中上人寄茶春山穀雨前併手摘芳煙緑嫩難盈籠清和易晚天且招鄰院客試煮落花泉地逺勞相寄無來又隔年送節大德歸闕西亰曾入內東洛又朝天聖上方虛席僧中正乏賢晨光金殿裏紫氣玉簾前知祝唐堯化新恩異往年覽清尚卷李洞僻相似得詩先示師鬼神迷去處風月背吟時格己搜清竭名還看紫卑從容味髙作翻為古人疑荆門送晝公歸彭澤舊居彭澤舊居在匡廬翠疊前因思從椘寺便附入吳船岸繞春殘樹江浮晚霽天應過虎溪社佇立想諸賢白蓮集卷第三
